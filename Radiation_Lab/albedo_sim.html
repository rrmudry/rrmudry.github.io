<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Albedo Simulation: Absorption & Reflection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #020617;
        /* Very dark blue/black slate */
        color: #f8fafc;
        overflow: hidden;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .glass-panel {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 1.5rem;
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        transition: all 0.3s ease;
      }

      /* The simulation canvas area */
      #sim-container {
        position: relative;
        flex: 1;
        margin: 1.5rem 1.5rem 0 1.5rem;
        border-radius: 1.5rem 1.5rem 0 0;
        overflow: hidden;
        background: linear-gradient(to bottom, #000000 0%, #0f172a 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-bottom: none;
        box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.8);
      }

      #canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Dashboard controls at the bottom */
      #dashboard {
        flex-shrink: 0;
        margin: 0 1.5rem 1.5rem 1.5rem;
        padding: 1.5rem;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 1.5rem;
        z-index: 10;
      }

      /* Material buttons */
      .material-btn {
        background: rgba(30, 41, 59, 0.8);
        border: 2px solid transparent;
        border-radius: 1rem;
        padding: 0.75rem 1rem;
        color: #cbd5e1;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.25rem;
        flex: 1;
      }

      .material-btn:hover {
        background: rgba(51, 65, 85, 0.8);
      }

      .material-btn.active {
        border-color: #38bdf8;
        background: rgba(14, 165, 233, 0.15);
        color: #fff;
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
      }

      /* Value display blocks */
      .value-box {
        background: rgba(0, 0, 0, 0.4);
        border-radius: 1rem;
        padding: 1rem;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .value-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #94a3b8;
        font-weight: 700;
        margin-bottom: 0.25rem;
      }

      .value-number {
        font-size: 2.5rem;
        font-weight: 900;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      /* Thermometer visual */
      .thermo-container {
        position: relative;
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        margin-top: 1rem;
        overflow: hidden;
      }

      .thermo-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          #38bdf8 0%,
          #fde047 50%,
          #f43f5e 100%
        );
        border-radius: 4px;
        transition: width 0.3s ease;
      }

      /* Range Slider Customization */
      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 20px;
        width: 20px;
        border-radius: 50%;
        background: #fde047;
        /* Yellow sun color */
        cursor: pointer;
        margin-top: -8px;
        box-shadow: 0 0 10px rgba(253, 224, 71, 0.6);
      }

      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
      }
    </style>
  </head>

  <body>
    <header
      class="flex justify-between items-center p-6 pb-0 shrink-0 z-10 absolute w-full top-0 left-0 pointer-events-none"
    >
      <div class="pointer-events-auto glass-panel px-6 py-3">
        <h1
          class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-sky-400 via-emerald-300 to-amber-300"
        >
          Albedo Concept Explorer
        </h1>
        <p
          class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1"
        >
          Radiation Absorption & Reflection
        </p>
      </div>

      <div
        class="pointer-events-auto glass-panel px-6 py-3 flex items-center gap-4"
      >
        <div class="flex flex-col">
          <label
            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1"
            >Incoming Solar Energy</label
          >
          <input
            type="range"
            id="intensity-slider"
            min="10"
            max="200"
            value="100"
            class="w-48"
          />
        </div>
      </div>
    </header>

    <div id="sim-container">
      <canvas id="canvas"></canvas>
    </div>

    <div id="dashboard" class="glass-panel">
      <!-- Surface Selection -->
      <div class="flex flex-col gap-3">
        <h2
          class="text-xs font-bold text-slate-400 uppercase tracking-widest text-center"
        >
          Select Surface Material
        </h2>
        <div class="flex flex-wrap gap-2 h-full">
          <button
            class="material-btn active"
            data-surface="snow"
            data-albedo="0.85"
            data-color="#f8fafc"
          >
            <span class="text-xl">❄️</span>
            <span class="text-xs">Fresh Snow</span>
          </button>
          <button
            class="material-btn"
            data-surface="ice"
            data-albedo="0.60"
            data-color="#bae6fd"
          >
            <span class="text-xl">🧊</span>
            <span class="text-xs">Sea Ice</span>
          </button>
          <button
            class="material-btn"
            data-surface="sand"
            data-albedo="0.40"
            data-color="#fcd34d"
          >
            <span class="text-xl">🏜️</span>
            <span class="text-xs">Desert Sand</span>
          </button>
          <button
            class="material-btn"
            data-surface="grass"
            data-albedo="0.25"
            data-color="#4ade80"
          >
            <span class="text-xl">🌿</span>
            <span class="text-xs">Grassland</span>
          </button>
          <button
            class="material-btn"
            data-surface="forest"
            data-albedo="0.15"
            data-color="#065f46"
          >
            <span class="text-xl">🌲</span>
            <span class="text-xs">Dark Forest</span>
          </button>
          <button
            class="material-btn"
            data-surface="asphalt"
            data-albedo="0.05"
            data-color="#1e293b"
          >
            <span class="text-xl">🛣️</span>
            <span class="text-xs">Asphalt</span>
          </button>
          <button
            class="material-btn"
            data-surface="ocean"
            data-albedo="0.08"
            data-color="#0284c7"
          >
            <span class="text-xl">🌊</span>
            <span class="text-xs">Deep Ocean</span>
          </button>
        </div>
      </div>

      <!-- Data Readout -->
      <div class="flex gap-4">
        <div class="value-box flex-1 border-sky-500/30">
          <div class="value-label text-sky-400">Albedo (Reflected)</div>
          <div class="flex items-baseline justify-center gap-1 text-sky-300">
            <span id="albedo-val" class="value-number">85</span>
            <span class="text-xl font-bold">%</span>
          </div>
        </div>

        <div class="value-box flex-1 border-rose-500/30">
          <div class="value-label text-rose-400">Absorbed Energy</div>
          <div class="flex items-baseline justify-center gap-1 text-rose-300">
            <span id="absorbed-val" class="value-number">15</span>
            <span class="text-xl font-bold">%</span>
          </div>
        </div>
      </div>

      <!-- Temperature Gauge -->
      <div class="value-box">
        <div class="flex justify-between items-end mb-2">
          <div class="value-label text-amber-400 m-0">Surface Temperature</div>
          <div class="text-amber-300 font-bold">
            <span id="temp-val" class="text-2xl">0.0</span>
            <span class="text-sm">°C</span>
          </div>
        </div>
        <p class="text-[10px] text-slate-500 text-left mb-2">
          Change relative to baseline. Affected by absorption and continuous
          radiant cooling.
        </p>
        <div class="thermo-container">
          <div id="thermo-bar" class="thermo-fill text-right"></div>
        </div>
        <button
          id="reset-temp"
          class="text-[10px] uppercase font-bold text-slate-500 hover:text-white mt-3 transition-colors text-right w-full"
        >
          Reset Temp Baseline
        </button>
      </div>
    </div>

    <script>
      // Simulation State
      const state = {
        albedo: 0.85, // 0 to 1
        surfaceColor: "#f8fafc",
        intensity: 100, // 10 to 200
        temperature: 0.0, // relative degrees
        particles: [],
        surfaceHeatLevel: 0, // Visual glow intensity 0 to 1
      };

      // Constants
      const BASE_EMISSION_RATE = 2; // particles per frame at intensity 100
      const PARTICLE_SPEED = 5;
      const COOLING_RATE = 0.005; // Degrees lost per frame
      const HEATING_FACTOR = 0.05; // Degrees gained per absorbed particle

      // Canvas Setup
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      // UI Elements
      const albedoVal = document.getElementById("albedo-val");
      const absorbedVal = document.getElementById("absorbed-val");
      const tempVal = document.getElementById("temp-val");
      const thermoBar = document.getElementById("thermo-bar");
      const intensitySlider = document.getElementById("intensity-slider");
      const materialBtns = document.querySelectorAll(".material-btn");
      const resetTempBtn = document.getElementById("reset-temp");

      // Particle Class
      class Photon {
        constructor() {
          // Source is the sun at top center
          this.x = canvas.width / 2 + (Math.random() - 0.5) * 100;
          this.y = -10;

          // Angle spreads outwards slightly
          const angle = Math.PI / 2 + (Math.random() - 0.5) * 1.5;
          this.vx = Math.cos(angle) * PARTICLE_SPEED;
          this.vy = Math.sin(angle) * PARTICLE_SPEED;

          this.state = "incident"; // 'incident', 'reflected'
          this.color = "rgba(253, 224, 71, 0.8)"; // Yellow sunlight
          this.radius = Math.random() * 2 + 1.5;
          this.active = true;
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;

          const surfaceY = canvas.height - 40; // Ground level

          if (this.state === "incident" && this.y >= surfaceY - this.radius) {
            // It hit the surface. Determine fate based on albedo.
            if (Math.random() < state.albedo) {
              // Reflected!
              this.state = "reflected";

              // Reflection logic: bounce up and spread out
              // If we just reverse vy, it goes straight back. Let's add more lateral scatter.
              this.vy = -(Math.abs(this.vy) * (0.5 + Math.random() * 0.5)); // upward velocity
              this.vx = this.vx + (Math.random() - 0.5) * 5; // significant lateral scatter

              // Ensure it doesn't get stuck bouncing horizontally
              if (Math.abs(this.vy) < 1) this.vy = -1;

              this.color = "rgba(186, 230, 253, 0.6)"; // Cooler blue/white reflection
            } else {
              // Absorbed!
              this.active = false; // Destroy particle

              // Increase temperature (amount of particles already scales with intensity)
              state.temperature += HEATING_FACTOR;

              // Visual burst effect
              createBurst(this.x, surfaceY);
            }
          }

          // Remove if off screen
          if (
            this.x < 0 ||
            this.x > canvas.width ||
            this.y > canvas.height ||
            this.y < -50
          ) {
            this.active = false;
          }
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();

          // Tail/glow
          ctx.shadowBlur = 10;
          ctx.shadowColor = this.color;
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

      // Heat bursts when absorbed
      const bursts = [];
      function createBurst(x, y) {
        bursts.push({
          x: x,
          y: y,
          radius: 1,
          alpha: 1,
          maxRadius: 15 + Math.random() * 10,
        });
      }

      function drawBursts() {
        for (let i = bursts.length - 1; i >= 0; i--) {
          const b = bursts[i];
          b.radius += 1;
          b.alpha -= 0.05;

          if (b.alpha <= 0) {
            bursts.splice(i, 1);
            continue;
          }

          ctx.beginPath();
          ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(244, 63, 94, ${b.alpha})`; // Rose/red heat
          ctx.fill();
        }
      }

      // Main Loop
      function animate() {
        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Sun
        ctx.beginPath();
        ctx.arc(canvas.width / 2, -20, 80, 0, Math.PI * 2);
        const sunGrad = ctx.createRadialGradient(
          canvas.width / 2,
          -20,
          10,
          canvas.width / 2,
          -20,
          80,
        );
        sunGrad.addColorStop(0, "#fef08a");
        sunGrad.addColorStop(0.5, "rgba(253, 224, 71, 0.5)");
        sunGrad.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = sunGrad;
        ctx.fill();

        // Emit new particles based on intensity
        const emissionRate = BASE_EMISSION_RATE * (state.intensity / 100);
        // Probabilistic emission to handle non-integer rates
        if (Math.random() < emissionRate % 1)
          state.particles.push(new Photon());
        for (let i = 0; i < Math.floor(emissionRate); i++) {
          state.particles.push(new Photon());
        }

        // Update and draw particles
        for (let i = state.particles.length - 1; i >= 0; i--) {
          const p = state.particles[i];
          p.update();
          if (p.active) {
            p.draw();
          } else {
            state.particles.splice(i, 1);
          }
        }

        drawBursts();

        // Draw Surface
        const surfaceY = canvas.height - 40;

        // Ground base
        ctx.fillStyle = state.surfaceColor;
        ctx.fillRect(0, surfaceY, canvas.width, 40);

        // Thermal glow overlay based on temperature
        // Map temp roughly 0-100 to alpha 0-0.8
        const glowAlpha = Math.min((state.temperature / 100) * 0.8, 0.8);
        if (glowAlpha > 0) {
          ctx.fillStyle = `rgba(244, 63, 94, ${glowAlpha})`; // Heat overlay
          ctx.fillRect(0, surfaceY, canvas.width, 40);

          // Radiant glow rising from surface
          const radGrad = ctx.createLinearGradient(
            0,
            surfaceY,
            0,
            surfaceY - 50,
          );
          radGrad.addColorStop(0, `rgba(244, 63, 94, ${glowAlpha * 0.5})`);
          radGrad.addColorStop(1, "rgba(244, 63, 94, 0)");
          ctx.fillStyle = radGrad;
          ctx.fillRect(0, surfaceY - 50, canvas.width, 50);
        }

        // Apply Continuous Cooling (Radiation back into space)
        // Hotter objects cool faster (Stefan-Boltzmann curve approximation)
        if (state.temperature > 0) {
          const coolingAmt = COOLING_RATE + state.temperature * 0.001;
          state.temperature = Math.max(0, state.temperature - coolingAmt);
        }

        updateUI();
        requestAnimationFrame(animate);
      }

      function updateUI() {
        // Update Temp Gauge
        tempVal.innerText = state.temperature.toFixed(1);
        // Cap visual bar at 100 relative max
        const barPct = Math.min(
          Math.max((state.temperature / 100) * 100, 0),
          100,
        );
        thermoBar.style.width = `${barPct}%`;
      }

      // Event Listeners
      intensitySlider.addEventListener("input", (e) => {
        state.intensity = parseInt(e.target.value);
      });

      resetTempBtn.addEventListener("click", () => {
        state.temperature = 0;
      });

      materialBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          // Update active class
          materialBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");

          // Update state
          state.albedo = parseFloat(btn.dataset.albedo);
          state.surfaceColor = btn.dataset.color;

          // Update text readout
          const albs = Math.round(state.albedo * 100);
          albedoVal.innerText = albs;
          absorbedVal.innerText = 100 - albs;
        });
      });

      // Initialize display values
      albedoVal.innerText = Math.round(state.albedo * 100);
      absorbedVal.innerText = 100 - Math.round(state.albedo * 100);

      // Start
      animate();
    </script>
  </body>
</html>
