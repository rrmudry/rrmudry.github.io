<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lighting a Bulb Lab</title>
    <link rel="icon" type="image/png" href="../../assets/unit7_favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom SVG Hover Effects */
        .wire-group {
            cursor: pointer;
        }

        .wire-group:hover .wire-visible {
            stroke: #ef4444 !important;
            transition: stroke 0.2s;
        }

        .btn-rotate:hover circle {
            fill: #eff6ff;
        }

        .btn-delete:hover circle {
            fill: #fef2f2;
        }

        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }
    </style>
</head>

<body class="bg-slate-100 overflow-hidden font-sans select-none touch-none w-full h-screen flex flex-col">

    <!-- Top UI Panel -->
    <div
        class="absolute top-4 left-4 right-4 z-10 flex flex-wrap gap-4 justify-between items-center bg-white p-4 rounded-xl shadow-lg border border-slate-200">
        <div>
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <svg id="zap-icon" class="text-slate-400" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                Lighting a Bulb Lab
            </h1>
            <p class="text-sm text-slate-500 mt-1">
                Drag items to connect. Scroll to zoom. Drag background to pan.
            </p>
        </div>

        <div class="flex flex-wrap gap-3 items-center">
            <!-- Zoom Controls -->
            <div class="flex bg-slate-100 rounded-lg p-1 border border-slate-200">
                <button onclick="handleZoom('out')"
                    class="p-2 hover:bg-white hover:shadow-sm rounded-md transition-all text-slate-600"
                    title="Zoom Out">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                    </svg>
                </button>
                <div id="zoom-text"
                    class="px-3 flex items-center text-xs font-mono font-bold text-slate-500 min-w-[60px] justify-center">
                    100%</div>
                <button onclick="handleZoom('in')"
                    class="p-2 hover:bg-white hover:shadow-sm rounded-md transition-all text-slate-600" title="Zoom In">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        <line x1="11" y1="8" x2="11" y2="14"></line>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                    </svg>
                </button>
            </div>

            <!-- Status -->
            <div id="status-indicator"
                class="px-4 py-2 rounded-lg font-bold flex items-center gap-2 transition-colors bg-slate-100 text-slate-500 border border-slate-200">
                <span id="status-text">⚫ Off</span>
            </div>

            <!-- Action Buttons -->
            <button onclick="addBulb()"
                class="flex items-center gap-2 px-3 py-2 bg-emerald-100 hover:bg-emerald-200 text-emerald-800 rounded-lg transition-colors text-sm font-semibold">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Bulb
            </button>

            <button onclick="resetSimulation()"
                class="flex items-center gap-2 px-3 py-2 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-lg transition-colors text-sm font-semibold">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                Reset
            </button>
        </div>
    </div>

    <!-- Interactive Canvas -->
    <svg id="sim-svg" class="w-full h-full bg-slate-50" viewBox="0 0 800 600"></svg>

    <div id="pan-helper"
        class="absolute bottom-4 left-4 bg-white/80 backdrop-blur p-2 rounded-lg border border-slate-200 text-xs text-slate-500 pointer-events-none hidden">
        Use background to pan &bull; Scroll to zoom
    </div>

    <script>
        const svgEl = document.getElementById('sim-svg');

        // --- Core State ---
        let state = {
            battery: { x: 300, y: 350 },
            bulbs: [{ id: 'bulb-1', x: 500, y: 350, angle: 0 }],
            wires: [], // [{ id, start, end }]
            selectedBulbId: null,
            view: { x: 0, y: 0, zoom: 1 },
            dragging: null,
            drawingWire: null,
            litBulbs: new Map(),
            touches: [],
            termPos: {}
        };

        // --- Math & Calculations ---
        function updateTerminals() {
            const terms = {
                'bat-pos': { x: state.battery.x, y: state.battery.y - 75 },
                'bat-neg': { x: state.battery.x, y: state.battery.y + 60 }
            };

            state.bulbs.forEach(b => {
                const rad = (b.angle * Math.PI) / 180;
                const rotate = (dx, dy) => ({
                    x: b.x + dx * Math.cos(rad) - dy * Math.sin(rad),
                    y: b.y + dx * Math.sin(rad) + dy * Math.cos(rad)
                });

                terms[`${b.id}-base`] = rotate(0, 50);
                terms[`${b.id}-side-l`] = rotate(-16, 30);
                terms[`${b.id}-side-r`] = rotate(16, 30);
            });

            state.termPos = terms;
        }

        function getSvgCoords(e) {
            const clientX = e.clientX ?? (e.touches && e.touches[0]?.clientX) ?? 0;
            const clientY = e.clientY ?? (e.touches && e.touches[0]?.clientY) ?? 0;

            const pt = svgEl.createSVGPoint();
            pt.x = clientX;
            pt.y = clientY;

            const ctm = svgEl.getScreenCTM();
            if (!ctm) return { x: 0, y: 0 };

            const transformed = pt.matrixTransform(ctm.inverse());
            return { x: transformed.x, y: transformed.y };
        }

        function dist(p1, p2) {
            return Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
        }

        // --- Circuit Graph Evaluation Engine ---
        function evaluateCircuit() {
            const termsList = Object.keys(state.termPos);
            const zeroResistanceEdges = [];
            const activeTouches = [];

            // Physical touches
            for (let i = 0; i < termsList.length; i++) {
                for (let j = i + 1; j < termsList.length; j++) {
                    const t1 = termsList[i];
                    const t2 = termsList[j];
                    if (dist(state.termPos[t1], state.termPos[t2]) < 15) {
                        zeroResistanceEdges.push([t1, t2]);
                        const isSameBulbSide = t1.includes('bulb-') && t2.includes('bulb-') &&
                            t1.split('-').slice(0, 2).join('-') === t2.split('-').slice(0, 2).join('-') &&
                            t1.includes('side') && t2.includes('side');
                        if (!isSameBulbSide) activeTouches.push([t1, t2]);
                    }
                }
            }
            state.touches = activeTouches;

            // Wired connections
            const validWires = state.wires.filter(w => state.termPos[w.start] && state.termPos[w.end]);
            validWires.forEach(w => zeroResistanceEdges.push([w.start, w.end]));

            const logicalId = (id) => id.replace('-side-l', '-side').replace('-side-r', '-side');

            const adj = {};
            termsList.forEach(t => { adj[logicalId(t)] = new Set(); });
            zeroResistanceEdges.forEach(([u, v]) => {
                const lu = logicalId(u), lv = logicalId(v);
                if (lu !== lv) {
                    adj[lu].add(lv);
                    adj[lv].add(lu);
                }
            });

            const compId = {};
            let currentComp = 0;
            const visited = new Set();

            const bfs = (startNode) => {
                const q = [startNode];
                visited.add(startNode);
                compId[startNode] = currentComp;
                while (q.length) {
                    const curr = q.shift();
                    for (const nxt of adj[curr]) {
                        if (!visited.has(nxt)) {
                            visited.add(nxt);
                            compId[nxt] = currentComp;
                            q.push(nxt);
                        }
                    }
                }
            };

            for (const t in adj) {
                if (!visited.has(t)) {
                    bfs(t);
                    currentComp++;
                }
            }

            const isShort = compId['bat-pos'] === compId['bat-neg'];
            let newlyLitBulbs = new Map();

            if (!isShort) {
                const compAdj = {};
                for (let i = 0; i < currentComp; i++) compAdj[i] = new Set();

                state.bulbs.forEach(b => {
                    const cBase = compId[`${b.id}-base`];
                    const cSide = compId[`${b.id}-side`];
                    if (cBase !== undefined && cSide !== undefined && cBase !== cSide) {
                        compAdj[cBase].add(cSide);
                        compAdj[cSide].add(cBase);
                    }
                });

                const edgeMinPath = {};
                const visitedPath = new Set();
                const currentPath = [];

                const findPaths = (curr) => {
                    if (curr === compId['bat-neg']) {
                        const len = currentPath.length;
                        currentPath.forEach(edgeStr => {
                            if (!edgeMinPath[edgeStr] || len < edgeMinPath[edgeStr]) {
                                edgeMinPath[edgeStr] = len;
                            }
                        });
                        return;
                    }
                    visitedPath.add(curr);
                    for (const nxt of compAdj[curr] || []) {
                        if (!visitedPath.has(nxt)) {
                            currentPath.push(`${Math.min(curr, nxt)}-${Math.max(curr, nxt)}`);
                            findPaths(nxt);
                            currentPath.pop();
                        }
                    }
                    visitedPath.delete(curr);
                };

                if (compId['bat-pos'] !== undefined && compId['bat-neg'] !== undefined) {
                    findPaths(compId['bat-pos']);
                }

                state.bulbs.forEach(b => {
                    const cBase = compId[`${b.id}-base`];
                    const cSide = compId[`${b.id}-side`];
                    if (cBase !== undefined && cSide !== undefined && cBase !== cSide) {
                        const edgeStr = `${Math.min(cBase, cSide)}-${Math.max(cBase, cSide)}`;
                        if (edgeMinPath[edgeStr]) {
                            newlyLitBulbs.set(b.id, edgeMinPath[edgeStr]);
                        }
                    }
                });
            }

            state.litBulbs = newlyLitBulbs;
            updateUI();
        }

        // --- DOM Update Render Loop ---
        function renderWirePath(x1, y1, x2, y2) {
            const avgX = (x1 + x2) / 2;
            const distance = Math.sqrt((x1 - x2) ** 2 + (y1 - y2) ** 2);
            const loopDirX = avgX < state.battery.x ? -1 : 1;
            const bulgeX = 80 + distance * 0.25;
            const getCpY = (y) => {
                const loopDirY = y < state.battery.y ? -1 : 1;
                return y + loopDirY * (60 + distance * 0.2);
            };
            const cp1X = x1 + loopDirX * bulgeX;
            const cp1Y = getCpY(y1);
            const cp2X = x2 + loopDirX * bulgeX;
            const cp2Y = getCpY(y2);
            return `M ${x1} ${y1} C ${cp1X} ${cp1Y}, ${cp2X} ${cp2Y}, ${x2} ${y2}`;
        }

        function updateUI() {
            // Update DOM overlay
            const hasLit = state.litBulbs.size > 0;
            const zap = document.getElementById('zap-icon');
            zap.setAttribute('class', hasLit ? "text-yellow-500 fill-yellow-500" : "text-slate-400");

            const indicator = document.getElementById('status-indicator');
            indicator.className = hasLit
                ? "px-4 py-2 rounded-lg font-bold flex items-center gap-2 transition-colors bg-yellow-100 text-yellow-700 border border-yellow-300"
                : "px-4 py-2 rounded-lg font-bold flex items-center gap-2 transition-colors bg-slate-100 text-slate-500 border border-slate-200";

            document.getElementById('status-text').innerText = hasLit
                ? `💡 ${state.litBulbs.size} Lit!`
                : '⚫ Off';

            document.getElementById('zoom-text').innerText = `${Math.round(state.view.zoom * 100)}%`;

            document.getElementById('pan-helper').style.display =
                (state.view.zoom !== 1 || state.view.x !== 0 || state.view.y !== 0) ? 'block' : 'none';

            // --- Build SVG Content ---
            let svgContent = `
        <defs>
          <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="10" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1"/>
          </pattern>
        </defs>

        <g transform="translate(${state.view.x}, ${state.view.y}) scale(${state.view.zoom})">
          <!-- Background Grid for panning reference -->
          <rect x="-5000" y="-5000" width="10000" height="10000" fill="url(#grid)" data-action="bg" />
      `;

            // Draw active wires
            state.wires.forEach(w => {
                const p1 = state.termPos[w.start];
                const p2 = state.termPos[w.end];
                if (!p1 || !p2) return;
                const d = renderWirePath(p1.x, p1.y, p2.x, p2.y);
                svgContent += `
          <g class="wire-group" data-action="delete-wire" data-id="${w.id}">
            <path d="${d}" fill="none" stroke="transparent" stroke-width="20" stroke-linecap="round" />
            <path class="wire-visible" d="${d}" fill="none" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round" />
          </g>
        `;
            });

            // Draw drawing wire
            if (state.drawingWire && state.termPos[state.drawingWire.startTerm]) {
                const p = state.termPos[state.drawingWire.startTerm];
                const d = renderWirePath(p.x, p.y, state.drawingWire.currentX, state.drawingWire.currentY);
                svgContent += `<path d="${d}" fill="none" stroke="#93c5fd" stroke-width="6" stroke-dasharray="8 8" stroke-linecap="round" pointer-events="none"/>`;
            }

            // Battery
            svgContent += `
        <g transform="translate(${state.battery.x}, ${state.battery.y})" style="cursor: ${state.dragging?.type === 'battery' ? 'grabbing' : 'grab'}" data-action="drag-battery">
          <rect x="-40" y="-60" width="80" height="120" rx="5" fill="#fbcfe8" stroke="#1f2937" stroke-width="3" />
          <path d="M -15 -60 L -15 -70 C -15 -75, 15 -75, 15 -70 L 15 -60 Z" fill="#9ca3af" stroke="#1f2937" stroke-width="3" />
          <text x="0" y="-30" text-anchor="middle" font-size="30" font-weight="bold" fill="#1f2937" pointer-events="none">+</text>
          <text x="0" y="45" text-anchor="middle" font-size="40" font-weight="bold" fill="#1f2937" pointer-events="none">-</text>
        </g>
      `;

            // Bulbs
            state.bulbs.forEach(b => {
                const litLevel = state.litBulbs.get(b.id);
                const isLit = litLevel !== undefined;
                const isSelected = state.selectedBulbId === b.id;
                const glowAlpha = isLit ? Math.max(0.2, 1.1 - litLevel * 0.25) : 0;
                const fillAlpha = isLit ? Math.max(0.6, 1.0 - (litLevel - 1) * 0.15) : 0;

                svgContent += `
          <g transform="translate(${b.x}, ${b.y}) rotate(${b.angle})" style="cursor: ${state.dragging?.type === 'bulb' && state.dragging.id === b.id ? 'grabbing' : 'grab'}" data-action="drag-bulb" data-id="${b.id}">
            ${isSelected ? '<circle r="65" fill="transparent" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 4" class="animate-pulse" />' : ''}
            
            <path d="M -25 -20 C -30 -60, 30 -60, 25 -20 C 25 10, 16 20, 16 20 L -16 20 C -16 20, -25 10, -25 -20 Z"
                  fill="${isLit ? `rgba(253, 224, 71, ${fillAlpha})` : 'rgba(241, 245, 249, 0.6)'}"
                  stroke="${isLit ? '#ca8a04' : '#94a3b8'}" 
                  stroke-width="3"
                  filter="${isLit ? 'url(#glow)' : ''}" />
                  
            <path d="M -8 20 L -4 -10 L 4 -10 L 8 20" stroke="${isLit ? '#fef08a' : '#64748b'}" stroke-width="2" fill="none" />
            ${isLit ? `<circle cx="0" cy="-10" r="15" fill="rgba(255,255,255,${glowAlpha})" filter="url(#glow)" pointer-events="none" />` : ''}
            
            <rect x="-16" y="20" width="32" height="20" fill="#cbd5e1" stroke="#334155" stroke-width="3" />
            <line x1="-16" y1="26" x2="16" y2="26" stroke="#475569" stroke-width="2" />
            <line x1="-16" y1="32" x2="16" y2="32" stroke="#475569" stroke-width="2" />
            <path d="M -10 40 L 10 40 L 4 50 L -4 50 Z" fill="#1e293b" stroke="#000" stroke-width="2" />
          </g>
        `;

                // Controls (Rotate & Delete)
                if (isSelected) {
                    const shift = state.bulbs.length > 1 ? -22 : 0;
                    svgContent += `
            <g transform="translate(${b.x}, ${b.y - 85})">
              <g class="btn-rotate" transform="translate(${shift}, 0)" style="cursor: pointer;" data-action="rotate-bulb" data-id="${b.id}">
                <circle r="16" fill="white" stroke="#3b82f6" stroke-width="2" />
                <path d="M -4 -5 A 7 7 0 1 1 -7 2 L -7 2 M -7 -3 L -7 2 L -2 2" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </g>
              ${state.bulbs.length > 1 ? `
                <g class="btn-delete" transform="translate(22, 0)" style="cursor: pointer;" data-action="delete-bulb" data-id="${b.id}">
                  <circle r="16" fill="white" stroke="#ef4444" stroke-width="2" />
                  <path d="M -5 -5 L 5 5 M 5 -5 L -5 5" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" />
                </g>
              ` : ''}
            </g>
          `;
                }
            });

            // Touch Sparks
            state.touches.forEach(([t1, t2]) => {
                const p1 = state.termPos[t1];
                const p2 = state.termPos[t2];
                if (!p1 || !p2) return;
                const midX = (p1.x + p2.x) / 2;
                const midY = (p1.y + p2.y) / 2;
                svgContent += `
          <circle cx="${midX}" cy="${midY}" r="8" fill="#22c55e" filter="url(#glow)" pointer-events="none">
            <animate attributeName="r" values="6;10;6" dur="1s" repeatCount="indefinite" />
          </circle>
        `;
            });

            // Terminals
            Object.entries(state.termPos).map(([id, pos]) => {
                const isHovered = state.drawingWire?.hoverTerm === id;
                const isDrawingStart = state.drawingWire?.startTerm === id;
                const isConnected = state.wires.some(w => w.start === id || w.end === id);

                svgContent += `
          <g transform="translate(${pos.x}, ${pos.y})" style="cursor: crosshair" data-action="draw-wire" data-termid="${id}">
            <circle r="25" fill="transparent" />
            <circle r="${isHovered ? 10 : 6}" 
                    fill="${isHovered ? '#3b82f6' : (isConnected || isDrawingStart ? '#2563eb' : '#60a5fa')}" 
                    stroke="white" 
                    stroke-width="${isHovered ? 3 : 2}" />
          </g>
        `;
            });

            svgContent += `</g>`;
            svgEl.innerHTML = svgContent;
        }

        // --- Global Event Handlers ---
        svgEl.addEventListener('pointerdown', (e) => {
            // Allow only main button or touch
            if (e.button !== 0 && e.type !== 'touchstart') return;

            const target = e.target.closest('[data-action]');
            if (!target || target.getAttribute('data-action') === 'bg') {
                state.selectedBulbId = null;
                state.dragging = { type: 'canvas', lastX: e.clientX, lastY: e.clientY };
                renderAll();
                return;
            }

            e.stopPropagation();
            const action = target.getAttribute('data-action');

            if (action === 'drag-battery') {
                state.selectedBulbId = null;
                const coords = getSvgCoords(e);
                state.dragging = { type: 'battery', offsetX: coords.x - state.battery.x, offsetY: coords.y - state.battery.y };
            }
            else if (action === 'drag-bulb') {
                const id = target.getAttribute('data-id');
                state.selectedBulbId = id;
                const bulb = state.bulbs.find(b => b.id === id);
                const coords = getSvgCoords(e);
                state.dragging = { type: 'bulb', id, offsetX: coords.x - bulb.x, offsetY: coords.y - bulb.y };
            }
            else if (action === 'draw-wire') {
                const id = target.getAttribute('data-termid');
                const coords = getSvgCoords(e);
                state.drawingWire = { startTerm: id, currentX: coords.x, currentY: coords.y, hoverTerm: null };
            }
            else if (action === 'delete-wire') {
                const id = target.getAttribute('data-id');
                state.wires = state.wires.filter(w => w.id !== id);
                renderAll();
            }
            else if (action === 'rotate-bulb') {
                const id = target.getAttribute('data-id');
                const bulb = state.bulbs.find(b => b.id === id);
                if (bulb) bulb.angle = (bulb.angle + 45) % 360;
                renderAll();
            }
            else if (action === 'delete-bulb') {
                const id = target.getAttribute('data-id');
                state.wires = state.wires.filter(w => !w.start.includes(id) && !w.end.includes(id));
                state.bulbs = state.bulbs.filter(b => b.id !== id);
                state.selectedBulbId = null;
                renderAll();
            }

            updateUI();
        });

        window.addEventListener('pointermove', (e) => {
            const coords = getSvgCoords(e);

            if (state.dragging) {
                if (state.dragging.type === 'battery') {
                    state.battery.x = coords.x - state.dragging.offsetX;
                    state.battery.y = coords.y - state.dragging.offsetY;
                    renderAll();
                }
                else if (state.dragging.type === 'bulb') {
                    const bulb = state.bulbs.find(b => b.id === state.dragging.id);
                    if (bulb) {
                        bulb.x = coords.x - state.dragging.offsetX;
                        bulb.y = coords.y - state.dragging.offsetY;
                        renderAll();
                    }
                }
                else if (state.dragging.type === 'canvas') {
                    const dx = e.clientX - state.dragging.lastX;
                    const dy = e.clientY - state.dragging.lastY;
                    state.view.x += dx;
                    state.view.y += dy;
                    state.dragging.lastX = e.clientX;
                    state.dragging.lastY = e.clientY;
                    updateUI();
                }
            }
            else if (state.drawingWire) {
                state.drawingWire.currentX = coords.x;
                state.drawingWire.currentY = coords.y;

                let hover = null;
                for (const [id, pos] of Object.entries(state.termPos)) {
                    if (id !== state.drawingWire.startTerm && dist(coords, pos) < 35) {
                        hover = id;
                        break;
                    }
                }
                state.drawingWire.hoverTerm = hover;
                updateUI(); // Quick UI update without full simulation re-eval
            }
        });

        window.addEventListener('pointerup', () => {
            if (state.dragging) {
                state.dragging = null;
                updateUI();
            }
            if (state.drawingWire) {
                if (state.drawingWire.hoverTerm) {
                    // Replace the wires array with just the newly drawn wire (restricting to 1 wire total)
                    state.wires = [{
                        id: `wire-${Date.now()}`,
                        start: state.drawingWire.startTerm,
                        end: state.drawingWire.hoverTerm
                    }];
                }
                state.drawingWire = null;
                renderAll();
            }
        });

        svgEl.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = -e.deltaY;
            const scaleFactor = Math.pow(1.1, delta / 200);
            state.view.zoom = Math.min(Math.max(state.view.zoom * scaleFactor, 0.2), 5);
            updateUI();
        }, { passive: false });

        // --- Action Functions ---
        window.handleZoom = function (direction) {
            state.view.zoom = direction === 'in' ? Math.min(state.view.zoom * 1.2, 5) : Math.max(state.view.zoom / 1.2, 0.2);
            updateUI();
        };

        window.addBulb = function () {
            const newId = `bulb-${Date.now()}`;
            const x = (400 - state.view.x) / state.view.zoom;
            const y = (300 - state.view.y) / state.view.zoom;
            state.bulbs.push({ id: newId, x, y, angle: 0 });
            state.selectedBulbId = newId;
            renderAll();
        };

        window.resetSimulation = function () {
            state = {
                battery: { x: 300, y: 350 },
                bulbs: [{ id: 'bulb-1', x: 500, y: 350, angle: 0 }],
                wires: [],
                selectedBulbId: null,
                view: { x: 0, y: 0, zoom: 1 },
                dragging: null,
                drawingWire: null,
                litBulbs: new Map(),
                touches: [],
                termPos: {}
            };
            renderAll();
        };

        // Composite render function that recalculates physics before drawing
        function renderAll() {
            updateTerminals();
            evaluateCircuit(); // updateUI() is called inside evaluateCircuit
        }

        // Boot
        renderAll();

    </script>
</body>

</html>
