<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Reports Generator // SIG_DATA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-cyan: #22d3ee;
            --accent-violet: #a855f7;
            --bg-dark: #020617;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: #f8fafc;
            min-height: 100vh;
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .gradient-text {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="p-8 flex flex-col items-center justify-start min-h-screen gap-8">
    <div class="glass max-w-6xl w-full p-10 rounded-[2.5rem] space-y-10">
        <div class="text-center space-y-2">
            <h1 class="text-5xl font-orbitron font-black gradient-text tracking-tighter uppercase">Reports_Generator</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.5em]">Advanced Analytics // Firebase Archive</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            <!-- Filters Panel -->
            <div class="space-y-6 lg:col-span-1">
                <p class="text-[10px] font-black text-cyan-500 uppercase tracking-widest">01 // Configuration</p>
                
                <div class="bg-slate-900 border border-white/10 p-5 rounded-2xl space-y-4">
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Report Type</label>
                        <select id="report-type" class="w-full bg-slate-950 border border-white/10 rounded-lg px-3 py-2 text-xs font-bold outline-none text-slate-300 focus:border-cyan-500 transition-colors" onchange="generateReport()">
                            <option value="assignment_averages">Assignment Averages (Bar)</option>
                            <option value="period_performance">Period Performance (Bar)</option>
                            <option value="score_distribution">Score Distribution (Pie)</option>
                            <option value="gradebook_matrix">Gradebook Matrix (CSV Export)</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Class Period</label>
                        <select id="period-filter" class="w-full bg-slate-950 border border-white/10 rounded-lg px-3 py-2 text-xs font-bold outline-none text-slate-300 focus:border-cyan-500 transition-colors" onchange="generateReport()">
                            <option value="ALL">All Periods</option>
                            <option value="1">Period 1</option>
                            <option value="2">Period 2</option>
                            <option value="3">Period 3</option>
                            <option value="4">Period 4</option>
                            <option value="5">Period 5</option>
                            <option value="6">Period 6</option>
                        </select>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Assignments</label>
                            <button onclick="toggleAllAssignments(true)" class="text-[8px] text-cyan-500 hover:text-cyan-400 uppercase">All</button>
                            <button onclick="toggleAllAssignments(false)" class="text-[8px] text-rose-500 hover:text-rose-400 uppercase">None</button>
                        </div>
                        <div id="assignment-list" class="bg-slate-950 border border-white/10 p-3 rounded-lg max-h-[150px] overflow-y-auto custom-scrollbar space-y-2">
                            <p class="text-xs text-slate-600 animate-pulse">Loading...</p>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <p class="text-[10px] font-black text-violet-500 uppercase tracking-widest">02 // Export</p>
                    <button onclick="exportChartData()" class="w-full bg-gradient-to-r from-cyan-600 to-violet-600 p-4 rounded-xl font-black uppercase tracking-widest text-xs shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                        Download Chart Data (CSV)
                    </button>
                </div>
            </div>

            <!-- Visualization Panel -->
            <div class="lg:col-span-2 space-y-4">
                <div class="flex justify-between items-end">
                    <p class="text-[10px] font-black text-cyan-500 uppercase tracking-widest">03 // Visualization</p>
                    <span id="db-status" class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Connecting...</span>
                </div>
                
                <div class="bg-slate-900 border border-white/10 p-6 rounded-2xl h-[400px] flex items-center justify-center relative">
                    <canvas id="reportChart" class="w-full h-full"></canvas>
                    <div id="loading-overlay" class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center rounded-2xl z-10 transition-opacity">
                        <p class="text-sm font-bold text-cyan-500 uppercase tracking-widest animate-pulse">Processing Data...</p>
                    </div>
                </div>

                <!-- Insights / Raw Data Summary -->
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-white/5 p-4 rounded-xl border border-white/5 text-center">
                        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Total Records</p>
                        <p id="stat-records" class="text-xl font-black text-cyan-400">---</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-xl border border-white/5 text-center">
                        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Avg Score</p>
                        <p id="stat-avg-score" class="text-xl font-black text-violet-400">---</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-xl border border-white/5 text-center">
                        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Unique Students</p>
                        <p id="stat-students" class="text-xl font-black text-emerald-400">---</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            projectId: "site-6e500",
            appId: "1:591530758858:web:1996cdca7316ffc3781a33",
            storageBucket: "site-6e500.firebasestorage.app",
            apiKey: "AIzaSyAji2nTjD2dbmzgk8gySWCy-aiQyKvR1i4",
            authDomain: "site-6e500.firebaseapp.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let archiveCache = [];
        let nestedAssignments = new Set();
        let currentChart = null;
        let chartDataForExport = [];

        async function init() {
            const statusEl = document.getElementById('db-status');
            try {
                statusEl.textContent = "Scanning Archive...";
                
                // 1. Fetch Flat Archive
                const archiveSnap = await db.collection('student_results').get();
                const assignmentNamesFromArchive = new Set();
                archiveCache = [];

                archiveSnap.docs.forEach(doc => {
                    const data = doc.data();
                    if (data.is_global_locked !== undefined || (!data.student_id && !data.student_name && !data.score && data.score !== 0)) {
                        nestedAssignments.add(doc.id);
                        return;
                    }
                    const assignmentName = data.assignment_name || 'Unknown';
                    assignmentNamesFromArchive.add(assignmentName);
                    archiveCache.push({
                        student_id: data.student_id || doc.id,
                        student_name: data.student_name || "Unknown",
                        class_period: String(data.class_period || "---").replace(/\D/g, ''),
                        assignment_name: assignmentName,
                        score: Number(data.score) || 0,
                        created_at: data.created_at || (data.timestamp ? new Date(data.timestamp.seconds * 1000).toISOString() : new Date().toISOString())
                    });
                });

                // 2. Fetch nested data
                for (const assignment of nestedAssignments) {
                    try {
                        const snap = await db.collection('student_results').doc(assignment).collection('students').get();
                        snap.forEach(doc => {
                            const data = doc.data();
                            archiveCache.push({
                                student_id: data.student_id || doc.id,
                                student_name: data.student_name || "Unknown",
                                class_period: String(data.class_period || "---").replace(/\D/g, ''),
                                assignment_name: data.assignment_name || assignment,
                                score: Number(data.score) || 0,
                                created_at: data.timestamp 
                                    ? (data.timestamp.seconds ? new Date(data.timestamp.seconds * 1000).toISOString() : data.timestamp)
                                    : (data.created_at || new Date().toISOString())
                            });
                        });
                    } catch (e) {
                        console.warn("Could not read nested:", assignment);
                    }
                }

                // 3. Populate Assignments UI
                const allAssignments = [...new Set(archiveCache.map(r => r.assignment_name))].sort();
                document.getElementById('assignment-list').innerHTML = allAssignments.map(a => `
                    <label class="flex items-center gap-2 p-1.5 hover:bg-white/5 rounded cursor-pointer group">
                        <input type="checkbox" value="${a}" class="assignment-cb accent-cyan-500 rounded" checked onchange="generateReport()">
                        <span class="text-[10px] font-bold text-slate-400 group-hover:text-slate-200 truncate" title="${a}">${a}</span>
                    </label>
                `).join('');

                statusEl.textContent = "READY";
                statusEl.className = "text-[10px] font-bold uppercase tracking-widest text-emerald-400";
                
                generateReport();
            } catch (err) {
                console.error("Init failed", err);
                statusEl.textContent = "ERROR";
                statusEl.className = "text-[10px] font-bold uppercase tracking-widest text-rose-500";
            }
        }

        function toggleAllAssignments(checked) {
            document.querySelectorAll('.assignment-cb').forEach(cb => cb.checked = checked);
            generateReport();
        }

        function generateReport() {
            document.getElementById('loading-overlay').classList.remove('hidden');
            
            setTimeout(() => {
                const reportType = document.getElementById('report-type').value;
                const periodFilter = document.getElementById('period-filter').value;
                const selectedAssignments = new Set(Array.from(document.querySelectorAll('.assignment-cb:checked')).map(cb => cb.value));

                // Filter Data
                let filteredData = archiveCache.filter(r => selectedAssignments.has(r.assignment_name));
                if (periodFilter !== 'ALL') {
                    filteredData = filteredData.filter(r => r.class_period === periodFilter);
                }

                updateStats(filteredData);
                
                if (currentChart) {
                    currentChart.destroy();
                }

                const ctx = document.getElementById('reportChart').getContext('2d');
                Chart.defaults.color = '#94a3b8';
                Chart.defaults.font.family = 'Inter';

                if (reportType === 'assignment_averages') {
                    renderAssignmentAverages(ctx, filteredData);
                } else if (reportType === 'period_performance') {
                    renderPeriodPerformance(ctx, filteredData);
                } else if (reportType === 'score_distribution') {
                    renderScoreDistribution(ctx, filteredData);
                } else if (reportType === 'gradebook_matrix') {
                    prepareGradebookMatrix(ctx, filteredData);
                }

                document.getElementById('loading-overlay').classList.add('hidden');
            }, 100);
        }

        function updateStats(data) {
            document.getElementById('stat-records').textContent = data.length;
            const avg = data.length ? (data.reduce((sum, r) => sum + r.score, 0) / data.length).toFixed(1) : 0;
            document.getElementById('stat-avg-score').textContent = avg;
            const uniqueStudents = new Set(data.map(r => r.student_id)).size;
            document.getElementById('stat-students').textContent = uniqueStudents;
        }

        function renderAssignmentAverages(ctx, data) {
            const agg = {};
            data.forEach(r => {
                if (!agg[r.assignment_name]) agg[r.assignment_name] = { sum: 0, count: 0 };
                agg[r.assignment_name].sum += r.score;
                agg[r.assignment_name].count++;
            });

            const labels = Object.keys(agg).sort();
            const values = labels.map(l => (agg[l].sum / agg[l].count).toFixed(2));
            
            chartDataForExport = [["Assignment", "Average Score", "Total Submissions"]].concat(
                labels.map(l => [l, (agg[l].sum / agg[l].count).toFixed(2), agg[l].count])
            );

            currentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels.map(l => l.length > 20 ? l.substring(0, 20) + '...' : l),
                    datasets: [{
                        label: 'Average Score',
                        data: values,
                        backgroundColor: 'rgba(34, 211, 238, 0.6)',
                        borderColor: 'rgba(34, 211, 238, 1)',
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { callbacks: { title: (ctx) => labels[ctx[0].dataIndex] } } },
                    scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } }
                }
            });
        }

        function renderPeriodPerformance(ctx, data) {
            const agg = {};
            data.forEach(r => {
                const p = r.class_period || "Unknown";
                if (!agg[p]) agg[p] = { sum: 0, count: 0 };
                agg[p].sum += r.score;
                agg[p].count++;
            });

            const labels = Object.keys(agg).sort((a,b) => Number(a) - Number(b)).map(p => `Period ${p}`);
            const values = Object.keys(agg).sort((a,b) => Number(a) - Number(b)).map(p => (agg[p].sum / agg[p].count).toFixed(2));

            chartDataForExport = [["Period", "Average Score", "Total Submissions"]].concat(
                Object.keys(agg).sort((a,b) => Number(a) - Number(b)).map(p => [`Period ${p}`, (agg[p].sum / agg[p].count).toFixed(2), agg[p].count])
            );

            currentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Average Score',
                        data: values,
                        backgroundColor: 'rgba(168, 85, 247, 0.6)',
                        borderColor: 'rgba(168, 85, 247, 1)',
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } }
                }
            });
        }

        function renderScoreDistribution(ctx, data) {
            let ranges = { '90-100': 0, '80-89': 0, '70-79': 0, '60-69': 0, '<60': 0 };
            data.forEach(r => {
                if (r.score >= 90) ranges['90-100']++;
                else if (r.score >= 80) ranges['80-89']++;
                else if (r.score >= 70) ranges['70-79']++;
                else if (r.score >= 60) ranges['60-69']++;
                else ranges['<60']++;
            });

            chartDataForExport = [["Score Range", "Count"]].concat(
                Object.keys(ranges).map(k => [k, ranges[k]])
            );

            currentChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(ranges),
                    datasets: [{
                        data: Object.values(ranges),
                        backgroundColor: [
                            'rgba(16, 185, 129, 0.8)', // Emerald
                            'rgba(34, 211, 238, 0.8)', // Cyan
                            'rgba(168, 85, 247, 0.8)', // Violet
                            'rgba(245, 158, 11, 0.8)', // Amber
                            'rgba(239, 68, 68, 0.8)'   // Red
                        ],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'right', labels: { color: '#f8fafc', font: { family: 'Inter', size: 12 } } } 
                    },
                    cutout: '60%'
                }
            });
        }

        function prepareGradebookMatrix(ctx, data) {
            const assignments = [...new Set(data.map(r => r.assignment_name))].sort();
            
            const students = {};
            data.forEach(r => {
                const id = r.student_id;
                if (!students[id]) {
                    students[id] = { id: id, name: r.student_name, period: r.class_period, scores: {} };
                }
                // Keep the highest score if multiple submissions exist for the same assignment
                if (students[id].scores[r.assignment_name] === undefined || r.score > students[id].scores[r.assignment_name]) {
                    students[id].scores[r.assignment_name] = r.score;
                }
            });

            const header = ["Student_ID", "Student_Name", "Class_Period", ...assignments];
            chartDataForExport = [header];
            
            Object.values(students).sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
                const row = [s.id, s.name, s.period];
                assignments.forEach(a => {
                    row.push(s.scores[a] !== undefined ? s.scores[a] : "");
                });
                chartDataForExport.push(row);
            });

            currentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Matrix Export Ready'],
                    datasets: [{
                        label: 'Status',
                        data: [1],
                        backgroundColor: 'rgba(34, 211, 238, 0.2)',
                        borderColor: 'rgba(34, 211, 238, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        title: {
                            display: true,
                            text: 'Gradebook Matrix built! Click "Download Chart Data" to save the full CSV.',
                            color: '#22d3ee',
                            font: { size: 14, family: 'Inter', weight: 'bold' }
                        },
                        legend: { display: false } 
                    },
                    scales: {
                        y: { display: false },
                        x: { display: false }
                    }
                }
            });
        }

        function exportChartData() {
            if (!chartDataForExport || chartDataForExport.length === 0) {
                alert("No data available to export.");
                return;
            }
            const csvContent = chartDataForExport.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob));
            link.setAttribute("download", `Chart_Export_${new Date().toISOString().split('T')[0]}.csv`);
            link.click();
        }

        init();
    </script>
</body>
</html>
