<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Data Export // SIG_DATA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-cyan: #22d3ee;
            --accent-violet: #a855f7;
            --bg-dark: #020617;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: #f8fafc;
            min-height: 100vh;
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .gradient-text {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="p-8 flex items-center justify-center">
    <div class="glass max-w-4xl w-full p-10 rounded-[2.5rem] space-y-10">
        <div class="text-center space-y-2">
            <h1 class="text-5xl font-orbitron font-black gradient-text tracking-tighter uppercase">Data_Export</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.5em]">Central Intelligence Archive // Firebase</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            <!-- Assignment Selector -->
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <p class="text-[10px] font-black text-cyan-500 uppercase tracking-widest">01 // Select Assignments</p>
                    <div class="flex gap-2">
                        <button onclick="toggleAll(true)" class="text-[8px] font-bold text-slate-500 hover:text-cyan-400 uppercase tracking-widest transition-colors">Select All</button>
                        <span class="text-[8px] text-slate-700">|</span>
                        <button onclick="toggleAll(false)" class="text-[8px] font-bold text-slate-500 hover:text-rose-400 uppercase tracking-widest transition-colors">Clear</button>
                    </div>
                </div>
                
                <div class="flex flex-wrap items-center gap-2 p-3 bg-white/5 rounded-xl border border-white/5">
                    <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Smart_Presets:</span>
                    <button onclick="applyPreset('unit6')" class="px-3 py-1 bg-slate-950 border border-white/10 rounded-lg text-[9px] font-black hover:border-cyan-500 hover:text-cyan-400 transition-all uppercase tracking-tighter">Unit 6 Assessments</button>
                </div>

                <div id="assignment-list" class="w-full bg-slate-900 border border-white/10 p-4 rounded-2xl max-h-[160px] overflow-y-auto custom-scrollbar space-y-2">
                    <p class="text-xs text-slate-600 animate-pulse">Scanning Archive...</p>
                </div>
            </div>

            <!-- Export Actions -->
            <div class="space-y-4">
                <p class="text-[10px] font-black text-violet-500 uppercase tracking-widest">02 // Export Operations</p>
                <div class="space-y-3">
                    <button id="export-btn" onclick="exportCSV()" class="w-full bg-gradient-to-r from-cyan-600 to-violet-600 p-5 rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                        Download Aeries CSV
                    </button>
                    <div class="bg-white/5 p-4 rounded-xl border border-white/5 flex items-center justify-between cursor-pointer group hover:bg-white/10 transition-all" onclick="toggleMode()">
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest group-hover:text-slate-200">Aggregate Mode</span>
                        <span id="mode-display" class="text-[9px] font-black text-cyan-500 uppercase">SUM_TOTAL</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="status-display" class="pt-8 border-t border-white/5 space-y-4">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center gap-4 text-[10px] font-bold uppercase tracking-widest text-slate-600">
                    <span>Database_Status: <span id="db-status" class="text-cyan-500">Connecting...</span></span>
                    <span>Students_Aggregated: <span id="record-count" class="text-white">0</span></span>
                    <span>Total_Records: <span id="total-archive-count" class="text-violet-400">---</span></span>
                </div>
                
                <!-- Search Component -->
                <div class="relative flex-1 max-w-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                    <input type="text" id="student-search" oninput="loadPreview()" placeholder="Search_Archive // ID or Name" class="w-full bg-slate-900 border border-white/10 pl-10 pr-4 py-2 rounded-xl text-xs font-bold text-slate-300 focus:border-cyan-500/50 outline-none transition-all placeholder:text-slate-700">
                </div>
            </div>

            <!-- Live Preview Table -->
            <div class="overflow-hidden rounded-xl border border-white/5 bg-slate-950/50">
                <table class="w-full text-left text-xs">
                    <thead>
                        <tr id="table-header-row" class="bg-white/5 text-slate-400 font-black uppercase tracking-tighter">
                            <th class="p-4 border-b border-white/5">Student_ID</th>
                            <th class="p-4 border-b border-white/5">Student_Name</th>
                            <th class="p-4 border-b border-white/5">Period</th>
                            <th class="p-4 border-b border-white/5">Total_Score</th>
                            <th class="p-4 border-b border-white/5 text-right">Count</th>
                        </tr>
                    </thead>
                    <tbody id="preview-body" class="text-slate-500">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            projectId: "site-6e500",
            appId: "1:591530758858:web:1996cdca7316ffc3781a33",
            storageBucket: "site-6e500.firebasestorage.app",
            apiKey: "AIzaSyAji2nTjD2dbmzgk8gySWCy-aiQyKvR1i4",
            authDomain: "site-6e500.firebaseapp.com",
            messagingSenderId: "591530758858"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Enable local caching to prevent massive reads on refresh
        db.enablePersistence({ synchronizeTabs: true }).catch(err => {
            console.warn("Firebase persistence error:", err.code);
        });

        let aggregationMode = 'SUM'; // 'SUM' or 'AVERAGE' or 'DETAILED'

        // Cache: all flat archive records loaded once at init
        let archiveCache = [];
        // Cache: known assignment names that exist as nested subcollection parents
        let nestedAssignments = new Set();

        const PRESETS = {
            'unit6': [
                'WaveMaster Lab',
                'Wave Diffraction Lab',
                'Wave Interference Tutorial',
                'Unit 6 Rapid Review',
                'Waves_Unit_Test'
            ]
        };

        function toggleMode() {
            if (aggregationMode === 'SUM') aggregationMode = 'AVERAGE';
            else if (aggregationMode === 'AVERAGE') aggregationMode = 'DETAILED';
            else aggregationMode = 'SUM';

            const display = {
                'SUM': 'SUM_TOTAL',
                'AVERAGE': 'MEAN_AVERAGE',
                'DETAILED': 'DETAILED_AUDIT'
            };
            document.getElementById('mode-display').textContent = display[aggregationMode];
            loadPreview();
        }

        function applyPreset(id) {
            const list = PRESETS[id];
            if (!list) return;
            
            document.querySelectorAll('.assignment-cb').forEach(cb => {
                cb.checked = list.includes(cb.value);
            });
            loadPreview();
        }

        function fuzzyMatch(target, query) {
            if (!query) return true;
            target = target.toLowerCase();
            query = query.toLowerCase();
            if (target.includes(query)) return true;
            let i = 0, j = 0;
            while (i < target.length && j < query.length) {
                if (target[i] === query[j]) j++;
                i++;
            }
            return j === query.length;
        }

        async function init() {
            const statusEl = document.getElementById('db-status');
            const archiveCountEl = document.getElementById('total-archive-count');

            try {
                statusEl.textContent = "Scanning...";

                // ── STEP 1: Load ALL flat archive records from student_results ──
                // These are the migrated Supabase records stored as top-level docs
                // with fields: assignment_name, student_id, student_name, score, etc.
                const archiveSnap = await db.collection('student_results').get();
                
                const assignmentNamesFromArchive = new Set();
                archiveCache = [];

                archiveSnap.docs.forEach(doc => {
                    const data = doc.data();
                    // Skip config documents (assignment parent docs with subcollections)
                    // These have fields like is_global_locked, locked_periods, etc.
                    if (data.is_global_locked !== undefined || (!data.student_id && !data.student_name && !data.score && data.score !== 0)) {
                        // This is an assignment config doc (parent for nested subcollections)
                        // Track it as a nested assignment
                        nestedAssignments.add(doc.id);
                        return;
                    }

                    const assignmentName = data.assignment_name || 'Unknown';
                    assignmentNamesFromArchive.add(assignmentName);

                    archiveCache.push({
                        student_id: data.student_id || doc.id,
                        student_name: data.student_name || "Unknown",
                        class_period: data.class_period || "---",
                        assignment_name: assignmentName,
                        score: data.score || 0,
                        created_at: data.created_at || (data.timestamp ? new Date(data.timestamp.seconds * 1000).toISOString() : new Date().toISOString())
                    });
                });

                archiveCountEl.textContent = archiveCache.length;

                // ── STEP 2: Also check the assessments collection for registered tests ──
                const assessmentsSnap = await db.collection('assessments').get();
                const assessmentNames = assessmentsSnap.docs.map(doc => doc.data().assignment_name || doc.id);

                // ── STEP 3: Merge all known assignment names ──
                const allAssignments = [...new Set([
                    ...assignmentNamesFromArchive,
                    ...assessmentNames,
                    ...nestedAssignments
                ])].filter(Boolean).sort();

                // ── STEP 4: Render assignment checkboxes ──
                const container = document.getElementById('assignment-list');
                
                container.innerHTML = allAssignments.map(a => {
                    // Count records per assignment from cache for the badge
                    const count = archiveCache.filter(r => r.assignment_name === a).length;
                    const isNested = nestedAssignments.has(a);
                    const badge = count > 0 
                        ? `<span class="ml-auto text-[8px] font-black px-2 py-0.5 rounded-full bg-cyan-500/10 text-cyan-400 border border-cyan-500/20">${count}</span>`
                        : (isNested ? `<span class="ml-auto text-[8px] font-black px-2 py-0.5 rounded-full bg-violet-500/10 text-violet-400 border border-violet-500/20">LIVE</span>` : '');
                    
                    return `
                        <label class="flex items-center gap-3 p-2 hover:bg-white/5 rounded-lg cursor-pointer transition-colors group">
                            <input type="checkbox" value="${a}" class="assignment-cb accent-cyan-500 w-4 h-4 rounded border-white/10" onchange="loadPreview()">
                            <span class="text-xs font-bold text-slate-400 group-hover:text-slate-200 transition-colors">${a}</span>
                            ${badge}
                        </label>
                    `;
                }).join('');
                
                statusEl.textContent = "Connection_Ready";
                statusEl.className = "text-emerald-400";
                console.log(`[DATA_EXPORT] Init complete. ${archiveCache.length} archive records loaded. ${allAssignments.length} assignments discovered. ${nestedAssignments.size} nested (live) assignments.`);
            } catch (err) {
                console.error("[DATA_EXPORT] Init error:", err);
                statusEl.textContent = "Access_Denied";
                statusEl.className = "text-rose-500";
                archiveCountEl.textContent = "ERR";
            }
        }

        function toggleAll(checked) {
            document.querySelectorAll('.assignment-cb').forEach(cb => cb.checked = checked);
            loadPreview();
        }

        async function fetchFilteredResults(selectedAssignments) {
            let allResults = [];
            const seenKeys = new Set(); // Deduplicate across sources

            // ── SOURCE 1: Pull from flat archive cache ──
            for (const assignment of selectedAssignments) {
                const matching = archiveCache.filter(r => r.assignment_name === assignment);
                matching.forEach(r => {
                    const key = `${r.student_id}_${r.assignment_name}_${r.created_at}`;
                    if (!seenKeys.has(key)) {
                        seenKeys.add(key);
                        allResults.push(r);
                    }
                });
            }

            // ── SOURCE 2: Pull from nested subcollections (live proctored data) ──
            for (const assignment of selectedAssignments) {
                if (!nestedAssignments.has(assignment)) continue;
                
                try {
                    const snap = await db.collection('student_results').doc(assignment).collection('students').get();
                    snap.forEach(doc => {
                        const data = doc.data();
                        const record = {
                            student_id: data.student_id || doc.id,
                            student_name: data.student_name || "Unknown",
                            class_period: data.class_period || "---",
                            assignment_name: data.assignment_name || assignment,
                            score: data.score || 0,
                            created_at: data.timestamp 
                                ? (data.timestamp.seconds ? new Date(data.timestamp.seconds * 1000).toISOString() : data.timestamp)
                                : (data.created_at || new Date().toISOString())
                        };
                        const key = `${record.student_id}_${record.assignment_name}_nested`;
                        if (!seenKeys.has(key)) {
                            seenKeys.add(key);
                            allResults.push(record);
                        }
                    });
                } catch (err) {
                    console.warn(`[DATA_EXPORT] Could not read nested subcollection for "${assignment}":`, err.message);
                }
            }

            return allResults;
        }

        async function loadPreview() {
            const selectedAssignments = Array.from(document.querySelectorAll('.assignment-cb:checked')).map(cb => cb.value);
            const tbody = document.getElementById('preview-body');
            const countEl = document.getElementById('record-count');

            if (selectedAssignments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-600 font-bold uppercase tracking-widest text-[8px]">No Assignments Selected</td></tr>';
                countEl.textContent = "0";
                return;
            }

            try {
                const data = await fetchFilteredResults(selectedAssignments);
                const aggregated = reduceToGradebook(data, aggregationMode);
                
                const searchQuery = document.getElementById('student-search').value.trim();
                const filteredStudents = Object.values(aggregated).filter(s => {
                    if (!searchQuery) return true;
                    return s.id.includes(searchQuery) || fuzzyMatch(s.name, searchQuery);
                });

                countEl.textContent = filteredStudents.length;
                const sortedStudents = filteredStudents.sort((a, b) => a.name.localeCompare(b.name));

                if (aggregationMode === 'DETAILED') {
                    document.getElementById('table-header-row').innerHTML = `
                        <th class="p-4 border-b border-white/5">Student_Name</th>
                        <th class="p-4 border-b border-white/5">Assignment_Name</th>
                        <th class="p-4 border-b border-white/5">Score</th>
                        <th class="p-4 border-b border-white/5 text-right">Submitted</th>
                    `;
                    const detailedRows = sortedStudents.flatMap(s => s.raw.map(r => ({
                        name: s.name, id: s.id, assignment: r.assignment_name, score: r.score, date: new Date(r.created_at).toLocaleDateString()
                    })));

                    tbody.innerHTML = detailedRows.slice(0, 30).map(r => `
                        <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                            <td class="p-4 font-medium text-slate-300 capitalize">${r.name} <span class="text-[9px] text-slate-600 block">${r.id}</span></td>
                            <td class="p-4 font-bold text-cyan-400">${r.assignment}</td>
                            <td class="p-4 font-black text-violet-400">${r.score}</td>
                            <td class="p-4 text-right text-slate-600 font-mono text-[10px]">${r.date}</td>
                        </tr>
                    `).join('');
                } else {
                    document.getElementById('table-header-row').innerHTML = `
                        <th class="p-4 border-b border-white/5">Student_ID</th>
                        <th class="p-4 border-b border-white/5">Student_Name</th>
                        <th class="p-4 border-b border-white/5">Period</th>
                        <th class="p-4 border-b border-white/5">Total_Score</th>
                        <th class="p-4 border-b border-white/5 text-right">Count</th>
                    `;
                    tbody.innerHTML = sortedStudents.slice(0, 15).map(s => `
                        <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                            <td class="p-4 font-mono font-bold text-cyan-400">${s.id}</td>
                            <td class="p-4 font-medium text-slate-300 capitalize">${s.name}</td>
                            <td class="p-4 font-bold text-slate-400">P${s.period || '?'}</td>
                            <td class="p-4 font-black text-violet-400">${s.totalScore}</td>
                            <td class="p-4 text-right"><span class="px-2 py-0.5 rounded-full bg-slate-800 text-[8px] font-black text-slate-500 border border-white/5">${s.assignmentCount} Assignments</span></td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error("Preview failed:", err);
                tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-rose-500 font-bold uppercase">Sync_Error</td></tr>';
            }
        }

        function reduceToGradebook(rows, mode = 'SUM') {
            const grouped = rows.reduce((acc, row) => {
                const id = row.student_id || 'UNKNOWN';
                if (!acc[id]) acc[id] = { id: id, name: row.student_name, period: row.class_period, totalScore: 0, assignmentCount: 0, raw: [] };
                acc[id].totalScore += (row.score || 0);
                acc[id].assignmentCount += 1;
                acc[id].raw.push(row);
                if (row.student_name) acc[id].name = row.student_name;
                if (row.class_period) acc[id].period = row.class_period;
                return acc;
            }, {});

            if (mode === 'AVERAGE') {
                Object.values(grouped).forEach(s => s.totalScore = Math.round(s.totalScore / s.assignmentCount));
            }
            return grouped;
        }

        async function exportCSV() {
            const selectedAssignments = Array.from(document.querySelectorAll('.assignment-cb:checked')).map(cb => cb.value);
            if (selectedAssignments.length === 0) { alert("Please select at least one assignment."); return; }

            try {
                const data = await fetchFilteredResults(selectedAssignments);
                const aggregated = reduceToGradebook(data, aggregationMode);
                const searchQuery = document.getElementById('student-search').value.trim();
                const filteredStudents = Object.values(aggregated).filter(s => {
                    if (!searchQuery) return true;
                    return s.id.includes(searchQuery) || fuzzyMatch(s.name, searchQuery);
                });

                const sortedStudents = filteredStudents.sort((a, b) => a.name.localeCompare(b.name));
                let headers, rows;
                if (aggregationMode === 'DETAILED') {
                    headers = ["Student_ID", "Student_Name", "Assignment_Name", "Score", "Submitted_At"];
                    rows = sortedStudents.flatMap(s => s.raw.map(r => [s.id, s.name, r.assignment_name, r.score, r.created_at]));
                } else {
                    headers = ["Student_ID", "Student_Name", "Class_Period", "Total_Score", "Assignment_Count"];
                    rows = sortedStudents.map(s => [s.id, s.name, s.period || "", s.totalScore, s.assignmentCount]);
                }

                const csvContent = [headers.join(","), ...rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(","))].join("\n");
                const filename = `${aggregationMode}_REPORT_${selectedAssignments.length}_ITEMS_${new Date().toISOString().split('T')[0]}.csv`;
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.setAttribute("href", URL.createObjectURL(blob));
                link.setAttribute("download", filename);
                link.click();
            } catch (err) {
                console.error("Export failed:", err);
                alert("Critical Export Failure");
            }
        }

        init();
    </script>
</body>
</html>
