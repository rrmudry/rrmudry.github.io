<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Editor | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/svg+xml" href="assessment_editor_favicon.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #010409; color: #ffffff; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .label-text { font-size: 0.75rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-6 md:p-10">
    <!-- Auth Guard Overlay -->
    <div id="auth-overlay" class="fixed inset-0 z-[100] glass flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center space-y-8">
            <div class="bg-indigo-600 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto shadow-2xl">
                <i data-lucide="shield-check" class="text-white w-12 h-12"></i>
            </div>
            <div>
                <h1 class="text-4xl font-black uppercase tracking-tighter italic mb-4">Admin<span class="text-indigo-400">Access</span></h1>
                <p class="text-slate-400 font-bold leading-relaxed">Please sign in with your verified teacher account to manage assessments.</p>
            </div>
            <button id="btn-login" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase tracking-widest hover:scale-[1.02] transition-all flex items-center justify-center gap-4">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6">
                Sign in with Google
            </button>
            <p id="auth-error" class="text-rose-500 font-bold text-sm hidden">Unauthorized account. Contact system administrator.</p>
        </div>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="max-w-6xl w-full mx-auto space-y-10 opacity-0 transition-opacity duration-1000">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-8">
            <div class="flex items-center gap-6">
                <div class="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center shadow-lg">
                    <i data-lucide="clipboard-list" class="text-white w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black uppercase tracking-tighter italic">Assessment<span class="text-indigo-400">Editor</span></h1>
                    <p class="label-text">Curriculum Structure Management</p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <button id="btn-add-assessment" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-2xl font-black uppercase tracking-widest text-xs transition-all flex items-center gap-3">
                    <i data-lucide="plus" class="w-5 h-5"></i> New Assessment
                </button>
                <button id="btn-logout" class="bg-white/5 hover:bg-white/10 text-slate-400 p-4 rounded-2xl border-2 border-white/5 transition-all">
                    <i data-lucide="log-out" class="w-6 h-6"></i>
                </button>
            </div>
        </header>

        <!-- Grid -->
        <div id="assessment-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Assessments injected here -->
        </div>
    </main>

    <!-- Editor Modal -->
    <div id="modal-editor" class="fixed inset-0 z-[150] hidden flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm">
        <div class="glass w-full max-w-2xl rounded-[3rem] overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-white/5 flex justify-between items-center">
                <h2 id="modal-title" class="text-2xl font-black uppercase tracking-tighter italic">Add <span class="text-indigo-400">Assessment</span></h2>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <div class="p-8 space-y-6 max-h-[70vh] overflow-y-auto">
                <form id="assessment-form" class="space-y-6">
                    <input type="hidden" id="edit-id">
                    
                    <div>
                        <label class="label-text ml-2 mb-3 block">Assessment ID (URL Name)</label>
                        <input type="text" id="input-id" placeholder="e.g. Waves_Unit_Test" class="w-full bg-slate-900 border-2 border-white/10 rounded-2xl px-6 py-4 text-base font-bold outline-none focus:border-indigo-500 transition-all">
                        <p class="text-xs text-slate-500 mt-2 ml-2 italic">No spaces. Use underscores.</p>
                    </div>

                    <div>
                        <label class="label-text ml-2 mb-3 block">Display Name</label>
                        <input type="text" id="input-name" placeholder="e.g. Waves Unit Test" class="w-full bg-slate-900 border-2 border-white/10 rounded-2xl px-6 py-4 text-base font-bold outline-none focus:border-indigo-500 transition-all">
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="label-text ml-2 mb-3 block">Max Questions</label>
                            <input type="number" id="input-max" placeholder="20" class="w-full bg-slate-900 border-2 border-white/10 rounded-2xl px-6 py-4 text-base font-bold outline-none focus:border-indigo-500 transition-all">
                        </div>
                        <div>
                            <label class="label-text ml-2 mb-3 block">Time Limit</label>
                            <div class="flex gap-4">
                                <select id="select-time-mode" class="bg-slate-900 border-2 border-white/10 rounded-2xl px-6 py-4 text-base font-bold outline-none focus:border-indigo-500 transition-all">
                                    <option value="none">No Limit</option>
                                    <option value="timed">Timed</option>
                                </select>
                                <input type="number" id="input-time" min="1" placeholder="Mins" class="flex-grow bg-slate-900 border-2 border-white/10 rounded-2xl px-6 py-4 text-base font-bold outline-none focus:border-indigo-500 transition-all hidden">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="p-8 bg-slate-950/50 border-t border-white/5 flex gap-4">
                <button id="btn-delete" type="button" class="px-6 py-4 rounded-2xl bg-rose-500/10 hover:bg-rose-500/20 text-rose-500 text-xs font-black uppercase tracking-widest transition-all hidden">Delete</button>
                <div class="flex-grow"></div>
                <button onclick="closeModal()" class="px-8 py-4 rounded-2xl bg-white/5 hover:bg-white/10 text-xs font-black uppercase tracking-widest transition-all">Cancel</button>
                <button id="btn-save" form="assessment-form" class="px-12 py-4 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-black uppercase tracking-widest transition-all">Save Assessment</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-8 right-8 z-[200] transform translate-y-20 opacity-0 transition-all duration-500">
        <div class="glass px-6 py-4 rounded-2xl border-l-4 border-indigo-500 flex items-center gap-4 shadow-2xl">
            <i id="toast-icon" data-lucide="info" class="w-5 h-5 text-indigo-500"></i>
            <p id="toast-message" class="text-sm font-bold"></p>
        </div>
    </div>

    <script>
        // Check for file protocol
        if (window.location.protocol === 'file:') {
            alert("⚠️ WARNING: Firebase Auth does not work via 'file://' protocol. Please use 'http://localhost:8080' to access the editor.");
        }

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            projectId: "site-6e500",
            appId: "1:591530758858:web:1996cdca7316ffc3781a33",
            storageBucket: "site-6e500.firebasestorage.app",
            apiKey: "AIzaSyAji2nTjD2dbmzgk8gySWCy-aiQyKvR1i4",
            authDomain: "site-6e500.firebaseapp.com",
            messagingSenderId: "591530758858"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const REQUIRED_EMAIL = "rmudry@orangeusd.org";
        let assessments = [];

        // --- AUTH LOGIC ---
        auth.onAuthStateChanged((user) => {
            const overlay = document.getElementById('auth-overlay');
            const main = document.getElementById('main-content');
            const error = document.getElementById('auth-error');

            if (user) {
                if (user.email === REQUIRED_EMAIL) {
                    overlay.classList.add('hidden');
                    main.classList.remove('opacity-0');
                    loadAssessments();
                } else {
                    error.classList.remove('hidden');
                    auth.signOut();
                }
            } else {
                overlay.classList.remove('hidden');
                main.classList.add('opacity-0');
            }
        });

        document.getElementById('btn-login').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            auth.signInWithPopup(provider);
        };

        document.getElementById('btn-logout').onclick = () => auth.signOut();

        // --- DATA LOGIC ---
        function loadAssessments() {
            db.collection('assessments').onSnapshot(snapshot => {
                assessments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderList();
            });
        }

        function renderList() {
            const list = document.getElementById('assessment-list');
            list.innerHTML = assessments.map(a => `
                <div class="glass p-8 rounded-[2rem] border-2 border-white/5 hover:border-indigo-500/50 transition-all group relative">
                    <div class="space-y-6">
                        <div class="bg-indigo-500/10 w-12 h-12 rounded-xl flex items-center justify-center">
                            <i data-lucide="file-text" class="text-indigo-400 w-6 h-6"></i>
                        </div>
                        <div>
                            <h3 class="text-2xl font-black text-white leading-tight mb-2">${a.assignment_name || a.id}</h3>
                            <p class="mono text-xs text-slate-500 uppercase tracking-widest">${a.id}</p>
                        </div>
                        <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/5">
                            <div>
                                <p class="label-text mb-1">Questions</p>
                                <p class="text-xl font-bold">${a.max_questions || '∞'}</p>
                            </div>
                            <div>
                                <p class="label-text mb-1">Time Limit</p>
                                <p class="text-xl font-bold">${a.time_limit_mins ? a.time_limit_mins + 'm' : 'None'}</p>
                            </div>
                        </div>
                    </div>
                    <button onclick="editAssessment('${a.id}')" class="absolute top-8 right-8 bg-indigo-600 hover:bg-indigo-500 text-white p-4 rounded-2xl transition-all shadow-xl opacity-0 group-hover:opacity-100">
                        <i data-lucide="edit-3" class="w-5 h-5"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- MODAL LOGIC ---
        function showModal() { document.getElementById('modal-editor').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-editor').classList.add('hidden'); }

        document.getElementById('select-time-mode').onchange = (e) => {
            document.getElementById('input-time').classList.toggle('hidden', e.target.value !== 'timed');
        };

        document.getElementById('btn-add-assessment').onclick = () => {
            document.getElementById('modal-title').innerHTML = `Add <span class="text-indigo-400">Assessment</span>`;
            document.getElementById('edit-id').value = '';
            document.getElementById('assessment-form').reset();
            document.getElementById('select-time-mode').value = 'none';
            document.getElementById('input-time').classList.add('hidden');
            document.getElementById('input-id').disabled = false;
            document.getElementById('btn-delete').classList.add('hidden');
            showModal();
        };

        window.editAssessment = (id) => {
            const a = assessments.find(item => item.id === id);
            if (!a) return;

            document.getElementById('modal-title').innerHTML = `Edit <span class="text-indigo-400">Assessment</span>`;
            document.getElementById('edit-id').value = a.id;
            document.getElementById('input-id').value = a.id;
            document.getElementById('input-id').disabled = true; // Cannot rename ID
            document.getElementById('input-name').value = a.assignment_name || a.id;
            document.getElementById('input-max').value = a.max_questions || '';
            
            if (a.time_limit_mins) {
                document.getElementById('select-time-mode').value = 'timed';
                document.getElementById('input-time').value = a.time_limit_mins;
                document.getElementById('input-time').classList.remove('hidden');
            } else {
                document.getElementById('select-time-mode').value = 'none';
                document.getElementById('input-time').value = '';
                document.getElementById('input-time').classList.add('hidden');
            }
            
            document.getElementById('btn-delete').classList.remove('hidden');
            showModal();
        };

        // Auto-slugging for ID field
        document.getElementById('input-id').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\s+/g, '_');
        });

        document.getElementById('assessment-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('input-id').value.trim();
            if (!id) {
                showToast("Assessment ID is required", "error");
                return;
            }

            const data = {
                assignment_name: document.getElementById('input-name').value.trim() || id,
                max_questions: parseInt(document.getElementById('input-max').value) || null,
                time_limit_mins: document.getElementById('select-time-mode').value === 'timed' ? (parseInt(document.getElementById('input-time').value) || null) : null,
                updated_at: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection('assessments').doc(id).set(data, { merge: true });
                showToast("Assessment saved!", "success");
                closeModal();
            } catch (err) {
                showToast("Error: " + err.message, "error");
            }
        };

        document.getElementById('btn-delete').onclick = async () => {
            if (!confirm("Are you sure? This will not delete questions, but students won't be able to access them via this assessment.")) return;
            const id = document.getElementById('edit-id').value;
            try {
                await db.collection('assessments').doc(id).delete();
                showToast("Assessment deleted.", "info");
                closeModal();
            } catch (err) {
                showToast("Error: " + err.message, "error");
            }
        };

        function showToast(message, type = "info") {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');
            toastMsg.textContent = message;
            
            const config = {
                success: { border: 'border-emerald-500', icon: 'check-circle', text: 'text-emerald-500' },
                error: { border: 'border-rose-500', icon: 'alert-circle', text: 'text-rose-500' },
                info: { border: 'border-indigo-500', icon: 'info', text: 'text-indigo-500' }
            }[type];

            toast.children[0].className = `glass px-6 py-4 rounded-2xl border-l-4 ${config.border} flex items-center gap-4 shadow-2xl`;
            toastIcon.setAttribute('data-lucide', config.icon);
            toastIcon.className = `w-5 h-5 ${config.text}`;
            lucide.createIcons();

            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        lucide.createIcons();
    </script>
</body>
</html>
