<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI VISION LAB // Object Detection Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #020617; color: #f8fafc; overflow: hidden; font-family: monospace; }
        .lab-border { border: 2px solid #334155; }
        .detection-flash { animation: flash 0.5s ease-out; }
        @keyframes flash {
            0% { background: rgba(239, 68, 68, 0.3); }
            100% { background: transparent; }
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-10">

    <div class="mb-8 text-center">
        <h1 class="text-3xl font-black tracking-tighter uppercase text-indigo-400">AI Vision Lab</h1>
        <p class="text-slate-500 text-xs mt-2 uppercase tracking-[0.3em]">Object Recognition & Bounding Box Debugger</p>
    </div>

    <div id="main-lab" class="relative lab-border rounded-3xl overflow-hidden bg-black shadow-2xl shadow-indigo-500/10">
        <!-- The Feed -->
        <video id="webcam" class="w-[800px] object-contain transform scale-x-[-1]" autoplay playsinline muted></video>
        <canvas id="overlay" class="absolute top-0 left-0 w-full h-full pointer-events-none"></canvas>
        
        <!-- Status HUD -->
        <div class="absolute top-6 left-6 flex flex-col gap-2">
            <div id="model-status" class="bg-black/60 backdrop-blur px-4 py-2 rounded-lg border border-white/10 flex items-center gap-3">
                <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
                <span id="status-text" class="text-[10px] font-bold uppercase tracking-widest text-slate-300">Initializing AI...</span>
            </div>
            <div id="frame-counter" class="bg-black/60 backdrop-blur px-4 py-2 rounded-lg border border-white/10 text-[10px] font-bold text-indigo-400 uppercase tracking-widest">
                Frames: 0
            </div>
        </div>

        <div id="detection-alert" class="absolute inset-0 pointer-events-none border-[12px] border-red-500/0 transition-all duration-300"></div>
    </div>

    <div class="mt-8 grid grid-cols-3 gap-6 w-full max-w-4xl">
        <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Target Object</p>
            <p class="text-xl font-black text-white">Cell Phone</p>
        </div>
        <div id="last-seen-box" class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Last Detection</p>
            <p id="last-seen-text" class="text-xl font-black text-slate-500">None</p>
        </div>
        <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Confidence Thresh</p>
            <p class="text-xl font-black text-white">0.50</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        let model = null;
        let frameCount = 0;

        async function init() {
            try {
                // 1. Get Webcam
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 800, height: 600 } });
                video.srcObject = stream;

                // 2. Load Model
                document.getElementById('status-text').textContent = "Loading COCO-SSD...";
                model = await cocoSsd.load();
                
                document.getElementById('status-text').textContent = "AI System Live";
                document.getElementById('status-dot').classList.replace('bg-red-500', 'bg-green-500');
                
                // 3. Start Loop
                detect();
            } catch (err) {
                document.getElementById('status-text').textContent = "ERROR: " + err.message;
                console.error(err);
            }
        }

        async function detect() {
            if (!model) return;

            frameCount++;
            document.getElementById('frame-counter').textContent = `Frames: ${frameCount}`;

            // Sync canvas size
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const predictions = await model.detect(video);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let phoneFound = false;

            predictions.forEach(prediction => {
                const [x, y, width, height] = prediction.bbox;
                const flippedX = canvas.width - x - width;
                
                const isPhone = prediction.class === 'cell phone';
                if (isPhone) phoneFound = true;

                // DRAW Bounding Box
                ctx.strokeStyle = isPhone ? '#ef4444' : '#22c55e';
                ctx.lineWidth = isPhone ? 8 : 2;
                ctx.strokeRect(flippedX, y, width, height);

                // DRAW Label
                ctx.fillStyle = isPhone ? '#ef4444' : '#22c55e';
                ctx.font = 'bold 20px monospace';
                const label = `${prediction.class.toUpperCase()} [${Math.round(prediction.score * 100)}%]`;
                const textWidth = ctx.measureText(label).width;
                ctx.fillRect(flippedX, y - 30, textWidth + 10, 30);
                
                ctx.fillStyle = '#ffffff';
                ctx.fillText(label, flippedX + 5, y - 8);
            });

            // Alert visuals
            const alertBox = document.getElementById('detection-alert');
            const lastSeen = document.getElementById('last-seen-text');
            const lastSeenBox = document.getElementById('last-seen-box');

            if (phoneFound) {
                alertBox.style.borderColor = 'rgba(239, 68, 68, 0.6)';
                lastSeen.textContent = new Date().toLocaleTimeString();
                lastSeen.classList.replace('text-slate-500', 'text-red-500');
                lastSeenBox.classList.add('detection-flash');
                setTimeout(() => lastSeenBox.classList.remove('detection-flash'), 500);
            } else {
                alertBox.style.borderColor = 'transparent';
            }

            requestAnimationFrame(detect);
        }

        init();
    </script>
</body>
</html>
