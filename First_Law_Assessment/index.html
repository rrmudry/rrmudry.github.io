<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Law of Thermodynamics - Assessment</title>
    <!-- React and Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap');

        :root {
            --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .piston-container {
            position: relative;
            width: 200px;
            height: 300px;
            background: #1e293b;
            border-radius: 0 0 16px 16px;
        }

        .fire-glow {
            box-shadow: 0 20px 50px -10px rgba(244, 63, 94, 0.5);
            border-bottom: 4px solid #f43f5e !important;
        }

        .ice-glow {
            box-shadow: 0 20px 50px -10px rgba(14, 165, 233, 0.5);
            border-bottom: 4px solid #0ea5e9 !important;
        }

        @keyframes pulse-value {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
                color: #fff;
            }

            100% {
                transform: scale(1);
            }
        }

        .value-change {
            animation: pulse-value 0.4s ease-out;
        }

        canvas {
            display: block;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(96, 165, 250, 0.2);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(96, 165, 250, 0.4);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Constants
        const BASE_U = 500; // Baseline internal energy
        const PARTICLES_COUNT = 45;
        const BASE_SPEED = 1.5;

        // Pressure Gauge Component
        const AnalogPressureGauge = ({ pressure }) => {
            const angle = useMemo(() => {
                // Map pressure 0-4 to -135 to 135 degrees
                return Math.min(Math.max((pressure / 4) * 270 - 135, -135), 135);
            }, [pressure]);

            return (
                <div className="relative w-32 h-32 flex flex-col items-center justify-center">
                    <div className="absolute inset-0">
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                            {/* Gauge Background */}
                            <circle cx="50" cy="50" r="45" fill="#0f172a" stroke="#334155" strokeWidth="2" />
                            {/* Gradient Arc */}
                            <path d="M 18.2 81.8 A 45 45 0 1 1 81.8 81.8" fill="none" stroke="url(#pressureGradient)" strokeWidth="8" strokeLinecap="round" />

                            {/* Ticks */}
                            {[0, 1, 2, 3, 4].map(tick => {
                                const tickAngle = -135 + (tick / 4) * 270;
                                const rad = (tickAngle - 90) * (Math.PI / 180);
                                const x1 = 50 + 35 * Math.cos(rad);
                                const y1 = 50 + 35 * Math.sin(rad);
                                const x2 = 50 + 42 * Math.cos(rad);
                                const y2 = 50 + 42 * Math.sin(rad);
                                return <line key={tick} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#64748b" strokeWidth="2" />;
                            })}

                            {/* Needle */}
                            <g style={{ transformOrigin: '50px 50px', transform: `rotate(${angle}deg)` }} className="transition-transform duration-300 ease-out">
                                <path d="M 46 50 C 46 52.2 47.8 54 50 54 C 52.2 54 54 52.2 54 50 L 51 15 L 49 15 Z" fill="#f43f5e" />
                                <circle cx="50" cy="50" r="4" fill="#cbd5e1" />
                            </g>

                            {/* Gradient Def */}
                            <defs>
                                <linearGradient id="pressureGradient" x1="0%" y1="100%" x2="100%" y2="100%">
                                    <stop offset="0%" stopColor="#10b981" /> {/* Emerald */}
                                    <stop offset="50%" stopColor="#f59e0b" /> {/* Amber */}
                                    <stop offset="100%" stopColor="#ef4444" /> {/* Red */}
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div className="text-rose-400 font-mono text-xl font-bold mt-12">{pressure.toFixed(2)} atm</div>
                </div>
            );
        };

        const CHALLENGES = [
            // Level 1: Simulation Proficiency
            {
                type: "multiple-choice",
                text: "1. You click THE 'Add Heat' button twice (+100 J). If the piston does not move (Work = 0), what should the Internal Energy change (ΔU) read?",
                options: ["0 J", "+50 J", "+100 J", "-100 J"],
                correctIndex: 2,
                explanation: "ΔU = Q + W. If Q = 100 and W = 0, then ΔU = 100 J."
            },
            {
                type: "true-false",
                text: "2. Compressing the gas (clicking the 'Compress' button) results in a positive Work (+W) value on the dashboard.",
                options: ["True", "False"],
                correctIndex: 0,
                explanation: "Work is positive (+) when work is done ON the system by compressing it."
            },
            {
                type: "multiple-choice",
                text: "3. What happens to the 'Internal Energy (U)' readout when you click the 'Remove Heat' button?",
                options: ["It increases", "It decreases", "It stays the same", "It fluctuates randomly"],
                correctIndex: 1,
                explanation: "Removing heat lowers the internal energy of the system."
            },
            {
                type: "multiple-choice",
                text: "4. When the gas is allowed to 'Expand,' what is the sign of the Work (W) shown on the dashboard?",
                options: ["Positive (+)", "Negative (-)", "Neutral (0)"],
                correctIndex: 1,
                explanation: "Expansion means the gas is doing work on the surroundings, which we define as negative work (-W)."
            },
            {
                type: "numerical",
                text: "5. If you click 'Add Heat' (+50 J) and then 'Compress' (+50 J), what is the total change in Internal Energy (ΔU) in Joules?",
                options: ["0", "50", "100", "-100"],
                correctIndex: 2,
                explanation: "ΔU = 50 (Q) + 50 (W) = 100 J."
            },
            {
                type: "matching",
                text: "6. Match the action to the sign convention:",
                pairs: [
                    { left: "Adding Heat", right: "+Q" },
                    { left: "Removing Heat", right: "-Q" },
                    { left: "Compressing", right: "+W" },
                    { left: "Expanding", right: "-W" }
                ],
                correctIndex: 0,
                explanation: "Heat added (+Q), Heat removed (-Q), Compression (+W), Expansion (-W)."
            },
            // Level 2: Problem Solving
            {
                type: "multiple-choice",
                text: "7. A student adds 200J of heat. To keep the Internal Energy change (ΔU) at exactly 100J, what must the gas do?",
                options: ["Expand (-100J Work)", "Compress (+100J Work)", "Expand (-300J Work)", "Nothing (W = 0)"],
                correctIndex: 0,
                explanation: "100 (ΔU) = 200 (Q) + W. Solving for W gives -100 J (Expansion)."
            },
            {
                type: "numerical",
                text: "8. The dashboard shows ΔU = -50 J and Q = -150 J. What is the value of W in Joules?",
                options: ["+100", "-100", "+200", "-200"],
                correctIndex: 0,
                explanation: "-50 = -150 + W. Adding 150 to both sides gives W = 100 J."
            },
            {
                type: "true-false",
                text: "9. If a process is 'Adiabatic' (meaning Q = 0), then any work done on the gas will be equal to the total change in internal energy.",
                options: ["True", "False"],
                correctIndex: 0,
                explanation: "In an adiabatic process (Q=0), all internal energy change comes from work: ΔU = W."
            },
            {
                type: "numerical",
                text: "10. In an isothermal process (ΔU = 0), if 75 J of heat is added (+Q), how much work (W) must the gas perform in Joules?",
                options: ["+75", "0", "-75", "-150"],
                correctIndex: 2,
                explanation: "0 = 75 + W, so W = -75 J."
            },
            {
                type: "multiple-choice",
                text: "11. You observe the particle speed increasing significantly. This visual change corresponds to:",
                options: ["A decrease in ΔU", "An increase in ΔU", "Work being done by the gas", "System at absolute zero"],
                correctIndex: 1,
                explanation: "Internal energy is directly related to the kinetic energy (speed) of the particles."
            },
            {
                type: "numerical",
                text: "12. If Q = +500 J and W = -500 J, what is the resulting change in internal energy (ΔU) in Joules?",
                options: ["+1000", "-1000", "0", "+500"],
                correctIndex: 2,
                explanation: "500 + (-500) = 0 J."
            },
            {
                type: "numerical",
                text: "13. The piston is compressed with 120 J of work (+W). 40 J of heat is lost to the environment (-Q). What is the final ΔU in Joules?",
                options: ["160", "120", "80", "40"],
                correctIndex: 2,
                explanation: "ΔU = 120 (W) - 40 (Q) = 80 J."
            },
            // Level 3: Application & Extension
            {
                type: "multiple-choice",
                text: "14. Bicycle Pump: Rapidly pumping air makes the pump hot. If Q ≈ 0 and you do work on the gas (+W), what happens to U?",
                options: ["U decreases (cools)", "U increases (heats up)", "U stays the same", "Pressure drops"],
                correctIndex: 1,
                explanation: "For a quick stroke (Q ≈ 0), +W leads to +ΔU, raising the temperature."
            },
            {
                type: "multiple-choice",
                text: "15. Aerosol Can: Spraying a can makes it feel cold because the gas expands (-W). If Q ≈ 0, why does it cool down?",
                options: ["Energy is added to can", "Work is done BY the gas, pulling from U", "The can is absorbing heat", "The gas molecules stopped"],
                correctIndex: 1,
                explanation: "ΔU = 0 + (-W). ΔU is negative, so temperature drops."
            },
            {
                type: "true-false",
                text: "16. If a system is perfectly insulated (Q = 0) and the gas expands against a piston (Work done by the gas), the internal energy of the system MUST decrease.",
                options: ["True", "False"],
                correctIndex: 0,
                explanation: "In an adiabatic expansion (Q=0), the work is done at the expense of internal energy (ΔU = -W), causing a temperature drop."
            },
            {
                type: "numerical",
                text: "17. A miniature steam engine takes in 1000 J of heat and produces 300 J of work. How much 'waste heat' is exhausted in Joules?",
                options: ["1300", "700", "300", "1000"],
                correctIndex: 1,
                explanation: "1000 total in = 300 out to work + 700 out as exhaust heat."
            },
            {
                type: "multiple-choice",
                text: "18. Which of these is an example of an 'Isochoric' process (where Work = 0)?",
                options: ["Balloon in the sun", "Heating a rigid steel tank", "Moving car piston", "Squeezing a sponge"],
                correctIndex: 1,
                explanation: "Isochoric means 'constant volume,' so the gas cannot expand or compress to do work."
            },
            {
                type: "matching",
                text: "19. Car Engine: Match the part of a car engine stroke to the energy change:",
                pairs: [
                    { left: "Compression", right: "+W" },
                    { left: "Power stroke", right: "+Q" },
                    { left: "Exhaust", right: "-Q" },
                    { left: "Expansion work", right: "-W" }
                ],
                correctIndex: 0,
                explanation: "Compression (+W), Power stroke explosion (+Q), Exhaust (-Q), Expansion work output (-W)."
            },
            {
                type: "multiple-choice",
                text: "20. Challenge: If you want to increase Pressure as much as possible with only TWO clicks, which is best?",
                options: ["Add Heat + Expand", "Add Heat + Compress", "Remove Heat + Compress", "Remove Heat + Expand"],
                correctIndex: 1,
                explanation: "Pressure increases both when temperature (Heat) rises and when volume (Compression) decreases."
            }
        ];

        const App = () => {
            // Thermodynamic State
            const [U, setU] = useState(BASE_U); // Internal Energy
            const [Q, setQ] = useState(0); // Net Heat added
            const [W, setW] = useState(0); // Net Work done ON system

            // Visual State
            const [pistonHeight, setPistonHeight] = useState(50); // percentage 0-100 (100 is fully compressed)
            const [heatState, setHeatState] = useState('neutral'); // 'neutral', 'heating', 'cooling'

            // Assessment State
            const [currentChallenge, setCurrentChallenge] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);
            const [score, setScore] = useState(0);
            const [isFinished, setIsFinished] = useState(false);
            const [studentName, setStudentName] = useState("");
            const [studentId, setStudentId] = useState("");
            const [isStarted, setIsStarted] = useState(false);
            
            // Matching Specific State
            const [selectedMatch, setSelectedMatch] = useState({ side: null, id: null });
            const [matches, setMatches] = useState({}); // { leftId: rightId }
            const [shuffledRight, setShuffledRight] = useState([]);

            const canvasRef = useRef(null);
            const heatCanvasRef = useRef(null); // External heat source
            const particlesRef = useRef([]);
            const heatParticlesRef = useRef([]); // Fire/Ice particles
            const animationRef = useRef(null);
            const [isFullscreen, setIsFullscreen] = useState(false);

            // Shuffler for Matching
            useEffect(() => {
                const challenge = CHALLENGES[currentChallenge];
                if (challenge && challenge.type === 'matching') {
                    const rightItems = challenge.pairs.map((p, i) => ({ text: p.right, id: i }));
                    setShuffledRight([...rightItems].sort(() => Math.random() - 0.5));
                }
            }, [currentChallenge]);

            // Fullscreen listener
            useEffect(() => {
                const handleFullscreenChange = () => {
                    setIsFullscreen(!!document.fullscreenElement);
                };
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
            }, []);

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.error(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            };


            // Calculate derived visual properties
            const particleSpeedMultipler = Math.max(0.05, Math.pow(U / BASE_U, 1.5));
            const canvasHeight = 250;
            const canvasWidth = 200;
            const pistonPixelHeight = 20 + (pistonHeight / 100) * (canvasHeight - 60);

            // Pressure (P ~ U / Volume)
            const currentVolume = canvasHeight - pistonPixelHeight;
            const normalizedVolume = currentVolume / 160;
            const pressure = (U / BASE_U) / normalizedVolume;

            const stateRef = useRef({ U, heatState, pistonPixelHeight, particleSpeedMultipler });

            useEffect(() => {
                stateRef.current = { U, heatState, pistonPixelHeight, particleSpeedMultipler };
            }, [U, heatState, pistonPixelHeight, particleSpeedMultipler]);

            useEffect(() => {
                const initParticles = () => {
                    const parts = [];
                    for (let i = 0; i < PARTICLES_COUNT; i++) {
                        parts.push({
                            x: Math.random() * (canvasWidth - 10) + 5,
                            y: pistonPixelHeight + Math.random() * (canvasHeight - pistonPixelHeight - 10) + 5,
                            vx: (Math.random() - 0.5) * 2,
                            vy: (Math.random() - 0.5) * 2,
                            radius: 3 + Math.random() * 2
                        });
                    }
                    particlesRef.current = parts;
                };
                initParticles();
            }, []);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const heatCanvas = heatCanvasRef.current;
                const hCtx = heatCanvas ? heatCanvas.getContext('2d') : null;

                const render = () => {
                    const { U, heatState, pistonPixelHeight, particleSpeedMultipler } = stateRef.current;
                    ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                    ctx.fillStyle = 'rgba(15, 23, 42, 0.4)';
                    ctx.fillRect(0, 0, canvasWidth, canvasHeight);

                    const clamp = (val, min, max) => Math.min(Math.max(val, min), max);
                    let r = 148, g = 163, b = 184;
                    if (U > BASE_U) {
                        const t = clamp((U - BASE_U) / 300, 0, 1);
                        r = Math.round(148 + t * (248 - 148));
                        g = Math.round(163 + t * (113 - 163));
                        b = Math.round(184 + t * (113 - 184));
                    } else {
                        const t = clamp((BASE_U - U) / 150, 0, 1);
                        r = Math.round(148 + t * (14 - 148));
                        g = Math.round(163 + t * (165 - 163));
                        b = Math.round(184 + t * (233 - 184));
                    }
                    const pColor = `rgb(${r}, ${g}, ${b})`;

                    particlesRef.current.forEach(p => {
                        let currentVx = p.vx * particleSpeedMultipler * BASE_SPEED;
                        let currentVy = p.vy * particleSpeedMultipler * BASE_SPEED;
                        p.x += currentVx;
                        p.y += currentVy;

                        if (p.x - p.radius <= 0) { p.x = p.radius + 1; p.vx *= -1; }
                        if (p.x + p.radius >= canvasWidth) { p.x = canvasWidth - p.radius - 1; p.vx *= -1; }
                        if (p.y + p.radius >= canvasHeight) { p.y = canvasHeight - p.radius - 1; p.vy *= -1; }
                        if (p.y - p.radius <= pistonPixelHeight) { p.y = pistonPixelHeight + p.radius + 1; p.vy = Math.abs(p.vy); }

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                        ctx.fillStyle = pColor;
                        ctx.fill();
                    });

                    ctx.fillStyle = '#475569';
                    ctx.fillRect(0, pistonPixelHeight - 20, canvasWidth, 20);
                    ctx.fillStyle = '#94a3b8';
                    ctx.fillRect(canvasWidth / 2 - 5, 0, 10, pistonPixelHeight - 20);

                    ctx.strokeStyle = '#334155';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(0, 0, canvasWidth, canvasHeight);

                    if (hCtx) {
                        hCtx.clearRect(0, 0, 220, 50);
                        if (heatState === 'heating') {
                            if (Math.random() > 0.1) {
                                for (let i = 0; i < 4; i++) {
                                    heatParticlesRef.current.push({
                                        x: 110 + (Math.random() - 0.5) * 160,
                                        y: 50, vx: (Math.random() - 0.5) * 1.5,
                                        vy: -Math.random() * 3 - 2, life: 1.0, decay: 0.03, type: 'fire', size: 15
                                    });
                                }
                            }
                        } else if (heatState === 'cooling') {
                            if (Math.random() > 0.1) {
                                for (let i = 0; i < 4; i++) {
                                    heatParticlesRef.current.push({
                                        x: 110 + (Math.random() - 0.5) * 180,
                                        y: 10, vx: (Math.random() - 0.5) * 2.5,
                                        vy: 1.0, life: 1.0, decay: 0.02, type: 'ice', size: 12
                                    });
                                }
                            }
                        }
                        hCtx.globalCompositeOperation = 'lighter';
                        for (let i = heatParticlesRef.current.length - 1; i >= 0; i--) {
                            let hp = heatParticlesRef.current[i];
                            hp.x += hp.vx; hp.y += hp.vy; hp.life -= hp.decay;
                            if (hp.life <= 0) { heatParticlesRef.current.splice(i, 1); continue; }
                            hCtx.beginPath();
                            hCtx.arc(hp.x, hp.y, Math.max(0.1, hp.size * hp.life), 0, Math.PI * 2);
                            if (hp.type === 'fire') hCtx.fillStyle = `rgba(255, ${Math.floor(200 * hp.life)}, 0, ${hp.life * 0.6})`;
                            else hCtx.fillStyle = `rgba(${100 + Math.floor(100 * hp.life)}, ${200 + Math.floor(55 * hp.life)}, 255, ${hp.life * 0.4})`;
                            hCtx.fill();
                        }
                        hCtx.globalCompositeOperation = 'source-over';
                    }
                    animationRef.current = requestAnimationFrame(render);
                };
                animationRef.current = requestAnimationFrame(render);
                return () => cancelAnimationFrame(animationRef.current);
            }, []);

            useEffect(() => {
                let timer;
                if (heatState !== 'neutral') {
                    timer = setTimeout(() => setHeatState('neutral'), 1000);
                }
                return () => clearTimeout(timer);
            }, [heatState]);

            // Simulation Handlers
            const addHeat = () => {
                const amount = 50; setQ(prev => prev + amount); setU(prev => prev + amount); setHeatState('heating');
            };
            const removeHeat = () => {
                const amount = 50; if (U - amount < 50) return;
                setQ(prev => prev - amount); setU(prev => prev - amount); setHeatState('cooling');
            };
            const compressGas = () => {
                if (pistonHeight >= 90) return;
                const workAmount = 50; setW(prev => prev + workAmount); setU(prev => prev + workAmount); setPistonHeight(prev => prev + 15);
            };
            const expandGas = () => {
                if (pistonHeight <= 10) return;
                const workAmount = -50; if (U + workAmount < 50) return;
                setW(prev => prev + workAmount); setU(prev => prev + workAmount); setPistonHeight(prev => prev - 15);
            };
            const resetSim = () => {
                setU(BASE_U); setQ(0); setW(0); setPistonHeight(50); setHeatState('neutral');
            };

            // Assessment Handlers
            const handleOptionSelect = (index) => {
                if (showFeedback) return;
                setSelectedOption(index);
                if (index === CHALLENGES[currentChallenge].correctIndex) {
                    setScore(prev => prev + 1);
                }
                setShowFeedback(true);
            };

            const handleMatchingSelect = (side, id) => {
                if (showFeedback) return;

                // Handle clicking a matched item to UNLINK it
                if (side === 'left' && matches[id] !== undefined) {
                    const newMatches = { ...matches };
                    delete newMatches[id];
                    setMatches(newMatches);
                    setSelectedMatch({ side: null, id: null });
                    return;
                }
                if (side === 'right') {
                    const leftId = Object.keys(matches).find(k => matches[k] === id);
                    if (leftId !== undefined) {
                        const newMatches = { ...matches };
                        delete newMatches[leftId];
                        setMatches(newMatches);
                        setSelectedMatch({ side: null, id: null });
                        return;
                    }
                }

                // Normal selection logic
                if (selectedMatch.side === side) {
                    setSelectedMatch({ side, id }); 
                    return;
                }
                if (!selectedMatch.side) {
                    setSelectedMatch({ side, id });
                    return;
                }
                
                // Pair them up
                const leftId = side === 'left' ? id : selectedMatch.id;
                const rightId = side === 'right' ? id : selectedMatch.id;
                
                setMatches(prev => ({ ...prev, [leftId]: rightId }));
                setSelectedMatch({ side: null, id: null });
            };

            const nextChallenge = () => {
                if (currentChallenge === CHALLENGES.length - 1) {
                    setIsFinished(true);
                    setShowFeedback(false);
                    return;
                }
                setSelectedOption(null);
                setShowFeedback(false);
                setMatches({});
                setSelectedMatch({ side: null, id: null });
                setCurrentChallenge((prev) => prev + 1);
            };

            const checkMatching = () => {
                const challenge = CHALLENGES[currentChallenge];
                let allCorrect = true;
                const matchCount = Object.keys(matches).length;
                if (matchCount < challenge.pairs.length) return;

                Object.entries(matches).forEach(([leftId, rightId]) => {
                    if (parseInt(leftId) !== rightId) allCorrect = false;
                });
                
                if (allCorrect) setScore(prev => prev + 1);
                setSelectedOption(allCorrect ? 0 : 1); 
                setShowFeedback(true);
            };

            const resetAssessment = () => {
                setScore(0);
                setCurrentChallenge(0);
                setSelectedOption(null);
                setShowFeedback(false);
                setMatches({});
                setSelectedMatch({ side: null, id: null });
                setIsFinished(false);
            };

                                                    const y2 = 24 + rIndex * 48;

                                                    const defaultColor = pairStrokeColors[lIndex % pairStrokeColors.length];
                                                    const color = defaultColor;
                                                    
                                                    const xStarts = 43;
                                                    const xEnds = 57;
                                                    
                                                    // If straight, add a tiny bit of curvature to avoid 0-height bounding boxes
                                                    const cp1y = y1 === y2 ? y1 - 1 : y1;
                                                    const cp2y = y1 === y2 ? y2 + 1 : y2;
                                                    
                                                    return (
                                                        <path key={idx}

                                    <div className="flex flex-col gap-2 w-[140px] origin-top">
                                        <div className="glass px-4 py-3 rounded-xl border border-slate-700 shadow-xl">
                                            <div className="text-[9px] text-slate-400 font-bold uppercase mb-1">Internal Energy (U)</div>
                                            <div className="text-blue-400 font-mono text-xl font-bold">{U} J</div>
                                        </div>
                                        <div className="glass p-2 rounded-xl border border-slate-700 shadow-xl flex flex-col items-center">
                                            <AnalogPressureGauge pressure={pressure} />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Feedback Panel (Relocated to Right Column) */}
                            {showFeedback && (
                                <div className={`glass rounded-xl p-3 border animate-in fade-in slide-in-from-right-2 duration-300 bg-blue-500/5 border-blue-500/30`}>
                                    <div className="flex items-center justify-between mb-2">
                                        <div className={`font-black uppercase text-[10px] tracking-widest text-blue-400`}>
                                            Answer Recorded
                                        </div>
                                    </div>
                                    <p className="text-[10px] text-slate-300 leading-tight mb-3 italic">
                                        Your answer has been saved. Please proceed to the next question.
                                    </p>
                                    <button
                                        onClick={nextChallenge}
                                        className="w-full py-1.5 rounded-md bg-blue-500 text-white font-bold text-[10px] uppercase tracking-widest hover:bg-blue-600 transition-colors"
                                    >
                                        {currentChallenge === CHALLENGES.length - 1 ? "Finish Assessment →" : "Next Question"}
                                    </button>
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
