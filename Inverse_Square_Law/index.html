<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inverse Square Law Explorer</title>

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- Inline SVG Icons (Replacing lucide-react for standalone HTML) ---
        const IconFlashlight = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M18 6c0 2-2 2-2 4v10a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V10c0-2-2-2-2-4V2h12z" /><line x1="6" y1="6" x2="18" y2="6" /><line x1="12" y1="12" x2="12" y2="12" />
            </svg>
        );
        const IconZap = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
            </svg>
        );
        const IconMoveHorizontal = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="18 8 22 12 18 16" /><polyline points="6 8 2 12 6 16" /><line x1="2" y1="12" x2="22" y2="12" />
            </svg>
        );
        const IconCalculator = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="4" y="2" width="16" height="20" rx="2" ry="2" /><line x1="8" y1="6" x2="16" y2="6" /><line x1="16" y1="14" x2="16" y2="18" /><path d="M16 10h.01" /><path d="M12 10h.01" /><path d="M8 10h.01" /><path d="M12 14h.01" /><path d="M8 14h.01" /><path d="M12 18h.01" /><path d="M8 18h.01" />
            </svg>
        );
        const IconGrid = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><line x1="3" y1="9" x2="21" y2="9" /><line x1="3" y1="15" x2="21" y2="15" /><line x1="9" y1="3" x2="9" y2="21" /><line x1="15" y1="3" x2="15" y2="21" />
            </svg>
        );
        const IconInfo = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
        );

        // --- Main App Component ---
        function App() {
            const [distance, setDistance] = useState(2); // meters
            const [power, setPower] = useState(1000); // Watts (or Lumens)

            // Area = distance^2
            // Intensity = Power / Area
            const area = useMemo(() => Math.pow(distance, 2), [distance]);
            const intensity = useMemo(() => power / area, [power, area]);

            const maxIntensity = useMemo(() => power / 1, [power]);

            const mapValue = (val, inMin, inMax, outMin, outMax) => {
                return ((val - inMin) * (outMax - outMin)) / (inMax - inMin) + outMin;
            };

            const graphPoints = useMemo(() => {
                let points = [];
                for (let d = 1; d <= 6; d += 0.1) {
                    let i = power / Math.pow(d, 2);
                    let x = mapValue(d, 1, 6, 0, 100);
                    let y = mapValue(i, 0, maxIntensity, 100, 0);
                    points.push(`${x},${y}`);
                }
                return points.join(' L ');
            }, [power, maxIntensity]);

            const currentPointX = mapValue(distance, 1, 6, 0, 100);
            const currentPointY = mapValue(intensity, 0, maxIntensity, 100, 0);

            const baseGridSize = 40;
            const projectionSize = distance * baseGridSize;

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto space-y-6">

                        {/* Header */}
                        <header className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200 flex flex-col md:flex-row items-start md:items-center justify-between">
                            <div>
                                <h1 className="text-2xl md:text-3xl font-bold text-slate-900 flex items-center gap-3">
                                    <IconFlashlight className="w-8 h-8 text-amber-500" />
                                    The Flashlight Analogy: Inverse Square Law
                                </h1>
                                <p className="text-slate-500 mt-2 text-base md:text-lg">
                                    Watch how a beam of radiant heat (or light) spreads out over a larger area as it travels.
                                </p>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">

                            {/* Controls & Variables */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col gap-6 lg:col-span-1">
                                <h2 className="text-xl font-semibold flex items-center gap-2 border-b pb-4">
                                    <IconZap className="w-5 h-5 text-blue-500" />
                                    Experiment Controls
                                </h2>

                                <div className="space-y-4">
                                    <div className="space-y-2">
                                        <label className="flex justify-between font-medium text-slate-700">
                                            <span className="flex items-center gap-2"><IconZap className="w-4 h-4 text-amber-500" /> Beam Power (P)</span>
                                            <span className="bg-amber-100 text-amber-800 px-2 py-0.5 rounded text-sm font-bold">{power} W</span>
                                        </label>
                                        <input
                                            type="range"
                                            min="100"
                                            max="2000"
                                            step="100"
                                            value={power}
                                            onChange={(e) => setPower(Number(e.target.value))}
                                            className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-amber-500"
                                        />
                                        <p className="text-xs text-slate-500">Adjust the total energy leaving the source.</p>
                                    </div>

                                    <div className="space-y-2 pt-4">
                                        <label className="flex justify-between font-medium text-slate-700">
                                            <span className="flex items-center gap-2"><IconMoveHorizontal className="w-4 h-4 text-blue-500" /> Distance to Wall (d)</span>
                                            <span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-sm font-bold">{distance.toFixed(1)} m</span>
                                        </label>
                                        <input
                                            type="range"
                                            min="1"
                                            max="6"
                                            step="0.1"
                                            value={distance}
                                            onChange={(e) => setDistance(Number(e.target.value))}
                                            className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-500"
                                        />
                                        <p className="text-xs text-slate-500">Move the projection wall further away.</p>
                                    </div>
                                </div>

                                <div className="mt-auto bg-slate-50 p-4 rounded-xl border border-slate-200">
                                    <h3 className="font-semibold text-slate-700 mb-2 flex items-center gap-2">
                                        <IconCalculator className="w-4 h-4" /> Live Math
                                    </h3>
                                    <div className="text-sm font-mono text-slate-600 space-y-2 bg-white p-3 rounded-lg border">
                                        <p>Area = d²</p>
                                        <p>Area = {distance}² = <span className="font-bold text-blue-600">{area.toFixed(2)} m²</span></p>
                                        <div className="border-t my-2 border-slate-100"></div>
                                        <p>Intensity = Power / Area</p>
                                        <p>I = {power} / {area.toFixed(2)}</p>
                                        <p className="text-base font-bold text-amber-600 pt-2 border-t mt-2">
                                            I = {intensity.toFixed(1)} W/m²
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* Visualization Area */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col lg:col-span-2">

                                {/* Split Visuals: Side View & Wall View */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">

                                    {/* 1. Side View of Beam */}
                                    <div className="bg-slate-900 rounded-xl overflow-hidden border-4 border-slate-800 flex flex-col relative h-64">
                                        <h3 className="absolute top-2 left-3 text-slate-300 text-xs font-bold z-10 uppercase tracking-wider">Side View</h3>

                                        <div className="flex-1 relative w-full h-full">
                                            <svg viewBox="0 0 100 50" className="w-full h-full" preserveAspectRatio="none">
                                                {/* Beam Cone */}
                                                <path
                                                    d={`M 15 25 L ${15 + distance * 13} ${25 - distance * 3.5} L ${15 + distance * 13} ${25 + distance * 3.5} Z`}
                                                    fill="url(#beamGradient)"
                                                    opacity="0.8"
                                                />
                                                {/* Gradient Definition */}
                                                <defs>
                                                    <linearGradient id="beamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                                        <stop offset="0%" stopColor="rgb(250, 204, 21)" stopOpacity="1" />
                                                        <stop offset="100%" stopColor="rgb(250, 204, 21)" stopOpacity={1 / distance} />
                                                    </linearGradient>
                                                </defs>

                                                {/* Flashlight Icon/Body */}
                                                <rect x="5" y="22" width="10" height="6" fill="#64748b" rx="1" />
                                                <rect x="13" y="21" width="3" height="8" fill="#475569" rx="0.5" />

                                                {/* Wall Line */}
                                                <line x1={15 + distance * 13} y1="5" x2={15 + distance * 13} y2="45" stroke="#94a3b8" strokeWidth="2" />

                                                {/* Distance Marker */}
                                                <line x1="15" y1="45" x2={15 + distance * 13} y2="45" stroke="#475569" strokeWidth="1" strokeDasharray="2,2" />
                                                <text x={15 + (distance * 13) / 2} y="43" fill="#94a3b8" fontSize="4" textAnchor="middle">{distance.toFixed(1)}m</text>
                                            </svg>
                                        </div>
                                    </div>

                                    {/* 2. Wall View (The Grid) */}
                                    <div className="bg-slate-900 rounded-xl overflow-hidden border-4 border-slate-800 flex flex-col relative h-64 items-center justify-center">
                                        <h3 className="absolute top-2 left-3 text-slate-300 text-xs font-bold z-10 uppercase tracking-wider">What the wall sees</h3>

                                        <div
                                            className="relative transition-all duration-200 ease-out shadow-[0_0_30px_rgba(250,204,21,0.2)]"
                                            style={{
                                                width: `${projectionSize}px`,
                                                height: `${projectionSize}px`,
                                                backgroundColor: `rgba(250, 204, 21, ${1 / area})`,
                                                border: '1px solid rgba(250, 204, 21, 0.8)',
                                            }}
                                        >
                                            <div
                                                className="absolute inset-0 opacity-50"
                                                style={{
                                                    backgroundImage: `
                                    linear-gradient(to right, rgba(255,255,255,0.4) 1px, transparent 1px),
                                    linear-gradient(to bottom, rgba(255,255,255,0.4) 1px, transparent 1px)
                                `,
                                                    backgroundSize: `${baseGridSize}px ${baseGridSize}px`
                                                }}
                                            />
                                            <div className="absolute top-1/2 left-1/2 w-1 h-1 bg-white rounded-full -translate-x-1/2 -translate-y-1/2 opacity-50"></div>
                                        </div>

                                        <div className="absolute bottom-3 right-3 bg-black/60 text-amber-400 px-3 py-1 rounded text-sm font-mono border border-amber-400/30">
                                            {area.toFixed(1)} Unit Squares
                                        </div>
                                    </div>
                                </div>

                                {/* Graph Area */}
                                <div className="flex-1 grid grid-cols-1 md:grid-cols-2 gap-8 items-center border-t border-slate-100 pt-8">
                                    <div className="relative w-full aspect-[4/3] bg-slate-50 rounded-lg border p-4">
                                        <h3 className="text-sm font-bold text-slate-500 text-center mb-2">Intensity vs. Distance</h3>
                                        <div className="relative w-full h-[85%]">
                                            <svg viewBox="0 -5 105 110" className="w-full h-full overflow-visible">
                                                {/* Axes */}
                                                <line x1="0" y1="100" x2="100" y2="100" stroke="#94a3b8" strokeWidth="1" />
                                                <line x1="0" y1="0" x2="0" y2="100" stroke="#94a3b8" strokeWidth="1" />

                                                {/* Grid labels */}
                                                <text x="50" y="115" fontSize="6" fill="#64748b" textAnchor="middle">Distance (m)</text>
                                                <text x="-15" y="50" fontSize="6" fill="#64748b" textAnchor="middle" transform="rotate(-90 -15 50)">Intensity (W/m²)</text>

                                                {/* Data Curve */}
                                                <path d={`M ${graphPoints}`} fill="none" stroke="#f59e0b" strokeWidth="2" strokeLinecap="round" />

                                                {/* Current Value Indicator */}
                                                <circle cx={currentPointX} cy={currentPointY} r="3" fill="#ef4444" className="transition-all duration-100 ease-out" />
                                                <line x1={currentPointX} y1="100" x2={currentPointX} y2={currentPointY} stroke="#ef4444" strokeWidth="1" strokeDasharray="2,2" />
                                                <line x1="0" y1={currentPointY} x2={currentPointX} y2={currentPointY} stroke="#ef4444" strokeWidth="1" strokeDasharray="2,2" />
                                            </svg>
                                        </div>
                                    </div>

                                    {/* Educational Text */}
                                    <div className="space-y-4">
                                        <div className="bg-blue-50 text-blue-900 p-4 rounded-xl border border-blue-100">
                                            <h4 className="font-bold flex items-center gap-2 mb-2">
                                                <IconGrid className="w-5 h-5 text-blue-600" />
                                                The Magic of the Grid
                                            </h4>
                                            <p className="text-sm leading-relaxed">
                                                Notice what happens when you slide the distance to exactly <strong>2m</strong>. The beam spreads out perfectly to cover a <strong>2x2 grid (4 squares)</strong>. At <strong>3m</strong>, it covers a <strong>3x3 grid (9 squares)</strong>.
                                            </p>
                                        </div>

                                        <div className="bg-amber-50 text-amber-900 p-4 rounded-xl border border-amber-100">
                                            <p className="text-sm leading-relaxed">
                                                Because the same amount of total energy (Power) is being "smeared" across more and more squares, the amount of energy hitting any <em>single</em> square drops drastically. <br /><br />
                                                This applies to flashlights, Wi-Fi signals, and <strong>radiant heat</strong> in thermodynamics!
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Render the App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
