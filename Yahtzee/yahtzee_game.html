<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Multiplayer Yahtzee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #0f172a;
            /* darker slate background */
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-y: auto;
        }

        .game-container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 950px) {
            .game-container {
                flex-direction: row;
                align-items: flex-start;
            }
        }

        /* --- Dice Styling --- */
        .dice-area {
            flex: 1;
            background-color: #1e293b;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            position: sticky;
            top: 20px;
            border: 1px solid #334155;
        }

        .dice-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            perspective: 1000px;
            min-height: 90px;
        }

        .die-wrapper {
            width: 70px;
            height: 70px;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .die-wrapper:hover {
            transform: translateY(-5px);
        }

        .die {
            width: 100%;
            height: 100%;
            background-color: #f8fafc;
            border-radius: 12px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.1), 0 6px 12px rgba(0, 0, 0, 0.3);
            display: grid;
            grid-template-areas:
                "a . c"
                "e g f"
                "d . b";
            padding: 10px;
            transition: all 0.3s ease;
            position: relative;
        }

        .dot {
            display: block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #1e293b;
            align-self: center;
            justify-self: center;
            box-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.5);
        }

        /* Dice Dot Positions */
        .die[data-value="1"] .dot:nth-child(1) {
            grid-area: g;
        }

        .die[data-value="2"] .dot:nth-child(1) {
            grid-area: a;
        }

        .die[data-value="2"] .dot:nth-child(2) {
            grid-area: b;
        }

        .die[data-value="3"] .dot:nth-child(1) {
            grid-area: a;
        }

        .die[data-value="3"] .dot:nth-child(2) {
            grid-area: g;
        }

        .die[data-value="3"] .dot:nth-child(3) {
            grid-area: b;
        }

        .die[data-value="4"] .dot:nth-child(1) {
            grid-area: a;
        }

        .die[data-value="4"] .dot:nth-child(2) {
            grid-area: c;
        }

        .die[data-value="4"] .dot:nth-child(3) {
            grid-area: d;
        }

        .die[data-value="4"] .dot:nth-child(4) {
            grid-area: b;
        }

        .die[data-value="5"] .dot:nth-child(1) {
            grid-area: a;
        }

        .die[data-value="5"] .dot:nth-child(2) {
            grid-area: c;
        }

        .die[data-value="5"] .dot:nth-child(3) {
            grid-area: g;
        }

        .die[data-value="5"] .dot:nth-child(4) {
            grid-area: d;
        }

        .die[data-value="5"] .dot:nth-child(5) {
            grid-area: b;
        }

        .die[data-value="6"] .dot:nth-child(1) {
            grid-area: a;
        }

        .die[data-value="6"] .dot:nth-child(2) {
            grid-area: c;
        }

        .die[data-value="6"] .dot:nth-child(3) {
            grid-area: e;
        }

        .die[data-value="6"] .dot:nth-child(4) {
            grid-area: f;
        }

        .die[data-value="6"] .dot:nth-child(5) {
            grid-area: d;
        }

        .die[data-value="6"] .dot:nth-child(6) {
            grid-area: b;
        }

        .die[data-value="1"] .dot:nth-child(n+2) {
            display: none;
        }

        .die[data-value="2"] .dot:nth-child(n+3) {
            display: none;
        }

        .die[data-value="3"] .dot:nth-child(n+4) {
            display: none;
        }

        .die[data-value="4"] .dot:nth-child(n+5) {
            display: none;
        }

        .die[data-value="5"] .dot:nth-child(n+6) {
            display: none;
        }

        .die-wrapper.held .die {
            background-color: #fde047;
            /* yellow */
            box-shadow: inset 0 0 15px rgba(202, 138, 4, 0.3), 0 5px 10px rgba(0, 0, 0, 0.2);
            border: 3px solid #eab308;
            transform: translateY(5px);
        }

        .die-wrapper.held .dot {
            background-color: #854d0e;
        }

        .held-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: #fde047;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .die-wrapper.held .held-label {
            opacity: 1;
        }

        @keyframes shake {
            0% {
                transform: translate(1px, 1px) rotate(0deg) scale(1);
            }

            20% {
                transform: translate(-3px, 0px) rotate(5deg) scale(1.1);
            }

            40% {
                transform: translate(1px, -1px) rotate(-5deg) scale(1.1);
            }

            60% {
                transform: translate(-3px, 1px) rotate(5deg) scale(1.1);
            }

            80% {
                transform: translate(-1px, -1px) rotate(-5deg) scale(1.1);
            }

            100% {
                transform: translate(1px, -2px) rotate(0deg) scale(1);
            }
        }

        .rolling .die {
            animation: shake 0.3s infinite;
            filter: blur(1px);
        }

        /* --- Controls & General --- */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .btn-roll {
            background: linear-gradient(to bottom, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #991b1b, 0 10px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 90%;
            max-width: 300px;
        }

        .btn-roll:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #991b1b, 0 4px 5px rgba(0, 0, 0, 0.3);
        }

        .btn-roll:disabled {
            background: linear-gradient(to bottom, #64748b, #475569);
            box-shadow: 0 6px 0 #334155;
            cursor: not-allowed;
            transform: translateY(0);
            color: #94a3b8;
        }

        .rolls-left {
            font-size: 1.2rem;
            font-weight: 600;
            color: #cbd5e1;
            background-color: #0f172a;
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #334155;
        }

        .scorecard-wrapper {
            flex: 1.8;
            background-color: #ffffff;
            color: #0f172a;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            overflow-x: auto;
            max-width: 100%;
        }

        .scorecard-header {
            text-align: center;
            border-bottom: 3px solid #e2e8f0;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .scorecard-header h1 {
            font-size: 2.2rem;
            color: #ef4444;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #fca5a5;
        }

        .score-grid {
            display: grid;
            min-width: max-content;
            border-collapse: collapse;
            width: 100%;
        }

        .score-row {
            display: contents;
            /* Allows grid layout to span naturally */
        }

        .score-cell {
            padding: 10px 12px;
            text-align: center;
            border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 45px;
            font-size: 1.1rem;
        }

        .score-row:last-child .score-cell {
            border-bottom: none;
        }

        .score-cell:last-child {
            border-right: none;
        }

        .score-cell.category-name {
            justify-content: flex-start;
            font-weight: 600;
            border-right: 3px solid #cbd5e1;
            position: sticky;
            left: 0;
            background: #f8fafc;
            z-index: 10;
            color: #334155;
            min-width: 160px;
        }

        .score-cell.category-name i {
            width: 25px;
            text-align: center;
            margin-right: 8px;
            color: #64748b;
        }

        .score-cell.player-header {
            font-weight: bold;
            background: #f1f5f9;
            color: #1e293b;
            border-bottom: 3px solid #cbd5e1;
            font-size: 1.2rem;
            min-width: 100px;
        }

        .score-cell.active-player-col {
            background-color: #f0fdf4;
        }

        .score-cell.active-player-header {
            background-color: #bbf7d0;
            color: #166534;
            border-bottom-color: #22c55e;
        }

        .score-value {
            font-family: monospace;
            font-size: 1.3rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .score-potential {
            color: #16a34a;
            cursor: pointer;
            border: 2px dashed #4ade80;
            border-radius: 8px;
            padding: 2px 15px;
            width: 100%;
            background: #f0fdf4;
            font-weight: bold;
        }

        .score-potential:hover {
            background-color: #dcfce7;
            transform: scale(1.05);
        }

        .score-zero {
            color: #cbd5e1;
            font-weight: normal;
        }

        .score-subtotal {
            background-color: #f1f5f9;
            font-weight: bold;
            color: #475569;
        }

        /* Turn Indicator */
        .turn-indicator {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fde047;
            text-align: center;
            margin-bottom: 15px;
            background: #0f172a;
            padding: 10px 20px;
            border-radius: 12px;
            width: 100%;
            border: 2px solid #334155;
            text-shadow: 1px 1px 0px black;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.9);
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            border: 2px solid #334155;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 2.8rem;
            color: #fde047;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            font-weight: 700;
        }

        .btn-action {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #166534;
            transition: all 0.1s;
            margin: 5px;
        }

        .btn-action:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #166534;
        }

        .btn-blue {
            background-color: #3b82f6;
            box-shadow: 0 5px 0 #1d4ed8;
        }

        .btn-blue:active {
            box-shadow: 0 0 0 #1d4ed8;
        }

        .btn-red {
            background-color: #ef4444;
            box-shadow: 0 4px 0 #991b1b;
            padding: 10px 20px;
            font-size: 1rem;
        }

        .btn-red:active {
            box-shadow: 0 0 0 #991b1b;
            transform: translateY(4px);
        }

        .player-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .player-input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: 2px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 1.1rem;
            outline: none;
            font-family: 'Fredoka', sans-serif;
        }

        .player-input:focus {
            border-color: #3b82f6;
        }

        .turn-announcement {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            z-index: 40;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .turn-announcement.show {
            opacity: 1;
            pointer-events: auto;
        }

        .turn-announcement h2 {
            font-size: 4rem;
            color: white;
            text-shadow: 0 4px 10px black;
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .turn-announcement.show h2 {
            transform: scale(1);
        }
    </style>
</head>

<body>

    <div class="game-container" id="game-ui" style="display: none;">
        <!-- Dice Area -->
        <div class="dice-area">
            <div id="turn-display" class="turn-indicator">Player 1's Turn</div>
            <div class="dice-container" id="dice-container">
                <!-- Dice are generated via JS -->
            </div>
            <div class="controls">
                <div class="rolls-left" id="rolls-left-display">Rolls Left: 3</div>
                <button class="btn-roll" id="roll-btn">ROLL DICE</button>
                <p class="text-sm text-slate-400 mt-2 text-center">Click a die to hold it between rolls.</p>
                <button id="restart-game-btn"
                    class="text-slate-400 hover:text-red-400 underline mt-6 text-sm transition-colors">End Game &
                    Restart</button>
            </div>
        </div>

        <!-- Scorecard Area -->
        <div class="scorecard-wrapper" id="scorecard-container">
            <div class="scorecard-header">
                <h1>Yahtzee</h1>
            </div>
            <!-- Dynamically generated scorecard grid goes here -->
            <div id="score-grid" class="score-grid"></div>
        </div>
    </div>

    <!-- Setup Modal -->
    <div id="setup-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Hotseat Setup</h2>
            <p class="text-slate-300 mb-6 text-lg">Add players to play on this device.</p>

            <div id="player-inputs-container">
                <!-- Player inputs added here -->
            </div>

            <button class="btn-action btn-blue w-full mb-6" id="add-player-btn">
                <i class="fa-solid fa-plus"></i> Add Player
            </button>

            <div class="border-t border-slate-600 pt-6">
                <button class="btn-action w-full" id="start-btn">Start Game</button>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2 class="modal-title">Game Over!</h2>
            <p class="text-slate-300 mb-4 text-xl">Final Standings:</p>
            <div class="bg-slate-800 rounded-lg p-4 mb-6" id="final-scores-list">
                <!-- Final scores here -->
            </div>
            <button class="btn-action" id="play-again-btn">Play Again</button>
        </div>
    </div>

    <!-- Turn Announcement Overlay -->
    <div id="turn-overlay" class="turn-announcement">
        <h2 id="turn-overlay-text">Player 1's Turn</h2>
        <button class="btn-action mt-8" id="begin-turn-btn">Let's Roll!</button>
    </div>

    <script>
        // --- Constants ---
        const SCORE_CATEGORIES = [
            { id: 'ones', name: 'Ones', icon: 'fa-dice-one', type: 'upper' },
            { id: 'twos', name: 'Twos', icon: 'fa-dice-two', type: 'upper' },
            { id: 'threes', name: 'Threes', icon: 'fa-dice-three', type: 'upper' },
            { id: 'fours', name: 'Fours', icon: 'fa-dice-four', type: 'upper' },
            { id: 'fives', name: 'Fives', icon: 'fa-dice-five', type: 'upper' },
            { id: 'sixes', name: 'Sixes', icon: 'fa-dice-six', type: 'upper' },
            { id: 'upper_sub', name: 'Upper Subtotal', type: 'subtotal' },
            { id: 'upper_bonus', name: 'Bonus (if >= 63)', type: 'subtotal' },
            { id: 'threeOfAKind', name: '3 of a Kind', icon: 'fa-3', type: 'lower' },
            { id: 'fourOfAKind', name: '4 of a Kind', icon: 'fa-4', type: 'lower' },
            { id: 'fullHouse', name: 'Full House', icon: 'fa-house', type: 'lower' },
            { id: 'smallStraight', name: 'Sm. Straight', icon: 'fa-arrow-down-short-wide', type: 'lower' },
            { id: 'largeStraight', name: 'Lg. Straight', icon: 'fa-arrow-down-wide-short', type: 'lower' },
            { id: 'yahtzee', name: 'YAHTZEE', icon: 'fa-star', type: 'lower' },
            { id: 'chance', name: 'Chance', icon: 'fa-question', type: 'lower' },
            { id: 'grand_total', name: 'GRAND TOTAL', type: 'total' }
        ];

        // --- Game State ---
        let gameState = {
            players: [], // { name: string, scores: { [categoryId]: number | null } }
            currentTurnIndex: 0,
            round: 1,
            dice: [
                { value: 1, held: false }, { value: 1, held: false },
                { value: 1, held: false }, { value: 1, held: false },
                { value: 1, held: false }
            ],
            rollsLeft: 3,
            isRolling: false,
            potentialScores: {}
        };

        // --- DOM Elements ---
        const ui = {
            setupModal: document.getElementById('setup-modal'),
            playerInputsContainer: document.getElementById('player-inputs-container'),
            addPlayerBtn: document.getElementById('add-player-btn'),
            startBtn: document.getElementById('start-btn'),

            gameUi: document.getElementById('game-ui'),
            diceContainer: document.getElementById('dice-container'),
            turnDisplay: document.getElementById('turn-display'),
            rollsLeftDisplay: document.getElementById('rolls-left-display'),
            rollBtn: document.getElementById('roll-btn'),
            scoreGrid: document.getElementById('score-grid'),
            restartBtn: document.getElementById('restart-game-btn'),

            gameOverModal: document.getElementById('game-over-modal'),
            finalScoresList: document.getElementById('final-scores-list'),
            playAgainBtn: document.getElementById('play-again-btn'),

            turnOverlay: document.getElementById('turn-overlay'),
            turnOverlayText: document.getElementById('turn-overlay-text'),
            beginTurnBtn: document.getElementById('begin-turn-btn'),
        };

        // --- Initialization & Setup ---
        function initSetup() {
            ui.setupModal.style.display = 'flex';
            ui.gameUi.style.display = 'none';
            ui.gameOverModal.style.display = 'none';
            ui.playerInputsContainer.innerHTML = '';

            // Add minimum 2 players by default for multiplayer
            addPlayerInput('Player 1');
            addPlayerInput('Player 2');
        }

        function addPlayerInput(defaultName = '') {
            const count = ui.playerInputsContainer.children.length + 1;
            const div = document.createElement('div');
            div.className = 'player-input-group';
            div.innerHTML = `
                <input type="text" class="player-input" placeholder="Player ${count} Name" value="${defaultName}">
                ${count > 1 ? `<button class="btn-action btn-red remove-player-btn"><i class="fa-solid fa-trash"></i></button>` : ''}
            `;

            if (count > 1) {
                div.querySelector('.remove-player-btn').addEventListener('click', () => {
                    div.remove();
                    updatePlayerInputPlaceholders();
                });
            }
            ui.playerInputsContainer.appendChild(div);
        }

        function updatePlayerInputPlaceholders() {
            const inputs = ui.playerInputsContainer.querySelectorAll('.player-input');
            inputs.forEach((input, index) => {
                input.placeholder = `Player ${index + 1} Name`;
            });
        }

        function startGame() {
            const inputs = ui.playerInputsContainer.querySelectorAll('.player-input');
            const players = [];

            inputs.forEach((input, index) => {
                let name = input.value.trim();
                if (!name) name = `Player ${index + 1}`;

                // Initialize empty scorecard
                let scores = {};
                SCORE_CATEGORIES.forEach(cat => {
                    if (cat.type !== 'subtotal' && cat.type !== 'total') {
                        scores[cat.id] = null; // null means unplayed
                    }
                });

                players.push({ name, scores });
            });

            if (players.length === 0) {
                alert("Please add at least one player."); // Fallback, shouldn't happen due to minimums
                return;
            }

            // Reset State
            gameState = {
                players: players,
                currentTurnIndex: 0,
                round: 1,
                dice: Array(5).fill().map(() => ({ value: Math.floor(Math.random() * 6) + 1, held: false })),
                rollsLeft: 3,
                isRolling: false,
                potentialScores: {}
            };

            ui.setupModal.style.display = 'none';
            ui.gameUi.style.display = 'flex';

            showTurnOverlay();
        }

        function showTurnOverlay() {
            const playerName = gameState.players[gameState.currentTurnIndex].name;
            ui.turnOverlayText.textContent = `${playerName}'s Turn`;
            ui.turnOverlay.classList.add('show');
            renderApp(); // Render behind overlay
        }

        ui.beginTurnBtn.addEventListener('click', () => {
            ui.turnOverlay.classList.remove('show');
            // Give them a fresh set of random dice visually to start, but don't count it as a roll yet.
            gameState.dice.forEach(d => { d.value = Math.floor(Math.random() * 6) + 1; d.held = false; });
            renderApp();
        });

        // --- Core Rendering ---
        function renderApp() {
            const currentPlayer = gameState.players[gameState.currentTurnIndex];

            ui.turnDisplay.textContent = `${currentPlayer.name}'s Turn (Round ${gameState.round}/13)`;
            ui.rollsLeftDisplay.textContent = `Rolls Left: ${gameState.rollsLeft}`;

            ui.rollBtn.disabled = gameState.rollsLeft === 0 || gameState.isRolling;

            if (gameState.rollsLeft < 3 && gameState.rollsLeft > 0) {
                ui.rollBtn.textContent = 'ROLL AGAIN';
            } else if (gameState.rollsLeft === 0) {
                ui.rollBtn.textContent = 'MUST SCORE';
            } else {
                ui.rollBtn.textContent = 'ROLL DICE';
            }

            renderDice();
            calculatePotentialScores();
            renderScorecard();
        }

        function renderDice() {
            ui.diceContainer.innerHTML = '';
            gameState.dice.forEach((die, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = `die-wrapper ${die.held ? 'held' : ''} ${gameState.isRolling && !die.held ? 'rolling' : ''}`;
                wrapper.onclick = () => toggleHold(index);

                // Generate dots based on standard 6-sided die
                let dotsHtml = '';
                for (let i = 0; i < 6; i++) {
                    dotsHtml += '<span class="dot"></span>';
                }

                wrapper.innerHTML = `
                    <div class="die" data-value="${die.value}">
                        ${dotsHtml}
                    </div>
                    <div class="held-label">HELD</div>
                `;
                ui.diceContainer.appendChild(wrapper);
            });
        }

        function renderScorecard() {
            const columns = gameState.players.length + 1; // Categories + 1 col per player
            ui.scoreGrid.style.gridTemplateColumns = `minmax(160px, max-content) repeat(${gameState.players.length}, minmax(100px, 1fr))`;
            ui.scoreGrid.innerHTML = '';

            // Header Row
            const headerRow = document.createElement('div');
            headerRow.className = 'score-row';
            headerRow.innerHTML = `<div class="score-cell category-name bg-slate-200" style="border-top-left-radius: 12px;">Category</div>`;

            gameState.players.forEach((player, pIdx) => {
                const isActive = pIdx === gameState.currentTurnIndex;
                headerRow.innerHTML += `<div class="score-cell player-header ${isActive ? 'active-player-header' : ''}">${player.name}</div>`;
            });
            ui.scoreGrid.appendChild(headerRow);

            // Body Rows
            SCORE_CATEGORIES.forEach(cat => {
                const row = document.createElement('div');
                row.className = 'score-row';

                // Category Label
                const icon = cat.icon ? `<i class="fa-solid ${cat.icon}"></i>` : '';
                row.innerHTML = `<div class="score-cell category-name">${icon} ${cat.name}</div>`;

                // Player Scores
                gameState.players.forEach((player, pIdx) => {
                    const isActive = pIdx === gameState.currentTurnIndex;
                    const cell = document.createElement('div');
                    cell.className = `score-cell ${isActive ? 'active-player-col' : ''} ${cat.type.includes('total') ? 'score-subtotal' : ''}`;

                    const scoreData = getPlayerScoreData(player, cat.id);

                    if (cat.type === 'subtotal' || cat.type === 'total') {
                        cell.innerHTML = `<span class="score-value">${scoreData}</span>`;
                    } else if (scoreData !== null) {
                        // Already scored
                        cell.innerHTML = `<span class="score-value ${scoreData === 0 ? 'score-zero' : ''}">${scoreData}</span>`;
                    } else if (isActive && gameState.rollsLeft < 3 && !gameState.isRolling) {
                        // Potential score (clickable)
                        const pot = gameState.potentialScores[cat.id] || 0;
                        cell.innerHTML = `<button class="score-potential">${pot}</button>`;
                        cell.querySelector('button').onclick = () => scoreCategory(cat.id, pot);
                    } else {
                        // Unscored, inactive or haven't rolled yet
                        cell.innerHTML = ``;
                    }

                    row.appendChild(cell);
                });
                ui.scoreGrid.appendChild(row);
            });
        }

        function getPlayerScoreData(player, categoryId) {
            if (player.scores[categoryId] !== undefined && player.scores[categoryId] !== null) {
                return player.scores[categoryId];
            }

            // Calculate subtotals dynamically
            const upperIds = ['ones', 'twos', 'threes', 'fours', 'fives', 'sixes'];
            let upperSum = 0;
            upperIds.forEach(id => { if (player.scores[id]) upperSum += player.scores[id]; });

            if (categoryId === 'upper_sub') return upperSum;
            if (categoryId === 'upper_bonus') return upperSum >= 63 ? 35 : 0;

            if (categoryId === 'grand_total') {
                let total = upperSum + (upperSum >= 63 ? 35 : 0);
                const lowerIds = ['threeOfAKind', 'fourOfAKind', 'fullHouse', 'smallStraight', 'largeStraight', 'yahtzee', 'chance'];
                lowerIds.forEach(id => { if (player.scores[id]) total += player.scores[id]; });
                return total;
            }

            return null; // Has not scored yet
        }

        function calculatePotentialScores() {
            gameState.potentialScores = {};
            if (gameState.rollsLeft === 3) return; // Haven't rolled yet

            const values = gameState.dice.map(d => d.value);
            const counts = [0, 0, 0, 0, 0, 0];
            let sum = 0;

            values.forEach(v => {
                counts[v - 1]++;
                sum += v;
            });

            // Upper Section
            gameState.potentialScores['ones'] = counts[0] * 1;
            gameState.potentialScores['twos'] = counts[1] * 2;
            gameState.potentialScores['threes'] = counts[2] * 3;
            gameState.potentialScores['fours'] = counts[3] * 4;
            gameState.potentialScores['fives'] = counts[4] * 5;
            gameState.potentialScores['sixes'] = counts[5] * 6;

            // Lower Section
            const has3 = counts.some(c => c >= 3);
            const has4 = counts.some(c => c >= 4);
            const has5 = counts.some(c => c === 5);
            const hasPair = counts.some(c => c === 2);

            gameState.potentialScores['threeOfAKind'] = has3 ? sum : 0;
            gameState.potentialScores['fourOfAKind'] = has4 ? sum : 0;

            // Full House: 3 of one, 2 of another. Or 5 of a kind (Yahtzee acts as full house)
            gameState.potentialScores['fullHouse'] = (has3 && hasPair) || has5 ? 25 : 0;

            // Straights (convert counts to binary string to find sequences easily)
            const seqStr = counts.map(c => c > 0 ? '1' : '0').join('');
            gameState.potentialScores['smallStraight'] = (seqStr.includes('1111')) ? 30 : 0;
            gameState.potentialScores['largeStraight'] = (seqStr.includes('11111')) ? 40 : 0;

            gameState.potentialScores['yahtzee'] = has5 ? 50 : 0;
            gameState.potentialScores['chance'] = sum;
        }

        // --- Game Actions ---
        function handleRollDice() {
            if (gameState.rollsLeft <= 0 || gameState.isRolling) return;

            gameState.isRolling = true;
            renderApp();

            // Simulate rolling animation time
            setTimeout(() => {
                gameState.dice = gameState.dice.map(d =>
                    d.held ? d : { value: Math.floor(Math.random() * 6) + 1, held: false }
                );
                gameState.rollsLeft--;
                gameState.isRolling = false;
                renderApp();
            }, 500); // 500ms animation
        }

        function toggleHold(index) {
            // Cannot hold before first roll or after 3rd roll
            if (gameState.rollsLeft === 3 || gameState.rollsLeft === 0 || gameState.isRolling) return;

            gameState.dice[index].held = !gameState.dice[index].held;
            renderApp();
        }

        function scoreCategory(categoryId, scoreValue) {
            if (gameState.isRolling) return;

            // Save the score
            const currentPlayer = gameState.players[gameState.currentTurnIndex];
            currentPlayer.scores[categoryId] = scoreValue;

            // Reset dice and rolls for next player
            gameState.dice = Array(5).fill().map(() => ({ value: 1, held: false }));
            gameState.rollsLeft = 3;

            // Advance Turn
            gameState.currentTurnIndex++;

            // Check for end of round
            if (gameState.currentTurnIndex >= gameState.players.length) {
                gameState.currentTurnIndex = 0;
                gameState.round++;
            }

            // Check for end of game (13 rounds max)
            if (gameState.round > 13) {
                renderApp(); // Render final board state
                endGame();
            } else {
                showTurnOverlay(); // Show pass-and-play screen
            }
        }

        function endGame() {
            ui.gameOverModal.style.display = 'flex';
            ui.finalScoresList.innerHTML = '';

            // Calculate totals and sort
            const standings = gameState.players.map(p => ({
                name: p.name,
                total: getPlayerScoreData(p, 'grand_total')
            })).sort((a, b) => b.total - a.total); // Sort highest to lowest

            // Render standings
            standings.forEach((p, idx) => {
                let badge = idx === 0 ? '<i class="fa-solid fa-trophy text-yellow-400"></i>' : `#${idx + 1}`;
                const div = document.createElement('div');
                div.className = `flex justify-between items-center p-3 border-b border-slate-600 last:border-0 ${idx === 0 ? 'text-2xl font-bold text-yellow-400' : 'text-xl text-slate-200'}`;
                div.innerHTML = `
                    <span>${badge} ${p.name}</span>
                    <span class="font-mono text-3xl">${p.total}</span>
                `;
                ui.finalScoresList.appendChild(div);
            });
        }

        // --- Event Listeners ---
        ui.addPlayerBtn.addEventListener('click', () => addPlayerInput());
        ui.startBtn.addEventListener('click', startGame);
        ui.rollBtn.addEventListener('click', handleRollDice);

        ui.restartBtn.addEventListener('click', () => {
            if (confirm("Are you sure you want to end the current game and go to the setup screen?")) {
                initSetup();
            }
        });

        ui.playAgainBtn.addEventListener('click', () => {
            initSetup();
        });

        // Start App
        window.onload = initSetup;

    </script>
</body>

</html>
