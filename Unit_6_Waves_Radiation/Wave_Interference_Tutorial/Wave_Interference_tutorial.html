<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Interference Tutorial // Unit 6</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/unit6-favicon.svg">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            projectId: "site-6e500",
            appId: "1:591530758858:web:1996cdca7316ffc3781a33",
            storageBucket: "site-6e500.firebasestorage.app",

        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-indigo: #6366f1;
            --accent-cyan: #22d3ee;
            --bg-dark: #0f172a;
        }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.98);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .glass {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .gradient-text {
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hidden { display: none !important; }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        @keyframes glow-pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        .animate-glow { animation: glow-pulse 2s infinite; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;


        // --- Lucide Icon Wrapper ---
        const Icon = ({ name, className = "w-5 h-5", size, color }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ targets: [containerRef.current.firstElementChild] });
                }
            }, [name]);
            return <span ref={containerRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size, color: color }}></span>;
        };

        // --- Original Component Constants & Helpers ---
        const SIM_SPEED = 20;
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 350;
        const X_MAX = 100;
        const Y_MAX = 10;

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const generateParams = () => {
            const s3_tA = Math.floor(Math.random() * 4) + 2;
            return {
                s1_leftA: Math.floor(Math.random() * 3) + 2,
                s1_rightA: Math.floor(Math.random() * 3) + 2,
                s2_leftA: Math.floor(Math.random() * 3) + 2,
                s2_rightA: -(Math.floor(Math.random() * 3) + 2),
                s3_targetA: s3_tA,
                s3_targetW: (Math.random() * 2 + 2).toFixed(1),
                s3_constructiveTarget: s3_tA + Math.floor(Math.random() * 3) + 2
            };
        };

        // --- Sub-Components ---
        const WaveGraphic = ({ leftA, rightA, isSelected, onClick }) => {
            const resultA = leftA + rightA;
            const getGaussianPath = (amp, xc, w = 6) => {
                const startX = xc - 30;
                const endX = xc + 30;
                let path = `M ${startX} 50`;
                for (let x = startX; x <= endX; x += 1) {
                    const yOffset = amp * 6 * Math.exp(-Math.pow(x - xc, 2) / (2 * w * w));
                    const y = 50 - yOffset;
                    path += ` L ${x} ${y}`;
                }
                return path;
            };
            return (
                <div onClick={onClick} className={`relative p-4 border-2 rounded-xl cursor-pointer transition-all ${isSelected ? 'border-indigo-600 bg-indigo-50 shadow-md' : 'border-slate-200 bg-white hover:border-indigo-300 hover:bg-slate-50'}`}>
                    {isSelected && <div className="absolute top-2 right-2 text-indigo-600"><Icon name="check-circle" /></div>}
                    <svg viewBox="0 0 300 100" className="w-full h-24 stroke-indigo-500 fill-transparent stroke-[3] stroke-linecap-round stroke-linejoin-round">
                        <line x1="0" y1="50" x2="130" y2="50" className="stroke-slate-300 stroke-2" />
                        <line x1="190" y1="50" x2="300" y2="50" className="stroke-slate-300 stroke-2" />
                        <path d={getGaussianPath(leftA, 35)} />
                        <path d={getGaussianPath(rightA, 95)} className="stroke-blue-500" />
                        <g className="stroke-slate-400 stroke-[5] fill-none stroke-linecap-round stroke-linejoin-round">
                            <line x1="140" y1="50" x2="180" y2="50" />
                            <polyline points="165,35 180,50 165,65" />
                        </g>
                        <path d={getGaussianPath(resultA, 230)} className="stroke-purple-600 stroke-[4]" />
                    </svg>
                </div>
            );
        };

        const IntroScreen = ({ onComplete }) => {
            const [selectedOpt, setSelectedOpt] = useState('');
            const [penalty, setPenalty] = useState(0);
            const [errorMsg, setErrorMsg] = useState('');
            const options = useMemo(() => shuffleArray([
                { id: 'A', text: 'They permanently destroy each other and disappear.' },
                { id: 'B', text: 'Their amplitudes combine (add together) to form a new temporary wave.' },
                { id: 'C', text: 'They bounce off each other and reverse their direction.' }
            ]), []);
            useEffect(() => {
                if (penalty <= 0) return;
                const timer = setInterval(() => setPenalty(p => p - 1), 1000);
                return () => clearInterval(timer);
            }, [penalty]);
            const handleSubmit = () => {
                const correctOpt = options.find(o => o.text.includes('combine'));
                if (selectedOpt === correctOpt.id) onComplete();
                else { setPenalty(20); setErrorMsg('Incorrect. You must review the material above and wait 20 seconds before trying again.'); setSelectedOpt(''); }
            };
            return (
                <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 max-w-4xl mx-auto space-y-8 animate-in fade-in duration-500">
                    <div className="flex items-center gap-4 border-b pb-4">
                        <div className="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center"><Icon name="book-open" className="w-6 h-6" /></div>
                        <h2 className="text-2xl font-bold text-slate-800">Introduction to Wave Behavior</h2>
                    </div>
                    <div className="prose prose-slate max-w-none space-y-4">
                        <p><strong>Superposition Principle:</strong> When two or more waves cross paths in the same medium, the resulting wave displacement is the algebraic sum of the individual wave displacements at that exact point.</p>
                        <p><strong>Interference:</strong> The physical effect of superposition. Because waves are energy (not solid objects), they do not crash into each other. They smoothly pass right through one another. While they are passing through, they <em>interfere</em> to create a new, temporary shape.</p>
                    </div>
                    <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 space-y-4">
                        <h3 className="font-bold text-slate-800">Concept Check</h3>
                        <p className="text-slate-600 mb-4">According to the Principle of Superposition, what happens when two waves occupy the same space at the same time?</p>
                        <div className="space-y-3">
                            {options.map(opt => (
                                <label key={opt.id} className="flex items-center p-3 border rounded-lg hover:bg-white cursor-pointer bg-slate-50 transition-colors">
                                    <input type="radio" name="intro_q" value={opt.id} checked={selectedOpt === opt.id} onChange={(e) => setSelectedOpt(e.target.value)} disabled={penalty > 0} className="w-4 h-4 text-indigo-600" />
                                    <span className="ml-3 text-slate-700">{opt.text}</span>
                                </label>
                            ))}
                        </div>
                        {errorMsg && penalty > 0 && (
                            <div className="bg-red-50 text-red-700 p-4 rounded-lg flex items-start gap-3 mt-4">
                                <Icon name="alert-circle" className="w-5 h-5 flex-shrink-0 mt-0.5" />
                                <div><p className="font-bold">Incorrect!</p><p className="text-sm">{errorMsg}</p><div className="flex items-center gap-2 mt-2 font-mono bg-white inline-flex px-3 py-1 rounded text-red-600 font-bold border border-red-200"><Icon name="clock" className="w-4 h-4" /> Wait {penalty}s</div></div>
                            </div>
                        )}
                        <button onClick={handleSubmit} disabled={!selectedOpt || penalty > 0} className="mt-6 w-full py-3 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all">{penalty > 0 ? 'Reviewing...' : 'Confirm Understanding & Start'}</button>
                    </div>
                </div>
            );
        };

        const ReviewSlide = ({ type, onComplete }) => {
            const [q1Ans, setQ1Ans] = useState('');
            const [q2Ans, setQ2Ans] = useState('');
            const [selectedImages, setSelectedImages] = useState([]);
            const [errorMsg, setErrorMsg] = useState('');
            const q1Options = useMemo(() => shuffleArray(['Constructive Interference', 'Destructive Interference', 'Refraction', 'Diffraction']), []);
            const [calcParams] = useState(() => (type === 'constructive' ? { a: 4, b: 3, correct: 7 } : { a: 5, b: -2, correct: 3 }));
            const q2Options = useMemo(() => {
                const { a, b, correct } = calcParams;
                let pool = [correct, a - b, a * b, correct + 1, correct - 2].filter(v => v !== correct);
                pool = [...new Set(pool)].slice(0, 3);
                return shuffleArray([correct, ...pool]);
            }, [calcParams]);
            const imageOptions = useMemo(() => shuffleArray([
                { id: 'C1', leftA: 2, rightA: 2, type: 'constructive' },
                { id: 'C2', leftA: 1, rightA: 3, type: 'constructive' },
                { id: 'D1', leftA: 3, rightA: -3, type: 'destructive' },
                { id: 'D2', leftA: 4, rightA: -2, type: 'destructive' }
            ]), []);
            const toggleImage = (id) => setSelectedImages(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            const handleSubmit = () => {
                const expectedVocab = type === 'constructive' ? 'Constructive Interference' : 'Destructive Interference';
                if (q1Ans !== expectedVocab) { setErrorMsg('Question 1 is incorrect. Check your vocabulary.'); return; }
                if (parseFloat(q2Ans) !== calcParams.correct) { setErrorMsg('Question 2 is incorrect. Check your math.'); return; }
                const correctImageIds = imageOptions.filter(img => img.type === type).map(img => img.id);
                const hasAllCorrect = correctImageIds.every(id => selectedImages.includes(id));
                const hasNoWrong = selectedImages.every(id => correctImageIds.includes(id));
                if (!hasAllCorrect || !hasNoWrong || selectedImages.length === 0) { setErrorMsg(`Question 3 is incorrect. Please select exactly all the images that demonstrate ${type} interference.`); return; }
                setErrorMsg(''); onComplete();
            };
            return (
                <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 max-w-4xl mx-auto space-y-8 animate-in slide-in-from-bottom-4 duration-500">
                    <div className="border-b pb-4"><h2 className="text-2xl font-bold text-slate-800 capitalize">{type} Interference Review</h2><p className="text-slate-500 mt-1">Let's verify what you just observed before moving forward.</p></div>
                    <div className="space-y-8">
                        <div className="space-y-3"><h3 className="font-bold text-slate-800">1. Vocabulary</h3><p className="text-slate-600">What term describes when two waves combine to make a {type === 'constructive' ? 'larger' : 'smaller/flat'} resulting wave?</p>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">{q1Options.map((opt, i) => (<label key={i} className={`p-3 border rounded-lg cursor-pointer transition-colors ${q1Ans === opt ? 'bg-indigo-50 border-indigo-300' : 'hover:bg-slate-50'}`}><input type="radio" value={opt} checked={q1Ans === opt} onChange={e => setQ1Ans(e.target.value)} className="hidden" />{opt}</label>))}</div>
                        </div>
                        <div className="space-y-3"><h3 className="font-bold text-slate-800">2. Quick Calculation</h3><p className="text-slate-600">If a wave pulse with an amplitude of {calcParams.a} perfectly overlaps with a pulse of amplitude {calcParams.b}, what is the maximum resulting amplitude?</p>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">{q2Options.map((opt, i) => (<label key={i} className={`p-3 border text-center rounded-lg cursor-pointer transition-colors ${parseFloat(q2Ans) === opt ? 'bg-indigo-50 border-indigo-300 font-bold' : 'hover:bg-slate-50'}`}><input type="radio" value={opt} checked={parseFloat(q2Ans) === opt} onChange={e => setQ2Ans(e.target.value)} className="hidden" />{opt}</label>))}</div>
                        </div>
                        <div className="space-y-3"><h3 className="font-bold text-slate-800">3. Visual Identification</h3><p className="text-slate-600">Select <strong>all</strong> the diagrams below that represent <strong>{type} interference</strong>.</p>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">{imageOptions.map((img) => (<WaveGraphic key={img.id} leftA={img.leftA} rightA={img.rightA} isSelected={selectedImages.includes(img.id)} onClick={() => toggleImage(img.id)} />))}</div>
                        </div>
                    </div>
                    {errorMsg && <div className="bg-red-50 text-red-700 p-4 rounded-lg flex items-center gap-3"><Icon name="alert-circle" /> <p className="font-medium">{errorMsg}</p></div>}
                    <button onClick={handleSubmit} className="w-full py-4 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition-colors text-lg shadow-md">Submit Review & Continue</button>
                </div>
            );
        };

        const MainApp = ({ user }) => {
            const [currentView, setCurrentView] = useState('intro');
            const [params, setParams] = useState(generateParams());
            const displayStage = currentView.includes('1') ? 1 : currentView.includes('2') ? 2 : currentView.includes('3') ? 3 : 0;
            const sidebarRef = useRef(null);

            // --- ALL STATE FROM ORIGINAL ---
            const [overlapAchieved, setOverlapAchieved] = useState(false);
            const [s1Q1Answer, setS1Q1Answer] = useState('');
            const [s1Q1Status, setS1Q1Status] = useState('locked');
            const [s1Q1Feedback, setS1Q1Feedback] = useState('');
            const [s1Q2Status, setS1Q2Status] = useState('waiting');
            const [s1Q2Feedback, setS1Q2Feedback] = useState('');
            const [s1DrillAttempts, setS1DrillAttempts] = useState(0);
            const [s1DrillStreak, setS1DrillStreak] = useState(0);
            const [s1DrillLeftA, setS1DrillLeftA] = useState(2);
            const [s1DrillRightA, setS1DrillRightA] = useState(3);
            const [s1DrillAns, setS1DrillAns] = useState('');
            const [s1DrillStatus, setS1DrillStatus] = useState('input');
            const [s1DrillFeedback, setS1DrillFeedback] = useState('');
            const [s2OverlapAchieved, setS2OverlapAchieved] = useState(false);
            const [passedThrough, setPassedThrough] = useState(false);
            const [s2Q1Answer, setS2Q1Answer] = useState('');
            const [s2Q1Status, setS2Q1Status] = useState('locked');
            const [s2Q1Feedback, setS2Q1Feedback] = useState('');
            const [s2Q2Status, setS2Q2Status] = useState('locked');
            const [s2Q2Feedback, setS2Q2Feedback] = useState('');
            const [s3Step, setS3Step] = useState(1);
            const [s3UserA, setS3UserA] = useState(0);
            const [s3UserW, setS3UserW] = useState(3);
            const [s3Status, setS3Status] = useState('building');
            const [s3Feedback, setS3Feedback] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);
            const syncStateRef = useRef({ isSyncing: false, needsSync: false });

            // Auto-scroll sidebar when status changes
            useEffect(() => {
                if (sidebarRef.current) {
                    sidebarRef.current.scrollTo({
                        top: sidebarRef.current.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            }, [s1Q1Status, s1Q2Status, s1DrillStatus, s1DrillStreak, s2Q1Status, s2Q2Status, s3Step, s3Status, currentView]);

            useEffect(() => {
                if (s1Q1Status === 'unlocked') {
                    const el = document.getElementById('s1q1-input');
                    if (el) el.focus();
                }
            }, [s1Q1Status]);

            useEffect(() => {
                if (s2Q1Status === 'unlocked') {
                    const el = document.getElementById('s2q1-input');
                    if (el) el.focus();
                }
            }, [s2Q1Status]);

            useEffect(() => {
                syncResults();
            }, [currentView]);

            const syncResults = useCallback(async () => {
                if (!user || !user.id) return;
                if (syncStateRef.current.isSyncing) {
                    syncStateRef.current.needsSync = true;
                    return;
                }
                syncStateRef.current.isSyncing = true;
                syncStateRef.current.needsSync = false;
                setIsSyncing(true);

                const scores = { 'intro': 5, 'stage1': 20, 'stage1_drill': 35, 'review1': 50, 'stage2': 65, 'review2': 80, 'stage3': 95, 'completed': 100 };
                const currentScore = scores[currentView] || 0;
                const indicator = document.getElementById('sync-indicator');
                const assignmentName = "Wave Interference Tutorial";
                
                try {
                    if (indicator) indicator.innerText = "Syncing...";
                    
                    const payload = {
                        student_name: user.name,
                        student_id: user.id,
                        class_period: user.period,
                        assignment_name: assignmentName,
                        score: currentScore,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        details: { view: currentView, ts: new Date().toISOString() }
                    };

                    const batch = db.batch();
                    // 1. Live Session Node (Nested)
                    const liveRef = db.collection('student_results').doc(assignmentName).collection('students').doc(user.id);
                    batch.set(liveRef, payload, { merge: true });

                    // 2. Archive Node (Flat)
                    const archiveRef = db.collection('student_results_archive').doc(`${user.id}_${assignmentName}`);
                    batch.set(archiveRef, payload, { merge: true });

                    await batch.commit();

                    if (indicator) indicator.innerText = "Saved";
                } catch (e) {
                    console.error("Sync Error:", e);
                    if (indicator) indicator.innerText = "Sync Error";
                } finally {
                    setIsSyncing(false);
                    syncStateRef.current.isSyncing = false;
                    if (syncStateRef.current.needsSync) {
                        syncResults();
                    }
                }
            }, [user, currentView]);

            const sidebarRefInternal = useRef(null);
            const canvasRef = useRef(null);
            const simTimeRef = useRef(0);
            const isPlayingRef = useRef(false);
            const pulsesRef = useRef([]);
            const animationRef = useRef(null);
            const lastUpdateRef = useRef(performance.now());
            const [isPlaying, setIsPlaying] = useState(false);
            const [simTime, setSimTime] = useState(0);

            const calcPulseY = (x, p, t) => {
                const distTraveled = (t - p.startTime) * SIM_SPEED;
                const xc = p.origin === 'left' ? distTraveled : X_MAX - distTraveled;
                return p.A * Math.exp(-Math.pow(x - xc, 2) / (2 * p.w * p.w));
            };
            const getPulseCenter = (p, t) => {
                const distTraveled = (t - p.startTime) * SIM_SPEED;
                return p.origin === 'left' ? distTraveled : X_MAX - distTraveled;
            };

            const updateSimulation = useCallback(() => {
                if (currentView === 'intro' || currentView.includes('review') || currentView === 'completed') {
                    animationRef.current = requestAnimationFrame(updateSimulation);
                    return;
                }
                const now = performance.now();
                const dt = (now - lastUpdateRef.current) / 1000;
                lastUpdateRef.current = now;
                if (isPlayingRef.current) { simTimeRef.current += dt; setSimTime(simTimeRef.current); }
                const t = simTimeRef.current;
                const pulses = pulsesRef.current;
                pulsesRef.current = pulses.filter(p => { const xc = getPulseCenter(p, t); return xc > -20 && xc < X_MAX + 20; });

                if (pulsesRef.current.length === 2) {
                    const c1 = getPulseCenter(pulsesRef.current[0], t);
                    const c2 = getPulseCenter(pulsesRef.current[1], t);
                    const dist = Math.abs(c1 - c2);

                    if (currentView === 'stage1' && s1Q1Status !== 'correct') {
                        if (!isPlayingRef.current && dist < 2.5) { if (!overlapAchieved) setOverlapAchieved(true); if (s1Q1Status === 'locked') setS1Q1Status('unlocked'); }
                        else if (overlapAchieved) setOverlapAchieved(false);
                    }
                    if (currentView === 'stage1_drill' && s1DrillStatus === 'simulating') {
                        if (dist < 1.0) {
                            setIsPlayingRef(false); 
                            const expected = s1DrillLeftA + s1DrillRightA;
                            const isCorrect = parseFloat(s1DrillAns) === expected;
                            if (isCorrect) { setS1DrillStreak(prev => prev + 1); setS1DrillFeedback(`Correct! The amplitudes combined perfectly to ${expected}.`); }
                            else { setS1DrillStreak(0); setS1DrillFeedback(`Incorrect. The correct combined amplitude is ${expected}.`); }
                            setS1DrillAttempts(prev => prev + 1); setS1DrillStatus('result');
                        }
                    }
                    if (currentView === 'stage2') {
                        if (s2Q1Status !== 'correct') {
                            if (!isPlayingRef.current && dist < 2.5) { if (!s2OverlapAchieved) setS2OverlapAchieved(true); if (s2Q1Status === 'locked') setS2Q1Status('unlocked'); }
                            else if (s2OverlapAchieved) setS2OverlapAchieved(false);
                        }
                        if (s2Q1Status === 'correct' && s2Q2Status !== 'correct') { if (c1 > c2 + 10) { if (!passedThrough) setPassedThrough(true); if (s2Q2Status === 'locked') setS2Q2Status('unlocked'); } }
                    }
                    if (currentView === 'stage3' && s3Status === 'testing') {
                        if (dist < 1) {
                            if (s3Step === 1) {
                                const isCancelled = (parseFloat(s3UserA) === -params.s3_targetA) && (parseFloat(s3UserW) === parseFloat(params.s3_targetW));
                                if (isCancelled) { setS3Status('correct'); setS3Feedback('Perfect destructive interference achieved!'); setIsPlayingRef(false); }
                                else { setS3Status('building'); setS3Feedback('Not quite canceled. Adjust and try again.'); }
                            } else if (s3Step === 2) {
                                const expectedUserA = params.s3_constructiveTarget - params.s3_targetA;
                                const isTargetHit = (parseFloat(s3UserA) === expectedUserA) && (parseFloat(s3UserW) === parseFloat(params.s3_targetW));
                                if (isTargetHit) { setS3Status('correct'); setS3Feedback(`Incredible! Target hit.`); setIsPlayingRef(false); }

                                                    </div>
                                                    <div className="bg-white p-2 rounded border text-center">
                                                        <span className="block text-[9px] uppercase font-black text-indigo-500 mb-1">Right (A)</span>
                                                        <span className="text-xl font-bold text-indigo-600">{s1DrillRightA}</span>
                                                    </div>
                                                </div>
                                                
                                                <div className="relative mb-3">
                                                    <label className="absolute -top-2 left-3 px-1 bg-white text-[10px] font-bold text-indigo-600 uppercase border border-indigo-100 rounded">Predicted Height</label>
                                                    <input 
                                                        type="number" 
                                                        value={s1DrillAns} 
                                                        onChange={e => setS1DrillAns(e.target.value)} 
                                                        disabled={s1DrillStatus !== 'input'} 
                                                        placeholder="?"
                                                        className="w-full px-4 py-3 border-2 border-indigo-200 rounded-xl text-2xl font-black text-center focus:ring-4 focus:ring-indigo-500 shadow-inner" 
                                                    />
                                                </div>

                                                {s1DrillStatus === 'input' ? (
                                                    <button onClick={submitS1Drill} disabled={s1DrillAns === ''} className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                                                        Verify Prediction <Icon name="play" size={18} />
                                                    </button>
                                                ) : s1DrillStatus === 'simulating' ? (
                                                    <button disabled className="w-full py-3 bg-slate-400 text-white font-bold rounded-xl cursor-not-allowed flex items-center justify-center gap-2">
                                                        <Icon name="loader" className="animate-spin" /> Simulating...
                                                    </button>
                                                ) : (
                                                    <button onClick={startNextS1Drill} className="w-full py-3 bg-slate-800 text-white font-bold rounded-xl shadow-md hover:bg-slate-700 transition-all flex items-center justify-center gap-2">
                                                        Next Trial <Icon name="arrow-right" />
                                                    </button>
                                                )}
                                                
                                                {s1DrillFeedback && (
                                                    <p className={`text-sm mt-4 font-bold flex items-center justify-center gap-2 p-3 rounded-lg ${s1DrillFeedback.includes('Correct') ? 'text-green-700 bg-green-100' : 'text-red-700 bg-red-100'}`}>
                                                        {s1DrillFeedback.includes('Correct') ? <Icon name="check-circle" size={18} /> : <Icon name="alert-circle" size={18} />}
                                                        {s1DrillFeedback}
                                                    </p>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                    {currentView === 'stage2' && (
                                        <div className="flex-1 flex flex-col space-y-6">
                                            <div className="sticky top-0 z-20 bg-white/95 backdrop-blur-sm -mx-4 px-4 pt-2 shadow-sm border-b pb-2">
                                                <div className="flex justify-between items-center">
                                                    <div>
                                                        <h2 className="text-xl font-bold text-slate-800 tracking-tight">Part 2: Destructive Interference</h2>
                                                        <p className="text-slate-500 text-[10px] uppercase font-black tracking-widest">Phase Assessment</p>
                                                    </div>
                                                </div>
                                                {s2Q2Status === 'correct' && (
                                                    <div className="mt-4 animate-in slide-in-from-top duration-500">
                                                        <button onClick={() => setCurrentView('review2')} className="w-full py-4 bg-indigo-600 text-white font-black rounded-xl flex justify-center items-center gap-2 shadow-xl shadow-indigo-100">
                                                            Concepts Mastered: Review <Icon name="arrow-right" />
                                                        </button>
                                                    </div>
                                                )}
                                            </div>

                                            <div className="px-1">
                                                <p className="text-slate-600 leading-relaxed text-sm">When waves are out of phase, they undergo <strong>destructive interference</strong>. Observe the result as they overlap.</p>
                                            </div>

                                            <div className={`p-5 rounded-xl border-2 transition-all duration-500 shadow-sm ${s2Q1Status === 'correct' ? 'bg-slate-50 border-slate-200' : s2Q1Status === 'unlocked' ? 'bg-indigo-50 border-indigo-400 animate-glow' : 'bg-amber-50 border-amber-200'}`}>
                                                <div className="flex justify-between items-center mb-3">
                                                    <h3 className="font-bold text-sm">Question 2.1: Cancellation</h3>
                                                    {s2Q1Status === 'unlocked' && <span className="bg-indigo-600 text-white text-[9px] font-black px-2 py-0.5 rounded tracking-widest uppercase animate-pulse">Ready</span>}
                                                </div>
                                                <p className="text-xs text-slate-500 mb-4 italic leading-snug">Align the upward and downward pulses to see what happens to the total amplitude.</p>
                                                <div className="flex gap-2">
                                                    <input id="s2q1-input" type="number" value={s2Q1Answer} onChange={e => setS2Q1Answer(e.target.value)} disabled={s2Q1Status === 'locked' || s2Q1Status === 'correct'} placeholder={s2Q1Status === 'locked' ? "Pause at peak..." : "Enter height..."} className="w-full p-2 border rounded-lg font-bold text-lg" />
                                                    <button onClick={handleS2Q1Check} disabled={s2Q1Status === 'locked' || s2Q1Status === 'correct' || s2Q1Answer === ''} className={`px-6 py-2 font-bold rounded-lg transition-all ${s2Q1Status === 'unlocked' ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-800 text-white opacity-50'}`}>Check</button>
                                                </div>
                                                {s2Q1Feedback && <p className={`text-sm mt-3 font-medium flex items-center gap-2 ${s2Q1Status === 'correct' ? 'text-green-700' : 'text-red-600'}`}>{s2Q1Status === 'correct' ? <Icon name="check-circle" size={16} /> : <Icon name="alert-circle" size={16} />}{s2Q1Feedback}</p>}
                                            </div>

                                            <div className={`p-5 rounded-xl border-2 transition-all duration-500 shadow-sm ${s2Q2Status === 'correct' ? 'bg-slate-50 border-slate-200' : s2Q1Status === 'correct' ? 'bg-purple-50 border-purple-400' : 'bg-slate-50 border-slate-100 opacity-60'}`}>
                                                <h3 className="font-bold text-sm text-slate-800 mb-2">Question 2.2: Persistence</h3>
                                                <p className="text-xs text-slate-600 mb-4 leading-relaxed">Do the waves continue to exist after they cancel each other out in the middle?</p>
                                                <div className="flex flex-col gap-2 relative">
                                                    <button onClick={() => handleS2Q2Check('pass')} disabled={s2Q1Status !== 'correct' || !passedThrough || s2Q2Status === 'correct'} className={`w-full py-2 px-4 rounded-lg font-bold text-sm transition-all ${s2Q2Status === 'correct' ? 'bg-green-600 text-white shadow-md' : (s2Q1Status === 'correct' && passedThrough) ? 'bg-white border-2 border-purple-200 text-purple-600 hover:bg-purple-50' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}>Yes, they pass through</button>
                                                    <button onClick={() => handleS2Q2Check('destroy')} disabled={s2Q1Status !== 'correct' || !passedThrough || s2Q2Status === 'correct'} className={`w-full py-2 px-4 rounded-lg font-bold text-sm transition-all ${s2Q2Status === 'correct' ? 'bg-white text-slate-400 cursor-not-allowed' : (s2Q1Status === 'correct' && passedThrough) ? 'bg-white border-2 border-purple-200 text-purple-600 hover:bg-purple-50' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}>No, they are destroyed</button>
                                                    {(s2Q1Status !== 'correct' || !passedThrough) && (
                                                        <div className="absolute inset-0 flex items-center justify-center bg-white/80 rounded-lg backdrop-blur-[1px]">
                                                            <div className="flex items-center gap-2 text-slate-500 font-bold text-[10px] uppercase tracking-widest">
                                                                <Icon name="lock" size={12} /> {s2Q1Status !== 'correct' ? 'Complete Q2.1' : 'Let pulses pass each other'}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    {currentView === 'stage3' && (
                                        <div className="flex-1 flex flex-col space-y-6 animate-in fade-in slide-in-from-right duration-500">
                                            <div className="sticky top-0 z-20 bg-white/95 backdrop-blur-sm -mx-4 px-4 pt-2 shadow-sm border-b pb-2">
                                                <div className="flex justify-between items-center">
                                                    <div>
                                                        <h2 className="text-xl font-bold text-slate-800 tracking-tight">Final Performance Tasks</h2>
                                                        <p className="text-slate-500 text-[10px] uppercase font-black tracking-widest">Mastery Application</p>
                                                    </div>
                                                </div>
                                                {s3Status === 'correct' && s3Step === 2 && (
                                                    <div className="mt-4 animate-in slide-in-from-top duration-500">
                                                        <button onClick={() => setCurrentView('completed')} className="w-full py-4 bg-green-600 text-white font-black text-lg rounded-xl flex justify-center items-center gap-2 shadow-xl shadow-green-100 animate-bounce">
                                                            Perfect Match! Finish <Icon name="check-circle" />
                                                        </button>
                                                    </div>
                                                )}
                                            </div>

                                            <div className="px-1">
                                                <p className="text-slate-600 leading-relaxed text-sm italic">Demonstrate your mastery of superposition by configuring wave pulses to achieve specific interference results.</p>
                                            </div>

                                            <div className={`p-5 rounded-xl border-2 transition-all duration-500 shadow-sm ${s3Step > 1 ? 'bg-slate-50 border-slate-200 opacity-60' : 'bg-indigo-50 border-indigo-200 shadow-md ring-1 ring-indigo-100'}`}>
                                                <div className="flex justify-between items-center mb-3">
                                                    <h3 className="font-bold text-sm text-indigo-900 flex items-center gap-2"><Icon name="zap" size={16} /> 3.1: Total Cancellation</h3>
                                                    {s3Step === 1 && s3Status === 'testing' && <Icon name="loader" size={16} className="animate-spin text-indigo-600" />}
                                                </div>
                                                <p className="text-xs text-slate-600 mb-4 leading-relaxed">Your objective is to create a pulse that <strong>perfectly cancels</strong> the target pulse when they overlap in the middle.</p>
                                                
                                                {s3Step === 1 && (
                                                    <div className="space-y-4">
                                                        <button onClick={testS3Build} disabled={s3Status === 'testing'} className="w-full py-2 bg-indigo-600 text-white font-bold rounded-lg shadow-lg shadow-indigo-200 flex items-center justify-center gap-2 shadow-md">
                                                            {s3Status === 'testing' ? 'Aligning...' : 'Test Superposition'}
                                                        </button>
                                                        {s3Status === 'correct' && (
                                                            <button onClick={advanceS3Step} className="w-full py-2 bg-green-600 text-white font-bold rounded-lg flex items-center justify-center gap-2 animate-bounce">
                                                            Success! Next Task <Icon name="arrow-right" />
                                                            </button>
                                                        )}
                                                    </div>
                                                )}
                                                {s3Step > 1 && <p className="text-[10px] text-green-700 font-bold uppercase tracking-widest flex items-center gap-1"><Icon name="check-circle" size={10} /> Cancellation Achieved</p>}
                                            </div>

                                            <div className={`p-5 rounded-xl border-2 transition-all duration-500 shadow-sm ${s3Step === 2 ? 'bg-blue-50 border-blue-400 shadow-md ring-1 ring-blue-100' : 'bg-slate-50 border-slate-100 opacity-60'}`}>
                                                <div className="flex justify-between items-center mb-3">
                                                    <h3 className="font-bold text-sm text-blue-900 flex items-center gap-2"><Icon name="trending-up" size={16} /> 3.2: Target Peak</h3>
                                                    {s3Step === 2 && s3Status === 'testing' && <Icon name="loader" size={16} className="animate-spin text-blue-600" />}
                                                </div>
                                                <p className="text-xs text-slate-600 mb-4 leading-relaxed">Your objective is to create a combined wave that reaches exactly <strong className="text-blue-700 text-sm">{params.s3_constructiveTarget} units</strong> high when they overlap.</p>
                                                
                                                {s3Step === 2 && (
                                                    <div className="space-y-4">
                                                        <button onClick={testS3Build} disabled={s3Status === 'testing'} className="w-full py-2 bg-blue-600 text-white font-bold rounded-lg shadow-lg shadow-indigo-200">
                                                            Test Result
                                                        </button>
                                                    </div>
                                                )}
                                            </div>

                                            {s3Feedback && s3Status !== 'correct' && (
                                                <div className="bg-red-50 border border-red-200 p-4 rounded-lg flex items-start gap-3 animate-in fade-in">
                                                    <Icon name="alert-circle" className="text-red-600 mt-0.5" />
                                                    <p className="text-xs text-red-700 font-medium">{s3Feedback}</p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {currentView === 'completed' && <div className="bg-white p-12 rounded-xl shadow-sm border border-slate-200 text-center space-y-6 animate-in zoom-in duration-500"><div className="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="check-circle" className="w-12 h-12" /></div><h2 className="text-4xl font-bold text-slate-800">Tutorial Complete!</h2><p className="text-lg text-slate-600">Mastery of Superposition achieved. Data pushed to records.</p><button onClick={startNewSession} className="mt-8 px-8 py-3 bg-indigo-600 text-white font-bold rounded-lg shadow hover:bg-indigo-700 transition">Start New Session</button></div>}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [idInput, setIdInput] = useState('');
            const [nameInput, setNameInput] = useState('');
            const [showNameEntry, setShowNameEntry] = useState(false);
            const [status, setStatus] = useState('');

            const handleLogin = async () => {
                if (idInput.length !== 6) return;
                setStatus("VERIFYING...");
                try {
                    // Check URL for period
                    const urlParams = new URLSearchParams(window.location.search);
                    const urlPeriod = urlParams.get('p') || urlParams.get('period');

                    // 1. Check Roster
                    const rosterSnap = await db.collection('roster').doc(idInput).get();

                    if (rosterSnap.exists) { 
                        const data = rosterSnap.data();
                        setUser({ 
                            id: idInput, 
                            name: data.full_name,
                            period: urlPeriod || data.class_period || null
                        }); 
                    }
                    else if (!showNameEntry) { setShowNameEntry(true); setStatus("NEW_ID_DETECTED"); }
                    else { 
                        if (nameInput.length < 3) return; 
                        setUser({ 
                            id: idInput, 
                            name: nameInput,
                            period: urlPeriod || null
                        }); 
                    }
                } catch (e) { setStatus("CONNECTION_ERROR"); }
            };

            if (!user) {
                return (
                    <div className="overlay">
                        <div className="glass max-w-md w-full p-10 rounded-[2rem] text-center space-y-8 animate-in zoom-in duration-300">
                            <div className="space-y-2">
                                <div className="w-16 h-16 bg-gradient-to-br from-indigo-500 to-cyan-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-indigo-500/20 mb-4">
                                    <Icon name="activity" className="w-10 h-10 text-white" />
                                </div>
                                <h1 className="text-4xl font-orbitron font-black gradient-text tracking-tighter uppercase">Wave_Interference</h1>
                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em]">Tutorial // Unit 6 Waves</p>
                            </div>
                            <div className="space-y-4">
                                <div className="space-y-2">
                                    <p className="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em] text-left px-1">Access_Node // Student ID</p>
                                    <input type="text" value={idInput} onChange={e => setIdInput(e.target.value)} placeholder="6-Digit ID" maxlength="6" className="w-full bg-slate-900 border border-white/10 p-5 rounded-xl outline-none text-center font-bold text-xl text-cyan-400" />
                                </div>
                                {showNameEntry && (
                                    <div className="space-y-2 animate-in fade-in">
                                        <p className="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em] text-left px-1">Register // Full Name</p>
                                        <input type="text" value={nameInput} onChange={e => setNameInput(e.target.value)} placeholder="Student Name" className="w-full bg-slate-900 border border-white/10 p-5 rounded-xl text-center font-bold text-white outline-none" />
                                    </div>
                                )}
                                <button onClick={handleLogin} className="w-full bg-gradient-to-r from-indigo-600 to-cyan-600 p-5 rounded-xl font-black uppercase tracking-widest text-sm text-white shadow-xl">Establish Link</button>
                                <p className="text-[9px] font-bold text-slate-600 uppercase tracking-widest animate-pulse h-4">{status}</p>
                            </div>
                        </div>
                    </div>
                );
            }
            return <MainApp user={user} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
