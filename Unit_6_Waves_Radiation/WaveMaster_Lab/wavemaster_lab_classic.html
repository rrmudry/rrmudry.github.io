<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Anatomy and Speed of Waves</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for range sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #e2e8f0;
            border-radius: 3px;
        }

        input[type=range]:focus {
            outline: none;
        }

        .tab-active {
            border-bottom: 3px solid #3b82f6;
            color: #1e40af;
            font-weight: 600;
        }

        canvas {
            display: block;
            width: 100%;
            background-color: #f8fafc;
            border-radius: 0.5rem;
            box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-900 flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                Physics Interactive: Waves
            </h1>
            <nav class="flex gap-2 mt-4 md:mt-0 overflow-x-auto w-full md:w-auto pb-1">
                <button onclick="setModule(1)" id="tab-1"
                    class="tab-active px-3 py-2 text-sm whitespace-nowrap transition-colors hover:bg-blue-50 rounded-t-md">1.
                    Spatial Wave</button>
                <button onclick="setModule(2)" id="tab-2"
                    class="px-3 py-2 text-sm whitespace-nowrap text-gray-500 transition-colors hover:bg-blue-50 rounded-t-md">2.
                    Temporal Wave</button>
                <button onclick="setModule(3)" id="tab-3"
                    class="px-3 py-2 text-sm whitespace-nowrap text-gray-500 transition-colors hover:bg-blue-50 rounded-t-md">3.
                    Inverse Relation</button>
                <button onclick="setModule(4)" id="tab-4"
                    class="px-3 py-2 text-sm whitespace-nowrap text-gray-500 transition-colors hover:bg-blue-50 rounded-t-md">4.
                    Wave Speed</button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-6xl mx-auto w-full p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Left Column: Interactive Canvas -->
        <div class="lg:col-span-2 flex flex-col gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">

                <!-- Wrapper to keep absolute elements pinned only to the main canvas -->
                <div class="relative">
                    <!-- Overlay UIs for specific modules -->
                    <div id="mod2-overlay"
                        class="hidden absolute top-4 right-4 bg-white/90 backdrop-blur px-4 py-2 rounded-lg shadow border border-gray-200">
                        <div class="text-sm text-gray-600 font-semibold mb-1">Time & Cycles</div>
                        <div class="flex gap-4">
                            <div>
                                <span class="block text-xs text-gray-500">Stopwatch</span>
                                <span id="m2-stopwatch" class="text-xl font-mono font-bold text-blue-600">0.00s</span>
                            </div>
                            <div>
                                <span class="block text-xs text-gray-500">Cycles</span>
                                <span id="m2-cycles" class="text-xl font-mono font-bold text-red-500">0</span>
                            </div>
                        </div>
                    </div>

                    <div id="mod4-overlay" class="hidden absolute bottom-4 left-4 flex gap-2">
                        <button id="btn-race-ready" onclick="prepareRace()"
                            class="bg-green-100 text-green-700 hover:bg-green-200 px-3 py-1 rounded shadow-sm text-sm font-semibold transition-colors">Race
                            a Crest</button>
                        <button id="btn-race-start" onclick="startRace()"
                            class="hidden bg-blue-600 text-white hover:bg-blue-700 px-3 py-1 rounded shadow-sm text-sm font-semibold transition-colors">Start
                            Race</button>
                        <button id="btn-race-reset" onclick="resetRace()"
                            class="hidden bg-gray-200 text-gray-700 hover:bg-gray-300 px-3 py-1 rounded shadow-sm text-sm font-semibold transition-colors">Reset</button>
                    </div>

                    <!-- Module 2 Bottom Overlay (Pause Button) -->
                    <div id="mod2-bottom-overlay" class="hidden absolute bottom-4 right-4 flex gap-2">
                        <button id="btn-m2-reset" onclick="resetM2Timer()"
                            class="hidden bg-gray-200 text-gray-700 hover:bg-gray-300 px-3 py-1 rounded shadow-sm text-sm font-semibold transition-colors">Reset
                            Timer</button>
                        <button id="btn-m2-pause" onclick="toggleM2Pause()"
                            class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-3 py-1 rounded shadow-sm text-sm font-semibold transition-colors">Pause
                            After Cycle</button>
                    </div>

                    <!-- Module 3 Bottom Overlay (Pause Button) -->
                    <div id="mod3-bottom-overlay" class="hidden absolute bottom-4 right-4 flex gap-2">
                        <button id="btn-m3-pause" onclick="toggleM3Pause()"
                            class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-3 py-1 rounded shadow-sm text-sm font-semibold transition-colors">Pause
                            Simulation</button>
                    </div>

                    <!-- Main Canvas Element -->
                    <canvas id="main-canvas" width="800" height="400" class="border border-gray-200"></canvas>
                </div>

                <!-- Secondary Graph Canvas (Now outside the relative wrapper) -->
                <canvas id="graph-canvas" width="800" height="200" class="hidden mt-4 border border-gray-200"></canvas>
            </div>

            <!-- Module Specific Instructions -->
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 text-blue-800 text-sm">
                <h3 class="font-bold flex items-center gap-2 mb-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Learning Objective
                </h3>
                <p id="learning-objective">Loading...</p>
            </div>
        </div>

        <!-- Right Column: Controls & Knowledge Check -->
        <div class="flex flex-col gap-6">

            <!-- Controls Panel -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Controls</h2>
                <div id="controls-container" class="space-y-5">
                    <!-- Injected dynamically based on module -->
                </div>
            </div>

            <!-- Knowledge Check Panel -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 fade-in">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Knowledge Check</h2>
                <div id="kc-container" class="space-y-4">
                    <!-- Injected dynamically -->
                </div>
                <div id="success-message"
                    class="hidden mt-4 p-3 bg-green-100 text-green-800 rounded-lg text-sm font-bold flex items-center gap-2">
                    <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    <span>Great! You've mastered this concept.</span>
                </div>
            </div>

        </div>
    </main>

    <script>
        /**
         * Application State
         */
        const state = {
            module: 1,
            time: 0,
            lastTime: 0,
            physicsTime: 0, // Used for logical simulation time
            pixelsPerMeter: 80, // 800px width = 10 meters

            // Module 1 State
            mod1: {
                amplitude: 1.0,
                wavelength: 4.0,
                targetA: 1.5,
                targetL: 2.5,
                solved: false
            },

            // Module 2 State
            mod2: {
                amplitude: 1.5,
                wavelength: 4.0,
                frequency: 0.5,
                timerActive: true,
                solved1: false,
                solved2: false,
                isPaused: false,
                pauseAtNextCycle: false,
                targetPauseCycle: 0
            },

            // Module 3 State
            mod3: {
                amplitude: 1.2,
                velocity: 4.0, // constant
                frequency: 1.0,
                solved: false,
                isPaused: false
            },

            // Module 4 State
            mod4: {
                amplitude: 0.8,
                velocity: 3.0,
                fA: 3.0, // High freq
                fB: 1.0, // Low freq
                raceState: 'idle', // idle, ready, racing, finished
                crestA_startPhase: 0,
                crestB_startPhase: 0,
                raceStartTime: 0,
                raceFinishX: 8.5 // meters
            }
        };

        /**
         * Canvas Context Setup
         */
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const graphCanvas = document.getElementById('graph-canvas');
        const gCtx = graphCanvas.getContext('2d');

        // Helper to convert physics meters to canvas pixels
        function xPx(meters) { return meters * state.pixelsPerMeter; }
        function yPx(meters, offset = 0) {
            // center of canvas is y=0 if offset is 0
            return (canvas.height / 2) + offset - (meters * state.pixelsPerMeter);
        }

        /**
         * UI Data Definitions for Modules
         */
        const modulesData = {
            1: {
                objective: "Students will understand that waves have a physical size in space, measured by <b>amplitude</b> (height from equilibrium) and <b>wavelength</b> (distance of one full cycle).",
                controls: `
            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Amplitude (m)</label>
                <div class="flex items-center gap-3 w-full">
                    <button onclick="stepSlider('mod1', 'amplitude', -1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-full text-gray-700 font-bold focus:outline-none focus:ring-2 focus:ring-blue-400" aria-label="Decrease Amplitude">-</button>
                    <div class="relative flex-grow h-8 flex items-center">
                        <span id="val-m1-a" class="absolute -top-4 text-blue-600 font-bold text-sm transform -translate-x-1/2">1.0</span>
                        <input type="range" id="slider-m1-a" min="0.2" max="2.0" step="0.1" value="1.0" oninput="updateState('mod1', 'amplitude', this.value); checkMod1()">
                    </div>
                    <button onclick="stepSlider('mod1', 'amplitude', 1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-full text-gray-700 font-bold focus:outline-none focus:ring-2 focus:ring-blue-400" aria-label="Increase Amplitude">+</button>
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Wavelength (m)</label>
                <div class="flex items-center gap-3 w-full">
                    <button onclick="stepSlider('mod1', 'wavelength', -1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-full text-gray-700 font-bold focus:outline-none focus:ring-2 focus:ring-blue-400" aria-label="Decrease Wavelength">-</button>
                    <div class="relative flex-grow h-8 flex items-center">
                        <span id="val-m1-w" class="absolute -top-4 text-blue-600 font-bold text-sm transform -translate-x-1/2">4.0</span>
                        <input type="range" id="slider-m1-w" min="1.0" max="8.0" step="0.1" value="4.0" oninput="updateState('mod1', 'wavelength', this.value); checkMod1()">
                    </div>
                    <button onclick="stepSlider('mod1', 'wavelength', 1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-full text-gray-700 font-bold focus:outline-none focus:ring-2 focus:ring-blue-400" aria-label="Increase Wavelength">+</button>
                </div>
            </div>
        `,
                kc: `
            <p class="text-sm text-gray-600 mb-3"><b>Task:</b> Match the target wave.</p>
            <p class="text-sm text-gray-600">Adjust both sliders until your solid blue wave perfectly overlaps the faded dashed wave.</p>
            <div class="mt-4 flex gap-2 items-center text-sm">
                <div id="m1-status-a" class="px-2 py-1 bg-gray-100 rounded text-gray-500">Amplitude: ???</div>
                <div id="m1-status-l" class="px-2 py-1 bg-gray-100 rounded text-gray-500">Wavelength: ???</div>
            </div>
        `
            },
            2: {
                objective: "Transition from viewing a wave in space to viewing a wave in time. Understand <b>frequency</b> as 'cycles per second' and <b>period</b> as 'seconds per cycle'.",
                controls: `
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Frequency (Hz)</label>
                <div class="flex items-center gap-3 w-full">
                    <button onclick="stepSlider('mod2', 'frequency', -1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-full text-gray-700 font-bold focus:outline-none focus:ring-2 focus:ring-blue-400" aria-label="Decrease Frequency">-</button>
                    <div class="relative flex-grow h-8 flex items-center">
                        <span id="val-m2-f" class="absolute -top-4 text-blue-600 font-bold text-sm transform -translate-x-1/2">0.5</span>
                        <input type="range" id="slider-m2-f" min="0.1" max="3.0" step="0.1" value="0.5" oninput="updateState('mod2', 'frequency', this.value); resetMod2AStatus();">
                    </div>
                    <button onclick="stepSlider('mod2', 'frequency', 1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-full text-gray-700 font-bold focus:outline-none focus:ring-2 focus:ring-blue-400" aria-label="Increase Frequency">+</button>
                </div>
            </div>
        `,
                kc: `
            <div class="mb-4">
                <p class="text-sm text-gray-600 mb-2"><b>1.</b> Adjust the frequency slider until the red dot completes exactly 2 full cycles every 1 second.</p>
                <div class="flex items-center gap-3">
                    <button onclick="verifyMod2A()" class="bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-1 rounded shadow-sm text-sm font-semibold transition-colors">Check Answer</button>
                    <div id="m2-status-f" class="text-sm font-bold text-gray-400">Target: ??? Hz</div>
                </div>
            </div>
            <div class="pt-4 border-t">
                <p class="text-sm text-gray-600 mb-2"><b>2.</b> If it takes 1 second to complete 2 cycles, how many seconds does it take to complete just 1 cycle? (This is the Period, T)</p>
                <div class="flex items-center gap-2">
                    <input type="number" id="m2-period-input" step="0.1" class="border p-1 w-20 rounded shadow-inner" oninput="checkMod2B(this.value)">
                    <span class="text-sm text-gray-600">seconds</span>
                </div>
            </div>
        `
            },
            3: {
                objective: "Discover visually that if <b>wave speed</b> is held constant by the medium, increasing the frequency forces the wavelength to get shorter.",
                controls: `
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Frequency (Hz)</label>
                <div class="flex items-center gap-3 w-full">
                    <button onclick="stepSlider('mod3', 'frequency', -1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-full text-gray-700 font-bold focus:outline-none focus:ring-2 focus:ring-blue-400" aria-label="Decrease Frequency">-</button>
                    <div class="relative flex-grow h-8 flex items-center">
                        <span id="val-m3-f" class="absolute -top-4 text-blue-600 font-bold text-sm transform -translate-x-1/2">1.0</span>
                        <input type="range" id="slider-m3-f" min="0.5" max="4.0" step="0.1" value="1.0" oninput="updateState('mod3', 'frequency', this.value)">
                    </div>
                    <button onclick="stepSlider('mod3', 'frequency', 1)" class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-full text-gray-700 font-bold focus:outline-none focus:ring-2 focus:ring-blue-400" aria-label="Increase Frequency">+</button>
                </div>
                <p class="text-xs text-gray-500 mt-6">Notice the wave generator on the left pulsing faster as you increase frequency, but the waves travel at a constant speed across the screen.</p>
            </div>
        `,
                kc: `
            <p class="text-sm text-gray-600 mb-3">Fill in the blanks based on your observation:</p>
            <div class="text-sm space-y-3 leading-relaxed">
                As you increase the frequency of the wave generator, the wavelength 
                <select id="m3-sel-1" class="border rounded px-1 bg-gray-50" onchange="checkMod3()">
                    <option value="">...</option>
                    <option value="increases">increases</option>
                    <option value="decreases">decreases</option>
                    <option value="stays the same">stays the same</option>
                </select>. 
                This is an 
                <select id="m3-sel-2" class="border rounded px-1 bg-gray-50" onchange="checkMod3()">
                    <option value="">...</option>
                    <option value="inverse">inverse</option>
                    <option value="direct">direct</option>
                </select>
                relationship.
            </div>
        `
            },
            4: {
                objective: "Prove that changing frequency/wavelength does <b>not</b> change how fast the wave's energy travels. Speed is dictated by the medium, not the wave's shape.",
                controls: `
            <div class="bg-gray-50 p-3 rounded text-sm text-gray-700 mb-4">
                <p><b>Track A:</b> High Frequency, Short Wavelength</p>
                <p><b>Track B:</b> Low Frequency, Long Wavelength</p>
                <p class="mt-2 italic text-xs">Both tracks represent the identical physical medium (e.g. ropes with same tension).</p>
            </div>
            <p class="text-sm text-gray-600">Use the buttons on the canvas to "Race a Crest" and see which wave travels faster horizontally.</p>
        `,
                kc: `
            <div id="m4-q1" class="opacity-50 pointer-events-none transition-opacity">
                <p class="text-sm text-gray-600 mb-2"><b>1.</b> Which wave reached the finish line first?</p>
                <div class="flex gap-2 mb-4">
                    <button onclick="checkMod4A('A')" class="px-3 py-1 bg-gray-200 rounded text-sm hover:bg-gray-300">Track A</button>
                    <button onclick="checkMod4A('B')" class="px-3 py-1 bg-gray-200 rounded text-sm hover:bg-gray-300">Track B</button>
                    <button onclick="checkMod4A('Tie')" class="px-3 py-1 bg-gray-200 rounded text-sm hover:bg-gray-300">It's a Tie</button>
                </div>
            </div>
            <div id="m4-q2" class="opacity-50 pointer-events-none transition-opacity pt-4 border-t">
                <p class="text-sm text-gray-600 mb-2"><b>2.</b> Based on this, does a high-pitched scream travel to your ear faster than a low-pitched groan through the same air?</p>
                <div class="flex gap-2">
                    <button onclick="checkMod4B('Yes')" class="px-3 py-1 bg-gray-200 rounded text-sm hover:bg-gray-300">Yes</button>
                    <button onclick="checkMod4B('No')" class="px-3 py-1 bg-gray-200 rounded text-sm hover:bg-gray-300">No</button>
                </div>
            </div>
            <div id="m4-reveal" class="hidden mt-4 p-4 bg-yellow-50 border border-yellow-200 rounded-lg fade-in">
                <h4 class="font-bold text-yellow-800 text-center mb-2">The Universal Wave Equation</h4>
                <div class="text-2xl font-serif text-center mb-2 text-black">v = f × λ</div>
                <p class="text-sm text-yellow-900 text-center">Because speed (<b>v</b>) is locked by the medium, if frequency (<b>f</b>) goes up, wavelength (<b>λ</b>) must go down to balance the equation!</p>
            </div>
        `
            }
        };

        /**
         * UI Interaction & State Updates
         */
        function setModule(modNum) {
            state.module = modNum;

            // Update tabs
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`tab-${i}`).className = i === modNum
                    ? "tab-active px-3 py-2 text-sm whitespace-nowrap transition-colors hover:bg-blue-50 rounded-t-md"
                    : "px-3 py-2 text-sm whitespace-nowrap text-gray-500 transition-colors hover:bg-blue-50 rounded-t-md";
            }

            // Load content
            document.getElementById('learning-objective').innerHTML = modulesData[modNum].objective;
            document.getElementById('controls-container').innerHTML = modulesData[modNum].controls;
            document.getElementById('kc-container').innerHTML = modulesData[modNum].kc;
            document.getElementById('success-message').classList.add('hidden');

            // Initialize sliders visually
            initializeSliders(modNum);

            // UI resets per module
            document.getElementById('mod2-overlay').classList.add('hidden');
            document.getElementById('mod2-bottom-overlay').classList.add('hidden');
            document.getElementById('mod3-bottom-overlay').classList.add('hidden');
            document.getElementById('mod4-overlay').classList.add('hidden');
            document.getElementById('graph-canvas').classList.add('hidden');
            state.physicsTime = 0; // Reset simulation time

            if (modNum === 2) {
                document.getElementById('mod2-overlay').classList.remove('hidden');
                document.getElementById('mod2-bottom-overlay').classList.remove('hidden');

                // Reset pause state
                state.mod2.isPaused = false;
                state.mod2.pauseAtNextCycle = false;
                document.getElementById('btn-m2-pause').innerText = "Pause After Cycle";
                document.getElementById('btn-m2-pause').className = "bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-3 py-1 rounded shadow-sm text-sm font-semibold transition-colors";

                const resetBtn = document.getElementById('btn-m2-reset');
                if (resetBtn) resetBtn.classList.add('hidden');

                document.getElementById('graph-canvas').classList.remove('hidden');
                resetMod2AStatus(); // Reset status when loading the module
            }

            if (modNum === 3) {
                document.getElementById('mod3-bottom-overlay').classList.remove('hidden');

                // Reset pause state
                state.mod3.isPaused = false;
                const btn = document.getElementById('btn-m3-pause');
                if (btn) {
                    btn.innerText = "Pause Simulation";
                    btn.className = "bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-3 py-1 rounded shadow-sm text-sm font-semibold transition-colors";
                }

                // Reset inputs
                state.mod3.solved = false;
            }

            if (modNum === 4) {
                document.getElementById('mod4-overlay').classList.remove('hidden');
                resetRace();
            }
        }

        function initializeSliders(modNum) {
            if (modNum === 1) {
                document.getElementById('slider-m1-a').value = state.mod1.amplitude;
                document.getElementById('slider-m1-w').value = state.mod1.wavelength;
                updateState('mod1', 'amplitude', state.mod1.amplitude);
                updateState('mod1', 'wavelength', state.mod1.wavelength);
            } else if (modNum === 2) {
                document.getElementById('slider-m2-f').value = state.mod2.frequency;
                updateState('mod2', 'frequency', state.mod2.frequency);
            } else if (modNum === 3) {
                document.getElementById('slider-m3-f').value = state.mod3.frequency;
                updateState('mod3', 'frequency', state.mod3.frequency);
            }
        }

        function updateState(mod, key, value) {
            state[mod][key] = parseFloat(value);

            // Using proper template literals without incorrect escaping
            const inputId = `slider-m${mod.replace('mod', '')}-${key[0]}`;
            const spanId = `val-m${mod.replace('mod', '')}-${key[0]}`;

            const input = document.getElementById(inputId);
            const span = document.getElementById(spanId);

            if (input && span) {
                const min = parseFloat(input.min);
                const max = parseFloat(input.max);
                const val = parseFloat(value);
                const percent = ((val - min) / (max - min));

                // Adjust left position to center over the thumb (thumb is 20px wide)
                span.style.left = `calc(${percent * 100}% + ${10 - percent * 20}px)`;
                span.innerText = val.toFixed(1);
            }

            // Always reset timer and unpause if frequency is changed in Module 2
            if (mod === 'mod2' && key === 'frequency') {
                state.physicsTime = 0;
                state.mod2.isPaused = false;
                state.mod2.pauseAtNextCycle = false;
                const btn = document.getElementById('btn-m2-pause');
                const resetBtn = document.getElementById('btn-m2-reset');
                if (btn) {
                    btn.innerText = "Pause After Cycle";
                    btn.className = "bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-3 py-1 rounded shadow-sm text-sm font-semibold transition-colors";
                }
                if (resetBtn) {
                    resetBtn.classList.add('hidden');
                }
            }
        }

        function stepSlider(mod, key, direction) {
            const inputId = `slider-m${mod.replace('mod', '')}-${key[0]}`;
            const input = document.getElementById(inputId);

            if (input) {
                const step = parseFloat(input.step) || 1;
                let newVal = parseFloat(input.value) + (direction * step);

                // Handle floating point precision issues
                newVal = Math.round(newVal * 10) / 10;
                newVal = Math.max(parseFloat(input.min), Math.min(parseFloat(input.max), newVal));
                input.value = newVal;

                // Trigger state update & visual label positioning
                updateState(mod, key, newVal);

                // Trigger specific module validations or resets
                if (mod === 'mod1') checkMod1();
                if (mod === 'mod2') resetMod2AStatus();
            }
        }

        function toggleM2Pause() {
            const btn = document.getElementById('btn-m2-pause');
            const resetBtn = document.getElementById('btn-m2-reset');
            if (state.mod2.isPaused) {

                state.mod2.isPaused = false;
                btn.innerText = "Pause After Cycle";
                btn.className = "bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-3 py-1 rounded shadow-sm text-sm font-semibold transition-colors";
                if (resetBtn) resetBtn.classList.add('hidden');
            } else if (!state.mod2.pauseAtNextCycle) {
                // Request a pause at the next full cycle
                state.mod2.pauseAtNextCycle = true;
                const currentCycles = state.physicsTime * state.mod2.frequency;
                // Target the next integer cycle (add 0.001 to prevent stopping immediately if exactly on an integer)
                state.mod2.targetPauseCycle = Math.ceil(currentCycles + 0.001);

                btn.innerText = "Pausing...";
                btn.className = "bg-yellow-100 text-yellow-700 px-3 py-1 rounded shadow-sm text-sm font-semibold cursor-wait transition-colors";
            }
        }

        /**

        function checkMod1() {
            const a = state.mod1.amplitude;
            const l = state.mod1.wavelength;
            const ta = state.mod1.targetA;
            const tl = state.mod1.targetL;

            const aMatch = Math.abs(a - ta) < 0.05;
            const lMatch = Math.abs(l - tl) < 0.05;

            const elA = document.getElementById('m1-status-a');
            const elL = document.getElementById('m1-status-l');

            if (aMatch) {
                elA.className = "px-2 py-1 bg-green-100 rounded text-green-700 font-bold";
                elA.innerText = "Amplitude: Matched ✓";
            } else {
                elA.className = "px-2 py-1 bg-gray-100 rounded text-gray-500";
                elA.innerText = "Amplitude: ???";
            }

            if (lMatch) {
                elL.className = "px-2 py-1 bg-green-100 rounded text-green-700 font-bold";
                elL.innerText = "Wavelength: Matched ✓";
            } else {
                elL.className = "px-2 py-1 bg-gray-100 rounded text-gray-500";
                elL.innerText = "Wavelength: ???";
            }

            if (aMatch && lMatch && !state.mod1.solved) {
                state.mod1.solved = true;
                showSuccess();
            }
        }

        // Module 4 Race Logic
        function prepareRace() {
            state.mod4.raceState = 'ready';
            document.getElementById('btn-race-ready').classList.add('hidden');
            document.getElementById('btn-race-start').classList.remove('hidden');
            document.getElementById('btn-race-reset').classList.remove('hidden');

            const v = state.mod4.velocity;
            const t = state.physicsTime;
            const lambdaB = v / state.mod4.fB;

            // Using Cosine wave equation: y = A * cos(2PI * (x/L - f*t))
            // Crest occurs when x/L - f*t = n  =>  x = L * (n + f*t)
            // Find the nearest crest of Track B past x = 1.0 meter

            // Dynamically calculate the starting 'n' based on current time 
            // to prevent spawning crests off-screen when t is large.
            let n = Math.floor(1.0 / lambdaB - state.mod4.fB * t);
            let startX = 0;
            while (true) {
                startX = lambdaB * (n + state.mod4.fB * t);
                if (startX > 1.0) break;
                n++;
            }

            // Since fA (3.0) is a multiple of fB (1.0), every crest of B is also a crest of A!
            // This ensures they are perfectly aligned vertically at the start.
            state.mod4.crestA_startX = startX;
            state.mod4.crestB_startX = startX;
            state.mod4.raceStartTime = t;
        }

            state.mod4.raceState = 'racing';

        /**
         * Rendering Utilities
         */
        function drawGrid(ctx, cWidth, cHeight, offset = 0, showDistance = true) {
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            ctx.beginPath();

            let eqY = (cHeight / 2) + offset;

            if (showDistance) {
                // Vertical lines (every 1 meter)
                for (let m = 0; m <= 10; m++) {
                    let px = xPx(m);
                    ctx.moveTo(px, 0);
                    ctx.lineTo(px, cHeight);
                }
            }

            // Horizontal equilibrium line
            ctx.moveTo(0, eqY);
            ctx.lineTo(cWidth, eqY);
            ctx.stroke();

            if (showDistance) {
                // Axis labels
                ctx.fillStyle = '#94a3b8';
                ctx.font = '10px sans-serif';
                for (let m = 0; m <= 10; m++) {
                    ctx.fillText(m + "m", xPx(m) + 2, eqY + 12);
                }
            }
        }

        function drawWave(ctx, A, L, f, t, color, isDashed = false, yOffset = 0) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            if (isDashed) {
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 2;
            } else {
                ctx.setLineDash([]);
            }

            const cHeight = ctx.canvas.height;

            for (let px = 0; px <= ctx.canvas.width; px += 2) {
                let x = px / state.pixelsPerMeter;
                // Wave eq: y(x,t) = A * sin( 2*PI * (x/L - f*t) )
                let y = A * Math.sin(2 * Math.PI * (x / L - f * t));
                let py = yPx(y, yOffset);

                if (px === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
            ctx.setLineDash([]); // reset
        }

        function drawBracket(ctx, x1, y1, x2, y2, text, color = '#ef4444', isVertical = false) {
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();

            // Main line
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            // Ticks
            const tickLen = 6;
            ctx.beginPath();
            if (isVertical) {
                ctx.moveTo(x1 - tickLen, y1); ctx.lineTo(x1 + tickLen, y1);
                ctx.moveTo(x2 - tickLen, y2); ctx.lineTo(x2 + tickLen, y2);
            } else {
                ctx.moveTo(x1, y1 - tickLen); ctx.lineTo(x1, y1 + tickLen);
                ctx.moveTo(x2, y2 - tickLen); ctx.lineTo(x2, y2 + tickLen);
            }
            ctx.stroke();

            // Text background for readability
            ctx.font = 'bold 12px sans-serif';
            const textWidth = ctx.measureText(text).width;
            let tx = (x1 + x2) / 2;
            let ty = (y1 + y2) / 2;

            ctx.fillStyle = 'white';
            if (isVertical) {
                ctx.fillRect(tx + 5, ty - 8, textWidth + 4, 16);
                ctx.fillStyle = color;
                ctx.fillText(text, tx + 7, ty + 4);
            } else {
                ctx.fillRect(tx - textWidth / 2 - 2, ty - 20, textWidth + 4, 16);
                ctx.fillStyle = color;
                ctx.fillText(text, tx - textWidth / 2, ty - 8);
            }
        }

        /**
         * Module Specific Renderers
         */
        function renderMod1() {
            drawGrid(ctx, canvas.width, canvas.height);

            // Draw Target
            drawWave(ctx, state.mod1.targetA, state.mod1.targetL, 0, 0, '#94a3b8', true);

            // Draw Actual
            const A = state.mod1.amplitude;
            const L = state.mod1.wavelength;
            drawWave(ctx, A, L, 0, 0, '#3b82f6');

            // Draw Brackets
            // Amplitude: from center to peak at x = L/4
            let peakX = L / 4;
            drawBracket(ctx, xPx(peakX), yPx(0), xPx(peakX), yPx(A), `A = ${A.toFixed(1)}m`, '#ef4444', true);

            // Wavelength: from peak to peak
            let nextPeakX = peakX + L;
            drawBracket(ctx, xPx(peakX), yPx(A) - 20, xPx(nextPeakX), yPx(A) - 20, `λ = ${L.toFixed(1)}m`, '#eab308');
        }

        function renderMod2() {
            drawGrid(ctx, canvas.width, canvas.height, 0, false);

            const A = state.mod2.amplitude;
            const f = state.mod2.frequency;
            const t = state.physicsTime;

            // Calculate wheel properties
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const R = A * state.pixelsPerMeter; // Radius based on amplitude
            const theta = 2 * Math.PI * f * t; // Angle based on frequency and time

            // Draw Wheel (Circle)
            ctx.beginPath();
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 4;
            ctx.arc(cx, cy, R, 0, 2 * Math.PI);
            ctx.stroke();

            // Draw crosshairs
            ctx.beginPath();
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            ctx.moveTo(cx - R - 20, cy); ctx.lineTo(cx + R + 20, cy);
            ctx.moveTo(cx, cy - R - 20); ctx.lineTo(cx, cy + R + 20);
            ctx.stroke();

            // Dot position (counter-clockwise rotation)
            const dotX = cx + R * Math.cos(theta);
            const dotY = cy - R * Math.sin(theta); // Subtract because Canvas Y is inverted

            // Draw spoke to the dot
            ctx.beginPath();
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 3;
            ctx.moveTo(cx, cy);
            ctx.lineTo(dotX, dotY);
            ctx.stroke();

            // Draw Red Dot
            ctx.beginPath();
            ctx.fillStyle = '#ef4444';
            ctx.arc(dotX, dotY, 10, 0, 2 * Math.PI);
            ctx.fill();

            // Draw horizontal tracking line to connect vertical displacement to the graph
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(239, 68, 68, 0.4)';
            ctx.setLineDash([5, 5]);
            ctx.moveTo(dotX, dotY);
            ctx.lineTo(canvas.width, dotY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Update overlay texts
            document.getElementById('m2-stopwatch').innerText = t.toFixed(2) + "s";
            // Cycles = time * freq
            document.getElementById('m2-cycles').innerText = Math.floor(t * f);

            // Secondary Graph
            gCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);

            // Grid
            gCtx.strokeStyle = '#e2e8f0';
            gCtx.beginPath();
            gCtx.moveTo(0, graphCanvas.height / 2);
            gCtx.lineTo(graphCanvas.width, graphCanvas.height / 2);
            gCtx.stroke();

            gCtx.fillStyle = '#94a3b8';
            gCtx.font = '12px sans-serif';
            gCtx.fillText("Time →", graphCanvas.width - 50, graphCanvas.height / 2 + 15);
            gCtx.fillText("Vertical Displacement", 10, 20);

            // Plot history
            gCtx.beginPath();
            gCtx.strokeStyle = '#ef4444';
            gCtx.lineWidth = 2;

            // Draw last 5 seconds of graph
            const historySecs = 5;
            for (let gx = 0; gx <= graphCanvas.width; gx++) {
                // map pixel x to historical time (0 at right edge, -5 at left edge)
                let timeAgo = (1 - (gx / graphCanvas.width)) * historySecs;
                let histT = Math.max(0, t - timeAgo);

                // If historical time is 0 and we haven't reached that far back, don't draw
                if (t - timeAgo < 0) continue;

                // Displacement is exactly the vertical projection of the circular path
                let histY = A * Math.sin(2 * Math.PI * f * histT);
                let gy = (graphCanvas.height / 2) - (histY * (graphCanvas.height / 4));

                if (gx === 0 || t - timeAgo === 0) gCtx.moveTo(gx, gy);
                else gCtx.lineTo(gx, gy);
            }
            gCtx.stroke();
        }

        function renderMod3() {
            drawGrid(ctx, canvas.width, canvas.height);

            const A = state.mod3.amplitude;
            const v = state.mod3.velocity;
            const f = state.mod3.frequency;
            const L = v / f; // Inverse relationship!
            const t = state.physicsTime;

            // Calculate phase at the edge of the generator box (px = 40, which is x = 0.5m)
            const phase = 2 * Math.PI * (0.5 / L - f * t);
            const sineValue = Math.sin(phase);

            // Normalize sineValue from [-1, 1] to [0, 1] for the color pulse
            // 1 = Crest (Red), 0 = Trough (Dark Grey)
            const pulse = (sineValue + 1) / 2;

            // Interpolate between dark slate (rgb(51, 65, 85)) and red (rgb(239, 68, 68))
            const r = Math.round(51 + (239 - 51) * pulse);
            const g = Math.round(65 + (68 - 65) * pulse);
            const b = Math.round(85 + (68 - 85) * pulse);

            // Draw Generator Box with pulsing color
            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            ctx.fillRect(0, yPx(A + 0.5), 40, (A + 0.5) * 2 * state.pixelsPerMeter);

            // Draw Wave starting from x=0.5
            ctx.beginPath();
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 3;
            for (let px = 40; px <= canvas.width; px += 2) {
                let x = px / state.pixelsPerMeter;
                let y = A * Math.sin(2 * Math.PI * (x / L - f * t));
                let py = yPx(y);
                if (px === 40) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();

            // Dynamic Bracket
            // Find a crest near x=2
            let n = Math.ceil((2 / L) - 0.25 + f * t);
            let peak1X = L * (0.25 + n + f * t);
            let peak2X = peak1X + L;

            // Ensure they don't jump around wildly on screen by modding
            if (peak1X > 4) {
                peak1X -= L;
                peak2X -= L;
            }

            if (peak1X > 0.5) {
                drawBracket(ctx, xPx(peak1X), yPx(A) - 20, xPx(peak2X), yPx(A) - 20, `λ = ${L.toFixed(1)}m`, '#eab308');
            }
        }

        function renderMod4() {
            const v = state.mod4.velocity;
            const A = state.mod4.amplitude;
            const fA = state.mod4.fA;
            const fB = state.mod4.fB;
            const L_A = v / fA;
            const L_B = v / fB;

            let t = state.physicsTime;

            // If ready, freeze time for visual setup
            if (state.mod4.raceState === 'ready') t = state.mod4.raceStartTime;
            // If racing or finished, time flows

            const halfH = canvas.height / 2;

            // Draw splits
            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(0, 0, canvas.width, halfH);
            ctx.fillStyle = '#f1f5f9';
            ctx.fillRect(0, halfH, canvas.width, halfH);

            ctx.beginPath();
            ctx.moveTo(0, halfH); ctx.lineTo(canvas.width, halfH);
            ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 2; ctx.stroke();

            // Track A (Top)
            drawGrid(ctx, canvas.width, halfH, -halfH / 2);
            ctx.fillStyle = '#64748b'; ctx.font = 'bold 14px sans-serif'; ctx.fillText("Track A (High f)", 10, 20);
            drawWaveMod4(ctx, A, L_A, fA, t, '#3b82f6', -halfH / 2, halfH);

            // Track B (Bottom)
            drawGrid(ctx, canvas.width, canvas.height, halfH / 2);
            ctx.fillStyle = '#64748b'; ctx.font = 'bold 14px sans-serif'; ctx.fillText("Track B (Low f)", 10, halfH + 20);
            drawWaveMod4(ctx, A, L_B, fB, t, '#0ea5e9', halfH / 2, canvas.height);

            // Draw Finish Line
            const finishPx = xPx(state.mod4.raceFinishX);
            ctx.beginPath();
            ctx.setLineDash([10, 10]);
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 3;
            ctx.moveTo(finishPx, 0);
            ctx.lineTo(finishPx, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#ef4444';
            ctx.fillText("FINISH", finishPx - 20, 20);

            // Handle Race Crests
            if (state.mod4.raceState !== 'idle') {
                let dt = t - state.mod4.raceStartTime;
                let currentXA = state.mod4.crestA_startX + v * dt;
                let currentXB = state.mod4.crestB_startX + v * dt;

                // Draw dot A
                ctx.beginPath(); ctx.fillStyle = '#22c55e'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                ctx.arc(xPx(currentXA), yPx(A, -halfH / 2), 8, 0, Math.PI * 2);
                ctx.fill(); ctx.stroke();

                // Draw dot B
                ctx.beginPath();
                ctx.arc(xPx(currentXB), yPx(A, halfH / 2), 8, 0, Math.PI * 2);
                ctx.fill(); ctx.stroke();

                // Check finish
                if (currentXA >= state.mod4.raceFinishX && state.mod4.raceState === 'racing') {
                    state.mod4.raceState = 'finished';
                    // Time stops naturally because we freeze dt here if we want, but letting it pass is fine
                }
            }
        }

        // Helper for split canvas drawing
        function drawWaveMod4(ctx, A, L, f, t, color, yOffset, maxPxY) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            for (let px = 0; px <= canvas.width; px += 2) {
                let x = px / state.pixelsPerMeter;
                // Use Cosine so crests periodically align perfectly across different frequencies
                let y = A * Math.cos(2 * Math.PI * (x / L - f * t));
                let py = yPx(y, yOffset);
                if (px === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
        }

        /**
         * Main Loop
         */
        function render(timestamp) {
            if (!state.lastTime) state.lastTime = timestamp;
            let dt = (timestamp - state.lastTime) / 1000; // seconds
            state.lastTime = timestamp;

            // Handle Module 2 pausing logic
            if (state.module === 2) {
                if (state.mod2.isPaused) {
                    dt = 0; // Freeze time
                } else if (state.mod2.pauseAtNextCycle) {
                    const nextCycles = (state.physicsTime + dt) * state.mod2.frequency;
                    // Check if this frame will cross the target cycle boundary
                    if (nextCycles >= state.mod2.targetPauseCycle) {
                        // Clamp the delta time to land EXACTLY on the cycle boundary
                        dt = (state.mod2.targetPauseCycle / state.mod2.frequency) - state.physicsTime;
                        state.mod2.isPaused = true;
                        state.mod2.pauseAtNextCycle = false;

                        // Update UI button to Resume state
                        const btn = document.getElementById('btn-m2-pause');
                        const resetBtn = document.getElementById('btn-m2-reset');
                        if (btn) {
                            btn.innerText = "Resume";
                            btn.className = "bg-green-100 text-green-700 hover:bg-green-200 px-3 py-1 rounded shadow-sm text-sm font-semibold transition-colors";
                        }
                        if (resetBtn) {
                            resetBtn.classList.remove('hidden');
                        }
                    }
                }
            }

            // Handle Module 3 pausing logic
            if (state.module === 3 && state.mod3.isPaused) {
                dt = 0; // Freeze time
            }

            // Only advance physics time if not paused by race ready state
            if (state.module !== 4 || state.mod4.raceState !== 'ready') {
                state.physicsTime += dt;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            switch (state.module) {
                case 1: renderMod1(); break;
                case 2: renderMod2(); break;
                case 3: renderMod3(); break;
                case 4: renderMod4(); break;
            }

            requestAnimationFrame(render);
        }

        // Init
        setModule(1);
        requestAnimationFrame(render);

    </script>
</body>
