        // --- LAB MISSION DATA ---

            {

                title: 'Application: Light in a Room',

                    {

                        isCorrect: false,

                    {

                        isCorrect: true,
                        feedback: 'Correct! The ratio of gap size to wavelength determines bending. A normal doorway is millions of times larger than light\'s wavelength.'
                    },
                    {
                        text: 'The air in the room absorbs the diffracted light.',
                        isCorrect: false,
                        feedback: 'Absorption happens, but it doesn\'t explain why the main beam stays straight without spreading.'

        // --- MAIN APPLICATION COMPONENT ---
        function App() {
            // Sandbox State
            const canvasRef = useRef(null);
            const [wavelength, setWavelength] = useState(30);
            const [size, setSize] = useState(60);
            const [mode, setMode] = useState('slit');
            const [barrierX, setBarrierX] = useState(240);
            const [barrierY, setBarrierY] = useState(200);

            // --- Supabase / Auth State ---
            const [studentId, setStudentId] = useState('');
            const [studentName, setStudentName] = useState('');
            const [studentPeriod, setStudentPeriod] = useState(null);
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [loginStatus, setLoginStatus] = useState('');
            const [showNameEntry, setShowNameEntry] = useState(false);
            const [tempId, setTempId] = useState('');
            const [tempName, setTempName] = useState('');
            const [syncStatus, setSyncStatus] = useState('Database_Secure');


            // Lab State
            const [currentStepIndex, setCurrentStepIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isLabComplete, setIsLabComplete] = useState(false);
            const [demoAnimation, setDemoAnimation] = useState(null);
            const [selectedProof, setSelectedProof] = useState(null);

            // Sync Ref Hooks (Prevent Race Conditions)
            const isSyncing = useRef(false);
            const needsSync = useRef(false);
            
            // New: Snapshot State
            const [snapshots, setSnapshots] = useState([]);
            const [capturedStepIds, setCapturedStepIds] = useState([]);
            const [fullscreenImage, setFullscreenImage] = useState(null);
            const notebookRef = useRef(null);

            // --- Database Logic ---
            const syncResults = async (finalScore = null) => {
                if (!isAuthorized || !studentId) return;

                // Concurrency Control
                if (isSyncing.current) {
                    needsSync.current = true;
                    return;
                }
                isSyncing.current = true;
                needsSync.current = false;

                setSyncStatus('Syncing...');
                try {
                    const assignmentName = "Wave Diffraction Lab";
                    const { data: existing } = await sbClient.from('student_results')
                        .select('id')
                        .eq('student_id', studentId)
                        .eq('assignment_name', assignmentName);

                    // Calculate score
                    let score = Math.round((currentStepIndex / (labSteps.length - 1)) * 100);
                    if (isLabComplete) score = 100;
                    if (finalScore !== null) score = finalScore;

                    const payload = {
                        student_name: studentName,
                        student_id: studentId,
                        class_period: studentPeriod,
                        assignment_name: assignmentName,
                        score: score,
                        details: {
                            currentStep: currentStepIndex,
                            snapshotsCount: snapshots.length,
                            isComplete: isLabComplete,
                            lastUpdate: new Date().toISOString()
                        }
                    };

                    if (existing && existing.length > 0) {
                        await sbClient.from('student_results').update(payload).eq('id', existing[0].id);
                    } else {
                        await sbClient.from('student_results').insert([payload]);
                    }
                    setSyncStatus('Database_Secure');
                } catch (e) {
                    console.error("Sync Error:", e);
                    setSyncStatus('Sync_Error');
                } finally {
                    isSyncing.current = false;
                    // If a sync was requested while we were busy, run it now
                    if (needsSync.current) {
                        syncResults(finalScore);
                    }
                }
            };

            const handleLogin = async () => {
                if (tempId.length !== 6) return;
                setLoginStatus('VERIFYING_CREDENTIALS...');
                const assignmentName = "Wave Diffraction Lab";
                
                try {
                    // Check URL for period parameter
                    const urlParams = new URLSearchParams(window.location.search);
                    const urlPeriod = urlParams.get('p') || urlParams.get('period');

                    const { data: nameData } = await sbClient.from('student_results')
                        .select('student_name, class_period')
                        .eq('student_id', tempId)
                        .order('created_at', { ascending: false })
                        .limit(1)
                        .maybeSingle();

                    if (nameData) {
                        setStudentPeriod(urlPeriod || nameData.class_period || null);
                        // Restore progress if available for THIS specific lab
                        const { data: progressData } = await sbClient.from('student_results')
                            .select('details')
                            .eq('student_id', tempId)
                            .eq('assignment_name', assignmentName)
                            .maybeSingle();

                        if (progressData && progressData.details) {
                            if (progressData.details.currentStep !== undefined) setCurrentStepIndex(progressData.details.currentStep);
                            if (progressData.details.isComplete !== undefined) setIsLabComplete(progressData.details.isComplete);
                        }

                        setStudentId(tempId);
                        setStudentName(nameData.student_name);
                        setIsAuthorized(true);
                    } else if (!showNameEntry) {
                        setShowNameEntry(true);
                        setLoginStatus('NEW_ID_DETECTED');
                    } else {
                        if (tempName.length < 3) return;
                        const urlParams = new URLSearchParams(window.location.search);
                        setStudentPeriod(urlParams.get('p') || urlParams.get('period') || null);
                        setStudentId(tempId);
                        setStudentName(tempName);
                        setIsAuthorized(true);
                    }
                } catch (e) {
                    setLoginStatus('SYNC_ERROR');
                }
            };

            // Sync on progress
            useEffect(() => {
                if (isAuthorized) {
                    syncResults();
                }
            }, [currentStepIndex, isLabComplete, snapshots.length, isAuthorized]);

            
            const step = labSteps[currentStepIndex];

            // Evaluate conditions
            const isTaskReady = (step.type === 'task' || step.type === 'capture') ? 
                step.checkAction({ wavelength, size, mode, barrierX, barrierY }) : false;
            
            const hasCapturedCurrent = capturedStepIds.includes(step.id);

            const handleTakeSnapshot = () => {
                if (canvasRef.current) {
                    const dataUrl = canvasRef.current.toDataURL('image/jpeg', 0.85);
                    setSnapshots(prev => [...prev, {
                        id: step.id,
                        url: dataUrl,
                        label: step.captureLabel
                    }]);
                    setCapturedStepIds(prev => [...prev, step.id]);
                }
            };

            const handleNextStep = () => {
                if (currentStepIndex < labSteps.length - 1) {
                    setCurrentStepIndex(prev => prev + 1);
                    setSelectedOption(null);
                    setShowFeedback(false);
                    setDemoAnimation(null);
                    setFullscreenImage(null);
                    setSelectedProof(null);
                } else {
                    setIsLabComplete(true);
                }
            };

            const handlePrevStep = () => {
                if (currentStepIndex > 0) {
                    setCurrentStepIndex(prev => prev - 1);
                    setSelectedOption(null);
                    setShowFeedback(false);
                    setDemoAnimation(null);
                    setFullscreenImage(null);
                    setSelectedProof(null);
                }
            };

            const resetLab = () => {
                setCurrentStepIndex(0);
                setSelectedOption(null);
                setShowFeedback(false);
                setIsLabComplete(false);
                setDemoAnimation(null);
                setFullscreenImage(null);
                setSelectedProof(null);
                setWavelength(30);
                setSize(60);
                setMode('slit');
                setSnapshots([]);
                setCapturedStepIds([]);
            };

            const isNextEnabled = () => {
                if (step.type === 'info') return true;
                if (step.type === 'task') return isTaskReady;
                if (step.type === 'capture') return hasCapturedCurrent;
                if (step.type === 'question') {
                    const isCorrectTextAnswer = showFeedback && step.options[selectedOption]?.isCorrect;
                    if (!isCorrectTextAnswer) return false;
                    if (step.requiresProof) {
                        return selectedProof === step.expectedProofId;
                    }
                    return true;
                }
                return false;
            };

            useEffect(() => {
                if (notebookRef.current) {
                    notebookRef.current.scrollTop = 0;
                }
            }, [currentStepIndex]);

            useEffect(() => {
                if (!demoAnimation?.active) return;
                const { animate, min, max, setValues } = demoAnimation;

                if (setValues) {
                    if (setValues.wavelength !== undefined) setWavelength(setValues.wavelength);

        function SimulationCanvas({ canvasRef, wavelength, size, mode, barrierX, setBarrierX, barrierY, setBarrierY, onInteract }) {
            const phaseRef = useRef(0);
            const [isDragging, setIsDragging] = useState(false);
            const dragOffset = useRef({ x: 0, y: 0 });

            const handleMouseDown = (e) => {
                if (onInteract) onInteract();
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const mouseX = (clientX - rect.left) * scaleX;
                const mouseY = (clientY - rect.top) * scaleY;

                if (Math.abs(mouseX - barrierX) <= 30) {
                    setIsDragging(true);
                    dragOffset.current = { x: mouseX - barrierX, y: mouseY - barrierY };
                }
            };

            const handleMouseMove = (e) => {
                if (!isDragging) return;
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const mouseX = (clientX - rect.left) * scaleX;
                const mouseY = (clientY - rect.top) * scaleY;

                let newX = mouseX - dragOffset.current.x;
                let newY = mouseY - dragOffset.current.y;
                newX = Math.max(20, Math.min(newX, canvas.width - 20));
                newY = Math.max(0, Math.min(newY, canvas.height));
                setBarrierX(newX);
                setBarrierY(newY);
            };

            const handleMouseUp = () => setIsDragging(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const render = () => {
                    const width = canvas.width;
                    const height = canvas.height;
                    phaseRef.current += 1.0;
                    const phase = phaseRef.current;
                    ctx.clearRect(0, 0, width, height);

                    const barrierThickness = 20;
                    const barrierLeft = barrierX - barrierThickness / 2;
                    const barrierRight = barrierX + barrierThickness / 2;
                    const yTop = barrierY - size/2;
                    const yBot = barrierY + size/2;

                    ctx.strokeStyle = 'rgba(6, 182, 212, 0.6)';
                    ctx.lineWidth = 2.5;
                    const offset = phase % wavelength;

                    for (let x = offset; x < width + wavelength; x += wavelength) {
                        if (x < barrierLeft) {
                            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
                        } else if (x >= barrierLeft && x <= barrierRight) {
                            if (mode === 'slit') {
                                const effTop = Math.max(0, yTop);
                                const effBot = Math.min(height, yBot);
                                if (effBot > effTop) {
                                    ctx.beginPath(); ctx.moveTo(x, effTop); ctx.lineTo(x, effBot); ctx.stroke();
                                }
                            } else {
                                if (yTop > 0) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, yTop); ctx.stroke(); }
                                if (yBot < height) { ctx.beginPath(); ctx.moveTo(x, yBot); ctx.lineTo(x, height); ctx.stroke(); }
                            }
                        } else if (x > barrierRight) {
                            ctx.strokeStyle = 'rgba(129, 140, 248, 0.8)';
                            const r = x - barrierRight;
                            if (mode === 'slit') {
                                const effTop = Math.max(0, yTop);
                                const effBot = Math.min(height, yBot);
                                const effSize = effBot - effTop;
                                if (effSize > 0) {
                                    const diffractionFactor = Math.min(1, (wavelength * 1.5) / effSize);
                                    const maxAngle = diffractionFactor * (Math.PI / 2);
                                    const straightLen = effSize * (1 - diffractionFactor);
                                    const arcYTop = effTop + (effSize - straightLen)/2;
                                    const arcYBot = effBot - (effSize - straightLen)/2;
                                    ctx.beginPath();
                                    if (yTop > 0) {
                                        ctx.moveTo(barrierRight + r * Math.cos(-maxAngle), arcYTop + r * Math.sin(-maxAngle));
                                        ctx.arc(barrierRight, arcYTop, r, -maxAngle, 0);
                                    } else {
                                        ctx.moveTo(barrierRight + r, effTop);
                                    }
                                    ctx.lineTo(barrierRight + r, arcYBot);
                                    if (yBot < height) { ctx.arc(barrierRight, arcYBot, r, 0, maxAngle); }
                                    ctx.stroke();
                                }
                            } else {
                                const hasTopOpening = yTop > 0;
                                const hasBotOpening = yBot < height;
                                const diffractionFactor = Math.min(1, (wavelength * 1.5) / size);
                                const maxAngle = diffractionFactor * (Math.PI / 2.5);
                                if (hasTopOpening) {
                                    ctx.beginPath(); ctx.moveTo(barrierRight + r, 0); ctx.lineTo(barrierRight + r, yTop); ctx.arc(barrierRight, yTop, r, 0, maxAngle, false); ctx.stroke();
                                }
                                if (hasBotOpening) {
                                    ctx.beginPath(); ctx.moveTo(barrierRight + r, height); ctx.lineTo(barrierRight + r, yBot); ctx.arc(barrierRight, yBot, r, 0, -maxAngle, true); ctx.stroke();
                                }
                            }
                            ctx.strokeStyle = 'rgba(6, 182, 212, 0.6)';
                        }
                    }
                    ctx.fillStyle = '#64748b';
                    ctx.shadowColor = '#000';
                    ctx.shadowBlur = 10;
                    if (mode === 'slit') {
                        if (yTop > 0) ctx.fillRect(barrierLeft, 0, barrierThickness, yTop);
                        if (yBot < height) ctx.fillRect(barrierLeft, yBot, barrierThickness, height - yBot);
                    } else {
                        const effTop = Math.max(0, yTop);
                        const effBot = Math.min(height, yBot);
                        if (effBot > effTop) ctx.fillRect(barrierLeft, effTop, barrierThickness, effBot - effTop);
                    }
                    ctx.shadowBlur = 0;
                    animationFrameId = window.requestAnimationFrame(render);
                };
                render();
                return () => window.cancelAnimationFrame(animationFrameId);
            }, [wavelength, size, mode, barrierX, barrierY]);

            return (
                <>
                    <canvas ref={canvasRef} width={800} height={600} 
                        className={`w-full h-full object-cover touch-none ${isDragging ? 'cursor-grabbing' : 'cursor-move'}`}
                        onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}
                        onTouchStart={handleMouseDown} onTouchMove={handleMouseMove} onTouchEnd={handleMouseUp} />
                    <div className="absolute inset-0 pointer-events-none opacity-20"
                        style={{ backgroundImage: 'linear-gradient(rgba(255,255,255,0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px)', backgroundSize: '40px 40px' }}></div>
                    <div className="absolute bottom-4 left-0 right-0 flex justify-center pointer-events-none">
                        <span className="bg-slate-900/80 backdrop-blur text-slate-300 text-xs px-3 py-1.5 rounded-full border border-slate-700 shadow-sm">
                            Drag the barrier on the canvas to move it
                        </span>
                    </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
