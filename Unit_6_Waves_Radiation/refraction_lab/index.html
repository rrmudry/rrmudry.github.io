<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Refraction Lab Simulation</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <!-- Import map for Three.js -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  
  <div id="ui-container">
    <div class="panel header-panel">
      <h1>Snell's Law: 3D Refraction</h1>
      <p>Observe how light bends as it enters and exits a physical medium. Drag the front pins to align them with the back pins while looking through the glass block.</p>
    </div>

    <div class="panel controls-panel">
      <h3>Camera Views</h3>
      <button id="btn-eye-front" class="active">Look Through Front</button>
      <button id="btn-eye-back">Look Through Back</button>
      <button id="btn-top-view">Top-Down View</button>
      
      <div class="divider"></div>
      
      <h3>Tools</h3>
      <button id="btn-toggle-ray" class="tool-btn">Show True Light Path</button>
      <button id="btn-toggle-virtual" class="tool-btn mt-2">Show Virtual Light Path</button>
    </div>
    
    <div id="status-message" class="toast hidden">
      Pins Aligned!
    </div>
  </div>

  <div id="canvas-container"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
