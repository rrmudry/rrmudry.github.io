<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Refraction Lab Simulation</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <!-- Import map for Three.js -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  
  <div id="ui-container">
    <div class="panel header-panel">
      <h1>Snell's Law: 3D Refraction</h1>
      <p>Observe how light bends as it enters and exits a physical medium. Drag the front pins to align them with the back pins while looking through the glass block.</p>
    </div>

    <div class="panel controls-panel">
      <h3>Camera Views</h3>
      <button id="btn-eye-front" class="active">Look Through Front</button>
      <button id="btn-eye-back">Look Through Back</button>
      <button id="btn-top-view">Top-Down View</button>
      
      <div class="divider"></div>
      
      <h3>Incident Angle</h3>
      <div style="display: flex; gap: 10px; align-items: center;">
        <input type="range" id="angle-slider" min="-80" max="80" value="45" step="0.5" style="flex-grow: 1;">
        <input type="number" id="angle-input" min="-80" max="80" value="45" step="0.5" style="width: 50px; text-align: center; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 4px;">&deg;
      </div>

      <div class="divider mt-4"></div>
      
      <h3>Refractive Index (n)</h3>
      <div style="display: flex; gap: 10px; align-items: center;">
        <input type="range" id="n-slider" min="1.0" max="2.5" value="1.5" step="0.01" style="flex-grow: 1;">
        <input type="number" id="n-input" min="1.0" max="2.5" value="1.5" step="0.01" style="width: 50px; text-align: center; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 4px;">
      </div>

      <div class="divider mt-4"></div>
      
      <h3>View Zoom</h3>
      <div style="display: flex; gap: 10px; align-items: center;">
        <input type="range" id="zoom-slider" min="0" max="1" value="0.5" step="0.01" style="flex-grow: 1;">
      </div>
    </div>
    
    <div id="status-message" class="toast hidden">
      Pins Aligned!
    </div>
  </div>

  <div id="canvas-container"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
