<body class="bg-slate-50 text-slate-800 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- SVG Icons ---
        const PlayIcon = ({ size = 24, fill = "none", className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        );
        const SquareIcon = ({ size = 24, fill = "none", className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
        );
        const ArrowRightIcon = ({ size = 24, className = "" }) => (

        );
        const ArrowLeftIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        );
        const CheckCircleIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        );
        const ActivityIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        );
        const BarChart2Icon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        );
        const PenToolIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>
        );
        const SearchIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        );
        const SlidersIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y1="14"></line><line x1="9" y1="8" x2="15" y1="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
        );

        // --- Constants & Utilities ---
        const WAVE_RESOLUTION = 800; // 800 points for an 8-second wave
        const AUDIO_DURATION = 8.0; // Seconds
        const MIN_FREQ = 220; // Hz (A3)
        const MAX_FREQ = 880; // Hz (A5)

        // Generate a smooth random wave using harmonics
        const generateSmoothWave = () => {
            const wave = new Array(WAVE_RESOLUTION).fill(0);
            const numHarmonics = 3;
            const phases = Array.from({ length: numHarmonics }, () => Math.random() * Math.PI * 2);
            const freqs = Array.from({ length: numHarmonics }, () => 1 + Math.random() * 3);
            const amps = Array.from({ length: numHarmonics }, () => 0.2 + Math.random() * 0.5);

            let maxVal = -Infinity;
            let minVal = Infinity;

            for (let i = 0; i < WAVE_RESOLUTION; i++) {
                let val = 0;
                const t = i / WAVE_RESOLUTION;
                for (let h = 0; h < numHarmonics; h++) {
                    val += Math.sin(t * Math.PI * 2 * freqs[h] + phases[h]) * amps[h];
                }
                wave[i] = val;
                if (val > maxVal) maxVal = val;
                if (val < minVal) minVal = val;
            }

            // Normalize to 0.1 - 0.9 range to keep it on screen
            return wave.map(v => 0.1 + ((v - minVal) / (maxVal - minVal)) * 0.8);
        };

        // Generate a step wave
        const generateDigitalWave = (segments = 16, isBinary = true) => {
            const levels = isBinary ? [0.1, 0.9] : [0.1, 0.3, 0.5, 0.7, 0.9];
            return Array.from({ length: segments }, () => levels[Math.floor(Math.random() * levels.length)]);
        };

        // Add noise to a given analog array
        const addAnalogNoise = (wave, amount = 0.15) => {
            return wave.map(v => Math.max(0, Math.min(1, v + (Math.random() * 2 - 1) * amount)));
        };

        // Add noise to a digital array (array of segments)
        const addDigitalNoiseToAnalogVis = (digitalWave, amount = 0.15) => {
            const noisy = new Array(WAVE_RESOLUTION).fill(0);
            const ptsPerSeg = Math.floor(WAVE_RESOLUTION / digitalWave.length);
            for (let i = 0; i < WAVE_RESOLUTION; i++) {
                const segIdx = Math.min(digitalWave.length - 1, Math.floor(i / ptsPerSeg));
                const base = digitalWave[segIdx];
                noisy[i] = Math.max(0, Math.min(1, base + (Math.random() * 2 - 1) * amount));
            }
            return noisy;
        };

        // Map themes to Tailwind classes for visual cueing
        const getThemeStyles = (theme) => {
            switch (theme) {
                case 'blue': return { primary: 'bg-blue-600', hover: 'hover:bg-blue-700', text: 'text-blue-600', lightBg: 'bg-blue-50', border: 'border-blue-200', ring: 'ring-blue-600', light: 'bg-blue-300' };
                case 'amber': return { primary: 'bg-amber-500', hover: 'hover:bg-amber-600', text: 'text-amber-600', lightBg: 'bg-amber-50', border: 'border-amber-200', ring: 'ring-amber-500', light: 'bg-amber-300' };
                case 'emerald': return { primary: 'bg-emerald-600', hover: 'hover:bg-emerald-700', text: 'text-emerald-600', lightBg: 'bg-emerald-50', border: 'border-emerald-200', ring: 'ring-emerald-600', light: 'bg-emerald-300' };
                case 'purple': return { primary: 'bg-purple-600', hover: 'hover:bg-purple-700', text: 'text-purple-600', lightBg: 'bg-purple-50', border: 'border-purple-200', ring: 'ring-purple-600', light: 'bg-purple-300' };
                case 'indigo':
                default:
                    return { primary: 'bg-indigo-600', hover: 'hover:bg-indigo-700', text: 'text-indigo-600', lightBg: 'bg-indigo-50', border: 'border-indigo-200', ring: 'ring-indigo-600', light: 'bg-indigo-300' };
            }
        };

        // --- Main Application Component ---
        function App() {
            const [student, setStudent] = useState({ id: '', name: '', period: null, isLogged: false });
            const [step, setStep] = useState(0);
            const [isSyncing, setIsSyncing] = useState(false);
            const syncStateRef = useRef({ isSyncing: false, needsSync: false });

            // Wave States
            const [analogDraw1, setAnalogDraw1] = useState(new Array(WAVE_RESOLUTION).fill(0.5));
            const [analogDraw2, setAnalogDraw2] = useState(new Array(WAVE_RESOLUTION).fill(0.5));
            const [digitalDraw1, setDigitalDraw1] = useState(new Array(16).fill(0.5));
            const [digitalDraw2, setDigitalDraw2] = useState(new Array(16).fill(0.5));

            const [targetAnalog, setTargetAnalog] = useState([]);
            const [noisyAnalogLevels, setNoisyAnalogLevels] = useState([]);
            const [targetDigital, setTargetDigital] = useState([]);
            const [noisyDigitalLevels, setNoisyDigitalLevels] = useState([]);

            const [traceAnalogLevels, setTraceAnalogLevels] = useState([new Array(WAVE_RESOLUTION).fill(0.5), new Array(WAVE_RESOLUTION).fill(0.5), new Array(WAVE_RESOLUTION).fill(0.5)]);
            const [traceDigitalLevels, setTraceDigitalLevels] = useState([new Array(16).fill(0.5), new Array(16).fill(0.5), new Array(16).fill(0.5)]);

            const [lowSample, setLowSample] = useState(new Array(5).fill(0.5));
            const [highSample, setHighSample] = useState(new Array(20).fill(0.5));

            // Gatekeeping States
            const [quizzesPassed, setQuizzesPassed] = useState({ part1: false, part2: false, part3: false });
            const [stepsPlayed, setStepsPlayed] = useState({});

            // Audio & Playback State
            const [isPlaying, setIsPlaying] = useState(false);
            const [playbackProgress, setPlaybackProgress] = useState(0);
            const audioCtxRef = useRef(null);
            const activeNodesRef = useRef([]);
            const animationRef = useRef(null);

            // Initialize targets on mount
            useEffect(() => {
                const aWave = generateSmoothWave();
                setTargetAnalog(aWave);
                setNoisyAnalogLevels([
                    addAnalogNoise(aWave, 0.15), // Moderate
                    addAnalogNoise(aWave, 0.35), // Heavy
                    addAnalogNoise(aWave, 0.60)  // Extreme
                ]);

                // Ensure the digital target is created as a binary signal
                const dWave = generateDigitalWave(16, true);
                setTargetDigital(dWave);
                setNoisyDigitalLevels([
                    addDigitalNoiseToAnalogVis(dWave, 0.15), // Moderate
                    addDigitalNoiseToAnalogVis(dWave, 0.35), // Heavy
                    addDigitalNoiseToAnalogVis(dWave, 0.60)  // Extreme
                ]);
            }, []);

            // Audio Engine
            const stopAudio = useCallback(() => {
                activeNodesRef.current.forEach(node => {
                    try { node.stop(); } catch (e) { /* ignore */ }
                    try { node.disconnect(); } catch (e) { /* ignore */ }
                });
                activeNodesRef.current = [];
                setIsPlaying(false);
                setPlaybackProgress(0);
                if (animationRef.current) cancelAnimationFrame(animationRef.current);
            }, []);

            const playAudio = useCallback((waveData, isDigital, hasNoise) => {
                stopAudio();
                if (!audioCtxRef.current) {
                    audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                }
                const ctx = audioCtxRef.current;
                if (ctx.state === 'suspended') ctx.resume();

                const masterGain = ctx.createGain();
                masterGain.gain.value = 0.3; // Prevent overwhelming volume
                masterGain.connect(ctx.destination);

                // Tone Oscillator
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.connect(masterGain);
                activeNodesRef.current.push(osc);

                const startTime = ctx.currentTime;

                if (!isDigital) {
                    // Smooth Analog transitions
                    osc.frequency.setValueAtTime(MIN_FREQ + waveData[0] * (MAX_FREQ - MIN_FREQ), startTime);
                    for (let i = 1; i < WAVE_RESOLUTION; i++) {
                        const time = startTime + (i / WAVE_RESOLUTION) * AUDIO_DURATION;
                        const freq = MIN_FREQ + waveData[i] * (MAX_FREQ - MIN_FREQ);
                        osc.frequency.linearRampToValueAtTime(freq, time);
                    }
                } else {
                    // Digital Step transitions
                    const segments = waveData.length;
                    for (let i = 0; i < segments; i++) {
                        const time = startTime + (i / segments) * AUDIO_DURATION;
                        const freq = MIN_FREQ + waveData[i] * (MAX_FREQ - MIN_FREQ);
                        osc.frequency.setValueAtTime(freq, time);
                    }
                }

                osc.start(startTime);
                osc.stop(startTime + AUDIO_DURATION);

                // Noise Generator
                if (hasNoise) {
                    const bufferSize = ctx.sampleRate * AUDIO_DURATION;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }
                    const noiseSource = ctx.createBufferSource();
                    noiseSource.buffer = buffer;

                    const noiseGain = ctx.createGain();
                    noiseGain.gain.value = 0.15; // Noise volume

                    noiseSource.connect(noiseGain);
                    noiseGain.connect(masterGain);
                    noiseSource.start(startTime);
                    activeNodesRef.current.push(noiseSource);
                }

                setIsPlaying(true);

                // Playback visualizer loop
                const updateProgress = () => {
                    const elapsed = ctx.currentTime - startTime;
                    if (elapsed >= AUDIO_DURATION) {
                        setIsPlaying(false);
                        setPlaybackProgress(0);
                    } else {
                        setPlaybackProgress(elapsed / AUDIO_DURATION);
                        animationRef.current = requestAnimationFrame(updateProgress);
                    }
                };
                animationRef.current = requestAnimationFrame(updateProgress);

            }, [stopAudio]);

            const handlePlay = (waveData, isDigital, hasNoise) => {
                playAudio(waveData, isDigital, hasNoise);
                // Mark this specific step as having met the "play" requirement
                setStepsPlayed(prev => ({ ...prev, [step]: true }));
            };

            // Scoring Logic
            const [score, setScore] = useState(null);
            const checkScore = (trace, target, isDigitalTarget = false) => {
                let mse = 0;
                if (isDigitalTarget) {
                    // Compare segment to segment
                    for (let i = 0; i < trace.length; i++) {
                        mse += Math.pow(trace[i] - target[i], 2);
                    }
                    mse /= trace.length;
                } else {
                    // Compare point to point
                    for (let i = 0; i < WAVE_RESOLUTION; i++) {
                        mse += Math.pow(trace[i] - target[i], 2);
                    }
                    mse /= WAVE_RESOLUTION;
                }
                // Convert MSE to a 0-100% score (lower MSE = higher score)
                const calculatedScore = Math.max(0, Math.min(100, Math.round((1 - Math.sqrt(mse) * 2.5) * 100)));
                setScore(calculatedScore);
            };

            // Sync Results to Firestore
            const syncResults = useCallback(async (currentStep, currentQuizzes, currentScore) => {
                if (!student.id) return;
                if (syncStateRef.current.isSyncing) {
                    syncStateRef.current.needsSync = true;
                    return;
                }
                syncStateRef.current.isSyncing = true;
                syncStateRef.current.needsSync = false;
                setIsSyncing(true);

                try {
                    const assignmentName = "Wave Signals Lab";
                    // Calculate total completion based on quizzes and step
                    let totalCompletion = 0;
                    if (currentQuizzes.part1) totalCompletion += 33;
                    if (currentQuizzes.part2) totalCompletion += 33;
                    if (currentQuizzes.part3) totalCompletion += 34;

                    const payload = {
                        student_name: student.name,
                        student_id: student.id,
                        class_period: student.period,
                        assignment_name: assignmentName,
                        score: Math.round(totalCompletion),
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        details: {
                            currentStep: currentStep,
                            quizzesPassed: currentQuizzes,
                            ts: new Date().toISOString()
                        }
                    };

                    const batch = db.batch();
                    // 1. Live Session Node (Nested)
                    const liveRef = db.collection('student_results').doc(assignmentName).collection('students').doc(student.id);
                    batch.set(liveRef, payload, { merge: true });

                    // 2. Archive Node (Flat)
                    const archiveRef = db.collection('student_results_archive').doc(`${student.id}_${assignmentName}`);
                    batch.set(archiveRef, payload, { merge: true });

                    await batch.commit();
                } catch (e) {
                    console.error("Sync Error:", e);
                } finally {
                    setIsSyncing(false);
                    syncStateRef.current.isSyncing = false;
                    if (syncStateRef.current.needsSync) {
                        syncResults(currentStep, currentQuizzes, currentScore);
                    }
                }
            }, [student]);

            // Nav Handlers
            const handleNext = () => {
                stopAudio();
                setScore(null);
                const nextStep = Math.min(step + 1, steps.length - 1);
                setStep(nextStep);
                syncResults(nextStep, quizzesPassed, score);
            };

            const handlePrev = () => {
                stopAudio();
                setScore(null);
                const prevStep = Math.max(step - 1, 0);
                setStep(prevStep);
                syncResults(prevStep, quizzesPassed, score);
            };

            const updateAnalogTrace = (idx, newTrace) => {
                const newTraces = [...traceAnalogLevels];
                newTraces[idx] = newTrace;
                setTraceAnalogLevels(newTraces);
            };

            const updateDigitalTrace = (idx, newTrace) => {
                const newTraces = [...traceDigitalLevels];
                newTraces[idx] = newTrace;
                setTraceDigitalLevels(newTraces);
            };

            // --- Step Definitions ---
            const steps = [
                { section: "Introduction", title: "Welcome to Signal Analysis", theme: 'indigo', content: <Intro themeStyles={getThemeStyles('indigo')} /> },

                { section: "Part 1: Creation", title: "Part 1: Signal Creation", theme: 'blue', requiresQuiz: 'part1', content: <Part1Intro themeStyles={getThemeStyles('blue')} passed={quizzesPassed.part1} onPass={() => setQuizzesPassed(p => ({ ...p, part1: true }))} /> },
                { section: "Part 1: Creation", title: "1a. Create Analog Wave 1", theme: 'blue', requiresPlay: true, targetWaveToCheck: analogDraw1, content: <AnalogCreate wave={analogDraw1} setWave={setAnalogDraw1} play={() => handlePlay(analogDraw1, false, false)} isPlaying={isPlaying} stop={stopAudio} progress={playbackProgress} /> },
                { section: "Part 1: Creation", title: "1b. Create Analog Wave 2", theme: 'blue', requiresPlay: true, targetWaveToCheck: analogDraw2, content: <AnalogCreate wave={analogDraw2} setWave={setAnalogDraw2} play={() => handlePlay(analogDraw2, false, false)} isPlaying={isPlaying} stop={stopAudio} progress={playbackProgress} /> },
                { section: "Part 1: Creation", title: "1c. Analog Wave + Noise", theme: 'blue', content: <AnalogNoise wave={analogDraw2} play={() => handlePlay(analogDraw2, false, true)} isPlaying={isPlaying} stop={stopAudio} progress={playbackProgress} /> },
                { section: "Part 1: Creation", title: "1d. Create Digital Wave 1", theme: 'blue', requiresPlay: true, targetWaveToCheck: digitalDraw1, content: <DigitalCreate wave={digitalDraw1} setWave={setDigitalDraw1} play={() => handlePlay(digitalDraw1, true, false)} isPlaying={isPlaying} stop={stopAudio} progress={playbackProgress} /> },
                { section: "Part 1: Creation", title: "1e. Create Digital Wave 2", theme: 'blue', requiresPlay: true, targetWaveToCheck: digitalDraw2, content: <DigitalCreate wave={digitalDraw2} setWave={setDigitalDraw2} play={() => handlePlay(digitalDraw2, true, false)} isPlaying={isPlaying} stop={stopAudio} progress={playbackProgress} /> },
                { section: "Part 1: Creation", title: "1f. Digital Wave + Noise", theme: 'blue', content: <DigitalNoise wave={digitalDraw2} play={() => handlePlay(digitalDraw2, true, true)} isPlaying={isPlaying} stop={stopAudio} progress={playbackProgress} /> },

                { section: "Part 2: Recovery", title: "Part 2: Signal Recovery", theme: 'amber', requiresQuiz: 'part2', content: <Part2Intro themeStyles={getThemeStyles('amber')} passed={quizzesPassed.part2} onPass={() => setQuizzesPassed(p => ({ ...p, part2: true }))} /> },
                { section: "Part 2: Recovery", title: "2a. Recover Analog Signal (Moderate Noise)", theme: 'amber', requiresScore: true, content: <RecoverAnalog level="moderate" target={noisyAnalogLevels[0] || []} trace={traceAnalogLevels[0]} setTrace={(t) => updateAnalogTrace(0, t)} score={score} onCheck={() => checkScore(traceAnalogLevels[0], targetAnalog, false)} themeStyles={getThemeStyles('amber')} /> },
                { section: "Part 2: Recovery", title: "2b. Recover Analog Signal (Heavy Noise)", theme: 'amber', requiresScore: true, content: <RecoverAnalog level="heavy" target={noisyAnalogLevels[1] || []} trace={traceAnalogLevels[1]} setTrace={(t) => updateAnalogTrace(1, t)} score={score} onCheck={() => checkScore(traceAnalogLevels[1], targetAnalog, false)} themeStyles={getThemeStyles('amber')} /> },

        // --- Login Overlay Component ---
        const LoginOverlay = ({ setStudent, setStep, setQuizzesPassed }) => {
            const [id, setId] = useState('');
            const [name, setName] = useState('');
            const [showNameEntry, setShowNameEntry] = useState(false);
            const [status, setStatus] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async () => {
                if (id.length !== 6) {
                    setStatus("INVALID_ID // 6_DIGITS_REQUIRED");
                    return;
                }
                setLoading(true);
                setStatus("VERIFYING_CREDENTIALS...");

                try {
                    const urlParams = new URLSearchParams(window.location.search);
                    let urlPeriod = urlParams.get('p') || urlParams.get('period');

                    const assignmentName = "Wave Signals Lab";
                    // 1. Check Roster
                    const rosterSnap = await db.collection('roster').doc(id).get();

                    if (rosterSnap.exists) {
                        const rosterData = rosterSnap.data();
                        const studentData = {
                            id: id,
                            name: rosterData.full_name,
                            period: urlPeriod || rosterData.class_period || null,
                            isLogged: true
                        };
                        setStudent(studentData);

                        // 2. Check for existing progress
                        const progressSnap = await db.collection('student_results').doc(assignmentName).collection('students').doc(id).get();

                        if (progressSnap.exists) {
                            const data = progressSnap.data();
                            if (data.details) {
                                if (data.details.currentStep !== undefined) setStep(data.details.currentStep);
                                if (data.details.quizzesPassed) setQuizzesPassed(data.details.quizzesPassed);
                            }
                        }
                    } else if (!showNameEntry) {
                        setShowNameEntry(true);
                        setLoading(false);
                        setStatus("NEW_ID_DETECTED");
                    } else {
                        if (name.length < 3) {
                            setStatus("ERROR // NAME_TOO_SHORT");
                            setLoading(false);
                            return;
                        }
                        const studentData = {
                            id: id,
                            name: name,
                            period: urlPeriod || null,
                            isLogged: true
                        };
                        setStudent(studentData);
                    }
                } catch (e) {
                    console.error(e);
                    setStatus("SYNC_ERROR // OFFLINE_MODE");
                    setLoading(false);
                }
            };

            return (

                            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest animate-pulse h-4">{status}</p>

                    </div>
                </div>

            const [selected, setSelected] = useState(null);

                    <h4 className="font-bold text-slate-800 mb-4 flex items-center justify-between gap-4">

                    </h4>
                    <div className="space-y-3">
                        {options.map((opt, idx) => {
                            const isSelected = selected === idx;
                            const isCorrect = idx === correctIdx;
                            let btnClass = "w-full text-left p-4 rounded-lg border-2 transition-all ";

                            if (passed) {
                                if (isCorrect) btnClass += "border-emerald-500 bg-emerald-100 text-emerald-800 font-semibold";
                                else btnClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-50";

                                if (isSelected) btnClass += "border-red-400 bg-red-50 text-red-700 font-medium";

                                    onClick={() => {

        const Intro = ({ themeStyles }) => (

                <div className={`${themeStyles.lightBg} rounded-xl p-5 border ${themeStyles.border}`}>

                        <>
                            <button onClick={playTarget} className="flex items-center gap-2 bg-slate-500 text-white px-6 py-3 rounded-full font-bold hover:bg-slate-600 transition-transform active:scale-95 shadow-md">
                                <PlayIcon fill="currentColor" size={20} /> Play Original Analog
                            </button>
                            <button onClick={play} className="flex items-center gap-2 bg-emerald-500 text-white px-6 py-3 rounded-full font-bold hover:bg-emerald-600 transition-transform active:scale-95 shadow-md">
                                <PlayIcon fill="currentColor" size={20} /> Play Your Digital Wave
                            </button>
                        </>
                    ) : (
                        <button onClick={stop} className="flex items-center gap-2 bg-red-500 text-white px-6 py-3 rounded-full font-bold hover:bg-red-600 transition-transform active:scale-95 shadow-md animate-pulse">
                            <SquareIcon fill="currentColor" size={20} /> Stop Playback
                        </button>
                    )}
                </div>
            </div>
        );

        const Reflection = ({ lowSample, highSample, targetAnalog, themeStyles }) => {
            const [q1Selected, setQ1Selected] = useState(null);
            const [q2Selected, setQ2Selected] = useState(null);
            const [q3Passed, setQ3Passed] = useState(false);
            const [q4Passed, setQ4Passed] = useState(false);

            return (
                <div className="space-y-8 animate-fade-in">
                    <p className="text-slate-600 font-medium text-lg">Let's review the digital signals you just created.</p>

                    {/* Question 1 */}
                    <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <label className="block text-md font-semibold text-slate-800 mb-4">
                            1. Which of the following represents your <span className={themeStyles?.text || 'text-indigo-600'}>High Sample Rate (20 segments)</span> wave?
                        </label>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div
                                onClick={() => setQ1Selected('low')}
                                className={`cursor-pointer rounded-xl border-2 overflow-hidden transition-all ${q1Selected === 'low' ? 'border-red-500 bg-red-50' : `border-slate-200 hover:${themeStyles?.border || 'border-indigo-300'}`}`}
                            >
                                <div className="pointer-events-none bg-slate-50">
                                    <WaveCanvas mode="digital-view" data={lowSample} height="120px" />
                                </div>
                                {q1Selected === 'low' && <div className="text-center p-2 text-red-600 font-bold bg-red-100 border-t border-red-200">Incorrect - That has fewer segments!</div>}
                            </div>

                            <div
                                onClick={() => setQ1Selected('high')}
                                className={`cursor-pointer rounded-xl border-2 overflow-hidden transition-all ${q1Selected === 'high' ? 'border-emerald-500 bg-emerald-50' : `border-slate-200 hover:${themeStyles?.border || 'border-indigo-300'}`}`}
                            >
                                <div className="pointer-events-none bg-slate-50">
                                    <WaveCanvas mode="digital-view" data={highSample} height="120px" />
                                </div>
                                {q1Selected === 'high' && <div className="text-center p-2 text-emerald-700 font-bold bg-emerald-100 border-t border-emerald-200">Correct! More segments = higher resolution.</div>}
                            </div>
                        </div>
                    </div>

                    {/* Question 2 */}
                    <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <label className="block text-md font-semibold text-slate-800 mb-4">
                            2. Review your <span className={themeStyles?.text || 'text-indigo-600'}>Low Sample Rate</span> wave below. Click on a segment where your digital wave does a <strong>poor</strong> job of capturing the shape of the original analog wave (gray).
                        </label>
                        <div className="relative border-2 border-slate-200 rounded-xl overflow-hidden bg-slate-50">
                            <WaveCanvas mode="digital-view" backgroundData={targetAnalog} data={lowSample} height="180px" />
                            <div className="absolute inset-0 flex">
                                {lowSample.map((_, i) => (
                                    <div
                                        key={i}
                                        onClick={() => setQ2Selected(i)}
                                        className={`flex-1 cursor-pointer transition-colors border-r border-slate-200/50 last:border-0 ${q2Selected === i ? `bg-transparent ring-4 ring-inset ${themeStyles?.ring || 'ring-indigo-600'}` : 'hover:bg-slate-300/20'}`}
                                    />
                                ))}
                            </div>
                        </div>
                        {q2Selected !== null && (
                            <div className={`mt-4 p-4 ${themeStyles?.lightBg || 'bg-indigo-50'} border ${themeStyles?.border || 'border-indigo-100'} ${themeStyles?.text || 'text-indigo-800'} rounded-lg text-sm animate-fade-in`}>
                                <strong>Segment {q2Selected + 1} selected.</strong> Notice how during this time block, the analog wave is constantly changing pitch, but the digital wave is forced to stay perfectly flat. This loss of detail between samples is what causes low-quality audio!
                            </div>
                        )}
                    </div>

                    {/* Question 3 */}
                    <IntroQuiz
                        className="shadow-sm"
                        question="3. Thinking about your experience recovering signals in Part 2, why do modern communication systems (like internet and cell phones) primarily use digital signals instead of analog signals?"
                        options={[
                            "Digital signals travel significantly faster through cables than analog signals.",
                            "Digital signals can be perfectly reconstructed even when distorted by moderate noise.",
                            "Digital signals naturally have a smoother, higher quality sound."
                        ]}
                        correctIdx={1}
                        passed={q3Passed}
                        onPass={() => setQ3Passed(true)}
                    />

                    {/* Question 4 */}
                    <IntroQuiz
                        className="shadow-sm"
                        question="4. If a high sample rate creates a much more accurate wave (as seen in Part 3), what might be a disadvantage of using extremely high sample rates for all our audio and video files?"
                        options={[
                            "It requires significantly more storage space and transmission bandwidth.",
                            "It introduces more real-world analog noise into the original signal.",
                            "It forces the playback speed of the audio to slow down."
                        ]}
                        correctIdx={0}
                        passed={q4Passed}
                        onPass={() => setQ4Passed(true)}
                    />
                </div>
            );
        };

        const Completion = () => (
            <div className="text-center space-y-6 animate-fade-in py-10">
                <div className="flex justify-center">
                    <div className="bg-emerald-100 p-5 rounded-full text-emerald-600 shadow-sm">
                        <CheckCircleIcon size={64} />
                    </div>
                </div>
                <h3 className="text-3xl font-bold text-slate-800">Excellent Work!</h3>
                <p className="text-lg text-slate-600 max-w-xl mx-auto leading-relaxed">
                    You have successfully completed the Wave Signal Physics Lab. You've learned how analog and digital signals are created, how they handle interference differently, and why the sampling rate is so critical when converting smooth analog waves into discrete digital data.
                </p>
                <p className="text-slate-500 italic mt-8">You may now close this webapp or use the "Back" button to review your work.</p>
            </div>
        );


        // --- Reusable UI Sub-components ---

        const PlayControls = ({ isPlaying, play, stop }) => (
            <div className="flex justify-center mt-2">
                {!isPlaying ? (
                    <button onClick={play} className="flex items-center gap-2 bg-emerald-500 text-white px-6 py-3 rounded-full font-bold hover:bg-emerald-600 transition-transform active:scale-95 shadow-md">
                        <PlayIcon fill="currentColor" size={20} /> Play Tone (8s)
                    </button>
                ) : (
                    <button onClick={stop} className="flex items-center gap-2 bg-red-500 text-white px-6 py-3 rounded-full font-bold hover:bg-red-600 transition-transform active:scale-95 shadow-md animate-pulse">
                        <SquareIcon fill="currentColor" size={20} /> Stop Playback
                    </button>
                )}
            </div>
        );

        const PlaybackCursor = ({ progress }) => (
            <div
                className="absolute top-0 bottom-0 w-1 bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)] z-10 pointer-events-none"
                style={{ left: `${progress * 100}%` }}
            />
        );

        const ScorePanel = ({ score, onCheck, themeStyles }) => (
            <div className="flex items-center justify-between bg-slate-100 p-4 rounded-xl border border-slate-200">
                <button
                    onClick={onCheck}
                    className={`flex items-center gap-2 ${themeStyles?.primary || 'bg-indigo-600'} text-white px-5 py-2.5 rounded-lg font-semibold ${themeStyles?.hover || 'hover:bg-indigo-700'} transition-colors`}
                >
                    <CheckCircleIcon size={18} /> Check Accuracy Score
                </button>
                {score !== null && (
                    <div className="text-right">
                        <span className="text-sm text-slate-500 font-medium block">Match Accuracy:</span>
                        <span className={`text-2xl font-black ${score >= 90 ? 'text-emerald-500' : score >= 70 ? 'text-amber-500' : 'text-red-500'}`}>
                            {score}%
                        </span>
                    </div>
                )}
            </div>
        );

        // --- Core Canvas Component ---
        // Handles all rendering and interaction for both analog curves and digital blocks
        const WaveCanvas = ({ mode, data, backgroundData, onChange, overlayDigital, height, isBinary }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const lastPosRef = useRef(null);

            // Render logic
            const draw = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;

                ctx.clearRect(0, 0, w, h);

                // Draw Grid
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let i = 1; i <= 4; i++) {
                    ctx.moveTo(0, h * (i / 5)); ctx.lineTo(w, h * (i / 5));
                }
                for (let i = 1; i <= 8; i++) {
                    ctx.moveTo(w * (i / 8), 0); ctx.lineTo(w * (i / 8), h);
                }
                ctx.stroke();

                // Draw Background Data (Target / Noise)
                if (backgroundData) {
                    ctx.beginPath();
                    ctx.strokeStyle = '#94a3b8'; // Slate 400
                    ctx.lineWidth = 3;

                    if (backgroundData.length === WAVE_RESOLUTION) {
                        // Analog background
                        for (let i = 0; i < WAVE_RESOLUTION; i++) {
                            const x = (i / WAVE_RESOLUTION) * w;
                            const y = (1 - backgroundData[i]) * h;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                    }
                    ctx.stroke();
                }

                // Draw Foreground Data (Interactive or View)
                if (mode.includes('analog') && !overlayDigital) {
                    ctx.beginPath();
                    ctx.strokeStyle = mode.includes('trace') ? '#3b82f6' : '#6366f1'; // Blue for trace, Indigo for create
                    ctx.lineWidth = 4;
                    for (let i = 0; i < WAVE_RESOLUTION; i++) {
                        const x = (i / WAVE_RESOLUTION) * w;
                        const y = (1 - data[i]) * h;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }

                if (mode.includes('digital') || overlayDigital) {
                    const dWave = overlayDigital || data;
                    const segments = dWave.length;
                    const segWidth = w / segments;

                    // For pure digital draw/trace, we draw blocks
                    ctx.fillStyle = mode.includes('trace') ? 'rgba(59, 130, 246, 0.7)' : 'rgba(99, 102, 241, 0.7)';
                    ctx.strokeStyle = mode.includes('trace') ? '#2563eb' : '#4f46e5';
                    ctx.lineWidth = 2;

                    for (let i = 0; i < segments; i++) {
                        const x = i * segWidth;
                        const y = (1 - dWave[i]) * h;
                        // Draw the horizontal bar
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x + segWidth, y);
                        ctx.stroke();

                        // Fill area under the curve
                        ctx.globalAlpha = 0.3;
                        ctx.fillRect(x, y, segWidth, h - y);
                        ctx.globalAlpha = 1.0;

                        // Draw vertical connectors
                        if (i > 0) {
                            const prevY = (1 - dWave[i - 1]) * h;
                            ctx.beginPath();
                            ctx.moveTo(x, prevY);
                            ctx.lineTo(x, y);
                            ctx.stroke();
                        }
                    }
                }
            }, [data, backgroundData, mode, overlayDigital]);

            const drawRef = useRef(draw);

            // Update ref and re-render when data changes
            useEffect(() => {
                drawRef.current = draw;
                draw();
            }, [draw]);

            // Resize canvas to match display size for crisp rendering
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                const resizeObserver = new ResizeObserver(() => {
                    // Safely grab dimensions as soon as the element is physically laid out on screen
                    if (canvas.clientWidth > 0 && canvas.clientHeight > 0) {
                        if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
                            canvas.width = canvas.clientWidth;
                            canvas.height = canvas.clientHeight;
                            if (drawRef.current) drawRef.current();
                        }
                    }
                });

                resizeObserver.observe(canvas);
                return () => resizeObserver.disconnect();
            }, []);

            // Interaction handlers
            const handleInput = (clientX, clientY) => {
                if (!onChange || !mode.includes('draw') && !mode.includes('trace')) return;

                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
                const y = Math.max(0, Math.min(rect.height, clientY - rect.top));

                const pctX = x / rect.width;
                const pctY = 1 - (y / rect.height); // Flip Y so bottom is 0, top is 1

                if (mode.includes('analog')) {
                    const newArray = [...data];
                    const currIdx = Math.max(0, Math.min(WAVE_RESOLUTION - 1, Math.floor(pctX * WAVE_RESOLUTION)));

                    if (lastPosRef.current !== null) {
                        // Interpolate between last point and current point to prevent gaps
                        const lastIdx = Math.max(0, Math.min(WAVE_RESOLUTION - 1, Math.floor(lastPosRef.current.pctX * WAVE_RESOLUTION)));
                        const start = Math.min(lastIdx, currIdx);
                        const end = Math.max(lastIdx, currIdx);

                        for (let i = start; i <= end; i++) {
                            const t = start === end ? 0 : (i - lastIdx) / (currIdx - lastIdx);
                            newArray[i] = lastPosRef.current.pctY + t * (pctY - lastPosRef.current.pctY);
                        }
                    } else {
                        newArray[currIdx] = pctY;
                    }

                    onChange(newArray);
                    lastPosRef.current = { pctX, pctY };
                }
                else if (mode.includes('digital')) {
                    const segments = data.length;
                    const segIdx = Math.max(0, Math.min(segments - 1, Math.floor(pctX * segments)));

                    let quantizedY;
                    if (isBinary) {
                        // Snap to purely binary High (0.9) or Low (0.1) states
                        quantizedY = pctY > 0.5 ? 0.9 : 0.1;
                    } else {
                        // Quantize Y for multi-level digital (used in sampling)
                        const discreteLevels = 10;
                        quantizedY = Math.round(pctY * discreteLevels) / discreteLevels;
                    }

                    if (data[segIdx] !== quantizedY) {
                        const newArray = [...data];
                        newArray[segIdx] = quantizedY;
                        onChange(newArray);
                    }
                }
            };

            const onStart = (e) => {
                if (!onChange) return;
                e.preventDefault(); // prevent scrolling while drawing
                setIsDrawing(true);
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                lastPosRef.current = null;
                handleInput(clientX, clientY);
            };

            const onMove = (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                handleInput(clientX, clientY);
            };

            const onEnd = () => {
                setIsDrawing(false);
                lastPosRef.current = null;
            };

            return (
                <canvas
                    ref={canvasRef}
                    className={`w-full block ${onChange ? 'cursor-crosshair' : 'cursor-default'}`}
                    style={{ height: height || '280px' }}
                    onMouseDown={onStart}
                    onMouseMove={onMove}
                    onMouseUp={onEnd}
                    onMouseLeave={onEnd}
                    onTouchStart={onStart}
                    onTouchMove={onMove}
                    onTouchEnd={onEnd}
                    onTouchCancel={onEnd}
                />
            );
        };

        // Mount the React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
