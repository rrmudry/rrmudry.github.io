                                                                                                        Math.min(segments
                                                                                                        - 1,
                                                                                                        Math.floor(pctX
                                                                                                        * segments)));
                                                                                                        let quantizedY;
                                                                                                        if (isBinary) {
                                                                                                        // Snap to
                                                                                                        purely binary
                                                                                                        High (0.9) or
                                                                                                        Low (0.1) states
                                                                                                        quantizedY=pctY>
                                                                                                        0.5 ? 0.9 : 0.1;
                                                                                                        } else {
                                                                                                        // Quantize Y
                                                                                                        for multi-level
                                                                                                        digital (used in
                                                                                                        sampling)
                                                                                                        const
                                                                                                        discreteLevels =
                                                                                                        10;
                                                                                                        quantizedY =
                                                                                                        Math.round(pctY
                                                                                                        *
                                                                                                        discreteLevels)
                                                                                                        /
                                                                                                        discreteLevels;
                                                                                                        }

                                                                                                        if (data[segIdx]
                                                                                                        !== quantizedY)
                                                                                                        {
                                                                                                        const newArray =
                                                                                                        [...data];
                                                                                                        newArray[segIdx]
                                                                                                        = quantizedY;
                                                                                                        onChange(newArray);
                                                                                                        }
                                                                                                        }
                                                                                                        };

                                                                                                        const onStart =
                                                                                                        (e) => {
                                                                                                        if (!onChange)
                                                                                                        return;
                                                                                                        e.preventDefault();
                                                                                                        // prevent
                                                                                                        scrolling while
                                                                                                        drawing
                                                                                                        setIsDrawing(true);
                                                                                                        const clientX =
                                                                                                        e.touches ?
                                                                                                        e.touches[0].clientX
                                                                                                        : e.clientX;
                                                                                                        const clientY =
                                                                                                        e.touches ?
                                                                                                        e.touches[0].clientY
                                                                                                        : e.clientY;
                                                                                                        lastPosRef.current
                                                                                                        = null;
                                                                                                        handleInput(clientX,
                                                                                                        clientY);
                                                                                                        };

                                                                                                        const onMove =
                                                                                                        (e) => {
                                                                                                        if (!isDrawing)
                                                                                                        return;
                                                                                                        e.preventDefault();
                                                                                                        const clientX =
                                                                                                        e.touches ?
                                                                                                        e.touches[0].clientX
                                                                                                        : e.clientX;
                                                                                                        const clientY =
                                                                                                        e.touches ?
                                                                                                        e.touches[0].clientY
                                                                                                        : e.clientY;
                                                                                                        handleInput(clientX,
                                                                                                        clientY);
                                                                                                        };

                                                                                                        const onEnd = ()
                                                                                                        => {
                                                                                                        setIsDrawing(false);
                                                                                                        lastPosRef.current
                                                                                                        = null;
                                                                                                        };

                                                                                                        return (
                                                                                                        <canvas
                                                                                                            ref={canvasRef}
                                                                                                            className={`w-full
                                                                                                            block
                                                                                                            ${onChange
                                                                                                            ? 'cursor-crosshair'
                                                                                                            : 'cursor-default'
                                                                                                            }`} style={{
                                                                                                            height:
                                                                                                            height
                                                                                                            || '280px'
                                                                                                            }}
                                                                                                            onMouseDown={onStart}
                                                                                                            onMouseMove={onMove}
                                                                                                            onMouseUp={onEnd}
                                                                                                            onMouseLeave={onEnd}
                                                                                                            onTouchStart={onStart}
                                                                                                            onTouchMove={onMove}
                                                                                                            onTouchEnd={onEnd}
                                                                                                            onTouchCancel={onEnd} />
                                                                                                        );
                                                                                                        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
