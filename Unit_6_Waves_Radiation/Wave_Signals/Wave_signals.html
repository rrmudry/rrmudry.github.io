<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Signals Physics Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const { Play, Square, ArrowRight, ArrowLeft, RefreshCw, CheckCircle, Activity, BarChart2, PenTool, Search, Sliders } = LucideReact;

// --- Constants & Utilities ---
const WAVE_RESOLUTION = 800; // 800 points for an 8-second wave
const AUDIO_DURATION = 8.0; // Seconds
const MIN_FREQ = 220; // Hz (A3)
const MAX_FREQ = 880; // Hz (A5)

// Generate a smooth random wave using harmonics
const generateSmoothWave = () => {
const wave = new Array(WAVE_RESOLUTION).fill(0);
const numHarmonics = 3;
const phases = Array.from({ length: numHarmonics }, () => Math.random() * Math.PI * 2);
const freqs = Array.from({ length: numHarmonics }, () => 1 + Math.random() * 3);
const amps = Array.from({ length: numHarmonics }, () => 0.2 + Math.random() * 0.5);

let maxVal = -Infinity;
let minVal = Infinity;

for (let i = 0; i < WAVE_RESOLUTION; i++) { let val=0; const t=i / WAVE_RESOLUTION; for (let h=0; h < numHarmonics; h++)
    { val +=Math.sin(t * Math.PI * 2 * freqs[h] + phases[h]) * amps[h]; } wave[i]=val; if (val> maxVal) maxVal = val;
    if (val < minVal) minVal=val; } // Normalize to 0.1 - 0.9 range to keep it on screen return wave.map(v=> 0.1 + ((v -
        minVal) / (maxVal - minVal)) * 0.8);
        };

        // Generate a step wave
        const generateDigitalWave = (segments = 16, isBinary = true) => {
        const levels = isBinary ? [0.1, 0.9] : [0.1, 0.3, 0.5, 0.7, 0.9];
        return Array.from({ length: segments }, () => levels[Math.floor(Math.random() * levels.length)]);
        };

        // Add noise to a given analog array
        const addAnalogNoise = (wave, amount = 0.15) => {
        return wave.map(v => Math.max(0, Math.min(1, v + (Math.random() * 2 - 1) * amount)));
        };

        // Add noise to a digital array (array of segments)
        const addDigitalNoiseToAnalogVis = (digitalWave, amount = 0.15) => {
        const noisy = new Array(WAVE_RESOLUTION).fill(0);
        const ptsPerSeg = Math.floor(WAVE_RESOLUTION / digitalWave.length);
        for (let i = 0; i < WAVE_RESOLUTION; i++) { const segIdx=Math.min(digitalWave.length - 1, Math.floor(i /
            ptsPerSeg)); const base=digitalWave[segIdx]; noisy[i]=Math.max(0, Math.min(1, base + (Math.random() * 2 - 1)
            * amount)); } return noisy; }; // Map themes to Tailwind classes for visual cueing const
            getThemeStyles=(theme)=> {
            switch(theme) {
            case 'blue': return { primary: 'bg-blue-600', hover: 'hover:bg-blue-700', text: 'text-blue-600', lightBg:
            'bg-blue-50', border: 'border-blue-200', ring: 'ring-blue-600', light: 'bg-blue-300' };
            case 'amber': return { primary: 'bg-amber-500', hover: 'hover:bg-amber-600', text: 'text-amber-600',
            lightBg: 'bg-amber-50', border: 'border-amber-200', ring: 'ring-amber-500', light: 'bg-amber-300' };
            case 'emerald': return { primary: 'bg-emerald-600', hover: 'hover:bg-emerald-700', text: 'text-emerald-600',
            lightBg: 'bg-emerald-50', border: 'border-emerald-200', ring: 'ring-emerald-600', light: 'bg-emerald-300' };
            case 'purple': return { primary: 'bg-purple-600', hover: 'hover:bg-purple-700', text: 'text-purple-600',
            lightBg: 'bg-purple-50', border: 'border-purple-200', ring: 'ring-purple-600', light: 'bg-purple-300' };
            case 'indigo':
            default:
            return { primary: 'bg-indigo-600', hover: 'hover:bg-indigo-700', text: 'text-indigo-600', lightBg:
            'bg-indigo-50', border: 'border-indigo-200', ring: 'ring-indigo-600', light: 'bg-indigo-300' };
            }
            };

            // --- Main Application Component ---
            function App() {
            const [step, setStep] = useState(0);

            // Wave States
            const [analogDraw1, setAnalogDraw1] = useState(new Array(WAVE_RESOLUTION).fill(0.5));
            const [analogDraw2, setAnalogDraw2] = useState(new Array(WAVE_RESOLUTION).fill(0.5));
            const [digitalDraw1, setDigitalDraw1] = useState(new Array(16).fill(0.5));
            const [digitalDraw2, setDigitalDraw2] = useState(new Array(16).fill(0.5));

            const [targetAnalog, setTargetAnalog] = useState([]);
            const [noisyAnalogLevels, setNoisyAnalogLevels] = useState([]);
            const [targetDigital, setTargetDigital] = useState([]);
            const [noisyDigitalLevels, setNoisyDigitalLevels] = useState([]);

            const [traceAnalogLevels, setTraceAnalogLevels] = useState([new Array(WAVE_RESOLUTION).fill(0.5), new
            Array(WAVE_RESOLUTION).fill(0.5), new Array(WAVE_RESOLUTION).fill(0.5)]);
            const [traceDigitalLevels, setTraceDigitalLevels] = useState([new Array(16).fill(0.5), new
            Array(16).fill(0.5), new Array(16).fill(0.5)]);

            const [lowSample, setLowSample] = useState(new Array(5).fill(0.5));
            const [highSample, setHighSample] = useState(new Array(20).fill(0.5));

            // Gatekeeping States
            const [quizzesPassed, setQuizzesPassed] = useState({ part1: false, part2: false, part3: false });
            const [stepsPlayed, setStepsPlayed] = useState({});

            // Audio & Playback State
            const [isPlaying, setIsPlaying] = useState(false);
            const [playbackProgress, setPlaybackProgress] = useState(0);
            const audioCtxRef = useRef(null);
            const activeNodesRef = useRef([]);
            const animationRef = useRef(null);

            // Initialize targets on mount
            useEffect(() => {
            const aWave = generateSmoothWave();
            setTargetAnalog(aWave);
            setNoisyAnalogLevels([
            addAnalogNoise(aWave, 0.15), // Moderate
            addAnalogNoise(aWave, 0.35), // Heavy
            addAnalogNoise(aWave, 0.60) // Extreme
            ]);

            // Ensure the digital target is created as a binary signal
            const dWave = generateDigitalWave(16, true);
            setTargetDigital(dWave);
            setNoisyDigitalLevels([
            addDigitalNoiseToAnalogVis(dWave, 0.15), // Moderate
            addDigitalNoiseToAnalogVis(dWave, 0.35), // Heavy
            addDigitalNoiseToAnalogVis(dWave, 0.60) // Extreme
            ]);
            }, []);

            // Audio Engine
            const stopAudio = useCallback(() => {
            activeNodesRef.current.forEach(node => {
            try { node.stop(); } catch (e) { /* ignore */ }
            try { node.disconnect(); } catch (e) { /* ignore */ }
            });
            activeNodesRef.current = [];
            setIsPlaying(false);
            setPlaybackProgress(0);
            if (animationRef.current) cancelAnimationFrame(animationRef.current);
            }, []);

            const playAudio = useCallback((waveData, isDigital, hasNoise) => {
            stopAudio();
            if (!audioCtxRef.current) {
            audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
            }
            const ctx = audioCtxRef.current;
            if (ctx.state === 'suspended') ctx.resume();

            const masterGain = ctx.createGain();
            masterGain.gain.value = 0.3; // Prevent overwhelming volume
            masterGain.connect(ctx.destination);

            // Tone Oscillator
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.connect(masterGain);
            activeNodesRef.current.push(osc);

            const startTime = ctx.currentTime;

            if (!isDigital) {
            // Smooth Analog transitions
            osc.frequency.setValueAtTime(MIN_FREQ + waveData[0] * (MAX_FREQ - MIN_FREQ), startTime);
            for (let i = 1; i < WAVE_RESOLUTION; i++) { const time=startTime + (i / WAVE_RESOLUTION) * AUDIO_DURATION;
                const freq=MIN_FREQ + waveData[i] * (MAX_FREQ - MIN_FREQ); osc.frequency.linearRampToValueAtTime(freq,
                time); } } else { // Digital Step transitions const segments=waveData.length; for (let i=0; i <
                segments; i++) { const time=startTime + (i / segments) * AUDIO_DURATION; const freq=MIN_FREQ +
                waveData[i] * (MAX_FREQ - MIN_FREQ); osc.frequency.setValueAtTime(freq, time); } } osc.start(startTime);
                osc.stop(startTime + AUDIO_DURATION); // Noise Generator if (hasNoise) { const bufferSize=ctx.sampleRate
                * AUDIO_DURATION; const buffer=ctx.createBuffer(1, bufferSize, ctx.sampleRate); const
                data=buffer.getChannelData(0); for (let i=0; i < bufferSize; i++) { data[i]=Math.random() * 2 - 1; }
                const noiseSource=ctx.createBufferSource(); noiseSource.buffer=buffer; const noiseGain=ctx.createGain();
                noiseGain.gain.value=0.15; // Noise volume noiseSource.connect(noiseGain);
                noiseGain.connect(masterGain); noiseSource.start(startTime); activeNodesRef.current.push(noiseSource); }
                setIsPlaying(true); // Playback visualizer loop const updateProgress=()=> {
                const elapsed = ctx.currentTime - startTime;
                if (elapsed >= AUDIO_DURATION) {
                setIsPlaying(false);
                setPlaybackProgress(0);
                } else {
                setPlaybackProgress(elapsed / AUDIO_DURATION);
                animationRef.current = requestAnimationFrame(updateProgress);
                }
                };
                animationRef.current = requestAnimationFrame(updateProgress);

                }, [stopAudio]);

                const handlePlay = (waveData, isDigital, hasNoise) => {
                playAudio(waveData, isDigital, hasNoise);
                // Mark this specific step as having met the "play" requirement
                setStepsPlayed(prev => ({ ...prev, [step]: true }));
                };

                // Scoring Logic
                const [score, setScore] = useState(null);
                const checkScore = (trace, target, isDigitalTarget = false) => {
                let mse = 0;
                if (isDigitalTarget) {
                // Compare segment to segment
                for (let i = 0; i < trace.length; i++) { mse +=Math.pow(trace[i] - target[i], 2); } mse /=trace.length;
                    } else { // Compare point to point for (let i=0; i < WAVE_RESOLUTION; i++) { mse +=Math.pow(trace[i]
                    - target[i], 2); } mse /=WAVE_RESOLUTION; } // Convert MSE to a 0-100% score (lower MSE=higher
                    score) const calculatedScore=Math.max(0, Math.min(100, Math.round((1 - Math.sqrt(mse) * 2.5) *
                    100))); setScore(calculatedScore); }; // Nav Handlers const handleNext=()=> { stopAudio();
                    setScore(null); setStep(s => Math.min(s + 1, steps.length - 1)); };
                    const handlePrev = () => { stopAudio(); setScore(null); setStep(s => Math.max(s - 1, 0)); };

                    const updateAnalogTrace = (idx, newTrace) => {
                    const newTraces = [...traceAnalogLevels];
                    newTraces[idx] = newTrace;
                    setTraceAnalogLevels(newTraces);
                    };

                    const updateDigitalTrace = (idx, newTrace) => {
                    const newTraces = [...traceDigitalLevels];
                    newTraces[idx] = newTrace;
                    setTraceDigitalLevels(newTraces);
                    };

                    // --- Step Definitions ---
                    const steps = [
                    { section: "Introduction", title: "Welcome to Signal Analysis", theme: 'indigo', content:
                    <Intro themeStyles={getThemeStyles('indigo')} /> },

                    { section: "Part 1: Creation", title: "Part 1: Signal Creation", theme: 'blue', requiresQuiz:
                    'part1', content: <Part1Intro themeStyles={getThemeStyles('blue')} passed={quizzesPassed.part1}
                        onPass={()=> setQuizzesPassed(p => ({...p, part1: true}))} /> },
                        { section: "Part 1: Creation", title: "1a. Create Analog Wave 1", theme: 'blue', requiresPlay:
                        true, targetWaveToCheck: analogDraw1, content: <AnalogCreate wave={analogDraw1}
                            setWave={setAnalogDraw1} play={()=> handlePlay(analogDraw1, false, false)}
                            isPlaying={isPlaying} stop={stopAudio} progress={playbackProgress} /> },
                            { section: "Part 1: Creation", title: "1b. Create Analog Wave 2", theme: 'blue',
                            requiresPlay: true, targetWaveToCheck: analogDraw2, content: <AnalogCreate
                                wave={analogDraw2} setWave={setAnalogDraw2} play={()=> handlePlay(analogDraw2, false,
                                false)} isPlaying={isPlaying} stop={stopAudio} progress={playbackProgress} /> },
                                { section: "Part 1: Creation", title: "1c. Analog Wave + Noise", theme: 'blue', content:
                                <AnalogNoise wave={analogDraw2} play={()=> handlePlay(analogDraw2, false, true)}
                                    isPlaying={isPlaying} stop={stopAudio} progress={playbackProgress} /> },
                                    { section: "Part 1: Creation", title: "1d. Create Digital Wave 1", theme: 'blue',
                                    requiresPlay: true, targetWaveToCheck: digitalDraw1, content: <DigitalCreate
                                        wave={digitalDraw1} setWave={setDigitalDraw1} play={()=>
                                        handlePlay(digitalDraw1, true, false)} isPlaying={isPlaying} stop={stopAudio}
                                        progress={playbackProgress} /> },
                                        { section: "Part 1: Creation", title: "1e. Create Digital Wave 2", theme:
                                        'blue', requiresPlay: true, targetWaveToCheck: digitalDraw2, content:
                                        <DigitalCreate wave={digitalDraw2} setWave={setDigitalDraw2} play={()=>
                                            handlePlay(digitalDraw2, true, false)} isPlaying={isPlaying}
                                            stop={stopAudio} progress={playbackProgress} /> },
                                            { section: "Part 1: Creation", title: "1f. Digital Wave + Noise", theme:
                                            'blue', content: <DigitalNoise wave={digitalDraw2} play={()=>
                                                handlePlay(digitalDraw2, true, true)} isPlaying={isPlaying}
                                                stop={stopAudio} progress={playbackProgress} /> },

                                                { section: "Part 2: Recovery", title: "Part 2: Signal Recovery", theme:
                                                'amber', requiresQuiz: 'part2', content: <Part2Intro
                                                    themeStyles={getThemeStyles('amber')} passed={quizzesPassed.part2}
                                                    onPass={()=> setQuizzesPassed(p => ({...p, part2: true}))} /> },
                                                    { section: "Part 2: Recovery", title: "2a. Recover Analog Signal
                                                    (Moderate Noise)", theme: 'amber', requiresScore: true, content:
                                                    <RecoverAnalog level="moderate" target={noisyAnalogLevels[0] || []}
                                                        trace={traceAnalogLevels[0]} setTrace={(t)=>
                                                        updateAnalogTrace(0, t)} score={score} onCheck={() =>
                                                        checkScore(traceAnalogLevels[0], targetAnalog, false)}
                                                        themeStyles={getThemeStyles('amber')} /> },
                                                        { section: "Part 2: Recovery", title: "2b. Recover Analog Signal
                                                        (Heavy Noise)", theme: 'amber', requiresScore: true, content:
                                                        <RecoverAnalog level="heavy" target={noisyAnalogLevels[1] || []}
                                                            trace={traceAnalogLevels[1]} setTrace={(t)=>
                                                            updateAnalogTrace(1, t)} score={score} onCheck={() =>
                                                            checkScore(traceAnalogLevels[1], targetAnalog, false)}
                                                            themeStyles={getThemeStyles('amber')} /> },
                                                            { section: "Part 2: Recovery", title: "2c. Recover Analog
                                                            Signal (Extreme Noise)", theme: 'amber', requiresScore:
                                                            true, content: <RecoverAnalog level="extreme"
                                                                target={noisyAnalogLevels[2] || []}
                                                                trace={traceAnalogLevels[2]} setTrace={(t)=>
                                                                updateAnalogTrace(2, t)} score={score} onCheck={() =>
                                                                checkScore(traceAnalogLevels[2], targetAnalog, false)}
                                                                themeStyles={getThemeStyles('amber')} /> },

                                                                { section: "Part 2: Recovery", title: "2d. Recover
                                                                Digital Signal (Moderate Noise)", theme: 'amber',
                                                                requiresScore: true, content: <RecoverDigital
                                                                    level="moderate" targetVis={noisyDigitalLevels[0] ||
                                                                    []} trace={traceDigitalLevels[0]} setTrace={(t)=>
                                                                    updateDigitalTrace(0, t)} score={score} onCheck={()
                                                                    => checkScore(traceDigitalLevels[0], targetDigital,
                                                                    true)} themeStyles={getThemeStyles('amber')} /> },
                                                                    { section: "Part 2: Recovery", title: "2e. Recover
                                                                    Digital Signal (Heavy Noise)", theme: 'amber',
                                                                    requiresScore: true, content: <RecoverDigital
                                                                        level="heavy" targetVis={noisyDigitalLevels[1]
                                                                        || []} trace={traceDigitalLevels[1]}
                                                                        setTrace={(t)=> updateDigitalTrace(1, t)}
                                                                        score={score} onCheck={() =>
                                                                        checkScore(traceDigitalLevels[1], targetDigital,
                                                                        true)} themeStyles={getThemeStyles('amber')} />
                                                                        },
                                                                        { section: "Part 2: Recovery", title: "2f.
                                                                        Recover Digital Signal (Extreme Noise)", theme:
                                                                        'amber', requiresScore: true, content:
                                                                        <RecoverDigital level="extreme"
                                                                            targetVis={noisyDigitalLevels[2] || []}
                                                                            trace={traceDigitalLevels[2]}
                                                                            setTrace={(t)=> updateDigitalTrace(2, t)}
                                                                            score={score} onCheck={() =>
                                                                            checkScore(traceDigitalLevels[2],
                                                                            targetDigital, true)}
                                                                            themeStyles={getThemeStyles('amber')} /> },

                                                                            { section: "Part 3: Sampling", title: "Part
                                                                            3: Sampling Rate", theme: 'emerald',
                                                                            requiresQuiz: 'part3', content: <Part3Intro
                                                                                themeStyles={getThemeStyles('emerald')}
                                                                                passed={quizzesPassed.part3}
                                                                                onPass={()=> setQuizzesPassed(p =>
                                                                                ({...p, part3: true}))} /> },
                                                                                { section: "Part 3: Sampling", title:
                                                                                "3a. Low Sample Rate", theme: 'emerald',
                                                                                requiresPlay: true, content: <Sampling
                                                                                    mode="low" target={targetAnalog}
                                                                                    sample={lowSample}
                                                                                    setSample={setLowSample} play={()=>
                                                                                    handlePlay(lowSample, true, false)}
                                                                                    playTarget={() =>
                                                                                    playAudio(targetAnalog, false,
                                                                                    false)} isPlaying={isPlaying}
                                                                                    stop={stopAudio}
                                                                                    progress={playbackProgress} /> },
                                                                                    { section: "Part 3: Sampling",
                                                                                    title: "3b. High Sample Rate",
                                                                                    theme: 'emerald', requiresPlay:
                                                                                    true, content: <Sampling mode="high"
                                                                                        target={targetAnalog}
                                                                                        sample={highSample}
                                                                                        setSample={setHighSample}
                                                                                        play={()=>
                                                                                        handlePlay(highSample, true,
                                                                                        false)} playTarget={() =>
                                                                                        playAudio(targetAnalog, false,
                                                                                        false)} isPlaying={isPlaying}
                                                                                        stop={stopAudio}
                                                                                        progress={playbackProgress} />
                                                                                        },
                                                                                        { section: "Part 3: Sampling",
                                                                                        title: "3c. Reflection", theme:
                                                                                        'emerald', content:
                                                                                        <Reflection
                                                                                            lowSample={lowSample}
                                                                                            highSample={highSample}
                                                                                            targetAnalog={targetAnalog}
                                                                                            themeStyles={getThemeStyles('emerald')} />
                                                                                        },

                                                                                        { section: "Complete", title:
                                                                                        "Lab Complete!", theme:
                                                                                        'purple', content:
                                                                                        <Completion /> }
                                                                                        ];

                                                                                        const currentStepObj =
                                                                                        steps[step];

                                                                                        // Gatekeeping Logic for
                                                                                        Advancement
                                                                                        let canAdvance = true;
                                                                                        let nextLabel = step === 0 ?
                                                                                        'Start Lab' : 'Next';

                                                                                        if (currentStepObj.requiresQuiz
                                                                                        &&
                                                                                        !quizzesPassed[currentStepObj.requiresQuiz])
                                                                                        {
                                                                                        canAdvance = false;
                                                                                        nextLabel = 'Answer Question to
                                                                                        Advance';
                                                                                        } else if
                                                                                        (currentStepObj.targetWaveToCheck)
                                                                                        {
                                                                                        const changedCount =
                                                                                        currentStepObj.targetWaveToCheck.filter(val
                                                                                        => val !== 0.5).length;
                                                                                        if (changedCount /
                                                                                        currentStepObj.targetWaveToCheck.length
                                                                                        < 0.5) { canAdvance=false;
                                                                                            nextLabel='Modify at least 50% of the wave'
                                                                                            ; } else if
                                                                                            (currentStepObj.requiresPlay
                                                                                            && !stepsPlayed[step]) {
                                                                                            canAdvance=false;
                                                                                            nextLabel='Play Tone to Advance'
                                                                                            ; } } else if
                                                                                            (currentStepObj.requiresPlay
                                                                                            && !stepsPlayed[step]) {
                                                                                            canAdvance=false;
                                                                                            nextLabel='Play Tone to Advance'
                                                                                            ; } else if
                                                                                            (currentStepObj.requiresScore
                                                                                            && (score===null || score <
                                                                                            70)) { canAdvance=false;
                                                                                            nextLabel='Score 70% to Advance'
                                                                                            ; } const
                                                                                            activeTheme=getThemeStyles(currentStepObj.theme);
                                                                                            return ( <div
                                                                                            className="min-h-screen bg-slate-50 text-slate-800 font-sans flex flex-col">
                                                                                            {/* Header */}
                                                                                            <header
                                                                                                className="bg-white border-b border-slate-200 p-4 shadow-sm z-10 sticky top-0 transition-colors">
                                                                                                <div
                                                                                                    className="max-w-5xl mx-auto flex items-center justify-between">
                                                                                                    <div className={`flex
                                                                                                        items-center
                                                                                                        gap-2
                                                                                                        ${activeTheme.text}
                                                                                                        transition-colors`}>
                                                                                                        <Activity
                                                                                                            size={28} />
                                                                                                        <h1
                                                                                                            className="font-bold text-xl hidden sm:block">
                                                                                                            Physics Lab:
                                                                                                            Wave Signals
                                                                                                        </h1>
                                                                                                    </div>

                                                                                                    {/* Progress
                                                                                                    Indicator */}
                                                                                                    <div
                                                                                                        className="flex flex-col items-end sm:items-center">
                                                                                                        <span
                                                                                                            className="text-sm font-semibold text-slate-500 mb-1">
                                                                                                            {currentStepObj.section}
                                                                                                        </span>
                                                                                                        <div
                                                                                                            className="flex gap-1">
                                                                                                            {steps.map((_,
                                                                                                            i) => (
                                                                                                            <div key={i}
                                                                                                                className={`h-2
                                                                                                                rounded-full
                                                                                                                transition-all
                                                                                                                duration-300
                                                                                                                ${i===step
                                                                                                                ? `w-6
                                                                                                                ${activeTheme.primary}`
                                                                                                                : i <
                                                                                                                step ?
                                                                                                                `w-2
                                                                                                                ${activeTheme.light}`
                                                                                                                : 'w-2 bg-slate-200'
                                                                                                                }`} />
                                                                                                            ))}
                                                                                                        </div>
                                                                                                    </div>
                                                                                                </div>
                                                                                            </header>

                                                                                            {/* Main Content Area */}
                                                                                            <main
                                                                                                className="flex-grow flex items-center justify-center p-4">
                                                                                                <div
                                                                                                    className="bg-white rounded-2xl shadow-lg border border-slate-100 max-w-4xl w-full p-6 sm:p-8 animate-fade-in transition-all">
                                                                                                    <h2
                                                                                                        className="text-2xl font-bold text-slate-800 mb-6">
                                                                                                        {currentStepObj.title}
                                                                                                    </h2>

                                                                                                    <div
                                                                                                        className="min-h-[400px] flex flex-col justify-between">
                                                                                                        {currentStepObj.content}

                                                                                                        {/* Navigation
                                                                                                        Footer */}
                                                                                                        <div
                                                                                                            className="flex justify-between items-center mt-10 pt-6 border-t border-slate-100">
                                                                                                            <button
                                                                                                                onClick={handlePrev}
                                                                                                                disabled={step===0}
                                                                                                                className={`flex
                                                                                                                items-center
                                                                                                                gap-2
                                                                                                                px-4
                                                                                                                py-2
                                                                                                                rounded-lg
                                                                                                                font-medium
                                                                                                                transition-colors
                                                                                                                ${step===0

                                                                                                // --- Core Canvas

                                                                                                // Handles all rendering
                                                                                                and interaction for both
                                                                                                analog curves and
                                                                                                digital blocks
                                                                                                const WaveCanvas = ({
                                                                                                mode, data,
                                                                                                backgroundData,
                                                                                                onChange,
                                                                                                overlayDigital, height,
                                                                                                isBinary }) => {
                                                                                                const canvasRef =
                                                                                                useRef(null);
                                                                                                const [isDrawing,
                                                                                                setIsDrawing] =
                                                                                                useState(false);
                                                                                                const lastPosRef =
                                                                                                useRef(null);

                                                                                                // Render logic
                                                                                                const draw =
                                                                                                useCallback(() => {
                                                                                                const canvas =
                                                                                                canvasRef.current;
                                                                                                if (!canvas) return;
                                                                                                const ctx =
                                                                                                canvas.getContext('2d');
                                                                                                const w = canvas.width;
                                                                                                const h = canvas.height;

                                                                                                ctx.clearRect(0, 0, w,
                                                                                                h);

                                                                                                // Draw Grid
                                                                                                ctx.strokeStyle =
                                                                                                '#e2e8f0';
                                                                                                ctx.lineWidth = 1;
                                                                                                ctx.beginPath();
                                                                                                for (let i = 1; i <= 4;
                                                                                                    i++) { ctx.moveTo(0,
                                                                                                    h * (i / 5));
                                                                                                    ctx.lineTo(w, h * (i
                                                                                                    / 5)); } for (let
                                                                                                    i=1; i <=8; i++) {
                                                                                                    ctx.moveTo(w * (i /
                                                                                                    8), 0); ctx.lineTo(w
                                                                                                    * (i / 8), h); }
                                                                                                    ctx.stroke(); //
                                                                                                    Draw Background Data
                                                                                                    (Target / Noise) if
                                                                                                    (backgroundData) {
                                                                                                    ctx.beginPath();
                                                                                                    ctx.strokeStyle='#94a3b8'
                                                                                                    ; // Slate 400
                                                                                                    ctx.lineWidth=3; if
                                                                                                    (backgroundData.length===WAVE_RESOLUTION)
                                                                                                    { // Analog
                                                                                                    background for (let
                                                                                                    i=0; i <
                                                                                                    WAVE_RESOLUTION;
                                                                                                    i++) { const x=(i /
                                                                                                    WAVE_RESOLUTION) *
                                                                                                    w; const y=(1 -
                                                                                                    backgroundData[i]) *
                                                                                                    h; if (i===0)
                                                                                                    ctx.moveTo(x, y);
                                                                                                    else ctx.lineTo(x,
                                                                                                    y); } }
                                                                                                    ctx.stroke(); } //
                                                                                                    Draw Foreground Data
                                                                                                    (Interactive or
                                                                                                    View) if
                                                                                                    (mode.includes('analog')
                                                                                                    && !overlayDigital)
                                                                                                    { ctx.beginPath();
                                                                                                    ctx.strokeStyle=mode.includes('trace')
                                                                                                    ? '#3b82f6'
                                                                                                    : '#6366f1' ; //
                                                                                                    Blue for trace,
                                                                                                    Indigo for create
                                                                                                    ctx.lineWidth=4; for
                                                                                                    (let i=0; i <
                                                                                                    WAVE_RESOLUTION;
                                                                                                    i++) { const x=(i /
                                                                                                    WAVE_RESOLUTION) *
                                                                                                    w; const y=(1 -
                                                                                                    data[i]) * h; if
                                                                                                    (i===0)
                                                                                                    ctx.moveTo(x, y);
                                                                                                    else ctx.lineTo(x,
                                                                                                    y); } ctx.stroke();
                                                                                                    } if
                                                                                                    (mode.includes('digital')
                                                                                                    || overlayDigital) {
                                                                                                    const
                                                                                                    dWave=overlayDigital
                                                                                                    || data; const
                                                                                                    segments=dWave.length;
                                                                                                    const segWidth=w /
                                                                                                    segments; // For
                                                                                                    pure digital
                                                                                                    draw/trace, we draw
                                                                                                    blocks
                                                                                                    ctx.fillStyle=mode.includes('trace')
                                                                                                    ? 'rgba(59, 130, 246, 0.7)'
                                                                                                    : 'rgba(99, 102, 241, 0.7)'
                                                                                                    ;
                                                                                                    ctx.strokeStyle=mode.includes('trace')
                                                                                                    ? '#2563eb'
                                                                                                    : '#4f46e5' ;
                                                                                                    ctx.lineWidth=2; for
                                                                                                    (let i=0; i <
                                                                                                    segments; i++) {
                                                                                                    const x=i *
                                                                                                    segWidth; const y=(1
                                                                                                    - dWave[i]) * h; //
                                                                                                    Draw the horizontal
                                                                                                    bar ctx.beginPath();
                                                                                                    ctx.moveTo(x, y);
                                                                                                    ctx.lineTo(x +
                                                                                                    segWidth, y);
                                                                                                    ctx.stroke(); //
                                                                                                    Fill area under the
                                                                                                    curve
                                                                                                    ctx.globalAlpha=0.3;
                                                                                                    ctx.fillRect(x, y,
                                                                                                    segWidth, h - y);
                                                                                                    ctx.globalAlpha=1.0;
                                                                                                    // Draw vertical
                                                                                                    connectors if (i> 0)
                                                                                                    {
                                                                                                    const prevY = (1 -
                                                                                                    dWave[i - 1]) * h;
                                                                                                    ctx.beginPath();
                                                                                                    ctx.moveTo(x,
                                                                                                    prevY);
                                                                                                    ctx.lineTo(x, y);
                                                                                                    ctx.stroke();
                                                                                                    }
                                                                                                    }
                                                                                                    }
                                                                                                    }, [data,
                                                                                                    backgroundData,
                                                                                                    mode,
                                                                                                    overlayDigital]);

                                                                                                    const drawRef =
                                                                                                    useRef(draw);

                                                                                                    // Update ref and
                                                                                                    re-render when data
                                                                                                    changes
                                                                                                    useEffect(() => {
                                                                                                    drawRef.current =
                                                                                                    draw;
                                                                                                    draw();
                                                                                                    }, [draw]);

                                                                                                    // Resize canvas to
                                                                                                    match display size
                                                                                                    for crisp rendering
                                                                                                    useEffect(() => {
                                                                                                    const canvas =
                                                                                                    canvasRef.current;
                                                                                                    if (!canvas) return;

                                                                                                    const resizeObserver
                                                                                                    = new
                                                                                                    ResizeObserver(() =>
                                                                                                    {
                                                                                                    // Safely grab
                                                                                                    dimensions as soon
                                                                                                    as the element is
                                                                                                    physically laid out
                                                                                                    on screen
                                                                                                    if
                                                                                                    (canvas.clientWidth
                                                                                                    > 0 &&
                                                                                                    canvas.clientHeight
                                                                                                    > 0) {
                                                                                                    if (canvas.width !==
                                                                                                    canvas.clientWidth
                                                                                                    || canvas.height !==
                                                                                                    canvas.clientHeight)
                                                                                                    {
                                                                                                    canvas.width =
                                                                                                    canvas.clientWidth;
                                                                                                    canvas.height =
                                                                                                    canvas.clientHeight;
                                                                                                    if (drawRef.current)
                                                                                                    drawRef.current();
                                                                                                    }
                                                                                                    }
                                                                                                    });

                                                                                                    resizeObserver.observe(canvas);
                                                                                                    return () =>
                                                                                                    resizeObserver.disconnect();
                                                                                                    }, []);

                                                                                                    // Interaction
                                                                                                    handlers
                                                                                                    const handleInput =
                                                                                                    (clientX, clientY)
                                                                                                    => {
                                                                                                    if (!onChange ||
                                                                                                    !mode.includes('draw')
                                                                                                    &&
                                                                                                    !mode.includes('trace'))

                                                                                                    canvasRef.current;
                                                                                                    const rect =

                                                                                                    Math.max(0,
                                                                                                    Math.min(rect.width,
                                                                                                    clientX -
                                                                                                    rect.left));
                                                                                                    const y =
                                                                                                    Math.max(0,
                                                                                                    Math.min(rect.height,
                                                                                                    clientY -
                                                                                                    rect.top));

                                                                                                    const pctX = x /
                                                                                                    rect.width;
                                                                                                    const pctY = 1 - (y
                                                                                                    / rect.height); //
                                                                                                    Flip Y so bottom is
                                                                                                    0, top is 1

                                                                                                    if
                                                                                                    (mode.includes('analog'))
                                                                                                    {
                                                                                                    const newArray =
                                                                                                    [...data];
                                                                                                    const currIdx =
                                                                                                    Math.max(0,
                                                                                                    Math.min(WAVE_RESOLUTION
                                                                                                    - 1, Math.floor(pctX
                                                                                                    *
                                                                                                    WAVE_RESOLUTION)));

                                                                                                    if
                                                                                                    (lastPosRef.current
                                                                                                    !== null) {
                                                                                                    // Interpolate
                                                                                                    between last point
                                                                                                    and current point to
                                                                                                    prevent gaps
                                                                                                    const lastIdx =
                                                                                                    Math.max(0,
                                                                                                    Math.min(WAVE_RESOLUTION
                                                                                                    - 1,
                                                                                                    Math.floor(lastPosRef.current.pctX
                                                                                                    *
                                                                                                    WAVE_RESOLUTION)));
                                                                                                    const start =
                                                                                                    Math.min(lastIdx,
                                                                                                    currIdx);
                                                                                                    const end =
                                                                                                    Math.max(lastIdx,
                                                                                                    currIdx);

                                                                                                    for (let i = start;
                                                                                                    i <= end; i++) {
                                                                                                        const
                                                                                                        t=start===end ?
                                                                                                        0 : (i -
                                                                                                        lastIdx) /
                                                                                                        (currIdx -
                                                                                                        lastIdx);
                                                                                                        newArray[i]=lastPosRef.current.pctY
                                                                                                        + t * (pctY -
                                                                                                        lastPosRef.current.pctY);
                                                                                                        } } else {
                                                                                                        newArray[currIdx]=pctY;
                                                                                                        }
                                                                                                        onChange(newArray);
                                                                                                        lastPosRef.current={
                                                                                                        pctX, pctY }; }
                                                                                                        else if
                                                                                                        (mode.includes('digital'))

                                                                                                        segments=data.length;
                                                                                                        const
