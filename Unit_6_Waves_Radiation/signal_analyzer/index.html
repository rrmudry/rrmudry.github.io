<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unknown Signal Analyzer</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/unit6-favicon.svg">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .font-mono { font-family: 'Fira Code', monospace; }
        .grid-bg {
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(139, 92, 246, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(139, 92, 246, 0.1) 1px, transparent 1px);
        }
        .caliper {
            touch-action: none;
        }
        /* Dashboard-consistent Wave Background */
        .wave-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; opacity: 0.3; }
        .wave-layer { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background-repeat: repeat-x; background-position: 0 bottom; background-size: 100vw 320px; }
        .wave-1 { animation: wave-scroll 30s linear infinite; opacity: 0.15; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1440 320' preserveAspectRatio='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%238b5cf6' d='M0,192C240,160,480,240,720,192S1200,224,1440,192L1440,320L0,320Z'%3E%3C/path%3E%3C/svg%3E"); }
        @keyframes wave-scroll { 0% { background-position-x: 0; } 100% { background-position-x: 100vw; } }
    </style>
</head>
<body class="bg-slate-950">
    <div class="wave-bg">
        <div class="wave-layer wave-1"></div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const C = 299792458; // Speed of light in m/s
        const H = 6.626e-34; // Planck's constant in J*s

        const BANDS = ['Radio', 'Microwave', 'Infrared', 'Visible', 'UV', 'X-Ray', 'Gamma'];

        function determineEMBand(f) {
            if (f < 3e11) return "Radio";
            if (f < 1.2e13) return "Microwave";
            if (f < 4e14) return "Infrared";
            if (f < 7.5e14) return "Visible";
            if (f < 3e17) return "UV";
            if (f < 3e19) return "X-Ray";
            return "Gamma";
        }

        function formatScientific(num) {
            if (num === 0) return "0";
            if (Math.abs(num) >= 0.01 && Math.abs(num) < 100000) {
                return num.toPrecision(3);
            }
            let str = num.toExponential(2);
            return str.replace('e+', ' × 10^').replace('e', ' × 10^');
        }

        function parseStudentNumber(str) {
            if (!str) return NaN;
            let s = str.toLowerCase().replace(/x10\^/g, 'e').replace(/\*10\^/g, 'e').replace(/ /g, '');
            return parseFloat(s);
        }

        function generateProblem() {
            const logF = 4 + Math.random() * 14; 
            const f = Math.pow(10, logF);
            const w = C / f;
            const e = H * f;
            const band = determineEMBand(f);

            // Calculate grid scaling
            const rawBoxLength = w / 3;
            const exponent = Math.floor(Math.log10(rawBoxLength));
            const mantissa = rawBoxLength / Math.pow(10, exponent);
            
            let roundedMantissa = 1;
            if (mantissa >= 1.5 && mantissa < 3) roundedMantissa = 2;
            if (mantissa >= 3 && mantissa < 7) roundedMantissa = 5;
            if (mantissa >= 7) roundedMantissa = 10;
            
            const boxLength = roundedMantissa * Math.pow(10, exponent);

            return { f, w, e, band, boxLength };
        }

        function App() {
            const [problem, setProblem] = useState(() => generateProblem());
            const [isRunning, setIsRunning] = useState(true);
            
            // Caliper positions (pixels)
            const [caliper1, setCaliper1] = useState(100);
            const [caliper2, setCaliper2] = useState(300);
            
            // Inputs
            const [inputW, setInputW] = useState('');
            const [inputF, setInputF] = useState('');
            const [inputE, setInputE] = useState('');
            const [inputBand, setInputBand] = useState('');

            const [feedback, setFeedback] = useState(null);
            const [validationCode, setValidationCode] = useState(null);

            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            const draggingRef = useRef(null); // '1' or '2'

            // Physical canvas rendering
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let startTime = performance.now();

                const renderLoop = (time) => {
                    const rect = canvas.parentElement.getBoundingClientRect();
                    // Keep canvas native size matched to CSS pixel size for sharp rendering
                    if (canvas.width !== rect.width || canvas.height !== rect.height) {
                        canvas.width = rect.width;
                        canvas.height = rect.height;
                    }

                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // 10 boxes across
                    const gridBoxes = 10;
                    const boxPx = canvas.width / gridBoxes;

                    // Draw grid
                    ctx.strokeStyle = 'rgba(139, 92, 246, 0.15)';
                    ctx.lineWidth = 1;
                    for (let i = 0; i <= gridBoxes; i++) {
                        ctx.beginPath();
                        ctx.moveTo(i * boxPx, 0);
                        ctx.lineTo(i * boxPx, canvas.height);
                        ctx.stroke();
                    }
                    const vBoxes = Math.ceil(canvas.height / boxPx);
                    for (let i = 0; i <= vBoxes; i++) {
                        ctx.beginPath();
                        ctx.moveTo(0, i * boxPx);
                        ctx.lineTo(canvas.width, i * boxPx);
                        ctx.stroke();
                    }

                    // Center line
                    const cy = canvas.height / 2;
                    ctx.strokeStyle = 'rgba(139, 92, 246, 0.4)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, cy);
                    ctx.lineTo(canvas.width, cy);
                    ctx.stroke();

                    // Physics to pixels translation
                    // If 1 boxPx = problem.boxLength (m)
                    // The wavelength in pixels is w_px = (problem.w / problem.boxLength) * boxPx
                    const w_px = (problem.w / problem.boxLength) * boxPx;
                    
                    // Artificial animation speed: we want the wave to visibly move.
                    // Let's have it move 1 wavelength every 2 seconds.
                    const elapsed = time - startTime;
                    const phase = isRunning ? (elapsed / 2000) * 2 * Math.PI : 0; // phase shift

                    const amplitude = (canvas.height / 2) * 0.7;

                    ctx.beginPath();
                    ctx.strokeStyle = '#06b6d4'; // Cyan wave
                    ctx.lineWidth = 4;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    
                    for (let x = 0; x <= canvas.width; x++) {
                        // sin(kx - wt)
                        const y = cy + amplitude * Math.sin((2 * Math.PI * x / w_px) - phase);
                        if (x === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();

                    // Glow effect
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(6, 182, 212, 0.6)';
                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    if (isRunning) {
                        animationFrameId = requestAnimationFrame(renderLoop);
                    }
                };

                if (isRunning) {
                    animationFrameId = requestAnimationFrame(renderLoop);
                } else {
                    animationFrameId = requestAnimationFrame(renderLoop); // render once when paused
                }
                
                return () => cancelAnimationFrame(animationFrameId);
            }, [problem, isRunning]);

            // Dragging handlers
            const handlePointerDown = (e, index) => {
                draggingRef.current = index;
                e.target.setPointerCapture(e.pointerId);
            };

            const handlePointerMove = (e) => {
                if (!draggingRef.current || !containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                let x = e.clientX - rect.left;
                x = Math.max(0, Math.min(x, rect.width));
                if (draggingRef.current === 1) setCaliper1(x);
                if (draggingRef.current === 2) setCaliper2(x);
            };

            const handlePointerUp = (e) => {
                draggingRef.current = null;
                e.target.releasePointerCapture(e.pointerId);
            };

            // Calculations for UI readout
            const containerWidth = containerRef.current ? containerRef.current.getBoundingClientRect().width : 600;
            const boxPx = containerWidth / 10;
            const pxDistance = Math.abs(caliper2 - caliper1);
            const gridBoxesDistance = (pxDistance / boxPx).toFixed(2);

            const handleCheck = () => {
                const w = parseStudentNumber(inputW);
                const f = parseStudentNumber(inputF);
                const e = parseStudentNumber(inputE);
                const b = inputBand;

                let errors = [];

                if (isNaN(w) || Math.abs(w - problem.w) / problem.w > 0.05) {
                    errors.push("Wavelength calculation is incorrect. Did you measure the distance between crests and multiply by the grid scale?");
                }
                if (isNaN(f) || Math.abs(f - problem.f) / problem.f > 0.05) {
                    errors.push("Frequency calculation is incorrect. Remember f = c / λ. Use c = 3E8 m/s.");
                }
                if (isNaN(e) || Math.abs(e - problem.e) / problem.e > 0.05) {
                    errors.push("Energy calculation is incorrect. Remember E = hf. Use h = 6.626E-34 J·s.");
                }
                if (b !== problem.band) {
                    errors.push(`Band is incorrect. A wave with this frequency is not in the ${b} range.`);
                }

                if (errors.length === 0) {
                    setFeedback({ type: 'success', text: "All calculations correct! Validation code generated." });
                    setValidationCode(`WAVE-${Math.floor(Math.random() * 100000).toString(16).toUpperCase()}-${Math.floor(problem.f/1e10).toString(16).toUpperCase().substring(0,3)}`);
                } else {
                    setFeedback({ type: 'error', text: errors[0] });
                    setValidationCode(null);
                }
            };

            const handleReset = () => {
                setProblem(generateProblem());
                setInputW('');
                setInputF('');
                setInputE('');
                setInputBand('');
                setFeedback(null);
                setValidationCode(null);
            };

            return (
                <div className="min-h-screen py-10 px-4 md:px-8 max-w-7xl mx-auto flex flex-col gap-8">
                    <header className="mb-2">
                        <h1 className="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-violet-400">Unknown Signal Analyzer</h1>
                        <p className="text-slate-400 mt-2">Intercept, measure, and decode the incoming electromagnetic transmission.</p>
                    </header>

                    <div className="grid lg:grid-cols-3 gap-8">
                        {/* LEFT: Oscilloscope */}
                        <div className="lg:col-span-2 space-y-4">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 shadow-2xl relative">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-bold text-cyan-500 font-mono tracking-wider">OSCILLOSCOPE</h2>
                                    <button 
                                        onClick={() => setIsRunning(!isRunning)}
                                        className="px-4 py-1.5 rounded-full text-sm font-bold border border-slate-600 hover:bg-slate-700 transition"
                                    >
                                        {isRunning ? "❚❚ Freeze Frame" : "▶ Resume Sweep"}
                                    </button>
                                </div>

                                <div 
                                    className="relative w-full h-[350px] bg-slate-950 rounded-xl overflow-hidden border border-slate-800"
                                    ref={containerRef}
                                >
                                    <canvas ref={canvasRef} className="absolute inset-0 w-full h-full" />
                                    
                                    {/* Calipers */}
                                    <div 
                                        className="caliper absolute top-0 bottom-0 w-6 -ml-3 cursor-ew-resize flex justify-center group z-20"
                                        style={{ transform: `translateX(${caliper1}px)` }}
                                        onPointerDown={(e) => handlePointerDown(e, 1)}
                                        onPointerMove={handlePointerMove}
                                        onPointerUp={handlePointerUp}
                                        onPointerCancel={handlePointerUp}
                                    >
                                        <div className="w-1 h-full bg-violet-500/80 group-hover:bg-violet-400 group-hover:shadow-[0_0_10px_#a855f7]"></div>
                                        <div className="absolute top-1/2 -translate-y-1/2 w-4 h-8 bg-violet-600 rounded flex items-center justify-center border border-violet-400">
                                            <div className="w-1 h-4 border-l border-r border-violet-300"></div>
                                        </div>
                                    </div>
                                    <div 
                                        className="caliper absolute top-0 bottom-0 w-6 -ml-3 cursor-ew-resize flex justify-center group z-20"
                                        style={{ transform: `translateX(${caliper2}px)` }}
                                        onPointerDown={(e) => handlePointerDown(e, 2)}
                                        onPointerMove={handlePointerMove}
                                        onPointerUp={handlePointerUp}
                                        onPointerCancel={handlePointerUp}
                                    >
                                        <div className="w-1 h-full bg-cyan-500/80 group-hover:bg-cyan-400 group-hover:shadow-[0_0_10px_#22d3ee]"></div>
                                        <div className="absolute top-1/2 -translate-y-1/2 w-4 h-8 bg-cyan-600 rounded flex items-center justify-center border border-cyan-400">
                                            <div className="w-1 h-4 border-l border-r border-cyan-300"></div>
                                        </div>
                                    </div>

                                    {/* Distance Readout Bubble */}
                                    {(containerWidth > 0 && Math.abs(caliper1 - caliper2) > 10) && (
                                        <div 
                                            className="absolute top-4 px-3 py-1 bg-slate-800/90 border border-slate-600 rounded text-cyan-300 font-mono text-sm pointer-events-none"
                                            style={{ left: `${Math.min(caliper1, caliper2) + pxDistance/2}px`, transform: 'translateX(-50%)' }}
                                        >
                                            Δx = {gridBoxesDistance} grids
                                        </div>
                                    )}
                                </div>

                                <div className="mt-4 flex justify-between items-center text-sm">
                                    <div className="bg-slate-800 px-4 py-2 rounded-lg border border-slate-700">
                                        <span className="text-slate-400">Scale: </span>
                                        <span className="font-mono text-violet-300 font-bold">1 Grid Square = {formatScientific(problem.boxLength)} m</span>
                                    </div>
                                    <button 
                                        onClick={handleReset}
                                        className="text-slate-400 hover:text-white underline text-sm"
                                    >
                                        Acquire New Target Signal
                                    </button>
                                </div>
                            </div>

                            <div className="bg-cyan-900/10 border border-cyan-500/20 rounded-xl p-5">
                                <h3 className="text-cyan-400 font-bold flex items-center gap-2">
                                    <span>ℹ️</span> Instructions
                                </h3>
                                <ol className="list-decimal list-inside mt-2 text-sm text-slate-300 space-y-1 leading-relaxed">
                                    <li>Click <strong>Freeze Frame</strong> to stop the wave animation.</li>
                                    <li>Drag the vertical calipers to match two consecutive crests to measure the wavelength visually.</li>
                                    <li>Multiply your measured "grid squares" by the <em>Scale</em> provided below the screen to find the exact Wavelength (λ) in meters.</li>
                                    <li>Calculate Frequency (f = c/λ) and Energy (E = hf).</li>
                                    <li>Identify the EM Band it belongs to and submit!</li>
                                </ol>
                                <p className="text-xs text-slate-500 mt-3 font-mono">c = 3.00 × 10^8 m/s  |  h = 6.626 × 10^-34 J·s</p>
                            </div>
                        </div>

                        {/* RIGHT: Data Entry */}
                        <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 shadow-2xl flex flex-col">
                            <h2 className="text-xl font-bold text-violet-400 mb-6 border-b border-slate-700 pb-2">Analysis Report</h2>

                            <div className="space-y-5 flex-grow">
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">1. Wavelength (λ) in meters</label>
                                    <input 
                                        type="text" 
                                        value={inputW}
                                        onChange={e => setInputW(e.target.value)}
                                        placeholder="e.g. 5.5e-7"
                                        className="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white font-mono focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">2. Frequency (f) in Hz</label>
                                    <input 
                                        type="text" 
                                        value={inputF}
                                        onChange={e => setInputF(e.target.value)}
                                        placeholder="e.g. 3e14"
                                        className="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white font-mono focus:border-violet-500 focus:ring-1 focus:ring-violet-500 outline-none transition"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">3. Energy (E) in Joules</label>
                                    <input 
                                        type="text" 
                                        value={inputE}
                                        onChange={e => setInputE(e.target.value)}
                                        placeholder="e.g. 4.5e-19"
                                        className="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white font-mono focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">4. EM Spectrum Category</label>
                                    <select 
                                        value={inputBand}
                                        onChange={e => setInputBand(e.target.value)}
                                        className="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition"
                                    >
                                        <option value="" disabled>Select Band...</option>
                                        {BANDS.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>
                                </div>
                            </div>

                            {feedback && (
                                <div className={`mt-6 p-4 rounded-xl border ${feedback.type === 'success' ? 'bg-emerald-900/20 border-emerald-500/50 text-emerald-300' : 'bg-rose-900/20 border-rose-500/50 text-rose-300'}`}>
                                    <p className="text-sm font-semibold">{feedback.text}</p>
                                </div>
                            )}

                            {validationCode && (
                                <div className="mt-4 p-5 bg-gradient-to-r from-violet-900 to-indigo-900 rounded-xl border border-violet-500 shadow-lg text-center animate-in zoom-in">
                                    <p className="text-xs text-indigo-300 uppercase tracking-widest font-bold mb-1">Validation Code</p>
                                    <p className="text-2xl font-mono text-white tracking-widest selection:bg-cyan-500">{validationCode}</p>
                                </div>
                            )}

                            <button 
                                onClick={handleCheck}
                                className="w-full mt-6 bg-gradient-to-r from-cyan-600 to-violet-600 hover:from-cyan-500 hover:to-violet-500 text-white font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(139,92,246,0.3)] transition-all active:scale-95"
                            >
                                Verify & Dispatch Data
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
