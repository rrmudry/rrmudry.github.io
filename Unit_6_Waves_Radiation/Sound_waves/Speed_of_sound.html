    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            projectId: "site-6e500",
            appId: "1:591530758858:web:1996cdca7316ffc3781a33",
            storageBucket: "site-6e500.firebasestorage.app",
            apiKey: "AIzaSyAji2nTjD2dbmzgk8gySWCy-aiQyKvR1i4",
            authDomain: "site-6e500.firebaseapp.com",
            messagingSenderId: "591530758858"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const state = {
            name: '',
            id: '',
            period: null,
            assignmentName: "Physics 101: Speed of Sound",
            stormTrials: 0, // Out of 10 (5 side + 5 fp)
            waveTrials: 0,  // Out of 5
            score: 0,
            isSyncing: false,
            needsSync: false
        };

        async function handleLogin() {
            const id = document.getElementById('student-id').value.trim();
            const nameEntry = document.getElementById('name-entry');
            const status = document.getElementById('login-status');
            const btn = document.getElementById('login-btn');

            if (id.length !== 6) { return; }
            btn.disabled = true;
            status.textContent = "SEARCHING_NODE...";

            try {
                const urlParams = new URLSearchParams(window.location.search);
                const urlPeriod = urlParams.get('p') || urlParams.get('period');

                // 1. Check Roster
                const rosterSnap = await db.collection('roster').doc(id).get();

                if (rosterSnap.exists) {
                    const data = rosterSnap.data();
                    state.name = data.full_name;
                    state.id = id;
                    state.period = urlPeriod || data.class_period || null;
                    
                    // 2. Check for existing progress
                    const progressSnap = await db.collection('student_results').doc(state.assignmentName).collection('students').doc(id).get();

                    if (progressSnap.exists) {
                        const assignmentData = progressSnap.data();
                        if (assignmentData && assignmentData.details) {
                            currentTrial = assignmentData.details.sideTrials || 1;
                            currentFPTrial = assignmentData.details.fpTrials || 1;
                            currentWaveTrial = assignmentData.details.waveTrials || 1;
                            
                            // If they were in FP mode, restore that
                            if (currentTrial > 5 && currentFPTrial <= 5) {
                                stormMode = 'fp';
                            }
                        }
                    }
                    status.textContent = "ID_VERIFIED // LOADING_STATE";
                    setTimeout(finalizeLogin, 800);
                } else if (nameEntry.classList.contains('hidden')) {
                    nameEntry.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = "REGISTER PROFILE";
                    status.textContent = "NEW_NODE_DETECTED";
                } else {
                    const newName = document.getElementById('student-name').value.trim();
                    if (newName.length < 3) return;
                    state.name = newName;
                    state.id = id;
                    state.period = urlPeriod || null;
                    finalizeLogin();
                }
            } catch (err) {
                console.error(err);
                btn.disabled = false;
                status.textContent = "CONNECTION_ERROR";
            }
        }

        async function devSimulateComplete() {
            const id = document.getElementById('student-id').value.trim() || '999999';
            state.id = id;
            state.name = "MR. MUDRY (SIM)";
            state.period = "0";
            
            // Set all trials to completion state
            currentTrial = 6;
            currentFPTrial = 6;
            currentWaveTrial = 6;
            trialCompleted = true;
            waveIsMatched = true;
            
            finalizeLogin();
            await syncResults();
        }

        function finalizeLogin() {
            document.getElementById('login-overlay').classList.add('hidden');
            
            if (state.id) {
                document.getElementById('student-tag').textContent = `${state.name.toUpperCase()} // SIG_${state.id}`;
            }
            
            // Re-sync trial UI counters from loaded state
            document.getElementById('trial-counter').innerText = `(Trial ${currentTrial > 5 ? 5 : currentTrial} of 5)`;
            document.getElementById('fp-trial-counter').innerText = `(Trial ${currentFPTrial > 5 ? 5 : currentFPTrial} of 5)`;
            document.getElementById('wave-trial-counter').innerText = `(Trial ${currentWaveTrial > 5 ? 5 : currentWaveTrial} of 5)`;
            
            // Set correct initial tab based on progress
            if (currentTrial <= 5) {
                switchTab('task1');
            } else if (currentFPTrial <= 5) {
                switchTab('task2');
            } else {
                switchTab('task3');
            }

            loadWaveProfile();

            // Initial sync
            syncResults(true);
        }

        async function syncResults(isSilent = false) {
            if (!state.id) return;
            if (state.isSyncing) { state.needsSync = true; return; }
            state.isSyncing = true; state.needsSync = false;

            try {
                // Calculate score: Each task completed counts as 5, incomplete tasks count (trial-1)
                const sideFin = (currentTrial > 5) ? 5 : (currentTrial - 1 + (trialCompleted && stormMode === 'side' ? 1 : 0));
                const fpFin = (currentFPTrial > 5) ? 5 : (currentFPTrial - 1 + (trialCompleted && stormMode === 'fp' ? 1 : 0));
                const waveFin = (currentWaveTrial > 5) ? 5 : (currentWaveTrial - 1 + (waveIsMatched ? 1 : 0));
                
                const totalFinished = sideFin + fpFin + waveFin;
                state.score = Math.round((totalFinished / 15) * 100);

                const payload = {
                    student_name: state.name,
                    student_id: state.id,
                    class_period: state.period,
                    assignment_name: state.assignmentName,
                    score: state.score,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    details: { 
                        sideTrials: currentTrial, 
                        fpTrials: currentFPTrial, 
                        waveTrials: currentWaveTrial,
                        ts: new Date().toISOString() 
                    }
                };

                const batch = db.batch();
                // 1. Live Session Node (Nested)
                const liveRef = db.collection('student_results').doc(state.assignmentName).collection('students').doc(state.id);
                batch.set(liveRef, payload, { merge: true });

                // 2. Archive Node (Flat)
                const archiveRef = db.collection('student_results_archive').doc(`${state.id}_${state.assignmentName}`);
                batch.set(archiveRef, payload, { merge: true });

                await batch.commit();
                
                document.getElementById('sync-indicator').textContent = "Database_Secure";

                // Update tab checkmarks
                if (currentTrial > 5) document.getElementById('check-task1').classList.remove('hidden');
                if (currentFPTrial > 5) document.getElementById('check-task2').classList.remove('hidden');
                if (currentWaveTrial > 5) document.getElementById('check-task3').classList.remove('hidden');

                if (state.score >= 100) {
                    document.getElementById('final-score-display').textContent = "100%";
                    document.getElementById('completion-overlay').classList.remove('hidden');
                }
            } catch (e) {
                console.error("Sync Error:", e);
            } finally {
                state.isSyncing = false;
                if (state.needsSync) syncResults();
            }
        }

        let calcInstance = null;
        let activeTab = 'storm'; // Track which canvas should be rendering

        // Initialize App once loaded
        window.onload = () => {
            // Init Desmos
            const elt = document.getElementById('desmos-container');
            calcInstance = window.Desmos.FourFunctionCalculator(elt);

            // Init Wave Matcher variables
            loadWaveProfile();

            // Randomize first cloud position
            cloudX = Math.floor(Math.random() * 320) + 40;

            // Start Animation loops
            requestAnimationFrame(animateStorm);
            requestAnimationFrame(animateWave);
        };

        // --- GLOBAL LOGIC ---
        let desmosMonitorInterval = null;

        function switchTab(tab) {
            activeTab = (tab === 'task3') ? 'wave' : 'storm'; 
            if (desmosMonitorInterval) clearInterval(desmosMonitorInterval);

            // Hide everything first
            document.getElementById('sec-storm').classList.add('hidden');
            document.getElementById('sec-wave').classList.add('hidden');
            document.getElementById('side-controls').classList.add('hidden');
            document.getElementById('fp-controls').classList.add('hidden');

            // Reset tab styles
            ['task1', 'task2', 'task3'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = "px-2.5 py-1.5 rounded-md font-bold transition-all bg-slate-700 text-slate-400 hover:bg-slate-600 flex items-center justify-center gap-1.5";
            });

            // Activate specific content
            const activeBtn = document.getElementById(`tab-${tab}`);
            activeBtn.className = "px-2.5 py-1.5 rounded-md font-bold transition-all bg-blue-600 text-white shadow-md flex items-center justify-center gap-1.5";

            if (tab === 'task1') {
                stormMode = 'side';
                document.getElementById('sec-storm').classList.remove('hidden');
                document.getElementById('side-controls').classList.remove('hidden');
            } else if (tab === 'task2') {
                stormMode = 'fp';
                document.getElementById('sec-storm').classList.remove('hidden');
                document.getElementById('fp-controls').classList.remove('hidden');
                startFirstPerson(); // Ensure UI state is refreshed for FP
            } else if (tab === 'task3') {
                document.getElementById('sec-wave').classList.remove('hidden');
            }
        }

        function verifyDesmosWork(requiredNumber1, requiredNumber2) {
            if (!calcInstance) return false;
            let expressions = [];
            if (typeof calcInstance.getExpressions === 'function') {
                expressions = calcInstance.getExpressions();
            } else if (typeof calcInstance.getState === 'function') {
                const state = calcInstance.getState();
                expressions = state?.expressions?.list || [];
            }

            const num1Str = requiredNumber1.toString();
            const num2Str = requiredNumber2.toString();

            for (let exp of expressions) {
                if (exp.latex && exp.latex.includes(num1Str) && exp.latex.includes(num2Str)) {
                    return true;
                }
            }
            return false;
        }

        // Monitors the calculator actively and triggers a callback when work is shown
        function startDesmosMonitor(num1, num2, unlockCallback) {
            if (desmosMonitorInterval) clearInterval(desmosMonitorInterval);
            desmosMonitorInterval = setInterval(() => {
                if (verifyDesmosWork(num1, num2)) {
                    clearInterval(desmosMonitorInterval);
                    desmosMonitorInterval = null;
                    unlockCallback();
                }
            }, 500); // Check every half second
        }

        function unlockStormAssessment() {
            const titleEl = document.getElementById('storm-assessment-title');
            titleEl.innerHTML = 'Assessment Unlocked 🔓';
            titleEl.classList.remove('text-blue-300');
            titleEl.classList.add('text-green-400');
            document.getElementById('storm-answer').disabled = false;
            document.getElementById('btn-storm-submit').disabled = false;
        }

        function unlockWaveAssessment() {
            const titleEl = document.getElementById('wave-assessment-title');
            titleEl.innerHTML = 'Assessment Unlocked 🔓';
            titleEl.classList.remove('text-blue-300');
            titleEl.classList.add('text-green-400');
            document.getElementById('wave-answer').disabled = false;
            document.getElementById('btn-wave-submit').disabled = false;
        }

        function showFeedback(elId, isSuccess, message) {
            const el = document.getElementById(elId);
            el.innerHTML = message;
            el.className = `p-3 rounded-md text-sm font-semibold animate-fade-in flex-1 ${isSuccess ? 'bg-green-900/50 text-green-300' : 'bg-red-900/50 text-red-300'}`;
        }

        function toggleStormHelp() {
            document.getElementById('storm-help-card').classList.toggle('hidden');
        }

        function toggleWaveHelp() {
            document.getElementById('wave-help-card').classList.toggle('hidden');
        }

        // --- AUDIO ENGINE ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        async function playThunder() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            const t = audioCtx.currentTime;

            // Create a rumbling, dissonant sound
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(40, t);
            osc1.frequency.exponentialRampToValueAtTime(10, t + 2.5);

            osc2.type = 'square';
            osc2.frequency.setValueAtTime(35, t);
            osc2.frequency.exponentialRampToValueAtTime(12, t + 2.5);

            gainNode.gain.setValueAtTime(0.8, t);
            gainNode.gain.linearRampToValueAtTime(1.2, t + 0.1);
            gainNode.gain.exponentialRampToValueAtTime(0.01, t + 2.5);

            osc1.connect(gainNode);
            osc2.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc1.start(t);
            osc2.start(t);
            osc1.stop(t + 2.5);
            osc2.stop(t + 2.5);
        }

        // NEW SYNTHESIZER FUNCTIONS
        function playTargetSound() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const profile = waveProfiles[currentWaveTrial - 1];
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.frequency.setValueAtTime(profile.freq, t);

            // Procedurally generate timbres based on the profile type
            if (profile.type === 'bass') {
                osc.type = 'triangle';
                gain.gain.setValueAtTime(1, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 1.5);
                osc.start(t);
                osc.stop(t + 1.5);
            } else if (profile.type === 'piano') {
                osc.type = 'sine';
                gain.gain.setValueAtTime(1, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 2);
                osc.start(t);
                osc.stop(t + 2);
            } else if (profile.type === 'frog') {
                osc.type = 'square';
                gain.gain.setValueAtTime(0, t);
                // Tremolo effect for croaking
                for (let i = 0; i < 4; i++) {
                    gain.gain.linearRampToValueAtTime(0.5, t + i * 0.2 + 0.05);
                    gain.gain.linearRampToValueAtTime(0, t + i * 0.2 + 0.15);
                }
                osc.start(t);
                osc.stop(t + 0.8);
            } else if (profile.type === 'fork') {
                osc.type = 'sine';
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.8, t + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.1, t + 2.5);
                osc.start(t);
                osc.stop(t + 2.5);
            } else if (profile.type === 'bird') {
                osc.type = 'sine';
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.8, t + 0.05);
                gain.gain.linearRampToValueAtTime(0, t + 0.2);
                // Pitch sweep up for a chirp
                osc.frequency.linearRampToValueAtTime(profile.freq + 200, t + 0.2);
                osc.start(t);
                osc.stop(t + 0.2);
            }
        }

        function playUserSound() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(userFreq, t);
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.8, t + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 1);
            osc.start(t);
            osc.stop(t + 1);
        }

        // --- PART 1: STORM TRACKER LOGIC ---
        let stormMode = 'side'; // 'side' or 'fp'
        let currentTrial = 1;
        let currentFPTrial = 1;
        let trialCompleted = false;
        let currentFPDistance = 0;

        // Side view variables
        let cloudX = 100;
        let stormStatus = 'idle';
        let userTime = null;
        let stormStartTime = null;
        let waveRadius = 0;
        let flashOpacity = 0;
        let lightningPath = [];
        const HOUSE_X = 500;
        const PIXELS_PER_SECOND = 120;

        // First Person variables
        let stopwatchRunning = false;
        let stopwatchStartTime = null;

        function drawStormCanvas() {
            const canvas = document.getElementById('storm-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            if (stormMode === 'side') {
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, canvas.height - 30, canvas.width, 30); // 30px tall ground

                // Draw cloud emoji
                ctx.font = '70px Arial';
                ctx.fillText('☁️', cloudX - 35, 70); // Base of cloud adjusted for height

                if (flashOpacity > 0) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${flashOpacity * 0.3})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    if (lightningPath.length > 0) {
                        ctx.beginPath();
                        ctx.moveTo(lightningPath[0].x, lightningPath[0].y);
                        for (let i = 1; i < lightningPath.length; i++) {
                            ctx.lineTo(lightningPath[i].x, lightningPath[i].y);
                        }
                        ctx.strokeStyle = `rgba(147, 197, 253, ${flashOpacity})`;
                        ctx.lineWidth = 6;
                        ctx.lineJoin = 'miter';
                        ctx.stroke();
                        ctx.strokeStyle = `rgba(255, 255, 255, ${flashOpacity})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    flashOpacity -= 0.04;
                }

                ctx.font = '35px Arial'; // Smaller house text
                ctx.fillText('🏠', HOUSE_X, canvas.height - 25);

                if (waveRadius > 0) {
                    ctx.beginPath();
                    ctx.arc(cloudX, 40, waveRadius, 0, Math.PI * 2); // Center of wave adjusted
                    ctx.strokeStyle = 'rgba(96, 165, 250, 0.6)';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(96, 165, 250, 0.1)';
                    ctx.fill();
                }
            }
            else if (stormMode === 'fp') {
                // First Person Window View
                ctx.fillStyle = '#0f172a'; // dark night
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw ground silhouette adjusted for new height
                ctx.fillStyle = '#020617';
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                ctx.lineTo(0, canvas.height - 40);
                ctx.lineTo(200, canvas.height - 60);
                ctx.lineTo(400, canvas.height - 30);
                ctx.lineTo(700, canvas.height - 70);
                ctx.lineTo(700, canvas.height);
                ctx.fill();

                if (flashOpacity > 0) {
                    // Bright flash covers outside window
                    ctx.fillStyle = `rgba(255, 255, 255, ${flashOpacity})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    flashOpacity -= 0.04;
                }

                // Draw Window Frame (Foreground)
                ctx.fillStyle = '#1e293b'; // slate-800
                ctx.fillRect(0, 0, canvas.width, 20); // Top
                ctx.fillRect(0, canvas.height - 20, canvas.width, 20); // Bottom
                ctx.fillRect(0, 0, 20, canvas.height); // Left
                ctx.fillRect(canvas.width - 20, 0, 20, canvas.height); // Right
                ctx.fillRect(canvas.width / 2 - 10, 0, 20, canvas.height); // Middle vertical
                ctx.fillRect(0, canvas.height / 2 - 10, canvas.width, 20); // Middle horizontal
            }
        }

        function animateStorm(time) {
            // ONLY draw if the tab is visible to save CPU!
            if (activeTab === 'storm') {
                if (stormStatus === 'running' && stormMode === 'side') {
                    if (!stormStartTime) stormStartTime = time;
                    const elapsedSeconds = (time - stormStartTime) / 1000;
                    waveRadius = elapsedSeconds * PIXELS_PER_SECOND;
                }
                drawStormCanvas();
            }
            requestAnimationFrame(animateStorm);
        }

        // --- SIDE VIEW MECHANICS ---
        function triggerLightning() {
            if (desmosMonitorInterval) clearInterval(desmosMonitorInterval);
            if (trialCompleted) {
                if (currentTrial === 5) {
                    startFirstPerson();
                    return;
                }
                currentTrial++;
                document.getElementById('trial-counter').innerText = `(Trial ${currentTrial} of 5)`;
                trialCompleted = false;
            }

            // Clean state for new trial
            userTime = null;
            document.getElementById('storm-time-display').innerText = 't = 0.00 s';

            stormStatus = 'waiting';
            userTime = null;
            waveRadius = 0;
            stormStartTime = null;
            lightningPath = [];

            // Randomize cloud position (between 40 and 360)
            cloudX = Math.floor(Math.random() * 320) + 40;

            document.getElementById('storm-assessment').classList.add('hidden');
            document.getElementById('storm-feedback').classList.add('hidden');
            document.getElementById('storm-answer').value = '';

            const btnT = document.getElementById('btn-trigger');
            const btnS = document.getElementById('btn-stop');
            btnT.disabled = true;
            btnT.innerText = 'Wait for Flash...';
            btnT.className = "px-5 py-1.5 bg-amber-500 hover:bg-amber-400 text-slate-900 text-sm font-bold rounded-md disabled:opacity-50 transition-all";
            btnS.disabled = true;

            setTimeout(() => {
                let curX = cloudX;
                let curY = 40; // Start lightning at wave center
                lightningPath.push({ x: curX, y: curY });
                while (curY < 130) { // Bound to ground level
                    curX += (Math.random() - 0.5) * 60;
                    curY += Math.random() * 30 + 10;
                    if (curY > 130) curY = 130;
                    lightningPath.push({ x: curX, y: curY });
                }

                flashOpacity = 1;
                playThunder();
                stormStatus = 'running';
                stormStartTime = performance.now();
                btnT.innerText = 'Trigger Lightning';
                btnS.disabled = false;
            }, 1000 + Math.random() * 2000);
        }

        function stopTimer() {
            if (stormStatus !== 'running') return;
            const stopT = performance.now();
            const elapsed = ((stopT - stormStartTime) / 1000).toFixed(2);
            userTime = parseFloat(elapsed);
            stormStatus = 'done';

            document.getElementById('storm-time-display').innerText = `t = ${userTime} s`;
            document.getElementById('btn-trigger').disabled = false;
            document.getElementById('btn-stop').disabled = true;

            // Strictly reset UI locks
            const titleEl = document.getElementById('storm-assessment-title');
            titleEl.innerHTML = 'Assessment Locked 🔒';
            titleEl.classList.remove('text-green-400');
            titleEl.classList.add('text-blue-300');
            document.getElementById('storm-answer').disabled = true;
            document.getElementById('btn-storm-submit').disabled = true;

            document.getElementById('storm-assessment-text').innerHTML = `You stopped the timer at <strong>${userTime} seconds</strong>. Using the Desmos calculator on the right, calculate the distance (<i>d = v &times; t</i>). You MUST show your work in the calculator to unlock the answer box.`;
            document.getElementById('storm-assessment').classList.remove('hidden');

            document.getElementById('btn-storm-help').classList.remove('hidden');
            document.getElementById('storm-help-card').classList.add('hidden');
            document.getElementById('storm-help-content').innerHTML = `
                <p class="mb-2">To find the distance, multiply the speed of sound and your measured time:</p>
                <div class="bg-slate-900 p-2 rounded font-mono text-center text-blue-300 border border-slate-700">
                    d = 343 &times; ${userTime}
                </div>
            `;

            startDesmosMonitor(343, userTime, unlockStormAssessment);
        }

        // --- FIRST PERSON MECHANICS ---
        function startFirstPerson() {
            if (desmosMonitorInterval) clearInterval(desmosMonitorInterval);
            stormMode = 'fp';
            trialCompleted = false;

            document.getElementById('storm-mode-title').innerHTML = `Task 2: First Person Lightning <span id="fp-trial-counter" class="text-sm font-normal text-amber-400 ml-2">(Trial 1 of 5)</span>`;
            document.getElementById('storm-desc').innerText = "Look out the window. When you SEE the flash, manually START the stopwatch. When you HEAR the thunder, STOP it.";

            document.getElementById('side-controls').classList.add('hidden');
            document.getElementById('fp-controls').classList.remove('hidden');

            document.getElementById('storm-assessment').classList.add('hidden');
            document.getElementById('storm-feedback').classList.add('hidden');
            document.getElementById('storm-answer').value = '';

            drawStormCanvas();
        }

        function triggerFPStorm() {
            initAudio(); // Ensure audio context is ready
            if (desmosMonitorInterval) clearInterval(desmosMonitorInterval);

            if (trialCompleted) {
                if (currentFPTrial >= 5) return;
                currentFPTrial++;
                document.getElementById('fp-trial-counter').innerText = `(Trial ${currentFPTrial} of 5)`;
                trialCompleted = false;
            }

            // Clean state for new trial
            userTime = null;
            document.getElementById('fp-time-display').innerText = 't = 0.00 s';

            document.getElementById('storm-assessment').classList.add('hidden');
            document.getElementById('storm-feedback').classList.add('hidden');
            document.getElementById('storm-answer').value = '';

            const btnT = document.getElementById('btn-fp-trigger');
            const btnSW = document.getElementById('btn-fp-stopwatch');
            btnT.disabled = true;
            btnT.innerText = "Observing...";
            btnT.className = "px-5 py-1.5 bg-amber-500 hover:bg-amber-400 text-slate-900 text-sm font-bold rounded-md disabled:opacity-50 transition-all";

            // Random distance between 1000m and 3500m
            currentFPDistance = Math.floor(Math.random() * 2500) + 1000;
            const timeDelay = currentFPDistance / 343; // seconds

            setTimeout(() => {
                flashOpacity = 1;
                btnSW.disabled = false; // Enable stopwatch for user to start

                // Schedule thunder
                setTimeout(() => {
                    playThunder();
                }, timeDelay * 1000);

            }, 1000 + Math.random() * 2000);
        }

        function toggleStopwatch() {
            const btnSW = document.getElementById('btn-fp-stopwatch');

            if (!stopwatchRunning) {
                // START STOPWATCH
                stopwatchStartTime = performance.now();
                stopwatchRunning = true;
                btnSW.innerText = 'Stop Stopwatch';
                btnSW.classList.replace('bg-green-500', 'bg-red-500');
                requestAnimationFrame(updateStopwatch);
            } else {
                // STOP STOPWATCH
                stopwatchRunning = false;
                const elapsed = ((performance.now() - stopwatchStartTime) / 1000).toFixed(2);
                userTime = parseFloat(elapsed);

                // FORCE DISPLAY UPDATE to match the exact recorded time
                document.getElementById('fp-time-display').innerText = `t = ${userTime.toFixed(2)} s`;

                btnSW.innerText = 'Done';
                btnSW.disabled = true;
                btnSW.classList.replace('bg-red-500', 'bg-slate-500');

                // Strictly reset UI locks
                const titleEl = document.getElementById('storm-assessment-title');
                titleEl.innerHTML = 'Assessment Locked 🔒';
                titleEl.classList.remove('text-green-400');
                titleEl.classList.add('text-blue-300');
                document.getElementById('storm-answer').disabled = true;
                document.getElementById('btn-storm-submit').disabled = true;

                document.getElementById('storm-assessment-text').innerHTML = `You stopped your stopwatch at <strong>${userTime} seconds</strong>. Using the Desmos calculator on the right, calculate the actual distance of the lightning strike (<i>d = v &times; t</i>). You MUST show your work to unlock the answer box!`;
                document.getElementById('storm-assessment').classList.remove('hidden');

                document.getElementById('btn-storm-help').classList.remove('hidden');
                document.getElementById('storm-help-card').classList.add('hidden');
                document.getElementById('storm-help-content').innerHTML = `
                    <p class="mb-2">To find the distance, multiply the speed of sound and your measured time:</p>
                    <div class="bg-slate-900 p-2 rounded font-mono text-center text-blue-300 border border-slate-700">
                        d = 343 &times; ${userTime}
                    </div>
                `;

                startDesmosMonitor(343, userTime, unlockStormAssessment);
            }
        }

        function updateStopwatch() {
            if (stopwatchRunning) {
                const elapsed = ((performance.now() - stopwatchStartTime) / 1000).toFixed(2);
                document.getElementById('fp-time-display').innerText = `t = ${elapsed} s`;
                requestAnimationFrame(updateStopwatch);
            }
        }

        function resetStormTrial() {
            if (desmosMonitorInterval) clearInterval(desmosMonitorInterval);
            
            // Clean up states
            stormStatus = 'idle';
            userTime = null;
            waveRadius = 0;
            stormStartTime = null;
            lightningPath = [];
            stopwatchRunning = false;

            // Reset UI
            document.getElementById('storm-assessment').classList.add('hidden');
            document.getElementById('storm-feedback').classList.add('hidden');
            document.getElementById('btn-storm-help').classList.add('hidden');
            document.getElementById('storm-help-card').classList.add('hidden');
            document.getElementById('storm-answer').value = '';
            document.getElementById('storm-answer').disabled = true;
            document.getElementById('btn-storm-submit').disabled = true;
            
            // Reset Time Displays
            document.getElementById('storm-time-display').innerText = 't = 0.00 s';
            document.getElementById('fp-time-display').innerText = 't = 0.00 s';

            // Re-enable primary trigger buttons
            const btnT = document.getElementById('btn-trigger');
            btnT.disabled = false;
            btnT.innerText = 'Trigger Lightning';
            btnT.className = "px-5 py-1.5 bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold rounded-md disabled:opacity-50 transition-all text-sm";
            
            const btnFPT = document.getElementById('btn-fp-trigger');
            btnFPT.disabled = false;
            btnFPT.innerText = 'Observe Window';
            
            const btnSW = document.getElementById('btn-fp-stopwatch');
            btnSW.disabled = true;
            btnSW.innerText = 'Start Stopwatch';
            btnSW.classList.remove('bg-red-500', 'bg-slate-500');
            btnSW.classList.add('bg-green-500');

            // Redraw canvas
            drawStormCanvas();
        }

        // --- ANSWER CHECKING ---
        function checkStormAnswer() {
            if (!userTime) return;

            // 1. Validate the accuracy of the user's timing
            let expectedTime = 0;
            let tolerance = 0;
            if (stormMode === 'side') {
                // Ground limit is 130, Wave start is 40
                const trueDistancePx = Math.hypot((HOUSE_X + 15) - cloudX, 130 - 40);
                expectedTime = trueDistancePx / PIXELS_PER_SECOND;
                tolerance = 0.3;
            } else {
                expectedTime = currentFPDistance / 343;
                tolerance = 0.5; // 500ms tolerance for human auditory reaction
            }

            if (Math.abs(userTime - expectedTime) > tolerance) {
                showFeedback('storm-feedback', false, `❌ Your stopwatch timing was inaccurate (expected ~${expectedTime.toFixed(2)}s). You stopped it too ${userTime < expectedTime ? 'early' : 'late'}! Use the **Reset Strike** button to try again.`);
                const btnT = stormMode === 'side' ? document.getElementById('btn-trigger') : document.getElementById('btn-fp-trigger');
                btnT.disabled = false;
                btnT.innerText = 'Retry Strike';
                return;
            }

            const userDistance = parseFloat(document.getElementById('storm-answer').value);
            if (isNaN(userDistance)) {
                showFeedback('storm-feedback', false, '❌ Please enter a valid number.');
                return;
            }

            const showedWork = verifyDesmosWork(343, userTime);
            if (!showedWork) {
                showFeedback('storm-feedback', false, `❌ We cannot find your work! You must multiply 343 and your specific time (${userTime}) in the Desmos calculator to prove your equation.`);
                return;
            }

            const expectedDistance = 343 * userTime;

            if (Math.abs(expectedDistance - userDistance) <= 1.0) {
                trialCompleted = true;
                if (stormMode === 'side') {
                    if (currentTrial < 5) {
                        showFeedback('storm-feedback', true, `✅ Correct! Distance was ${userDistance}m. <button onclick="triggerLightning()" class="ml-3 px-3 py-1 bg-green-700 hover:bg-green-600 text-white rounded font-bold shadow-md transition-all">Next Strike &rarr;</button>`);
                        const btnT = document.getElementById('btn-trigger');
                        btnT.innerText = "Trigger New Lightning Strike";
                        btnT.disabled = false;
                        btnT.className = "px-5 py-1.5 bg-green-500 hover:bg-green-400 shadow-[0_0_15px_rgba(34,197,94,0.8)] animate-pulse text-white text-sm font-bold rounded-md transition-all";
                    } else {
                        currentTrial = 6; // MARK TASK 1 AS COMPLETED
                        showFeedback('storm-feedback', true, `✅ Correct! You've mastered the Side View. <button onclick="switchTab('task2')" class="ml-3 px-3 py-1 bg-blue-700 hover:bg-blue-600 text-white rounded font-bold shadow-md transition-all">Go to Task 2 &rarr;</button>`);
                        const btnT = document.getElementById('btn-trigger');
                        btnT.innerText = "Start Task 2: First-Person Mode";
                        btnT.disabled = false;
                        btnT.className = "px-5 py-1.5 bg-blue-500 hover:bg-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.8)] animate-pulse text-white text-sm font-bold rounded-md transition-all";
                    }
                } else {
                    // FP Mode Success
                    if (currentFPTrial < 5) {
                        showFeedback('storm-feedback', true, `✅ Correct! You calculated the actual physical distance. <button onclick="triggerFPStorm()" class="ml-3 px-3 py-1 bg-green-700 hover:bg-green-600 text-white rounded font-bold shadow-md transition-all">Next Strike &rarr;</button>`);
                        const btnT = document.getElementById('btn-fp-trigger');
                        btnT.innerText = "Trigger New Lightning Strike";
                        btnT.disabled = false;
                        btnT.className = "px-5 py-1.5 bg-green-500 hover:bg-green-400 shadow-[0_0_15px_rgba(34,197,94,0.8)] animate-pulse text-white text-sm font-bold rounded-md transition-all";

                        const btnSW = document.getElementById('btn-fp-stopwatch');
                        btnSW.innerText = "Start Stopwatch";
                        btnSW.classList.replace('bg-slate-500', 'bg-green-500');
                    } else {
                        currentFPTrial = 6; // MARK TASK 2 AS COMPLETED
                        showFeedback('storm-feedback', true, `✅ Correct! You have mastered Task 2! <button onclick="switchTab('task3')" class="ml-3 px-3 py-1 bg-blue-700 hover:bg-blue-600 text-white rounded font-bold shadow-md transition-all">Go to Task 3 &rarr;</button>`);
                        const btnT = document.getElementById('btn-fp-trigger');
                        btnT.innerText = "Task 2 Complete";
                        btnT.disabled = true;
                        btnT.className = "px-5 py-1.5 bg-slate-600 text-slate-400 text-sm font-bold rounded-md transition-all";
                    }
                }
                syncResults();
            } else {
                showFeedback('storm-feedback', false, `❌ Not quite. Double check your calculator. You want 343 * ${userTime}. If your time (t) is difficult to work with, click **Reset Strike** to get a new number.`);
            }
        }

        // --- PART 2: WAVE MATCHER LOGIC ---
        const waveProfiles = [
            { name: "Low Bass Guitar", freq: 150, type: "bass", icon: "🎸" },
            { name: "Middle C (Piano)", freq: 260, type: "piano", icon: "🎹" },
            { name: "Frog Croak", freq: 350, type: "frog", icon: "🐸" },
            { name: "Concert A (Tuning Fork)", freq: 440, type: "fork", icon: "🧲" },
            { name: "High Bird Chirp", freq: 580, type: "bird", icon: "🐦" }
        ];

        let targetFreq = 0;
        let userFreq = 100;
        let waveIsMatched = false;
        let waveTime = 0;
        let currentWaveTrial = 1;

        function loadWaveProfile() {
            const profile = waveProfiles[currentWaveTrial - 1];
            targetFreq = profile.freq;
            document.getElementById('wave-target-name').innerText = profile.name;
            document.getElementById('wave-target-icon').innerText = profile.icon;
        }

        function drawWaveCanvas() {
            const canvas = document.getElementById('wave-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, width, height);

            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1;
            for (let i = 0; i < width; i += 50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke(); }
            for (let i = 0; i < height; i += 50) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke(); }

            const drawWave = (freq, color, opacity, offsetTime) => {
                ctx.beginPath();
                const visualV = 20000;
                const wavelength = visualV / freq;
                const amplitude = 60;

                for (let x = 0; x < width; x++) {
                    const y = height / 2 + amplitude * Math.sin((Math.PI * 2 * x) / wavelength - offsetTime);
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = color;
                ctx.globalAlpha = opacity;
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            };

            if (targetFreq > 0) drawWave(targetFreq, '#ef4444', 0.5, 0);
            drawWave(userFreq, '#3b82f6', 0.9, waveTime);
        }

        function animateWave() {
            // ONLY draw if the tab is visible to save CPU!
            if (activeTab === 'wave') {
                waveTime += 0.05;
                drawWaveCanvas();
            }
            requestAnimationFrame(animateWave);
        }

        function updateWave() {
            if (waveIsMatched) return;
            userFreq = parseInt(document.getElementById('wave-slider').value);
            document.getElementById('wave-freq-display').innerText = `${userFreq} Hz`;

            if (targetFreq > 0 && Math.abs(userFreq - targetFreq) < 1) {
                waveIsMatched = true;
                const slider = document.getElementById('wave-slider');
                slider.disabled = true;
                slider.classList.replace('bg-slate-600', 'bg-green-500');

                document.getElementById('wave-matched-text').classList.remove('hidden');

                // Strictly reset UI locks
                const titleEl = document.getElementById('wave-assessment-title');
                titleEl.innerHTML = 'Assessment Locked 🔒';
                titleEl.classList.remove('text-green-400');
                titleEl.classList.add('text-blue-300');
                document.getElementById('wave-answer').disabled = true;
                document.getElementById('btn-wave-submit').disabled = true;

                document.getElementById('wave-assessment-text').innerHTML = `You discovered the frequency is <strong>${targetFreq} Hz</strong>. Assuming this sound is travelling through the air (<i>v</i> = 343 m/s), use the Desmos calculator to find the <strong>wavelength (&lambda;)</strong> of this sound wave. Show your work to unlock the answer box!`;
                document.getElementById('wave-assessment').classList.remove('hidden');

                document.getElementById('btn-wave-help').classList.remove('hidden');
                document.getElementById('wave-help-card').classList.add('hidden');
                document.getElementById('wave-help-content').innerHTML = `
                    <p class="mb-2">To find the wavelength, divide the speed of sound by your frequency:</p>
                    <div class="bg-slate-900 p-2 rounded font-mono text-center text-blue-300 border border-slate-700">
                        &lambda; = 343 / ${targetFreq}
                    </div>
                `;

                startDesmosMonitor(343, targetFreq, unlockWaveAssessment);
            }
        }

        function checkWaveAnswer() {
            const userWavelength = parseFloat(document.getElementById('wave-answer').value);
            if (isNaN(userWavelength)) {
                showFeedback('wave-feedback', false, '❌ Please enter a valid number.');
                return;
            }

            const showedWork = verifyDesmosWork(343, targetFreq);
            if (!showedWork) {
                showFeedback('wave-feedback', false, `❌ We cannot find your work! You must divide 343 by your matched frequency (${targetFreq}) in the Desmos calculator.`);
                return;
            }

            const expectedWavelength = 343 / targetFreq;
            if (Math.abs(expectedWavelength - userWavelength) <= 0.05) {
                if (currentWaveTrial < 5) {
                    showFeedback('wave-feedback', true, `✅ Correct! Because velocity (343 m/s) is constant, a higher frequency means a shorter wavelength. <button onclick="nextWaveTask()" class="ml-3 px-3 py-1 bg-green-700 hover:bg-green-600 text-white rounded font-bold transition-colors">Next Wave</button>`);
                } else {
                    currentWaveTrial = 6; // MARK TASK 3 AS COMPLETED
                    waveIsMatched = true; // Sticky for final trial
                    showFeedback('wave-feedback', true, `✅ Correct! You've mastered Part 2: Wave Matcher!`);
                }
                syncResults();
            } else {
                showFeedback('wave-feedback', false, `❌ Not quite. Remember the wave equation: v = f &times; &lambda;. So &lambda; = 343 / ${targetFreq}.`);
            }
        }

        function nextWaveTask() {
            if (desmosMonitorInterval) clearInterval(desmosMonitorInterval);

            // Advance trial counter
            currentWaveTrial++;
            document.getElementById('wave-trial-counter').innerText = `(Trial ${currentWaveTrial} of 5)`;

            // Load specific profile instead of random
            loadWaveProfile();

            // Reset variables
            waveIsMatched = false;
            userFreq = 100;

            // Reset slider UI
            const slider = document.getElementById('wave-slider');
            slider.disabled = false;
            slider.value = 100;
            slider.classList.replace('bg-green-500', 'bg-slate-600');

            document.getElementById('wave-freq-display').innerText = `100 Hz`;
            document.getElementById('wave-matched-text').classList.add('hidden');

            // Reset Assessment UI
            document.getElementById('wave-assessment').classList.add('hidden');
            document.getElementById('btn-wave-help').classList.add('hidden');
            document.getElementById('wave-help-card').classList.add('hidden');
            document.getElementById('wave-answer').value = '';
            document.getElementById('wave-feedback').classList.add('hidden');
        }
    </script>
