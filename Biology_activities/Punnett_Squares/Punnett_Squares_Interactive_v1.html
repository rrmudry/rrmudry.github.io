<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Genetics Lab - Interactive Punnett Squares</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (UMD via Unpkg) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
        }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-2deg); }
            75% { transform: translateX(5px) rotate(2deg); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Inline Lucide Icons ---
        const Dna = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="m8 8 8 8"/><path d="m8 16 8-8"/><path d="m19 11-3-3"/><path d="m19 14-3 3"/><path d="m5 11 3-3"/><path d="m5 14 3 3"/>
            </svg>
        );

        const ArrowRight = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
            </svg>
        );

        const RotateCcw = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
            </svg>
        );

        const CheckCircle2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/>
            </svg>
        );

        const Info = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
            </svg>
        );

        const ArrowDown = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 5v14"/><path d="m19 12-7 7-7-7"/>
            </svg>
        );

        // --- HELPER FUNCTIONS ---
        const combineAlleles = (a1, a2) => {
            if (a1 === 'F' || a2 === 'F') {
                return a1 === 'F' && a2 === 'F' ? 'FF' : 'Ff';
            }
            return 'ff';
        };

        const getPhenotype = (genotype) => {
            return genotype.includes('F') ? 'Purple' : 'Yellow';
        };

        // --- COMPONENTS ---

        const Monster = ({ genotype, className = "w-32 h-32", small = false }) => {
            const isPurple = genotype.includes('F');
            const baseColor = isPurple ? '#a855f7' : '#facc15';
            const darkColor = isPurple ? '#7e22ce' : '#ca8a04';

            return (
                <div className={`relative ${className} animate-pop`}>
                    <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                        <ellipse cx="50" cy="90" rx="30" ry="6" fill="rgba(0,0,0,0.15)" />
                        <rect x="30" y="70" width="12" height="20" rx="6" fill={darkColor} />
                        <rect x="58" y="70" width="12" height="20" rx="6" fill={darkColor} />
                        <path d="M 20 50 C 20 15, 80 15, 80 50 C 80 85, 75 80, 50 80 C 25 80, 20 85, 20 50 Z" fill={baseColor} />
                        {/* Ears (Now always visible) */}
                        <path d="M 30 25 Q 20 10 10 15 Q 15 25 25 28 Z" fill={darkColor} />
                        <path d="M 70 25 Q 80 10 90 15 Q 85 25 75 28 Z" fill={darkColor} />
                        
                        <circle cx="35" cy="45" r="8" fill="white" />
                        <circle cx="35" cy="45" r="3" fill="#1e293b" />
                        <circle cx="65" cy="45" r="8" fill="white" />
                        <circle cx="65" cy="45" r="3" fill="#1e293b" />
                        {!small && (
                            <>
                                <circle cx="33" cy="43" r="1.5" fill="white" />
                                <circle cx="63" cy="43" r="1.5" fill="white" />
                            </>
                        )}
                        <path d="M 42 60 Q 50 68 58 60" stroke="#1e293b" strokeWidth="3" fill="transparent" strokeLinecap="round" />
                    </svg>
                </div>
            );
        };

        function App() {
            const [step, setStep] = useState(1);
            const [p1a1, setP1a1] = useState('F');
            const [p1a2, setP1a2] = useState('f');
            const [p2a1, setP2a1] = useState('F');
            const [p2a2, setP2a2] = useState('f');
            const [gridAnswers, setGridAnswers] = useState([null, null, null, null]);
            const [shakeIndex, setShakeIndex] = useState(null);
            const [population, setPopulation] = useState([]);

            const parent1Genotype = p1a1 + p1a2;
            const parent2Genotype = p2a1 + p2a2;

            const expectedGrid = [
                combineAlleles(p2a1, p1a1),
                combineAlleles(p2a1, p1a2),
                combineAlleles(p2a2, p1a1),
                combineAlleles(p2a2, p1a2)
            ];

            const allFilled = gridAnswers.every(ans => ans !== null);

            const generatePopulation = () => {
                const pop = [];
                const p1Alleles = [p1a1, p1a2];
                const p2Alleles = [p2a1, p2a2];
                for (let i = 0; i < 100; i++) {
                    const a1 = p1Alleles[Math.floor(Math.random() * 2)];
                    const a2 = p2Alleles[Math.floor(Math.random() * 2)];
                    pop.push(combineAlleles(a1, a2));
                }
                setPopulation(pop);
            };

            const handleStepChange = (newStep) => {
                if (newStep === 3) generatePopulation();
                setStep(newStep);
            };

            const handleGuess = (index, guess) => {
                if (guess === expectedGrid[index]) {
                    const newAnswers = [...gridAnswers];
                    newAnswers[index] = guess;
                    setGridAnswers(newAnswers);
                    setShakeIndex(null);
                } else {
                    setShakeIndex(index);
                    setTimeout(() => setShakeIndex(null), 400);
                }
            };

            const resetLab = () => {
                setStep(1);
                setP1a1('F'); setP1a2('f');
                setP2a1('F'); setP2a2('f');
                setGridAnswers([null, null, null, null]);
                setPopulation([]);
            };

            const theoryStats = useMemo(() => {
                const counts = { FF: 0, Ff: 0, ff: 0 };
                expectedGrid.forEach(g => counts[g]++);
                const purpleCount = counts.FF + counts.Ff;
                const yellowCount = counts.ff;
                return { 
                    counts, 
                    purplePct: Math.round((purpleCount / 4) * 100), 
                    yellowPct: Math.round((yellowCount / 4) * 100),
                    ffPct: Math.round((counts.ff / 4) * 100),
                    FfPct: Math.round((counts.Ff / 4) * 100),
                    FFPct: Math.round((counts.FF / 4) * 100)
                };
            }, [p1a1, p1a2, p2a1, p2a2]);

            const populationStats = useMemo(() => {
                if (population.length === 0) return null;
                const counts = { FF: 0, Ff: 0, ff: 0 };
                population.forEach(g => counts[g]++);
                const purpleCount = counts.FF + counts.Ff;
                const yellowCount = counts.ff;
                return { 
                    counts, 
                    purplePct: Math.round((purpleCount / 100) * 100), 
                    yellowPct: Math.round((yellowCount / 100) * 100),
                    ffPct: Math.round((counts.ff / 100) * 100),
                    FfPct: Math.round((counts.Ff / 100) * 100),
                    FFPct: Math.round((counts.FF / 100) * 100)
                };
            }, [population]);

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-2 md:p-4 flex flex-col">
                    <div className="max-w-6xl mx-auto w-full flex-1 flex flex-col">
                        <header className="mb-3 flex flex-col md:flex-row items-center justify-center gap-3 text-center md:text-left">
                            <div className="inline-flex items-center justify-center p-2 bg-purple-100 text-purple-700 rounded-full shadow-sm">
                                <Dna size={24} />
                            </div>
                            <div>
                                <h1 className="text-2xl font-extrabold tracking-tight text-slate-900 leading-none mb-1">Monster Genetics Lab</h1>
                                <p className="text-xs text-slate-500 font-medium">Learn how traits are passed down using a Punnett Square!</p>
                            </div>
                        </header>

                        <div className="flex justify-center items-center gap-2 mb-4 text-[11px] md:text-sm font-medium">
                            <div className={`px-3 py-1.5 rounded-full ${step >= 1 ? 'bg-purple-600 text-white shadow-md' : 'bg-slate-200 text-slate-500'}`}>1. Parents</div>
                            <div className={`w-6 h-1 rounded-full ${step >= 2 ? 'bg-purple-600' : 'bg-slate-200'}`} />
                            <div className={`px-3 py-1.5 rounded-full ${step >= 2 ? 'bg-purple-600 text-white shadow-md' : 'bg-slate-200 text-slate-500'}`}>2. Punnett Square</div>
                            <div className={`w-6 h-1 rounded-full ${step >= 3 ? 'bg-purple-600' : 'bg-slate-200'}`} />
                            <div className={`px-3 py-1.5 rounded-full ${step >= 3 ? 'bg-purple-600 text-white shadow-md' : 'bg-slate-200 text-slate-500'}`}>3. Offspring</div>
                        </div>

                        <main className="bg-white rounded-3xl shadow-xl p-4 md:p-6 border border-slate-100 flex-1 flex flex-col">
                            {step === 1 && (
                                <div className="animate-pop flex-1 flex flex-col justify-center">
                                    <div className="bg-blue-50 text-blue-800 p-3 rounded-xl flex items-start gap-3 mb-4 text-sm">
                                        <Info className="shrink-0 mt-0.5" size={18} />
                                        <p><strong>Trait: Fur Color.</strong> Monsters can be Purple or Yellow. <span className="font-bold text-purple-700 ml-1">Purple (F)</span> is DOMINANT over <span className="font-bold text-yellow-600">Yellow (f)</span>.</p>
                                    </div>
                                    <div className="grid md:grid-cols-2 gap-4 md:gap-6 mb-6">
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 flex flex-col items-center text-center">
                                            <h3 className="text-lg font-bold mb-2 text-blue-600">Parent 1 (Top)</h3>
                                            <Monster genotype={parent1Genotype} className="w-24 h-24 mb-4" />
                                            <div className="w-full max-w-[200px] space-y-3">
                                                <div className="flex items-center justify-between"><p className="text-[10px] font-bold text-slate-400 uppercase">Allele 1</p><div className="flex gap-2 w-24">
                                                    <button onClick={() => setP1a1('F')} className={`flex-1 py-1 rounded-lg font-bold ${p1a1 === 'F' ? 'bg-purple-600 text-white shadow-md' : 'bg-slate-200'}`}>F</button>
                                                    <button onClick={() => setP1a1('f')} className={`flex-1 py-1 rounded-lg font-bold ${p1a1 === 'f' ? 'bg-yellow-500 text-white shadow-md' : 'bg-slate-200'}`}>f</button>
                                                </div></div>
                                                <div className="flex items-center justify-between"><p className="text-[10px] font-bold text-slate-400 uppercase">Allele 2</p><div className="flex gap-2 w-24">
                                                    <button onClick={() => setP1a2('F')} className={`flex-1 py-1 rounded-lg font-bold ${p1a2 === 'F' ? 'bg-purple-600 text-white shadow-md' : 'bg-slate-200'}`}>F</button>
                                                    <button onClick={() => setP1a2('f')} className={`flex-1 py-1 rounded-lg font-bold ${p1a2 === 'f' ? 'bg-yellow-500 text-white shadow-md' : 'bg-slate-200'}`}>f</button>
                                                </div></div>
                                            </div>
                                            <div className="mt-3 pt-3 border-t border-slate-200 w-full"><p className="text-sm text-slate-500 font-bold">Genotype: {combineAlleles(p1a1, p1a2)}</p></div>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 flex flex-col items-center text-center">
                                            <h3 className="text-lg font-bold mb-2 text-rose-600">Parent 2 (Side)</h3>
                                            <Monster genotype={parent2Genotype} className="w-24 h-24 mb-4" />
                                            <div className="w-full max-w-[200px] space-y-3">
                                                <div className="flex items-center justify-between"><p className="text-[10px] font-bold text-slate-400 uppercase">Allele 1</p><div className="flex gap-2 w-24">
                                                    <button onClick={() => setP2a1('F')} className={`flex-1 py-1 rounded-lg font-bold ${p2a1 === 'F' ? 'bg-purple-600 text-white shadow-md' : 'bg-slate-200'}`}>F</button>
                                                    <button onClick={() => setP2a1('f')} className={`flex-1 py-1 rounded-lg font-bold ${p2a1 === 'f' ? 'bg-yellow-500 text-white shadow-md' : 'bg-slate-200'}`}>f</button>
                                                </div></div>
                                                <div className="flex items-center justify-between"><p className="text-[10px] font-bold text-slate-400 uppercase">Allele 2</p><div className="flex gap-2 w-24">
                                                    <button onClick={() => setP2a2('F')} className={`flex-1 py-1 rounded-lg font-bold ${p2a2 === 'F' ? 'bg-purple-600 text-white shadow-md' : 'bg-slate-200'}`}>F</button>
                                                    <button onClick={() => setP2a2('f')} className={`flex-1 py-1 rounded-lg font-bold ${p2a2 === 'f' ? 'bg-yellow-500 text-white shadow-md' : 'bg-slate-200'}`}>f</button>
                                                </div></div>
                                            </div>
                                            <div className="mt-3 pt-3 border-t border-slate-200 w-full"><p className="text-sm text-slate-500 font-bold">Genotype: {combineAlleles(p2a1, p2a2)}</p></div>
                                        </div>
                                    </div>
                                    <div className="flex justify-center"><button onClick={() => handleStepChange(2)} className="bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2 transform active:scale-95 transition-all shadow-lg">Start Lab <ArrowRight size={20} /></button></div>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="animate-pop flex flex-col items-center flex-1 justify-center">
                                    <div className="bg-purple-50 text-purple-800 p-3 rounded-xl flex items-start gap-3 mb-6 w-full max-w-lg text-xs leading-relaxed">
                                        <Info className="shrink-0" size={16} />
                                        <p>Combine the allele from the <strong>Top Parent</strong> and the <strong>Side Parent</strong>. <span className="opacity-80">(Hint: The dominant uppercase 'F' always goes first!)</span></p>
                                    </div>
                                    <div className="relative mb-8 w-full max-w-xl">
                                        <div className="grid grid-cols-[80px_80px_1fr_1fr] gap-2 items-center">
                                            {/* Row 1: Top Parent Header */}
                                            <div className="col-span-2"></div>
                                            <div className="col-span-2 flex flex-col items-center pb-2">
                                                <span className="text-[10px] font-black text-blue-600 uppercase mb-1 tracking-widest">Top Parent</span>
                                                <Monster genotype={parent1Genotype} className="w-16 h-16" />
                                            </div>

                                            {/* Row 2: Top Allele Labels */}
                                            <div className="col-span-2 flex justify-end pr-4 text-slate-300">
                                                <ArrowDown className="w-6 h-6 rotate-[-45deg]" />
                                            </div>
                                            <div className="bg-blue-100 rounded-t-xl p-2 flex flex-col items-center justify-center border-b-4 border-blue-200 shadow-sm">
                                                <span className="text-[9px] text-blue-600 font-bold uppercase">Allele 1</span>
                                                <span className={`text-2xl font-black ${p1a1 === 'F' ? 'text-purple-600' : 'text-yellow-600'}`}>{p1a1}</span>
                                            </div>
                                            <div className="bg-blue-100 rounded-t-xl p-2 flex flex-col items-center justify-center border-b-4 border-blue-200 shadow-sm">
                                                <span className="text-[9px] text-blue-600 font-bold uppercase">Allele 2</span>
                                                <span className={`text-2xl font-black ${p1a2 === 'F' ? 'text-purple-600' : 'text-yellow-600'}`}>{p1a2}</span>
                                            </div>

                                            {/* Row 3: Side Parent & Side Allele 1 */}
                                            <div className="row-span-2 flex flex-col items-center pr-2">
                                                <span className="text-[10px] font-black text-rose-600 uppercase mb-1 tracking-widest">Side Parent</span>
                                                <Monster genotype={parent2Genotype} className="w-16 h-16" />
                                            </div>
                                            <div className="bg-rose-100 rounded-l-xl p-2 flex flex-col items-center justify-center border-r-4 border-rose-200 shadow-sm">
                                                <span className="text-[9px] text-rose-600 font-bold uppercase">Allele 1</span>
                                                <span className={`text-2xl font-black ${p2a1 === 'F' ? 'text-purple-600' : 'text-yellow-600'}`}>{p2a1}</span>
                                            </div>
                                            {[0, 1].map(i => (
                                                <div key={i} className={`bg-white rounded-xl min-h-[90px] border-4 border-slate-200 flex flex-col items-center justify-center shadow-inner ${shakeIndex === i ? 'animate-shake bg-red-50' : ''}`}>
                                                    {gridAnswers[i] ? <div className="text-green-700 animate-pop flex flex-col items-center"><CheckCircle2 className="mb-1" size={24} /><span className="text-2xl font-black">{gridAnswers[i]}</span></div> :
                                                        <div className="flex flex-wrap justify-center gap-2 p-2">{['FF', 'Ff', 'ff'].map(g => <button key={g} onClick={() => handleGuess(i, g)} className="w-14 py-3 bg-slate-50 border-2 border-slate-200 rounded-lg hover:bg-white hover:border-purple-400 hover:text-purple-700 hover:shadow-md transition-all font-black text-xs uppercase tracking-tighter">{g}</button>)}</div>}
                                                </div>
                                            ))}

                                            {/* Row 4: Side Allele 2 */}
                                            <div className="bg-rose-100 rounded-l-xl p-2 flex flex-col items-center justify-center border-r-4 border-rose-200 shadow-sm">
                                                <span className="text-[9px] text-rose-600 font-bold uppercase">Allele 2</span>
                                                <span className={`text-2xl font-black ${p2a2 === 'F' ? 'text-purple-600' : 'text-yellow-600'}`}>{p2a2}</span>
                                            </div>
                                            {[2, 3].map(i => (
                                                <div key={i} className={`bg-white rounded-xl min-h-[90px] border-4 border-slate-200 flex flex-col items-center justify-center shadow-inner ${shakeIndex === i ? 'animate-shake bg-red-50' : ''}`}>
                                                    {gridAnswers[i] ? <div className="text-green-700 animate-pop flex flex-col items-center"><CheckCircle2 className="mb-1" size={20} /><span className="text-xl font-black">{gridAnswers[i]}</span></div> :
                                                        <div className="flex flex-wrap justify-center gap-1 p-1">{['FF', 'Ff', 'ff'].map(g => <button key={g} onClick={() => handleGuess(i, g)} className="w-9 py-1 bg-slate-50 border border-slate-200 rounded hover:bg-white hover:border-purple-300 font-bold text-[10px]">{g}</button>)}</div>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    {allFilled ? <button onClick={() => handleStepChange(3)} className="bg-green-600 text-white px-8 py-3 rounded-xl font-black animate-pop shadow-lg flex items-center gap-2">Hatch Offspring <ArrowRight size={20} /></button> : <button onClick={() => setStep(1)} className="text-slate-400 font-bold">Cancel</button>}
                                </div>
                            )}

                            {step === 3 && (
                                <div className="animate-pop flex flex-col h-full space-y-6">
                                    <div className="flex items-center justify-between">
                                        <div><h2 className="text-2xl font-black text-slate-800 leading-tight">The Hatchlings</h2><p className="text-xs text-slate-500 font-bold uppercase tracking-wider">Theory vs. Reality</p></div>
                                        <button onClick={resetLab} className="bg-slate-200 hover:bg-slate-300 text-slate-800 px-4 py-2 rounded-lg font-bold flex items-center gap-2 text-xs"><RotateCcw size={16} /> Reset Lab</button>
                                    </div>

                                    <div className="grid lg:grid-cols-[1fr_350px] gap-6">
                                        <div className="space-y-6">
                                            <div className="bg-slate-100 rounded-3xl p-6 border-b-4 border-slate-200">
                                                <div className="flex items-center justify-between mb-4">
                                                    <h3 className="text-sm font-black uppercase text-slate-500 tracking-widest">Theoretical Outcomes (The 4 Boxes)</h3>
                                                </div>
                                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                                    {expectedGrid.map((geno, i) => (
                                                        <div key={i} className="bg-white rounded-2xl p-4 flex flex-col items-center text-center shadow-sm border border-slate-200">
                                                            <Monster genotype={geno} className="w-16 h-16 mb-2" />
                                                            <div className="bg-slate-50 px-2 py-1 rounded border border-slate-100 w-full flex justify-between items-center mt-1">
                                                                <span className="text-sm font-black">{geno}</span>
                                                                <span className={`text-[9px] font-black uppercase ${geno.includes('F') ? 'text-purple-600' : 'text-yellow-600'}`}>{getPhenotype(geno)}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="bg-indigo-50/50 rounded-3xl p-6 border-b-4 border-indigo-100">
                                                <div className="flex items-center justify-between mb-4">
                                                    <div>
                                                        <h3 className="text-sm font-black uppercase text-indigo-900 tracking-widest">Offspring Population (n=100)</h3>
                                                        <p className="text-[10px] font-bold text-indigo-700 italic">Notice how the actual counts fluctuate every time!</p>
                                                    </div>
                                                    <button onClick={generatePopulation} className="bg-white text-indigo-600 border border-indigo-200 px-4 py-2 rounded-xl font-black text-xs hover:bg-indigo-600 hover:text-white transition-all shadow-sm flex items-center gap-2">
                                                        <RotateCcw size={14} /> New Batch
                                                    </button>
                                                </div>
                                                <div className="bg-white rounded-2xl p-4 border border-indigo-100 shadow-inner flex flex-wrap gap-1 justify-center max-h-[300px] overflow-y-auto custom-scroll">
                                                    {population.map((geno, i) => (
                                                        <Monster key={i} genotype={geno} className="w-6 h-6 md:w-8 md:h-8" small />
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            <div className="bg-slate-900 text-white rounded-3xl p-6 shadow-xl flex flex-col h-full">
                                                <h4 className="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] mb-6 border-b border-white/10 pb-2">Statistical Comparison</h4>
                                                
                                                <div className="space-y-6 flex-1">
                                                    <div>
                                                        <h5 className="text-[10px] font-bold text-orange-400 uppercase mb-3 px-2">Purple Phenotype (F_)</h5>
                                                        <div className="grid grid-cols-2 gap-4">
                                                            <div className="bg-orange-500/10 p-3 rounded-xl border border-orange-500/20">
                                                                <p className="text-[9px] font-bold text-orange-300/80 uppercase tracking-wider">Predicted</p>
                                                                <p className="text-2xl font-black text-orange-400">{theoryStats.purplePct}%</p>
                                                            </div>
                                                            <div className="bg-purple-500/20 p-3 rounded-xl border border-purple-500/30">
                                                                <p className="text-[9px] font-bold text-purple-300 uppercase">Actual</p>
                                                                <p className="text-2xl font-black text-purple-400">{populationStats?.purplePct}%</p>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div>
                                                        <h5 className="text-[10px] font-bold text-orange-400 uppercase mb-3 px-2">Yellow Phenotype (ff)</h5>
                                                        <div className="grid grid-cols-2 gap-4">
                                                            <div className="bg-orange-500/10 p-3 rounded-xl border border-orange-500/20">
                                                                <p className="text-[9px] font-bold text-orange-300/80 uppercase tracking-wider">Predicted</p>
                                                                <p className="text-2xl font-black text-orange-400">{theoryStats.yellowPct}%</p>
                                                            </div>
                                                            <div className="bg-yellow-500/20 p-3 rounded-xl border border-yellow-500/30">
                                                                <p className="text-[9px] font-bold text-yellow-300 uppercase">Actual</p>
                                                                <p className="text-2xl font-black text-yellow-400">{populationStats?.yellowPct}%</p>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="pt-4 mt-4 border-t border-white/10">
                                                        <div className="flex justify-between items-center mb-4 px-2">
                                                            <h5 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Genotype Breakdown</h5>
                                                            <div className="flex gap-4">
                                                                <div className="flex items-center gap-1.5"><div className="w-2 h-2 bg-orange-500 rounded-sm"></div><span className="text-[9px] text-orange-400 font-bold uppercase">Predicted</span></div>
                                                                <div className="flex items-center gap-1.5"><div className="w-2 h-2 bg-cyan-400 rounded-sm"></div><span className="text-[9px] text-cyan-400 font-bold uppercase">Actual</span></div>
                                                            </div>
                                                        </div>
                                                        <div className="space-y-5">
                                                            {['FF', 'Ff', 'ff'].map(g => (
                                                                <div key={g} className="space-y-1.5">
                                                                    <div className="flex justify-between text-[11px] font-black px-2">
                                                                        <span className="text-slate-200">{g}</span>
                                                                        <div className="space-x-3">
                                                                            <span className="text-orange-400">{theoryStats[`${g}Pct`]}%</span>
                                                                            <span className="text-cyan-400">{populationStats?.counts[g]}%</span>
                                                                        </div>
                                                                    </div>
                                                                    <div className="space-y-1">
                                                                        {/* Predicted Bar */}
                                                                        <div className="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                                                                            <div className="h-full bg-orange-500 rounded-full transition-all duration-700 shadow-[0_0_8px_rgba(249,115,22,0.4)]" style={{ width: `${theoryStats[`${g}Pct`]}%` }}></div>
                                                                        </div>
                                                                        {/* Actual Bar */}
                                                                        <div className="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                                                                            <div className="h-full bg-cyan-400 rounded-full transition-all duration-1000 shadow-[0_0_8px_rgba(34,211,238,0.4)]" style={{ width: `${populationStats?.counts[g]}%` }}></div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="mt-8 p-3 bg-blue-500/10 border border-blue-500/20 rounded-xl">
                                                    <p className="text-[10px] font-bold leading-relaxed text-blue-200">
                                                        Note: In a small sample of 4, you'll rarely see exact percentages. With a population of 100, we get closer to the theory, but random chance still exists!
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
