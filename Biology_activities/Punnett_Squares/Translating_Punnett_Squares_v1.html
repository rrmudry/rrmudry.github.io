<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translating Punnett Squares</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM (UMD via Unpkg) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
        }

        #root {
            height: 100%;
        }

        /* Custom Animations */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px) rotate(-2deg);
            }

            75% {
                transform: translateX(5px) rotate(2deg);
            }
        }

        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-pop {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .confetti {
            position: absolute;
            animation: confettiFall 3s linear infinite;
        }

        /* Smooth simplify transition */
        .simplify-transition {
            transition: all 0.8s ease-in-out;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- INLINE ICONS ---
        const CheckCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>;
        const XCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><line x1="15" y1="9" x2="9" y2="15" /><line x1="9" y1="9" x2="15" y2="15" /></svg>;
        const ArrowRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>;
        const Trophy = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" /><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" /><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" /></svg>;
        const Scale = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z" /><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z" /><path d="M7 21h10" /><path d="M12 3v18" /><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2" /></svg>;
        const TableIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2" /><line x1="3" x2="21" y1="9" y2="9" /><line x1="3" x2="21" y1="15" y2="15" /><line x1="9" x2="9" y1="9" y2="21" /><line x1="15" x2="15" y1="9" y2="21" /></svg>;
        const Cyclops = ({ eyeColor, className = "w-10 h-10" }) => (
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" className={`${className} drop-shadow-sm`}>
                <path d="M30 35 L20 15 L40 25" fill="#cbd5e1" stroke="#64748B" strokeWidth="4" strokeLinejoin="round" />
                <path d="M70 35 L80 15 L60 25" fill="#cbd5e1" stroke="#64748B" strokeWidth="4" strokeLinejoin="round" />
                <rect x="20" y="30" width="60" height="65" rx="30" fill="#f1f5f9" stroke="#64748B" strokeWidth="4" />
                <circle cx="50" cy="55" r="16" fill="white" stroke="#64748B" strokeWidth="3" />
                <circle cx="50" cy="55" r="9" fill={eyeColor} />
                <circle cx="50" cy="55" r="4" fill="#0f172a" />
                <path d="M42 80 Q50 85 58 80" stroke="#64748B" strokeWidth="3" strokeLinecap="round" />
            </svg>
        );

        const SiblingGroup = ({ brown, blue }) => (
            <div className="flex gap-2 sm:gap-4 justify-center items-end bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-inner w-full max-w-sm mx-auto mb-6">
                {Array.from({ length: brown }).map((_, i) => (
                    <div key={`br-${i}`} className="flex flex-col items-center gap-2 animate-pop" style={{ animationDelay: `${i * 0.1}s` }}>
                        <Cyclops eyeColor="#b45309" className="w-10 h-10 sm:w-12 sm:h-12 drop-shadow-sm hover:scale-110 transition-transform" />
                    </div>
                ))}
                {Array.from({ length: blue }).map((_, i) => (
                    <div key={`bl-${i}`} className="flex flex-col items-center gap-2 animate-pop" style={{ animationDelay: `${(brown + i) * 0.1}s` }}>
                        <Cyclops eyeColor="#3b82f6" className="w-10 h-10 sm:w-12 sm:h-12 drop-shadow-sm hover:scale-110 transition-transform" />
                    </div>
                ))}
            </div>
        );

        // --- SHARED COMPONENTS ---
        const Button = ({ children, onClick, disabled, variant = 'primary', className = '' }) => {
            const baseStyle = "px-4 py-2 rounded-lg font-bold transition-all shadow-sm flex items-center justify-center gap-2 text-sm";
            const variants = {
                primary: "bg-blue-600 text-white hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed",
                success: "bg-green-600 text-white hover:bg-green-700",
                outline: "border-2 border-blue-600 text-blue-600 hover:bg-blue-50"
            };
            return (
                <button
                    onClick={onClick}
                    disabled={disabled}
                    className={`${baseStyle} ${variants[variant]} ${className}`}
                >
                    {children}
                </button>
            );
        };

        const PunnettGrid = ({ topAlleles, leftAlleles, getBoxState, onBoxClick, onBoxDrop }) => {
            const boxes = [
                [topAlleles[0], leftAlleles[0]].sort().join(''),
                [topAlleles[1], leftAlleles[0]].sort().join(''),
                [topAlleles[0], leftAlleles[1]].sort().join(''),
                [topAlleles[1], leftAlleles[1]].sort().join(''),
            ];

            return (
                <div className="grid grid-cols-[auto_1fr_1fr] gap-1.5 max-w-[240px] mx-auto items-center justify-items-center">
                    <div></div>
                    <div className="text-xl font-bold text-slate-700">{topAlleles[0]}</div>
                    <div className="text-xl font-bold text-slate-700">{topAlleles[1]}</div>

                    <div className="text-xl font-bold text-slate-700 pr-1">{leftAlleles[0]}</div>
                    {[0, 1].map(i => {
                        const state = getBoxState ? getBoxState(i) : {};
                        return (
                            <div key={i} onClick={() => onBoxClick && onBoxClick(i)}
                                onDrop={e => onBoxDrop && onBoxDrop(e, i)}
                                onDragOver={e => onBoxDrop && e.preventDefault()}
                                className={`w-20 h-20 sm:w-24 sm:h-24 flex flex-col items-center justify-center border-4 rounded-xl text-2xl font-bold transition-all
                                ${onBoxClick ? 'cursor-pointer hover:scale-105 shadow-md' : ''}
                                ${state.bgColor || 'border-slate-300 bg-white text-slate-800'}`}>
                                {boxes[i]}
                                {state.content}
                            </div>
                        )
                    })}

                    <div className="text-xl font-bold text-slate-700 pr-1">{leftAlleles[1]}</div>
                    {[2, 3].map(i => {
                        const state = getBoxState ? getBoxState(i) : {};
                        return (
                            <div key={i} onClick={() => onBoxClick && onBoxClick(i)}
                                onDrop={e => onBoxDrop && onBoxDrop(e, i)}
                                onDragOver={e => onBoxDrop && e.preventDefault()}
                                className={`w-20 h-20 sm:w-24 sm:h-24 flex flex-col items-center justify-center border-4 rounded-xl text-2xl font-bold transition-all
                                ${onBoxClick ? 'cursor-pointer hover:scale-105 shadow-md' : ''}
                                ${state.bgColor || 'border-slate-300 bg-white text-slate-800'}`}>
                                {boxes[i]}
                                {state.content}
                            </div>
                        )
                    })}
                </div>
            );
        };

        const Confetti = () => {
            const colors = ['bg-blue-500', 'bg-green-500', 'bg-yellow-500', 'bg-red-500', 'bg-purple-500'];
            return (
                <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                    {Array.from({ length: 50 }).map((_, i) => (
                        <div
                            key={i}
                            className={`confetti w-2 h-2 md:w-3 md:h-3 rounded-sm ${colors[Math.floor(Math.random() * colors.length)]}`}
                            style={{
                                left: `${Math.random() * 100}vw`,
                                animationDuration: `${Math.random() * 2 + 2}s`,
                                animationDelay: `${Math.random() * 1}s`
                            }}
                        />
                    ))}
                </div>
            );
        };


        // --- PHASES ---

        // PHASE 1: Visual Foundation
        const Phase1 = ({ onComplete }) => {
            const [crossIndex, setCrossIndex] = useState(0);
            const [step, setStep] = useState(1);
            const [clicked, setClicked] = useState([]);
            const [err, setErr] = useState('');

            const [input1, setInput1] = useState('');
            const [input2, setInput2] = useState('');

            // State for the Data Table
            const [tableData, setTableData] = useState({ bb: '-', Bb: '-', BB: '-' });

            const crosses = [
                { top: ['B', 'b'], left: ['B', 'b'] },
                { top: ['B', 'B'], left: ['B', 'b'] },
                { top: ['B', 'B'], left: ['b', 'b'] },
                { top: ['B', 'B'], left: ['B', 'B'] }
            ];

            const currentCross = crosses[crossIndex];

            // Generate grid boxes to find targets dynamically
            const topA = currentCross.top;
            const leftA = currentCross.left;
            const boxes = [
                [topA[0], leftA[0]].sort().join(''),
                [topA[1], leftA[0]].sort().join(''),
                [topA[0], leftA[1]].sort().join(''),
                [topA[1], leftA[1]].sort().join('')
            ];

            const targets = {
                bb: boxes.map((b, i) => b === 'bb' ? i : -1).filter(i => i !== -1),
                Bb: boxes.map((b, i) => b === 'Bb' ? i : -1).filter(i => i !== -1),
                BB: boxes.map((b, i) => b === 'BB' ? i : -1).filter(i => i !== -1),
            };

            const getTargetIndices = () => {
                if (step === 1 || step === 2) return targets.bb;
                if (step === 3 || step === 4) return targets.Bb;
                if (step === 5 || step === 6) return targets.BB;
                return [];
            };

            const handleBoxClick = (i) => {
                setErr('');
                const targetIndices = getTargetIndices();

                if (step === 1 || step === 3 || step === 5) {
                    const expectedText = step === 1 ? 'two lowercase letters (bb)' : step === 3 ? 'ONE big letter and ONE little letter (Bb)' : 'TWO big letters (BB)';

                    if (targetIndices.includes(i)) {
                        const newClicked = Array.from(new Set([...clicked, i]));
                        setClicked(newClicked);
                        if (newClicked.length === targetIndices.length) {
                            setTimeout(() => setStep(step + 1), 600);
                        }
                    } else {
                        setErr(`Try again! Look for ${expectedText}.`);
                    }
                }
            };

            const handleNoneClick = () => {
                setErr('');
                setClicked([]);
                setStep(step + 1);
            };

            const getBoxState = (i) => {
                const isClicked = clicked.includes(i);

                if (step <= 2 && isClicked && targets.bb.includes(i)) return { bgColor: 'bg-blue-100 border-blue-500 text-blue-700' };
                if (step >= 3 && step <= 4 && isClicked && targets.Bb.includes(i)) return { bgColor: 'bg-green-100 border-green-500 text-green-700' };
                if (step >= 5 && step <= 6 && isClicked && targets.BB.includes(i)) return { bgColor: 'bg-purple-100 border-purple-500 text-purple-700' };

                return { bgColor: 'bg-white border-slate-300 text-slate-800' };
            };

            const checkInputs = () => {
                const targetLength = getTargetIndices().length.toString();

                if (input1 === targetLength && input2 === '4') {
                    setClicked([]);
                    setInput1('');
                    setInput2('');
                    setErr('');
                    if (step === 2) {
                        setTableData(prev => ({ ...prev, bb: targetLength }));
                        setStep(3);
                    }
                    else if (step === 4) {
                        setTableData(prev => ({ ...prev, Bb: targetLength }));
                        setStep(5);
                    }
                    else if (step === 6) {
                        setTableData(prev => ({ ...prev, BB: targetLength }));
                        if (crossIndex < crosses.length - 1) {
                            setStep(7); // Go to cross complete screen
                        } else {
                            setStep(8); // Go to final mastery screen
                        }
                    }
                } else {
                    setErr("Count the highlighted boxes and total boxes.");
                }
            };

            const nextCross = () => {
                setCrossIndex(crossIndex + 1);
                setStep(1);
                setTableData({ bb: '-', Bb: '-', BB: '-' }); // Reset table for next cross
            };

            return (
                <div className="h-full flex flex-col space-y-3 animate-pop">
                    <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 text-center shrink-0">
                        <h2 className="text-lg font-bold text-slate-800">Phase 1: The Visual Foundation</h2>
                        <div className="flex items-center justify-center gap-2 mt-1">
                            <p className="text-slate-600 text-sm font-medium">Cross {crossIndex + 1} of {crosses.length}:</p>
                            <div className="bg-slate-100 px-2 py-0.5 rounded border border-slate-300 font-bold text-slate-700 text-sm">
                                {topA.join('')} x {leftA.join('')}
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 min-h-0 flex flex-row gap-6 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                        <div className="flex-1 flex items-center justify-center min-h-0">
                            <PunnettGrid topAlleles={topA} leftAlleles={leftA} getBoxState={getBoxState} onBoxClick={handleBoxClick} />
                        </div>

                        <div className="flex-1 flex flex-col justify-start space-y-3 min-h-0 overflow-y-auto pr-2 pb-2">
                            {step === 1 && (
                                <div className="bg-blue-50 border-l-4 border-blue-500 p-3 rounded-r-lg">
                                    <p className="text-base font-semibold text-blue-900">👉 Click on all the boxes that have two little letters (bb).</p>
                                    {targets.bb.length === 0 && (
                                        <Button onClick={handleNoneClick} className="mt-3 w-full !bg-white border-2 border-blue-500 !text-blue-700 hover:!bg-blue-100">
                                            There are no 'bb' boxes
                                        </Button>
                                    )}
                                </div>
                            )}

                            {step === 2 && (
                                <div className="bg-blue-50 p-3 rounded-xl border border-blue-200 animate-pop">
                                    <p className="text-sm font-semibold text-blue-900 mb-2">Correct! Fill in the blanks for bb:</p>
                                    <div className="flex items-center gap-2 text-sm text-blue-900">
                                        Count:
                                        <select className="w-14 text-center border-2 border-blue-300 rounded p-1 font-bold focus:border-blue-500 outline-none bg-white cursor-pointer"
                                            value={input1} onChange={e => setInput1(e.target.value)}>
                                            <option value="" disabled>-</option>
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                        </select>
                                        out of
                                        <select className="w-14 text-center border-2 border-blue-300 rounded p-1 font-bold focus:border-blue-500 outline-none bg-white cursor-pointer"
                                            value={input2} onChange={e => setInput2(e.target.value)}>
                                            <option value="" disabled>-</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                        </select>
                                        total boxes.
                                    </div>
                                    <Button onClick={checkInputs} className="mt-2 w-full text-sm py-1.5">Check Answer</Button>
                                </div>
                            )}

                            {step === 3 && (
                                <div className="bg-green-50 border-l-4 border-green-500 p-3 rounded-r-lg animate-pop">
                                    <p className="text-base font-semibold text-green-900">👉 Now, click on all the boxes with one big letter and one little letter (Bb).</p>
                                    {targets.Bb.length > 0 && <p className="text-xs text-green-700 mt-1">Hint: There might be more than one!</p>}
                                    {targets.Bb.length === 0 && (
                                        <Button onClick={handleNoneClick} className="mt-3 w-full !bg-white border-2 border-green-500 !text-green-700 hover:!bg-green-100">
                                            There are no 'Bb' boxes
                                        </Button>
                                    )}
                                </div>
                            )}

                            {step === 4 && (
                                <div className="bg-green-50 p-3 rounded-xl border border-green-200 animate-pop">
                                    <p className="text-sm font-semibold text-green-900 mb-2">Awesome! Fill in the blanks for Bb:</p>
                                    <div className="flex items-center gap-2 text-sm text-green-900">
                                        Count:
                                        <select className="w-14 text-center border-2 border-green-300 rounded p-1 font-bold focus:border-green-500 outline-none bg-white cursor-pointer"
                                            value={input1} onChange={e => setInput1(e.target.value)}>
                                            <option value="" disabled>-</option>
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                        </select>
                                        out of
                                        <select className="w-14 text-center border-2 border-green-300 rounded p-1 font-bold focus:border-green-500 outline-none bg-white cursor-pointer"
                                            value={input2} onChange={e => setInput2(e.target.value)}>
                                            <option value="" disabled>-</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                        </select>
                                        total boxes.
                                    </div>
                                    <Button variant="success" onClick={checkInputs} className="mt-2 w-full text-sm py-1.5">Check Answer</Button>
                                </div>
                            )}

                            {step === 5 && (
                                <div className="bg-purple-50 border-l-4 border-purple-500 p-3 rounded-r-lg animate-pop">
                                    <p className="text-base font-semibold text-purple-900">👉 Finally, click on all the boxes with TWO big letters (BB).</p>
                                    {targets.BB.length === 0 && (
                                        <Button onClick={handleNoneClick} className="mt-3 w-full !bg-white border-2 border-purple-500 !text-purple-700 hover:!bg-purple-100">
                                            There are no 'BB' boxes
                                        </Button>
                                    )}
                                </div>
                            )}

                            {step === 6 && (
                                <div className="bg-purple-50 p-3 rounded-xl border border-purple-200 animate-pop">
                                    <p className="text-sm font-semibold text-purple-900 mb-2">Perfect! Fill in the blanks for BB:</p>
                                    <div className="flex items-center gap-2 text-sm text-purple-900">
                                        Count:
                                        <select className="w-14 text-center border-2 border-purple-300 rounded p-1 font-bold focus:border-purple-500 outline-none bg-white cursor-pointer"
                                            value={input1} onChange={e => setInput1(e.target.value)}>
                                            <option value="" disabled>-</option>
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                        </select>
                                        out of
                                        <select className="w-14 text-center border-2 border-purple-300 rounded p-1 font-bold focus:border-purple-500 outline-none bg-white cursor-pointer"
                                            value={input2} onChange={e => setInput2(e.target.value)}>
                                            <option value="" disabled>-</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                        </select>
                                        total boxes.
                                    </div>
                                    <Button onClick={checkInputs} className="mt-2 w-full text-sm py-1.5 !bg-purple-600 hover:!bg-purple-700 !text-white">Check Answer</Button>
                                </div>
                            )}

                            {step === 7 && (
                                <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-200 text-center animate-pop flex flex-col justify-center min-h-[120px]">
                                    <CheckCircle className="w-8 h-8 text-indigo-600 mx-auto mb-2" />
                                    <p className="text-sm font-bold text-indigo-900 mb-1">Great job!</p>
                                    <p className="text-xs text-indigo-700 mb-3">You've successfully analyzed Cross {crossIndex + 1}.</p>
                                    <Button onClick={nextCross} className="mx-auto w-full text-sm py-1.5 !bg-indigo-600 hover:!bg-indigo-700 text-white">Next Punnett Square <ArrowRight className="ml-1 w-4 h-4" /></Button>
                                </div>
                            )}

                            {step === 8 && (
                                <div className="bg-blue-100 p-4 rounded-xl border border-blue-300 text-center animate-pop flex flex-col justify-center min-h-[120px]">
                                    <CheckCircle className="w-8 h-8 text-blue-600 mx-auto mb-2" />
                                    <p className="text-sm font-bold text-blue-900 mb-2">Awesome! You've mastered counting the different genotypes.</p>
                                    <Button onClick={onComplete} variant="success" className="mx-auto mt-1 text-sm py-1.5">Next Phase <ArrowRight className="ml-1 w-4 h-4" /></Button>
                                </div>
                            )}

                            {err && <p className="text-red-500 text-xs font-medium animate-shake flex items-center gap-1"><XCircle className="w-4 h-4 shrink-0" />{err}</p>}

                            {/* Genotype Data Table */}
                            <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-200 shadow-inner mt-auto animate-pop">
                                <h3 className="text-xs font-bold text-slate-700 mb-2 flex items-center gap-1.5">

        // PHASE 2: The Money Method
        const Phase2 = ({ onComplete }) => {

        };

        // PHASE 3: Fractions
        const Phase3 = ({ onComplete }) => {
            const [step, setStep] = useState(1);
            const [selectedLeft, setSelectedLeft] = useState(null);

                                    <div className="flex flex-col gap-1 w-full h-full simplify-transition" style={{ gap: simplified ? '0px' : '4px' }}>
                                        <div className="bg-emerald-400 w-full flex-1 flex items-center justify-center font-bold text-xl text-white simplify-transition">
                                            {simplified ? '' : 'Bb'}
                                        </div>
                                        <div className="bg-emerald-400 w-full flex-1 flex items-center justify-center font-bold text-xl text-white simplify-transition">

                                    <div className="flex flex-col gap-1 w-full h-full simplify-transition" style={{ gap: simplified ? '0px' : '4px' }}>

        // PHASE 4: Scientific Ratios
        const Phase4 = ({ onComplete }) => {
            const [step, setStep] = useState(1);
            const [quizStatus, setQuizStatus] = useState(null);
            const [quizIndex, setQuizIndex] = useState(0);
            const [selectedOpt, setSelectedOpt] = useState(null);

            // Bucket Sort State
            const [bucketA, setBucketA] = useState([]);
            const [bucketB, setBucketB] = useState([]);
            const [terms, setTerms] = useState(['Percents (%)', 'Fractions (/)', 'Ratios (:)']);

                if (!draggedTerm) return;

                    setBucketB(bucketB.filter(t => t !== draggedTerm));
                } else {
                    if (!bucketB.includes(draggedTerm)) setBucketB([...bucketB, draggedTerm]);
                    setBucketA(bucketA.filter(t => t !== draggedTerm));

                setTerms(terms.filter(t => t !== draggedTerm));
                setDraggedTerm(null);
            };

                const aCorrect = bucketA.includes('Percents (%)') && bucketA.includes('Fractions (/)') && bucketA.length === 2;
                const bCorrect = bucketB.includes('Ratios (:)') && bucketB.length === 1;
                if (aCorrect && bCorrect) {
                    onComplete();

            const ratioSum = (parseInt(rLeft) || 0) + (parseInt(rRight) || 0);
            const bothFilled = rLeft !== '' && rRight !== '';

            // 3:1 is correct for Bb x Bb
            const isRatioCorrect = bothFilled && ratioSum === 4 && rLeft === '3' && rRight === '1';

            const quizQuestions = [
                {
                    brown: 3, blue: 1,

                    feedback: {

                {

            const handleNextQuestion = () => {

            return (

                    {step === 1 && (
                        <div className="flex-1 min-h-0 bg-white p-6 rounded-xl shadow-sm border border-slate-200 animate-pop flex flex-row items-center justify-center gap-8">
                            <div className="flex-1 flex justify-center max-w-xs">
                                <PunnettGrid
                                    topAlleles={['B', 'b']} leftAlleles={['B', 'b']}
                                    getBoxState={(i) => [0, 1, 2].includes(i) ? { bgColor: 'bg-amber-100 text-amber-900 border-amber-400' } : { bgColor: 'bg-blue-100 text-blue-900 border-blue-400' }}
                                />
                            </div>

                            <div className="flex-1 max-w-sm bg-slate-50 p-5 rounded-xl border border-slate-200">
                                <h3 className="text-lg font-bold text-slate-800 mb-3">Building the Phenotypic Ratio</h3>
                                <p className="text-slate-600 text-sm mb-4">Type the number of <b>Brown</b> eye boxes on the left, and <b>blue</b> eye boxes on the right.</p>

                                <div className="flex items-center justify-center gap-3 text-2xl font-black text-slate-700 mb-6">
                                    <input type="number" min="0" max="4" value={rLeft} onChange={e => setRLeft(e.target.value)}
                                        className="w-14 h-14 text-center rounded-xl border-4 border-amber-300 bg-amber-50 focus:border-amber-500 outline-none" placeholder="0" />
                                    <span>:</span>
                                    <input type="number" min="0" max="4" value={rRight} onChange={e => setRRight(e.target.value)}
                                        className="w-14 h-14 text-center rounded-xl border-4 border-blue-300 bg-blue-50 focus:border-blue-500 outline-none" placeholder="0" />
                                </div>

                                {bothFilled && (
                                    <div className={`p-3 rounded-xl text-center border-2 transition-all animate-pop
                                        ${ratioSum === 4 ? 'bg-green-50 border-green-300' : 'bg-red-50 border-red-300'}`}>

                                        <Scale className={`w-8 h-8 mx-auto mb-1 transition-transform duration-500 
                                            ${ratioSum === 4 ? 'text-green-600' : 'text-red-500 origin-bottom'} 
                                            ${ratioSum > 4 ? 'rotate-12' : ratioSum < 4 ? '-rotate-12' : ''}`}
                                        />

                                        {ratioSum === 4 ? (
                                            <div>
                                                <p className="font-bold text-sm text-green-800">Perfect! Your numbers add up to 4 total boxes.</p>
                                                {isRatioCorrect ? (
                                                    <Button onClick={() => setStep(2)} variant="success" className="mt-3 w-full">Next: Compare Concepts <ArrowRight className="ml-1 w-4 h-4" /></Button>
                                                ) : (
                                                    <p className="text-red-600 text-sm font-bold mt-1 animate-shake">But wait! Count the brown and blue boxes again.</p>
                                                )}
                                            </div>
                                        ) : (
                                            <p className="font-bold text-sm text-red-700 animate-shake">
                                                Oops! {rLeft} + {rRight} = {ratioSum} boxes.<br />A Punnett square *always* has 4.
                                            </p>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="flex-1 min-h-0 bg-white p-6 rounded-xl shadow-sm border border-slate-200 animate-pop flex flex-col justify-center items-center text-center overflow-y-auto">
                            <h3 className="text-xl font-bold text-slate-800 mb-3">What does a 3:1 ratio actually mean?</h3>
                            <p className="text-slate-600 mb-4 max-w-lg text-sm">
                                Instead of comparing to the <b>whole</b> square, ratios compare the different groups of <strong>siblings</strong> directly to each other.
                            </p>

                            <div className="flex flex-col items-center w-full max-w-lg mb-5 bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-inner">
                                <p className="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest border-b border-slate-200 w-full pb-1">A Family of 4 Siblings</p>

                                <div className="flex items-end justify-center gap-6 md:gap-10 w-full">
                                    <div className="flex flex-col items-center gap-3">
                                        <div className="flex items-end relative h-16">
                                            <Cyclops eyeColor="#b45309" className="w-12 h-12 z-10 hover:scale-110 transition-transform cursor-pointer" />
                                            <Cyclops eyeColor="#b45309" className="w-16 h-16 -ml-4 z-20 hover:scale-110 transition-transform cursor-pointer" />
                                            <Cyclops eyeColor="#b45309" className="w-10 h-10 -ml-3 z-30 hover:scale-110 transition-transform cursor-pointer" />
                                        </div>
                                        <div className="bg-amber-100 text-amber-900 font-bold px-4 py-1.5 rounded-lg text-sm border-2 border-amber-300 shadow-sm">
                                            3 Brown-Eyed
                                        </div>
                                    </div>

                                    <div className="text-4xl font-black text-slate-300 pb-8">:</div>

                                    <div className="flex flex-col items-center gap-3">
                                        <div className="flex items-end h-16">
                                            <Cyclops eyeColor="#3b82f6" className="w-12 h-12 hover:scale-110 transition-transform cursor-pointer" />
                                        </div>
                                        <div className="bg-blue-100 text-blue-900 font-bold px-4 py-1.5 rounded-lg text-sm border-2 border-blue-300 shadow-sm">
                                            1 Blue-Eyed
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4 max-w-xl w-full mb-6 text-left">
                                <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-200">
                                    <h4 className="font-bold text-emerald-900 mb-1 text-sm">Fractions & Percents</h4>
                                    <p className="text-xs text-emerald-800 leading-relaxed">Compare to the <b>WHOLE</b> square.<br /><i>"3 out of 4 total boxes" (75%)</i></p>
                                </div>
                                <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-200">
                                    <h4 className="font-bold text-indigo-900 mb-1 text-sm">Ratios</h4>
                                    <p className="text-xs text-indigo-800 leading-relaxed">Compare <b>SIBLINGS</b> to each other.<br /><i>"3 brown-eyed babies for every 1 blue-eyed baby"</i></p>
                                </div>
                            </div>

                            <Button onClick={() => setStep(3)}>I understand the difference</Button>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="flex-1 min-h-0 bg-white p-6 rounded-xl shadow-sm border border-slate-200 animate-pop flex flex-col justify-start items-center text-center overflow-y-auto">
                            <h3 className="text-lg font-black text-indigo-900 mb-1">{currentQ.title}</h3>

                            <SiblingGroup brown={currentQ.brown} blue={currentQ.blue} />

                            <p className="text-slate-700 mb-6 max-w-lg text-sm font-medium">
                                {currentQ.text}
                            </p>

                            <div className="flex flex-col gap-3 w-full max-w-md mb-6">
                                {currentQ.options.map((opt, i) => {
                                    const letter = String.fromCharCode(65 + i); // A, B, C...
                                    return (
                                        <button
                                            key={i}
                                            onClick={() => { setSelectedOpt(i); setQuizStatus(opt.isCorrect ? 'correct' : 'incorrect'); }}
                                            disabled={quizStatus === 'correct'}
                                            className={`p-3 border-2 rounded-xl text-sm font-bold transition-all text-left flex items-center gap-3
                                                ${quizStatus === 'correct' && opt.isCorrect ? 'border-green-500 bg-green-50 text-green-800' :
                                                    selectedOpt === i && quizStatus === 'incorrect' ? 'border-red-400 bg-red-50 text-red-800' :
                                                        'border-slate-300 hover:border-indigo-400 hover:bg-indigo-50 text-slate-700'}
                                                ${quizStatus === 'correct' && !opt.isCorrect ? 'opacity-50' : ''}`}
                                        >
                                            <div className="w-6 h-6 rounded-full border-2 border-current flex items-center justify-center shrink-0">{letter}</div>
                                            {opt.text}
                                        </button>
                                    );
                                })}
                            </div>

                            {quizStatus === 'incorrect' && (
                                <p className="text-red-600 text-sm font-bold animate-shake mb-4 max-w-md">{currentQ.feedback.incorrect}</p>
                            )}

                            {quizStatus === 'correct' && (
                                <div className="animate-pop w-full max-w-md mt-2">
                                    <p className="text-green-700 text-sm font-bold mb-4">{currentQ.feedback.correct}</p>
                                    <Button onClick={handleNextQuestion} variant="success" className="mx-auto">
                                        {quizIndex < quizQuestions.length - 1 ? 'Next Question' : 'Next: Sort the Math Terms'} <ArrowRight className="ml-1 w-4 h-4" />
                                    </Button>
                                </div>
                            )}
                        </div>
                    )}

                    {step === 4 && (
                        <div className="flex-1 min-h-0 bg-white p-6 rounded-xl shadow-sm border border-slate-200 overflow-y-auto animate-pop">
                            <p className="text-base font-bold text-center mb-4 text-slate-700">Final check: Drag terms into the correct buckets to lock in what they measure.</p>

                            <div className="flex justify-center gap-2 mb-6 min-h-[40px]">
                                {terms.map(t => (
                                    <div key={t} draggable onDragStart={() => setDraggedTerm(t)}
                                        className="bg-indigo-100 border-2 border-indigo-400 text-indigo-900 font-bold px-3 py-1 text-sm rounded-lg cursor-grab active:cursor-grabbing shadow-sm">
                                        {t}
                                    </div>
                                ))}
                            </div>

                            <div className="grid grid-cols-2 gap-6">
                                <div onDragOver={e => e.preventDefault()} onDrop={e => handleDropBucket(e, 'A')}
                                    className="border-4 border-dashed border-slate-300 bg-slate-50 rounded-xl p-4 min-h-[120px]">
                                    <h4 className="font-bold text-slate-700 text-sm mb-3 text-center border-b pb-2">Bucket A:<br />Compares to the WHOLE square</h4>
                                    <div className="flex flex-col gap-2">
                                        {bucketA.map(t => <div key={t} className="bg-indigo-100 border-2 border-indigo-400 text-indigo-900 font-bold px-2 py-1 text-sm rounded-lg text-center">{t}</div>)}
                                    </div>
                                </div>
                                <div onDragOver={e => e.preventDefault()} onDrop={e => handleDropBucket(e, 'B')}
                                    className="border-4 border-dashed border-slate-300 bg-slate-50 rounded-xl p-4 min-h-[120px]">
                                    <h4 className="font-bold text-slate-700 text-sm mb-3 text-center border-b pb-2">Bucket B:<br />Compares SIBLINGS to each other</h4>
                                    <div className="flex flex-col gap-2">
                                        {bucketB.map(t => <div key={t} className="bg-indigo-100 border-2 border-indigo-400 text-indigo-900 font-bold px-2 py-1 text-sm rounded-lg text-center">{t}</div>)}
                                    </div>
                                </div>
                            </div>

                            <div className="mt-6 flex justify-center">
                                <Button onClick={checkBuckets} disabled={terms.length > 0} variant="success">Check Sorting & Finish Phase</Button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // PHASE 5: Synthesis (Boss Level)
        const Phase5 = () => {
            const bossRounds = [
                {
                    top: ['T', 't'], left: ['t', 't'],
                    title: 'Tall x Short plants',
                    domName: 'Tall Plants', recName: 'Short Plants',
                    domSymbol: 'T', recSymbol: 't',
                    domStyle: 'bg-emerald-100 text-emerald-900 border-emerald-400',
                    recStyle: 'bg-emerald-50 text-emerald-600 border-slate-300',
                    domDot: 'bg-emerald-400 border-emerald-500',
                    recDot: 'bg-white border-slate-400',
                    domLabel: 'Tall (Tt)',
                    recLabel: 'Short (tt)'
                },
                {
                    top: ['P', 'p'], left: ['P', 'p'],
                    title: 'Purple x Purple flowers',
                    domName: 'Purple Flowers', recName: 'White Flowers',
                    domSymbol: 'P', recSymbol: 'p',
                    domStyle: 'bg-purple-100 text-purple-900 border-purple-400',
                    recStyle: 'bg-purple-50 text-purple-600 border-slate-300',
                    domDot: 'bg-purple-400 border-purple-500',
                    recDot: 'bg-white border-slate-400',
                    domLabel: 'Purple (PP or Pp)',
                    recLabel: 'White (pp)'
                }
            ];

            const [roundIndex, setRoundIndex] = useState(0);
            const [inputs, setInputs] = useState({
                dom_outOf4: '', dom_frac: '', dom_pct: '',
                rec_outOf4: '', rec_frac: '', rec_pct: '',
                rLeft: '', rRight: ''
            });
            const [showConfetti, setShowConfetti] = useState(false);
            const [err, setErr] = useState('');

            const currentRound = bossRounds[roundIndex];

            // Dynamic count calculation based on current cross
            const getCounts = () => {
                let dom = 0, rec = 0;
                [0, 1].forEach(r => {
                    [0, 1].forEach(c => {
                        const box = currentRound.top[c] + currentRound.left[r];
                        if (box.includes(currentRound.domSymbol)) dom++;
                        else rec++;
                    });
                });
                return { dom, rec };
            };
            const counts = getCounts();

            const updateInput = (key, val) => setInputs(prev => ({ ...prev, [key]: val }));

            const validateAll = () => {
                const i = inputs;

                // Allow exact fractions, or proper simplified versions
                const checkFrac = (val, expectedCount) => {
                    const v = val.replace(/\s+/g, '');
                    if (v === `${expectedCount}/4`) return true;
                    if (expectedCount === 2 && v === '1/2') return true;
                    if (expectedCount === 4 && (v === '1/1' || v === '1')) return true;
                    if (expectedCount === 0 && (v === '0/1' || v === '0')) return true;
                    return false;
                };

                const domCorrect = (i.dom_outOf4 === String(counts.dom)) && checkFrac(i.dom_frac, counts.dom) && (i.dom_pct.replace('%', '') === String(counts.dom * 25));
                const recCorrect = (i.rec_outOf4 === String(counts.rec)) && checkFrac(i.rec_frac, counts.rec) && (i.rec_pct.replace('%', '') === String(counts.rec * 25));

                const ratioCorrect = (i.rLeft === String(counts.dom) && i.rRight === String(counts.rec)) ||
                    (counts.dom === 2 && counts.rec === 2 && i.rLeft === '1' && i.rRight === '1');

                if (domCorrect && recCorrect && ratioCorrect) {
                    setErr('');
                    if (roundIndex < bossRounds.length - 1) {
                        setRoundIndex(roundIndex + 1);
                        // Reset all inputs for the next round
                        setInputs({ dom_outOf4: '', dom_frac: '', dom_pct: '', rec_outOf4: '', rec_frac: '', rec_pct: '', rLeft: '', rRight: '' });
                    } else {
                        setShowConfetti(true);
                    }
                } else {
                    setErr('Something is incorrect. Check your fractions, percents, and ratios carefully!');
                }
            };

            if (showConfetti) {
                return (
                    <div className="h-full flex flex-col items-center justify-center p-8 bg-white rounded-2xl shadow-xl border-4 border-yellow-400 relative overflow-hidden animate-pop">
                        <Confetti />
                        <Trophy className="w-20 h-20 text-yellow-500 mx-auto mb-4 drop-shadow-md" />
                        <h1 className="text-3xl font-black text-slate-800 mb-3">Genetics Math Master!</h1>
                        <p className="text-lg text-slate-600 mb-6">You successfully translated genotypes into fractions, percentages, and scientific ratios.</p>
                        <div className="bg-yellow-50 border border-yellow-200 p-4 rounded-xl inline-block shadow-sm">
                            <p className="font-bold text-yellow-800">Badge Unlocked: Translator of Squares 🧬</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-full flex flex-col space-y-3 animate-pop">
                    <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 text-center bg-gradient-to-r from-indigo-900 to-purple-900 text-white shrink-0">
                        <h2 className="text-lg font-bold mb-1 flex items-center justify-center gap-2">
                            <Trophy className="w-5 h-5 text-yellow-400" /> Boss Level: Round {roundIndex + 1} of {bossRounds.length}
                        </h2>
                        <p className="text-indigo-100 text-sm">Fill out all the missing blanks for this cross: {currentRound.top.join('')} x {currentRound.left.join('')} ({currentRound.title}).</p>
                    </div>

                    <div key={roundIndex} className="flex-1 min-h-0 bg-white p-4 md:p-5 rounded-xl shadow-sm border border-slate-200 overflow-y-auto animate-pop">
                        <div className="flex flex-row gap-6 items-start h-full">

                            <div className="w-1/3 flex flex-col justify-center">
                                <PunnettGrid
                                    topAlleles={currentRound.top} leftAlleles={currentRound.left}
                                    getBoxState={(i) => {
                                        const c = i % 2;
                                        const r = Math.floor(i / 2);
                                        const box = currentRound.top[c] + currentRound.left[r];
                                        return box.includes(currentRound.domSymbol) ? { bgColor: currentRound.domStyle } : { bgColor: currentRound.recStyle };
                                    }}
                                />
                                <div className="text-center mt-4 flex gap-3 justify-center">
                                    <span className={`flex items-center gap-1 text-xs font-bold text-slate-700`}>
                                        <div className={`w-3 h-3 border rounded ${currentRound.domDot}`}></div> {currentRound.domLabel}
                                    </span>
                                    <span className={`flex items-center gap-1 text-xs font-bold text-slate-500`}>
                                        <div className={`w-3 h-3 border rounded ${currentRound.recDot}`}></div> {currentRound.recLabel}
                                    </span>
                                </div>
                            </div>

                            <div className="w-2/3 flex flex-col space-y-4">
                                <div className="overflow-x-auto border border-slate-200 rounded-lg">
                                    <table className="w-full text-left border-collapse text-sm">
                                        <thead>
                                            <tr className="bg-slate-50">
                                                <th className="p-2 border-b-2 border-slate-200 text-slate-600">Trait (Phenotype)</th>
                                                <th className="p-2 border-b-2 border-slate-200 text-slate-600">Boxes (out of 4)</th>
                                                <th className="p-2 border-b-2 border-slate-200 text-slate-600">Fraction (/)</th>
                                                <th className="p-2 border-b-2 border-slate-200 text-slate-600">Percent (%)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="font-medium">
                                            <tr>
                                                <td className={`p-2 border-b border-slate-100 font-bold ${currentRound.domSymbol === 'T' ? 'text-emerald-700' : 'text-purple-700'}`}>
                                                    {currentRound.domName}
                                                </td>
                                                <td className="p-2 border-b border-slate-100">
                                                    <select value={inputs.dom_outOf4} onChange={e => updateInput('dom_outOf4', e.target.value)} className="border-2 border-slate-300 rounded p-1 bg-slate-50 w-full outline-none focus:border-indigo-500 text-center">
                                                        <option value="">-</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option>
                                                    </select>
                                                </td>
                                                <td className="p-2 border-b border-slate-100">
                                                    <input type="text" value={inputs.dom_frac} onChange={e => updateInput('dom_frac', e.target.value)} placeholder="e.g. 1/4" className="border-2 border-slate-300 rounded p-1 w-full text-center focus:border-indigo-500 outline-none" />
                                                </td>
                                                <td className="p-2 border-b border-slate-100">
                                                    <input type="text" value={inputs.dom_pct} onChange={e => updateInput('dom_pct', e.target.value)} placeholder="e.g. 25" className="border-2 border-slate-300 rounded p-1 w-full text-center focus:border-indigo-500 outline-none" />
                                                </td>
                                            </tr>
                                            <tr>
                                                <td className="p-2 text-slate-600 font-bold">{currentRound.recName}</td>
                                                <td className="p-2">
                                                    <select value={inputs.rec_outOf4} onChange={e => updateInput('rec_outOf4', e.target.value)} className="border-2 border-slate-300 rounded p-1 bg-slate-50 w-full outline-none focus:border-indigo-500 text-center">
                                                        <option value="">-</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option>
                                                    </select>
                                                </td>
                                                <td className="p-2">
                                                    <input type="text" value={inputs.rec_frac} onChange={e => updateInput('rec_frac', e.target.value)} placeholder="e.g. 1/4" className="border-2 border-slate-300 rounded p-1 w-full text-center focus:border-indigo-500 outline-none" />
                                                </td>
                                                <td className="p-2">
                                                    <input type="text" value={inputs.rec_pct} onChange={e => updateInput('rec_pct', e.target.value)} placeholder="e.g. 25" className="border-2 border-slate-300 rounded p-1 w-full text-center focus:border-indigo-500 outline-none" />
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-200 flex flex-row items-center justify-between">
                                    <p className="font-bold text-sm text-indigo-900 w-1/2">
                                        Bonus Challenge: Phenotypic ratio of {currentRound.domName.split(' ')[0]} to {currentRound.recName.split(' ')[0]}?
                                    </p>
                                    <div className="flex items-center gap-2 text-xl font-black text-indigo-900">
                                        <input type="number" min="0" max="4" value={inputs.rLeft} onChange={e => updateInput('rLeft', e.target.value)} className="w-12 h-12 text-center border-4 border-indigo-300 rounded-lg focus:border-indigo-500 outline-none" placeholder="0" />
                                        <span>:</span>
                                        <input type="number" min="0" max="4" value={inputs.rRight} onChange={e => updateInput('rRight', e.target.value)} className="w-12 h-12 text-center border-4 border-indigo-300 rounded-lg focus:border-indigo-500 outline-none" placeholder="0" />
                                    </div>
                                </div>

                                {err && <p className="text-red-600 text-sm font-bold animate-shake bg-red-50 p-2 rounded-lg border border-red-200 text-center">{err}</p>}

                                <Button onClick={validateAll} className="w-full mt-auto">
                                    {roundIndex < bossRounds.length - 1 ? 'Submit & Next Round' : 'Submit Final Answers'}
                                </Button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [phase, setPhase] = useState(1);

            const renderPhase = () => {
                switch (phase) {
                    case 1: return <Phase1 onComplete={() => setPhase(2)} />;
                    case 2: return <Phase2 onComplete={() => setPhase(3)} />;
                    case 3: return <Phase3 onComplete={() => setPhase(4)} />;
                    case 4: return <Phase4 onComplete={() => setPhase(5)} />;
                    case 5: return <Phase5 />;
                    default: return <Phase1 onComplete={() => setPhase(2)} />;
                }
            };

            return (
                <div className="h-screen w-full p-2 md:p-4 flex flex-col max-w-6xl mx-auto font-sans overflow-hidden bg-[#f8fafc]">
                    {/* Header / Progress bar */}
                    <header className="mb-2 shrink-0">
                        <div className="flex justify-between items-end mb-2">
                            <h1 className="text-xl md:text-2xl font-black text-slate-800 tracking-tight">Translating Punnett Squares</h1>
                            <span className="text-xs font-bold text-slate-500 bg-slate-200 px-2 py-1 rounded-full">Phase {phase} of 5</span>
                        </div>
                        <div className="h-2 w-full bg-slate-200 rounded-full overflow-hidden flex">
                            {[1, 2, 3, 4, 5].map(p => (
                                <div key={p}
                                    onClick={() => setPhase(p)}
                                    className={`h-full flex-1 border-r border-slate-300 last:border-0 transition-colors duration-500 cursor-pointer ${p <= phase ? 'bg-blue-600 hover:bg-blue-500' : 'bg-transparent hover:bg-slate-300'}`}
                                />
                            ))}
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 min-h-0 overflow-hidden">
                        {renderPhase()}
                    </main>

                    {/* Navigation Footer */}
                    <footer className="mt-2 shrink-0 flex justify-center items-center gap-2 pt-2 border-t border-slate-200">
                        <button
                            onClick={() => setPhase(Math.max(1, phase - 1))}
                            disabled={phase === 1}
                            className="px-3 py-1.5 rounded-lg text-sm font-bold border-2 border-slate-300 text-slate-600 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
                        >
                            &larr; Prev
                        </button>

                        <div className="flex gap-1">
                            {[1, 2, 3, 4, 5].map(p => (
                                <button
                                    key={p}
                                    onClick={() => setPhase(p)}
                                    className={`w-8 h-8 rounded-full text-sm font-bold transition-all ${p === phase ? 'bg-blue-600 text-white shadow-md scale-110' : 'bg-slate-200 text-slate-600 hover:bg-slate-300 hover:scale-105'}`}
                                >
                                    {p}
                                </button>
                            ))}
                        </div>

                        <button
                            onClick={() => setPhase(Math.min(5, phase + 1))}
                            disabled={phase === 5}
                            className="px-3 py-1.5 rounded-lg text-sm font-bold border-2 border-slate-300 text-slate-600 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
                        >
                            Next &rarr;
                        </button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
