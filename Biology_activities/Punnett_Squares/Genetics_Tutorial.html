<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Genetics Tutorial</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (UMD via Unpkg) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f5f3ff;
        }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
        }
        .animate-bounce-slow { animation: bounce-slow 1s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Inline Lucide Icons ---
        const Lock = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
        );

        const Unlock = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 9.9-1" />
            </svg>
        );

        const CheckCircle = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" />
            </svg>
        );

        const ArrowRight = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" />
            </svg>
        );

        const PaintBucket = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11Z"/><path d="m5 15 3 3"/><path d="M22 22n-3.2-3.2c-.8-.8-2-.8-2.8 0L10 21"/>
            </svg>
        );

        const Dna = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="m8 8 8 8"/><path d="m8 16 8-8"/><path d="m19 11-3-3"/><path d="m19 14-3 3"/><path d="m5 11 3-3"/><path d="m5 14 3 3"/>
            </svg>
        );

        const ArrowDown = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 5v14"/><path d="m19 12-7 7-7-7"/>
            </svg>
        );

        const Sparkles = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
            </svg>
        );

        const AlertCircle = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
            </svg>
        );

        const TableIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 3v18"/><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/>
            </svg>
        );

        // --- Reusable UI Components ---

        const Monster = ({ genotype, className = "w-32 h-32" }) => {
        const isUnpainted = !genotype; 
        const isPurple = genotype.includes('F');
        const baseColor = isUnpainted ? '#e5e7eb' : (isPurple ? '#a855f7' : '#facc15');
        const darkColor = isUnpainted ? '#9ca3af' : (isPurple ? '#7e22ce' : '#ca8a04');

        return (
        <div className={`relative ${className} animate-pop`}>
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                <ellipse cx="50" cy="90" rx="30" ry="6" fill="rgba(0,0,0,0.15)" />
                <rect x="30" y="70" width="12" height="20" rx="6" fill={darkColor} />
                <rect x="58" y="70" width="12" height="20" rx="6" fill={darkColor} />
                <path d="M 20 50 C 20 15, 80 15, 80 50 C 80 85, 75 80, 50 80 C 25 80, 20 85, 20 50 Z" fill={baseColor} />
                {/* Ears (Now always visible) */}
                <path d="M 30 25 Q 20 10 10 15 Q 15 25 25 28 Z" fill={darkColor} />
                <path d="M 70 25 Q 80 10 90 15 Q 85 25 75 28 Z" fill={darkColor} />
                
                <circle cx="35" cy="45" r="8" fill="white" />
                <circle cx="35" cy="45" r="3" fill="#1e293b" />
                <circle cx="65" cy="45" r="8" fill="white" />
                <circle cx="65" cy="45" r="3" fill="#1e293b" />
                <circle cx="33" cy="43" r="1.5" fill="white" />
                <circle cx="63" cy="43" r="1.5" fill="white" />
                <path d="M 42 60 Q 50 68 58 60" stroke="#1e293b" strokeWidth="3" fill="transparent" strokeLinecap="round" />
            </svg>
        </div>
        );
        };

        const Card = ({ children, className = "" }) => (
        <div className={`bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden ${className}`}>
            {children}
        </div>
        );

        const Button = ({ onClick, disabled, className = "", children, variant = "primary" }) => {
        const baseStyle = "px-6 py-3 rounded-lg font-bold transition-all transform active:scale-95 flex items-center justify-center gap-2";
        const variants = {
        primary: "bg-purple-600 text-white hover:bg-purple-700 disabled:bg-gray-300 disabled:text-gray-500",
        secondary: "bg-yellow-400 text-yellow-900 hover:bg-yellow-500 disabled:bg-gray-200",
        outline: "border-2 border-purple-600 text-purple-600 hover:bg-purple-50",
        };
        return (
        <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
            {children}
        </button>
        );
        };

        // --- Interactive Challenges ---

        const Challenge1 = ({ onSuccess }) => {
        const [selected, setSelected] = useState([]);
        const [phase, setPhase] = useState('initial'); 
        const [followUpChoice, setFollowUpChoice] = useState(null);
        const [scaffoldFeedback, setScaffoldFeedback] = useState("");

        const items = [
        { id: 'fur', label: 'Fur Color', isTrait: true },
        { id: 'hat', label: 'Wearing a Hat', isTrait: false },
        { id: 'scar', label: 'A Battle Scar', isTrait: false },
        { id: 'horns', label: 'Horn Size', isTrait: true },
        { id: 'food', label: 'Favorite Food', isTrait: false },
        { id: 'eyes', label: 'Number of Eyes', isTrait: true },
        ];

        const toggle = (id) => { setSelected(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]); };

        const checkInitialAnswer = () => {
        const correctIds = items.filter(i => i.isTrait).map(i => i.id);
        if (selected.length === correctIds.length && selected.every(id => correctIds.includes(id))) setPhase('followup');
        else { setPhase('scaffolding'); setScaffoldFeedback(""); }
        };

        const handleScaffoldAnswer = (isCorrect) => {
        if (isCorrect) { setScaffoldFeedback("Exactly! Biological traits are built-in from birth."); setTimeout(() => { setPhase('initial'); setSelected([]); }, 1500); }
        else setScaffoldFeedback("Not quite! Think about the baby monster.");
        };

        const checkFollowUp = () => { if (followUpChoice === 'B') onSuccess(); else alert("Think about DNA!"); };

        if (phase === 'scaffolding') {
        return (
        <div className="flex flex-col items-center gap-4 w-full animate-fade-in text-sm">
            <div className="bg-orange-50 border-2 border-orange-200 p-6 rounded-xl flex flex-col gap-4 w-full max-w-lg">
                <h3 className="font-bold text-orange-800 flex items-center gap-2 text-base"><AlertCircle size={20} /> Let's think!</h3>
                <p className="text-gray-700">Acquired things aren't passed down through DNA.</p>
                <div className="bg-white p-4 rounded border border-orange-100 shadow-sm text-xs">
                    <p className="font-medium mb-3">If a monster gets a "Battle Scar", will its babies inherit it?</p>
                    <div className="flex flex-col gap-2">
                        <button onClick={()=> handleScaffoldAnswer(false)} className="px-4 py-2 text-left rounded border hover:bg-gray-50">Yes</button>
                        <button onClick={()=> handleScaffoldAnswer(true)} className="px-4 py-2 text-left rounded border hover:bg-gray-50">No, it's not DNA</button>
                    </div>
                </div>
                {scaffoldFeedback && <div className={`p-3 rounded font-medium ${scaffoldFeedback.startsWith('Exactly') ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800' }`}>{scaffoldFeedback}</div>}
            </div>
        </div>
        );
        }

        if (phase === 'followup') {
        return (
        <div className="flex flex-col items-center gap-4 w-full animate-fade-in text-sm">
            <div className="bg-green-50 border-2 border-green-200 p-6 rounded-xl flex flex-col gap-4 w-full max-w-lg">
                <h3 className="font-bold text-green-800 flex items-center gap-2"><CheckCircle size={20} /> Spot on!</h3>
                <div className="bg-white p-4 rounded border border-green-100 shadow-sm">
                    <p className="font-medium mb-3">Why are these biological traits?</p>
                    <div className="flex flex-col gap-2">
                        {[ { id: 'A', text: 'Learned behaviors.' }, { id: 'B', text: 'Determined by DNA inherited from parents.' }, { id: 'C', text: 'Environment only.' } ].map(opt => (
                        <div key={opt.id} onClick={()=> setFollowUpChoice(opt.id)} className={`p-3 rounded border-2 cursor-pointer transition-all ${followUpChoice === opt.id ? 'border-purple-600 bg-purple-100 font-bold' : 'bg-white border-gray-200 hover:border-purple-300'}`}>{opt.text}</div> ))}
                    </div>
                </div>
                <Button disabled={!followUpChoice} onClick={checkFollowUp} className="w-full mt-2">Submit</Button>
            </div>
        </div>
        );
        }

        return (
        <div className="flex flex-col items-center gap-4 animate-fade-in">
            <p className="text-center text-gray-700 mb-2 font-medium text-sm">Select ONLY biological traits.</p>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3 w-full">
                {items.map(item => ( <div key={item.id} onClick={()=> toggle(item.id)} className={`cursor-pointer p-4 rounded-lg border-2 text-center transition-all ${selected.includes(item.id) ? 'border-purple-600 bg-purple-100 font-bold text-purple-800' : 'border-gray-200 bg-gray-50'}`}>{item.label}</div> ))}
            </div>
            <Button onClick={checkInitialAnswer} className="mt-4">Check Answer</Button>
        </div>
        );
        };

        const Challenge2 = ({ onSuccess }) => {
        const [selected, setSelected] = useState([]);
        const [phase, setPhase] = useState('initial'); 
        const symbols = ['P', 'p', 'F', 'f', 'Y', 'y'];
        const toggle = (sym) => { setSelected(prev => prev.includes(sym) ? prev.filter(s => s !== sym) : [...prev, sym]); };

        const checkAnswer = () => {
            if (selected.length !== 2) { alert("Select exactly TWO."); return; }
            if (selected.includes('F') && selected.includes('f')) setPhase('clarification');
            else setPhase('wrong_step1');
        };

        if (phase === 'clarification') {
        return (
        <div className="flex flex-col items-center gap-4 w-full animate-fade-in">
            <div className="bg-green-50 border-green-200 border-2 p-6 rounded-xl flex flex-col gap-4 w-full max-w-lg shadow-lg">
                <h3 className="font-bold text-green-800 flex items-center gap-2 text-lg"><CheckCircle size={24} /> Correct!</h3>
                <div className="bg-white p-3 rounded-lg border-2 border-green-200 relative">
                    <div className="flex justify-around items-end mt-4 px-4 font-black text-2xl"><div className="flex flex-col items-center"><Monster genotype="FF" className="w-16 h-16" /><span className="text-green-600">F</span></div><div className="flex flex-col items-center"><Monster genotype="ff" className="w-16 h-16" /><span className="text-green-600">f</span></div></div>
                    <p className="text-center text-sm mt-3 font-medium text-green-800">Same letter = Same gene!</p>
                </div>
                <Button onClick={onSuccess} className="w-full mt-2 py-4">Continue</Button>
            </div>
        </div>
        );
        }

        if (phase === 'wrong_step1') {
        return (
        <div className="flex flex-col items-center gap-4 w-full animate-fade-in text-sm">
            <div className="bg-orange-50 border-orange-200 border-2 p-6 rounded-xl flex flex-col gap-4 w-full max-w-lg shadow-lg">
                <h3 className="font-bold text-orange-800 flex items-center gap-2"><AlertCircle size={24} /> Not quite!</h3>
                <div className="bg-white p-4 rounded-lg border shadow-sm mt-2">
                    <p className="font-bold mb-3">Different letters mean different traits (like Color vs. Horns).</p>
                    <p className="mb-4">Which pair shows two versions of the <strong>SAME</strong> gene?</p>
                    <div className="flex flex-col gap-2">
                        <button onClick={()=> setPhase('initial')} className="p-3 text-left rounded border-2 hover:border-blue-400 font-bold">A and B</button>
                        <button onClick={()=> { setPhase('initial'); setSelected([]); }} className="p-3 text-left rounded border-2 hover:border-blue-400 font-bold">D and d (Same letter, different cases!)</button>
                    </div>
                </div>
            </div>
        </div>
        );
        }

        return (
        <div className="flex flex-col items-center gap-6 animate-fade-in text-sm">
            <div className="flex justify-center gap-8 w-full bg-gray-50 p-4 rounded-xl border border-gray-200"><div className="flex flex-col items-center"><Monster genotype="FF" className="w-20 h-20" /><span className="font-bold text-purple-700 mt-2">Purple</span></div><div className="flex flex-col items-center"><Monster genotype="ff" className="w-20 h-20" /><span className="font-bold text-yellow-600 mt-2">Yellow</span></div></div>
            <p className="text-center text-gray-700 font-medium">Select the TWO alleles for these monsters.</p>
            <div className="flex flex-wrap justify-center gap-3 w-full max-w-md">
                {symbols.map((sym, i) => ( <div key={i} onClick={()=> toggle(sym)} className={`cursor-pointer w-12 h-12 rounded-full flex items-center justify-center text-xl font-bold border-4 transition-all ${selected.includes(sym) ? 'border-purple-500 bg-purple-500 text-white scale-110 shadow-lg' : 'border-gray-200 bg-white text-gray-600 hover:border-purple-200'}`}>{sym}</div> ))}
            </div>
            <Button onClick={checkAnswer} className="mt-2">Lock in Alleles</Button>
        </div>
        );
        };

        const Challenge3 = ({ onSuccess }) => {
        const [babySlots, setBabySlots] = useState([null, null]);
        const [phase, setPhase] = useState('first'); 
        const [firstCombo, setFirstCombo] = useState(null);
        const [errorMsg, setErrorMsg] = useState("");
        const [isCompleted, setIsCompleted] = useState(false);

        const fillSlot = (allele, idx) => { if (phase === 'congratulate' || isCompleted) return; const n = [...babySlots]; n[idx] = allele; setBabySlots(n); setErrorMsg(""); };

        useEffect(() => {
            if (babySlots[0] && babySlots[1]) {
                if (phase === 'first') { setTimeout(() => { setFirstCombo([...babySlots]); setPhase('congratulate'); }, 500); }
                else if (phase === 'second' && !isCompleted) {
                    if (babySlots[0] === firstCombo[0] && babySlots[1] === firstCombo[1]) { setTimeout(() => { setErrorMsg("Try a DIFFERENT combo!"); setBabySlots([null, null]); }, 300); }
                    else { setErrorMsg(""); setIsCompleted(true); setTimeout(onSuccess, 800); }
                }
            }
        }, [babySlots, phase, firstCombo, onSuccess, isCompleted]);

        return (
        <div className="flex flex-col items-center gap-6 w-full text-sm">
            {phase === 'first' && <p className="text-center font-medium">Click one allele from each parent.</p>}
            {phase === 'congratulate' && <div className="bg-green-50 border-2 border-green-200 p-5 rounded-xl flex flex-col items-center gap-3 w-full animate-fade-in shadow-sm"><h3 className="font-bold text-green-800 flex items-center gap-2"><CheckCircle size={20} /> Great!</h3><p className="text-gray-700 text-center">Genotype: <strong className="bg-green-200 px-2 py-1 rounded">{firstCombo.join('')}</strong>. Find another!</p><Button onClick={()=> { setPhase('second'); setBabySlots([null, null]); }}>Another One</Button></div>}
            {errorMsg && <div className="bg-orange-50 text-orange-800 p-2 rounded text-xs font-bold animate-pop flex items-center gap-2"><AlertCircle size={14} /> {errorMsg}</div>}
            <div className={`flex justify-around w-full max-w-sm ${(phase==='congratulate' || isCompleted) ? 'opacity-40' : '' }`}>
                <div className="flex flex-col items-center bg-blue-50 p-3 rounded-xl border border-blue-200"><span className="text-xs font-bold text-blue-800 mb-2">Parent 1</span><Monster genotype="Ff" className="w-10 h-10 mb-2" /><div className="flex gap-2"><button onClick={()=> fillSlot('F', 0)} className={`w-8 h-8 border-2 rounded font-bold ${babySlots[0] === 'F' ? 'bg-blue-500 text-white' : 'bg-white'}`}>F</button><button onClick={()=> fillSlot('f', 0)} className={`w-8 h-8 border-2 rounded font-bold ${babySlots[0] === 'f' ? 'bg-blue-500 text-white' : 'bg-white'}`}>f</button></div></div>
                <div className="flex flex-col items-center bg-pink-50 p-3 rounded-xl border border-pink-200"><span className="text-xs font-bold text-pink-800 mb-2">Parent 2</span><Monster genotype="Ff" className="w-10 h-10 mb-2" /><div className="flex gap-2"><button onClick={()=> fillSlot('F', 1)} className={`w-8 h-8 border-2 rounded font-bold ${babySlots[1] === 'F' ? 'bg-pink-500 text-white' : 'bg-white'}`}>F</button><button onClick={()=> fillSlot('f', 1)} className={`w-8 h-8 border-2 rounded font-bold ${babySlots[1] === 'f' ? 'bg-pink-500 text-white' : 'bg-white'}`}>f</button></div></div>
            </div>
            <div className="flex flex-col items-center"><ArrowDown className="text-gray-400 mb-2" size={24} /><div className="bg-purple-100 p-4 rounded-xl border-4 border-purple-300 flex flex-col items-center shadow-md"><span className="font-bold text-purple-900 text-xs mb-2">Baby Monster DNA</span><div className="flex gap-4"><div className={`w-12 h-12 rounded flex items-center justify-center text-xl font-black border-4 ${babySlots[0] ? 'bg-blue-400 text-white animate-pop' : 'bg-white border-dashed border-gray-400' }`}>{babySlots[0] || '?'}</div><div className={`w-12 h-12 rounded flex items-center justify-center text-xl font-black border-4 ${babySlots[1] ? 'bg-pink-400 text-white animate-pop' : 'bg-white border-dashed border-gray-400' }`}>{babySlots[1] || '?'}</div></div></div></div>
        </div>
        );
        };

        const Challenge4 = ({ onSuccess }) => {
        const [monsters, setMonsters] = useState({ m1: { geno: 'FF', color: null }, m2: { geno: 'Ff', color: null }, m3: { geno: 'ff', color: null } });
        const [activePaint, setActivePaint] = useState(null);
        const paintMonster = (id) => { if (!activePaint) return; setMonsters(prev => ({ ...prev, [id]: { ...prev[id], color: activePaint } })); };
        const checkAnswer = () => { if (monsters.m1.color === 'purple' && monsters.m2.color === 'purple' && monsters.m3.color === 'yellow') onSuccess(); else alert("Remember: Dominant (F) wins!"); };

        return (
        <div className="flex flex-col items-center gap-4 text-sm">
            <p className="text-center font-medium">Grab paint and color based on genotype.</p>
            <div className="flex gap-4 p-3 bg-gray-100 rounded-xl"><button onClick={()=> setActivePaint('purple')} className={`px-4 py-2 rounded font-bold flex gap-2 ${activePaint === 'purple' ? 'bg-purple-600 text-white' : 'bg-white text-purple-600'}`}><PaintBucket size={18} /> Purple</button><button onClick={()=> setActivePaint('yellow')} className={`px-4 py-2 rounded font-bold flex gap-2 ${activePaint === 'yellow' ? 'bg-yellow-400 text-yellow-900' : 'bg-white text-yellow-600'}`}><PaintBucket size={18} /> Yellow</button></div>
            <div className="flex justify-around w-full">{Object.entries(monsters).map(([id, data]) => ( <div key={id} onClick={()=> paintMonster(id)} className="flex flex-col items-center cursor-pointer transition-transform hover:scale-105"><Monster genotype={data.color==='purple' ? 'F' : data.color==='yellow' ? 'f' : '' } className="w-16 h-16" /><div className="mt-2 bg-white px-3 py-1 rounded shadow font-bold font-mono">{data.geno}</div></div> ))}</div>
            <Button onClick={checkAnswer} className="mt-4">Check Phenotypes</Button>
        </div>
        );
        };

        const SortingChallenge = ({ items, categories, successCondition, errorMessage, onSuccess, description }) => {
        const [assignments, setAssignments] = useState(items.map(i => ({ ...i, box: null })));
        const [selectedItem, setSelectedItem] = useState(null);
        const handleBoxClick = (boxId) => { if (!selectedItem) return; setAssignments(prev => prev.map(item => item.id === selectedItem ? { ...item, box: boxId } : item)); setSelectedItem(null); };

        return (
        <div className="flex flex-col items-center gap-6 w-full text-xs">
            <p className="text-center font-bold text-sm text-gray-700">{description}</p>
            <div className="flex flex-wrap justify-center gap-2 min-h-[50px] w-full p-3 bg-gray-50 rounded border-2 border-dashed border-gray-300">{assignments.filter(i => i.box === null).map(item => ( <div key={item.id} onClick={()=> setSelectedItem(item.id === selectedItem ? null : item.id)} className={`cursor-pointer px-3 py-1 bg-white rounded shadow font-bold border-2 transition-all ${selectedItem === item.id ? 'border-purple-500 scale-110' : 'border-gray-200'}`}>{item.label}</div> ))}</div>
            <div className="grid grid-cols-2 gap-4 w-full">{categories.map(cat => ( <div key={cat.id} onClick={()=> handleBoxClick(cat.id)} className={`flex flex-col items-center p-3 rounded-xl border-4 cursor-pointer min-h-[120px] ${selectedItem ? 'border-purple-400 bg-purple-50' : 'border-gray-200 bg-gray-50'}`}><h3 className={`font-bold mb-2 text-sm ${cat.colorClass}`}>{cat.title}</h3><div className="flex flex-col gap-1 w-full">{assignments.filter(i => i.box === cat.id).map(item => ( <div key={item.id} className="px-2 py-1 bg-white rounded shadow text-center font-bold">{item.label}</div> ))}</div></div> ))}</div>
            <Button onClick={()=> successCondition(assignments) ? onSuccess() : alert(errorMessage)} disabled={assignments.some(x => x.box === null)} className="mt-2 text-sm">Check Sorting</Button>
        </div>
        );
        };

        const Challenge7 = ({ onSuccess }) => {
        const [topSlots, setTopSlots] = useState([null, null]);
        const [sideSlots, setSideSlots] = useState([null, null]);
        const [selectedAllele, setSelectedAllele] = useState(null);
        const handleSlotClick = (zone, idx) => {
            if (!selectedAllele) return;
            if (selectedAllele.source === (zone === 'top' ? 'p1' : 'p2')) { const n = zone === 'top' ? [...topSlots] : [...sideSlots]; n[idx] = selectedAllele.val; if (zone === 'top') setTopSlots(n); else setSideSlots(n); setSelectedAllele(null); }
            else alert("Wrong side!");
        };
        useEffect(() => { if (!topSlots.includes(null) && !sideSlots.includes(null)) { if (topSlots.includes('F') && topSlots.includes('f') && sideSlots.includes('F') && sideSlots.includes('f')) setTimeout(onSuccess, 500); } }, [topSlots, sideSlots]);

        return (
        <div className="flex flex-col items-center gap-6 w-full text-xs">
            <p className="text-center font-bold text-sm text-gray-700">Set up the Punnett Square! Tap Parent letter, then a square.</p>
            <div className="flex gap-4">
                <div className="bg-blue-50 p-2 rounded border border-blue-200 flex flex-col items-center"><span className="text-xs font-bold text-blue-800 mb-1">Parent 1 (Top)</span><div className="flex gap-1">{['F', 'f'].map((a, i) => ( <button key={i} onClick={()=> setSelectedAllele({source: 'p1', val: a, id: `p1-${i}`})} className={`w-8 h-8 rounded font-bold border-2 ${selectedAllele?.id === `p1-${i}` ? 'bg-blue-500 text-white' : 'bg-white'}`}>{a}</button> ))}</div></div>
                <div className="bg-pink-50 p-2 rounded border border-pink-200 flex flex-col items-center"><span className="text-xs font-bold text-pink-800 mb-1">Parent 2 (Side)</span><div className="flex gap-1">{['F', 'f'].map((a, i) => ( <button key={i} onClick={()=> setSelectedAllele({source: 'p2', val: a, id: `p2-${i}`})} className={`w-8 h-8 rounded font-bold border-2 ${selectedAllele?.id === `p2-${i}` ? 'bg-pink-500 text-white' : 'bg-white'}`}>{a}</button> ))}</div></div>
            </div>
            <div className="relative p-6 bg-white rounded-xl shadow-inner border-2 border-gray-100"><div className="grid grid-cols-3 grid-rows-3 gap-2 w-48 h-48"><div></div>
                <div onClick={()=> handleSlotClick('top', 0)} className="border-b-4 border-gray-400 flex items-center justify-center font-bold cursor-pointer">{topSlots[0] || '?'}</div>
                <div onClick={()=> handleSlotClick('top', 1)} className="border-b-4 border-l-4 border-gray-400 flex items-center justify-center font-bold cursor-pointer">{topSlots[1] || '?'}</div>
                <div onClick={()=> handleSlotClick('side', 0)} className="border-r-4 border-gray-400 flex items-center justify-center font-bold cursor-pointer">{sideSlots[0] || '?'}</div><div className="bg-gray-100"></div><div className="bg-gray-100 border-l-4 border-gray-400"></div>
                <div onClick={()=> handleSlotClick('side', 1)} className="border-r-4 border-t-4 border-gray-400 flex items-center justify-center font-bold cursor-pointer">{sideSlots[1] || '?'}</div><div className="bg-gray-100 border-t-4 border-gray-400"></div><div className="bg-gray-100 border-l-4 border-t-4 border-gray-400"></div>
            </div></div>
        </div>
        );
        };

        const LESSONS = [
            { title: "1. Traits and Genes", concept: "A trait is a characteristic. In our monsters, 'Fur Color' is determined by DNA instructions called genes.", ChallengeComponent: Challenge1 },
            { title: "2. Alleles (Gene Variations)", concept: "Genes have different versions called Alleles. Our variations are Purple (F) and Yellow (f).", ChallengeComponent: Challenge2 },
            { title: "3. Diploid Inheritance", concept: "Monsters inherit TWO alleles for every trait—one from each parent.", ChallengeComponent: Challenge3 },
            { title: "4. Dominant & Recessive", concept: "DOMINANT (F) wins. RECESSIVE (f) is hidden unless there are two copies.", ChallengeComponent: Challenge4 },
            { title: "5. Genotype vs. Phenotype", concept: "GENOTYPE: Genetic code (Ff). PHENOTYPE: Physical look (Purple).", ChallengeComponent: (props) => ( <SortingChallenge {...props} description="Sort Genotypes (letters) from Phenotypes (physical looks)." items={[ { id: '1', label: 'Ff', type: 'g' }, { id: '2', label: 'Purple Fur', type: 'p' }, { id: '3', label: 'ff', type: 'g' }, { id: '4', label: 'Yellow Fur', type: 'p' }, { id: '5', label: 'FF', type: 'g' } ]} categories={[ { id: 'geno', title: 'GENOTYPE', colorClass: 'text-blue-700' }, { id: 'pheno', title: 'PHENOTYPE', colorClass: 'text-green-700' } ]} successCondition={(a)=> a.every(x => (x.type === 'g' && x.box === 'geno') || (x.type === 'p' && x.box === 'pheno'))} errorMessage="Check your boxes!" /> ) },
            { title: "6. Zygosity", concept: "HOMOZYGOUS: Same alleles (FF or ff). HETEROZYGOUS: Different alleles (Ff).", ChallengeComponent: (props) => ( <SortingChallenge {...props} description="Sort into Homozygous and Heterozygous." items={[ { id: '1', label: 'FF', type: 'homo' }, { id: '2', label: 'Ff', type: 'hetero' }, { id: '3', label: 'ff', type: 'homo' }, { id: '4', label: 'fF', type: 'hetero' } ]} categories={[ { id: 'homo', title: 'HOMOZYGOUS', colorClass: 'text-teal-700' }, { id: 'hetero', title: 'HETEROZYGOUS', colorClass: 'text-orange-700' } ]} successCondition={(a)=> a.every(x => x.box === x.type)} errorMessage="Check your letters!" /> ) },
            { title: "7. Punnett Square Setup", concept: "We place alleles from Parent 1 across the top and Parent 2 down the side.", ChallengeComponent: Challenge7 }
        ];

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [unlockedStep, setUnlockedStep] = useState(0);
            const [showCelebration, setShowCelebration] = useState(false);
            const handleSuccess = () => { setShowCelebration(true); if (currentStep === unlockedStep) setUnlockedStep(prev => Math.min(prev + 1, LESSONS.length)); setTimeout(() => { setShowCelebration(false); if (currentStep < LESSONS.length - 1) setCurrentStep(prev => prev + 1); }, 2000); };

            return (
                <div className="flex-grow p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="mb-6 flex items-center justify-between bg-white p-4 rounded-2xl shadow-sm border border-purple-100">
                            <div className="flex items-center gap-4"><div className="bg-purple-100 p-2 rounded-full"><Dna className="text-purple-600" size={28} /></div><div><h1 className="text-xl font-bold text-purple-900">Monster Genetics</h1><p className="text-[10px] text-gray-500">Foundational Concepts</p></div></div>
                            <div className="text-right hidden sm:block"><span className="text-[10px] font-bold text-purple-600 uppercase tracking-widest">Progress</span><div className="flex gap-1 mt-1">{LESSONS.map((_, i) => ( <div key={i} className={`h-1 w-5 rounded-full ${i < unlockedStep ? 'bg-purple-500' : i===currentStep ? 'bg-purple-300 animate-pulse' : 'bg-gray-200' }`} /> ))}</div></div>
                        </header>
                        {(unlockedStep === LESSONS.length && currentStep === LESSONS.length - 1) ? (
                            <Card className="p-10 text-center bg-gradient-to-br from-purple-600 to-indigo-600 text-white animate-fade-in"><Sparkles className="mx-auto mb-4 text-yellow-300" size={60} /><h2 className="text-2xl font-bold mb-2">Genetics Master!</h2><p className="text-sm mb-6 opacity-90">You have successfully mastered Mendelian genetics.</p><Button variant="secondary" onClick={()=> { setCurrentStep(0); setUnlockedStep(0); }} className="mx-auto">Restart</Button></Card>
                        ) : (
                            <div className="flex flex-col md:flex-row gap-6">
                                <nav className="w-full md:w-64 flex flex-col gap-2 shrink-0">{LESSONS.map((lesson, index) => { const isLocked = index > unlockedStep; const isActive = index === currentStep; const isPassed = index < unlockedStep; return ( <div key={index} onClick={()=> !isLocked && setCurrentStep(index)} className={`p-3 rounded-xl border-2 transition-all flex items-center gap-3 cursor-pointer text-xs ${isLocked ? 'bg-gray-50 border-gray-100 text-gray-400 opacity-70' : isActive ? 'bg-white border-purple-500 shadow-md font-bold' : 'bg-white border-purple-100 hover:border-purple-300' }`}><div className={`${isPassed ? 'text-green-500' : isActive ? 'text-purple-600' : 'text-gray-400'}`}>{isPassed ? <CheckCircle size={16} /> : isLocked ? <Lock size={16} /> : <Unlock size={16} />}</div><span>{lesson.title}</span></div> ); })}</nav>
                                <Card className="flex-grow flex flex-col relative min-h-[450px]">{showCelebration && <div className="absolute inset-0 z-50 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center animate-fade-in"><div className="bg-green-100 text-green-600 p-6 rounded-full mb-4 animate-bounce"><CheckCircle size={64} /></div><h2 className="text-xl font-bold text-green-700">Unlocked!</h2></div>}<div className="p-5 border-b border-gray-50 bg-purple-50/20"><h2 className="text-lg font-bold text-purple-900 mb-1">{LESSONS[currentStep].title}</h2><p className="text-xs text-gray-700 leading-relaxed">{LESSONS[currentStep].concept}</p></div><div className="p-5 flex-grow flex flex-col justify-center bg-white">{React.createElement(LESSONS[currentStep].ChallengeComponent, { onSuccess: handleSuccess })}</div></Card>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
