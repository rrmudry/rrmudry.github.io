<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connections Challenge | Physics Autograder</title>
    <link rel="icon" type="image/png" href="../head.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --slate-950: #030712;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-400: #94a3b8;
            --orange-500: #f97316;
            --orange-600: #ea580c;
            --yellow-500: #eab308;
            --green-500: #22c55e;
            --blue-500: #3b82f6;
            --purple-500: #a855f7;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--slate-950);
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.015) 1px, transparent 0);
            background-size: 32px 32px;
            color: #f8fafc;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 2rem 1rem;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, var(--slate-400) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            font-style: italic;
        }

        .subtitle {
            color: var(--slate-400);
            font-size: 0.9rem;
            margin: 0.5rem 0 0 0;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Glass Panel */
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Pack Selector Dropdown */
        .select-wrapper {
            position: relative;
            width: 100%;
        }

        .select-wrapper select {
            width: 100%;
            background-color: var(--slate-900);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-family: inherit;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 0.75rem;
            cursor: pointer;
            appearance: none;
            transition: all 0.3s;
        }

        .select-wrapper select:focus {
            outline: none;
            border-color: var(--orange-500);
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.2);
        }

        .select-wrapper::after {
            content: "▼";
            font-size: 0.7rem;
            color: var(--slate-400);
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            width: 100%;
        }

        .card {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 0.5rem;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            word-break: break-word;
        }

        @media (max-width: 480px) {
            .card {
                font-size: 0.7rem;
                padding: 0.25rem;
            }
        }

        .card:hover:not(.completed) {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .card.selected {
            background: var(--orange-500);
            border-color: var(--orange-500);
            color: white;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
            transform: scale(0.95);
        }

        /* Banners */
        .banner {
            grid-column: span 4;
            padding: 0.85rem;
            border-radius: 0.75rem;
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            animation: banner-pop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            box-sizing: border-box;
        }

        @keyframes banner-pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .banner-yellow {
            background: rgba(234, 179, 8, 0.15);
            color: #fef08a;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }
        .banner-green {
            background: rgba(34, 197, 94, 0.15);
            color: #bbf7d0;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .banner-blue {
            background: rgba(59, 130, 246, 0.15);
            color: #bfdbfe;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .banner-purple {
            background: rgba(168, 85, 247, 0.15);
            color: #e9d5ff;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .banner-title {
            font-size: 0.85rem;
            margin-bottom: 0.1rem;
        }

        .banner-words {
            font-family: 'JetBrains Mono', monospace;
            opacity: 0.85;
            font-weight: 500;
            font-size: 0.7rem;
        }

        /* Status & Mistakes */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--slate-400);
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .mistakes-dots {
            display: flex;
            gap: 0.35rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--slate-800);
            transition: all 0.3s;
        }

        .dot.active {
            background-color: var(--orange-500);
            box-shadow: 0 0 8px var(--orange-500);
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr;
            gap: 0.5rem;
        }

        button.btn {
            font-family: inherit;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: none;
            box-sizing: border-box;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: var(--slate-400);
        }

        .btn-outline:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-color: rgba(255, 255, 255, 0.2) !important;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--orange-500) 0%, var(--orange-600) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(249, 115, 22, 0.35);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Creator / Form Styles */
        .section-title {
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 1rem;
            border-radius: 1rem;
            background: rgba(255,255,255,0.015);
            border: 1px solid rgba(255,255,255,0.03);
        }

        .form-group-yellow { border-left: 4px solid var(--yellow-500); }
        .form-group-green { border-left: 4px solid var(--green-500); }
        .form-group-blue { border-left: 4px solid var(--blue-500); }
        .form-group-purple { border-left: 4px solid var(--purple-500); }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-label-yellow { color: var(--yellow-500); }
        .form-label-green { color: var(--green-500); }
        .form-label-blue { color: var(--blue-500); }
        .form-label-purple { color: var(--purple-500); }

        input.input-text {
            background: var(--slate-950);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        input.input-text:focus {
            outline: none;
            border-color: var(--orange-500);
        }

        .form-words-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        /* Toast & Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            width: 100%;
            max-width: 450px;
            background: var(--slate-900);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            text-align: center;
            transform: scale(0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            font-style: italic;
        }

        .emoji-grid-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            letter-spacing: 0.1em;
            line-height: 1.4;
            background: var(--slate-950);
            padding: 1rem;
            border-radius: 0.75rem;
            display: inline-block;
            margin: 0 auto;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--slate-800);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            z-index: 200;
            pointer-events: none;
        }

        .toast.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .footer-logo {
            text-align: center;
            font-size: 0.65rem;
            color: var(--slate-800);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            margin-top: 2rem;
        }

        .creator-toggle-btn {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--orange-500);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            transition: all 0.2s;
        }

        .creator-toggle-btn:hover {
            color: white;
            text-shadow: 0 0 8px var(--orange-500);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Header -->
        <header>
            <h1>Connections</h1>
            <div class="subtitle">Physics word-grouping challenge</div>
        </header>

        <!-- Game Screen -->
        <div id="game-screen" class="glass-card">
            
            <div class="select-wrapper">
                <select id="preset-selector" onchange="onPresetSelected()">
                    <option value="0">Forces & Newton's Laws</option>
                    <option value="1">Waves & Optics</option>
                    <option value="2">Thermodynamics & Energy</option>
                    <option value="3">Electricity & Magnetism</option>
                </select>
            </div>

            <!-- Status Label & Mistakes -->
            <div class="status-row">
                <span id="game-status-lbl">Create groups of four!</span>
                <div class="mistakes-dots">
                    <span style="font-size: 0.7rem; margin-right: 0.25rem; align-self: center;">MISTAKES:</span>
                    <span id="dot-0" class="dot active"></span>
                    <span id="dot-1" class="dot active"></span>
                    <span id="dot-2" class="dot active"></span>
                    <span id="dot-3" class="dot active"></span>
                </div>
            </div>

            <!-- Board Grid -->
            <div id="connections-grid" class="grid">
                <!-- JS Populated -->
            </div>

            <!-- Control Buttons -->
            <div class="controls">
                <button onclick="shuffleGrid()" class="btn btn-outline">Shuffle</button>
                <button onclick="deselectAll()" class="btn btn-outline">Deselect</button>
                <button id="submit-guess-btn" onclick="submitGuess()" class="btn btn-primary" disabled>Submit</button>
            </div>

            <!-- Custom Creator Link Trigger -->
            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 0.5rem; margin-top: 0.5rem;">
                <span id="loader-mode-badge" style="font-weight: 700; color: var(--slate-400); font-size: 0.75rem;">Preset Puzzle Pack</span>
                <button onclick="toggleView('creator')" class="creator-toggle-btn">
                    <i data-lucide="plus-circle" style="width: 14px; height: 14px;"></i> Custom Creator
                </button>
            </div>

        </div>

        <!-- Creator Screen -->
        <div id="creator-screen" class="glass-card" style="display: none;">
            <div class="section-title">
                <span>Custom Board Creator</span>
                <button onclick="toggleView('game')" class="creator-toggle-btn" style="color: var(--slate-400);">
                    <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Back to Game
                </button>
            </div>

            <!-- Category 1 (Yellow) -->
            <div class="form-group form-group-yellow">
                <label class="form-label form-label-yellow">Category 1 (Easy)</label>
                <input type="text" id="form-cat-title-0" placeholder="e.g. Contact Forces" class="input-text">
                <div class="form-words-grid">
                    <input type="text" id="form-word-0-0" placeholder="Word 1" class="input-text">
                    <input type="text" id="form-word-0-1" placeholder="Word 2" class="input-text">
                    <input type="text" id="form-word-0-2" placeholder="Word 3" class="input-text">
                    <input type="text" id="form-word-0-3" placeholder="Word 4" class="input-text">
                </div>
            </div>

            <!-- Category 2 (Green) -->
            <div class="form-group form-group-green">
                <label class="form-label form-label-green">Category 2 (Medium)</label>
                <input type="text" id="form-cat-title-1" placeholder="e.g. Field Forces" class="input-text">
                <div class="form-words-grid">
                    <input type="text" id="form-word-1-0" placeholder="Word 1" class="input-text">
                    <input type="text" id="form-word-1-1" placeholder="Word 2" class="input-text">
                    <input type="text" id="form-word-1-2" placeholder="Word 3" class="input-text">
                    <input type="text" id="form-word-1-3" placeholder="Word 4" class="input-text">
                </div>
            </div>

            <!-- Category 3 (Blue) -->
            <div class="form-group form-group-blue">
                <label class="form-label form-label-blue">Category 3 (Hard)</label>
                <input type="text" id="form-cat-title-2" placeholder="e.g. Vector Quantities" class="input-text">
                <div class="form-words-grid">
                    <input type="text" id="form-word-2-0" placeholder="Word 1" class="input-text">
                    <input type="text" id="form-word-2-1" placeholder="Word 2" class="input-text">
                    <input type="text" id="form-word-2-2" placeholder="Word 3" class="input-text">
                    <input type="text" id="form-word-2-3" placeholder="Word 4" class="input-text">
                </div>
            </div>

            <!-- Category 4 (Purple) -->
            <div class="form-group form-group-purple">
                <label class="form-label form-label-purple">Category 4 (Tricky)</label>
                <input type="text" id="form-cat-title-3" placeholder="e.g. Famous Physicists" class="input-text">
                <div class="form-words-grid">
                    <input type="text" id="form-word-3-0" placeholder="Word 1" class="input-text">
                    <input type="text" id="form-word-3-1" placeholder="Word 2" class="input-text">
                    <input type="text" id="form-word-3-2" placeholder="Word 3" class="input-text">
                    <input type="text" id="form-word-3-3" placeholder="Word 4" class="input-text">
                </div>
            </div>

            <button onclick="generateCustomLink()" class="btn btn-primary w-full" style="padding: 1rem; width: 100%;">
                Generate shareable puzzle link
            </button>

            <!-- Output Link Box -->
            <div id="link-output-box" style="display: none; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem;">
                <label class="form-label" style="color: var(--slate-400);">Shareable link:</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="share-link-url" readonly class="input-text" style="flex-grow: 1;">
                    <button onclick="copyShareLink()" class="btn btn-primary" style="padding: 0 1rem; flex-shrink: 0;">Copy</button>
                </div>
            </div>
        </div>

        <div class="footer-logo"> rrmudry / connections </div>

    </div>

    <!-- Victory / Defeat Modal -->
    <div id="end-modal-overlay" class="modal-overlay">
        <div class="modal">
            <h2 id="modal-result-title" class="modal-title">Solved!</h2>
            <p id="modal-result-desc" style="color: var(--slate-400); font-size: 0.9rem; margin: 0 0 1rem 0;">You successfully solved the board!</p>
            <div id="modal-emoji-grid" class="emoji-grid-display">
                <!-- Emoji grid filled here -->
            </div>
            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <button onclick="copyEmojiGrid()" class="btn btn-primary" style="flex-grow: 1;">Share Results</button>
                <button onclick="closeModal()" class="btn btn-outline" style="flex-grow: 1;">Close</button>
            </div>
            <button id="modal-play-again-btn" onclick="playAgainPreset()" class="btn btn-outline" style="margin-top: 0.5rem; display: none;">Play Another Preset Pack</button>
        </div>
    </div>

    <!-- Toast Alert -->
    <div id="toast" class="toast">Copied to Clipboard!</div>

    <script>
        const PRESETS = [
            {
                name: "Forces & Newton's Laws",
                categories: [
                    { name: "Contact Forces", color: "yellow", words: ["Friction", "Tension", "Normal", "Spring"] },
                    { name: "Field Forces", color: "green", words: ["Gravity", "Electric", "Magnetic", "Strong Nuclear"] },
                    { name: "Vector Quantities", color: "blue", words: ["Velocity", "Acceleration", "Displacement", "Momentum"] },
                    { name: "Famous Physicists", color: "purple", words: ["Newton", "Galileo", "Einstein", "Hooke"] }
                ]
            },
            {
                name: "Waves & Optics",
                categories: [
                    { name: "Wave Properties", color: "yellow", words: ["Amplitude", "Frequency", "Wavelength", "Period"] },
                    { name: "Electromagnetic Spectrum", color: "green", words: ["Gamma Rays", "Radio", "Infrared", "Ultraviolet"] },
                    { name: "Wave Behaviors", color: "blue", words: ["Reflection", "Refraction", "Diffraction", "Interference"] },
                    { name: "Types of Waves", color: "purple", words: ["Transverse", "Longitudinal", "Sound", "Seismic"] }
                ]
            },
            {
                name: "Thermodynamics & Energy",
                categories: [
                    { name: "Energy Types", color: "yellow", words: ["Kinetic", "Potential", "Thermal", "Chemical"] },
                    { name: "Heat Transfer Modes", color: "green", words: ["Conduction", "Convection", "Radiation", "Advection"] },
                    { name: "Thermodynamic States", color: "blue", words: ["Temperature", "Pressure", "Volume", "Entropy"] },
                    { name: "Phase Changes", color: "purple", words: ["Melting", "Freezing", "Vaporization", "Condensation"] }
                ]
            },
            {
                name: "Electricity & Magnetism",
                categories: [
                    { name: "Circuit Components", color: "yellow", words: ["Resistor", "Capacitor", "Inductor", "Diode"] },
                    { name: "Electrical Quantities", color: "green", words: ["Voltage", "Current", "Resistance", "Charge"] },
                    { name: "Magnetic Objects", color: "blue", words: ["Compass", "Lodestone", "Solenoid", "Earth"] },
                    { name: "Materials", color: "purple", words: ["Conductor", "Insulator", "Semiconductor", "Superconductor"] }
                ]
            }
        ];

        let connectionsData = null; // Active categories config
        let gridWords = [];        // Shuffled grid state {word, catIndex}
        let selectedWords = [];    // Currently selected words
        let completedCategories = []; // Indices of completed categories (0 to 3)
        let mistakesRemaining = 4;
        let guessHistory = [];     // Array of guess strings for emoji grid share

        window.addEventListener('load', () => {
            lucide.createIcons();
            initApp();
        });

        // Initialize App: Checks for custom URL param, else loads first preset
        function initApp() {
            const params = new URLSearchParams(window.location.search);
            const rawPuzzle = params.get('p');
            
            if (rawPuzzle) {
                const customConfig = decodeData(rawPuzzle);
                if (customConfig && customConfig.categories && customConfig.categories.length === 4) {
                    connectionsData = customConfig;
                    document.getElementById('preset-selector').style.display = 'none';
                    document.getElementById('loader-mode-badge').innerText = "Playing Custom Puzzle 🔗";
                    document.getElementById('loader-mode-badge').style.color = "var(--orange-500)";
                    document.getElementById('modal-play-again-btn').style.display = 'block';
                    loadGame();
                    return;
                } else {
                    showToast("Failed to load custom link. Loading default preset.");
                }
            }

            // Normal preset load
            document.getElementById('preset-selector').style.display = 'block';
            document.getElementById('loader-mode-badge').innerText = "Preset Puzzle Pack";
            document.getElementById('loader-mode-badge').style.color = "var(--slate-400)";
            document.getElementById('modal-play-again-btn').style.display = 'none';
            onPresetSelected();
        }

        function onPresetSelected() {
            const idx = parseInt(document.getElementById('preset-selector').value) || 0;
            connectionsData = PRESETS[idx];
            loadGame();
        }

        // Set up active board
        function loadGame() {
            gridWords = [];
            selectedWords = [];
            completedCategories = [];
            mistakesRemaining = 4;
            guessHistory = [];
            
            document.getElementById('game-status-lbl').innerText = "Create groups of four!";
            document.getElementById('submit-guess-btn').disabled = true;

            updateMistakesUI();

            connectionsData.categories.forEach((cat, idx) => {
                cat.words.forEach(word => {
                    gridWords.push({
                        word: word,
                        catIndex: idx
                    });
                });
            });

            shuffleGrid();
            renderBoard();
        }

        // Render Board: completed banners on top, active cards grid on bottom
        function renderBoard() {
            const gridEl = document.getElementById('connections-grid');
            gridEl.innerHTML = '';

            // Render Completed Banners
            completedCategories.forEach(idx => {
                const cat = connectionsData.categories[idx];
                const banner = document.createElement('div');
                banner.className = `banner banner-${cat.color}`;
                banner.innerHTML = `
                    <div class="banner-title">${cat.name}</div>
                    <div class="banner-words">${cat.words.join(', ')}</div>
                `;
                gridEl.appendChild(banner);
            });

            // Filter out completed cards
            const activeWords = gridWords.filter(w => !completedCategories.includes(w.catIndex));

            // Render Remaining Active Cards
            activeWords.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerText = item.word;

                if (selectedWords.includes(item.word)) {
                    card.classList.add('selected');
                }

                card.onclick = () => selectCard(item.word);
                gridEl.appendChild(card);
            });
        }

        function selectCard(word) {
            if (mistakesRemaining <= 0 || completedCategories.length === 4) return;

            const idx = selectedWords.indexOf(word);
            if (idx > -1) {
                selectedWords.splice(idx, 1);
            } else {
                if (selectedWords.length >= 4) return;
                selectedWords.push(word);
            }

            // Sync submit button state
            document.getElementById('submit-guess-btn').disabled = (selectedWords.length !== 4);
            renderBoard();
        }

        function deselectAll() {
            selectedWords = [];
            document.getElementById('submit-guess-btn').disabled = true;
            renderBoard();
        }

        function shuffleGrid() {
            // Only shuffle active words
            const activeWords = gridWords.filter(w => !completedCategories.includes(w.catIndex));
            
            for (let i = activeWords.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [activeWords[i], activeWords[j]] = [activeWords[j], activeWords[i]];
            }

            let activePointer = 0;
            gridWords = gridWords.map(w => {
                if (completedCategories.includes(w.catIndex)) return w;
                return activeWords[activePointer++];
            });

            renderBoard();
        }

        function updateMistakesUI() {
            for (let i = 0; i < 4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (i < mistakesRemaining) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            }
        }

        // Validate selected words
        function submitGuess() {
            if (selectedWords.length !== 4) return;

            const selectedItems = gridWords.filter(w => selectedWords.includes(w.word));
            const categoryCounts = {};
            selectedItems.forEach(item => {
                categoryCounts[item.catIndex] = (categoryCounts[item.catIndex] || 0) + 1;
            });

            let matchedIdx = -1;
            let isOneAway = false;

            Object.keys(categoryCounts).forEach(catIdx => {
                const cnt = categoryCounts[catIdx];
                if (cnt === 4) {
                    matchedIdx = parseInt(catIdx);
                } else if (cnt === 3) {
                    isOneAway = true;
                }
            });

            // Compile emoji grid colors
            const colors = ['🟨', '🟩', '🟦', '🟪'];
            const guessColors = selectedWords.map(w => {
                const item = gridWords.find(gw => gw.word === w);
                return colors[item.catIndex];
            }).join('');
            guessHistory.push(guessColors);

            if (matchedIdx > -1) {
                // Correct Match
                completedCategories.push(matchedIdx);
                selectedWords = [];
                document.getElementById('submit-guess-btn').disabled = true;
                document.getElementById('game-status-lbl').innerText = "Excellent!";
                renderBoard();

                if (completedCategories.length === 4) {
                    endGame(true);
                }
            } else {
                // Incorrect Match
                mistakesRemaining--;
                updateMistakesUI();

                if (mistakesRemaining <= 0) {
                    endGame(false);
                } else {
                    document.getElementById('game-status-lbl').innerText = isOneAway ? "One away!" : "Try again!";
                    document.getElementById('game-status-lbl').style.color = "var(--orange-500)";
                    setTimeout(() => {
                        document.getElementById('game-status-lbl').style.color = "var(--slate-400)";
                    }, 1500);
                }
            }
        }

        function endGame(victory) {
            const overlay = document.getElementById('end-modal-overlay');
            const title = document.getElementById('modal-result-title');
            const desc = document.getElementById('modal-result-desc');
            const gridEl = document.getElementById('modal-emoji-grid');

            if (victory) {
                title.innerText = "Solved!";
                desc.innerText = "Fantastic physics connections puzzle solved!";
                title.style.color = "var(--green-500)";
            } else {
                title.innerText = "Game Over";
                desc.innerText = "Nice try! Click share to show your grid, or play another preset.";
                title.style.color = "var(--orange-500)";
                
                // Show solutions in order
                completedCategories = [0, 1, 2, 3];
                selectedWords = [];
                renderBoard();
            }

            gridEl.innerText = guessHistory.join('\n');
            overlay.classList.add('active');
        }

        function closeModal() {
            document.getElementById('end-modal-overlay').classList.remove('active');
        }

        function playAgainPreset() {
            closeModal();
            window.location.search = ""; // Revert to standard preset modes
        }

        // Copy Emoji grid board
        async function copyEmojiGrid() {
            let shareText = `Connections: Physics Edition\n`;
            if (completedCategories.length === 4 && mistakesRemaining > 0) {
                shareText += `Solved with ${4 - mistakesRemaining} mistakes!\n`;
            } else {
                shareText += `Attempted connections board\n`;
            }
            shareText += `${guessHistory.join('\n')}\n`;
            shareText += `Play here: ${window.location.origin}${window.location.pathname}`;

            try {
                await navigator.clipboard.writeText(shareText);
                showToast("Results copied to Clipboard!");
            } catch (err) {
                console.error(err);
                alert("Failed to copy results: " + err.message);
            }
        }

        // Toggle Screen Views (Game vs Custom Creator)
        function toggleView(mode) {
            const gameScreen = document.getElementById('game-screen');
            const creatorScreen = document.getElementById('creator-screen');

            if (mode === 'creator') {
                gameScreen.style.display = 'none';
                creatorScreen.style.display = 'flex';
            } else {
                gameScreen.style.display = 'flex';
                creatorScreen.style.display = 'none';
            }
        }

        // Custom Board URL Generator
        function generateCustomLink() {
            const categories = [];
            const colors = ['yellow', 'green', 'blue', 'purple'];
            
            for (let c = 0; c < 4; c++) {
                const name = document.getElementById(`form-cat-title-${c}`).value.trim();
                const words = [];
                for (let w = 0; w < 4; w++) {
                    const word = document.getElementById(`form-word-${c}-${w}`).value.trim();
                    if (word) words.push(word);
                }

                if (!name || words.length !== 4) {
                    alert(`Category ${c + 1} requires a valid title and exactly 4 words.`);
                    return;
                }

                categories.push({
                    name: name,
                    words: words,
                    color: colors[c]
                });
            }

            const boardConfig = { categories: categories };
            const payload = encodeData(boardConfig);
            
            const shareUrl = `${window.location.origin}${window.location.pathname}?p=${payload}`;
            document.getElementById('share-link-url').value = shareUrl;
            document.getElementById('link-output-box').style.display = 'flex';
        }

        async function copyShareLink() {
            const urlInput = document.getElementById('share-link-url');
            try {
                await navigator.clipboard.writeText(urlInput.value);
                showToast("Shareable link copied!");
            } catch (err) {
                console.error(err);
                alert("Failed to copy link: " + err.message);
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('active');
            setTimeout(() => {
                toast.classList.remove('active');
            }, 2500);
        }

        // Base64 helper supporting UTF-8 strings
        function encodeData(obj) {
            return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
        }
        
        function decodeData(str) {
            try {
                return JSON.parse(decodeURIComponent(escape(atob(str))));
            } catch (e) {
                console.error("Base64 parsing error:", e);
                return null;
            }
        }
    </script>
</body>
</html>
